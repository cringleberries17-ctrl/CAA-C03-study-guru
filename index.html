<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SAA-C03 Study</title>
<meta name="theme-color" content="#232F3E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SAA-C03">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#232F3E;overflow:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}

  .frames{position:fixed;inset:0;bottom:calc(58px + env(safe-area-inset-bottom));background:#EDF0F3}
  .frames iframe{
    position:absolute;inset:0;width:100%;height:100%;border:none;
    display:none;background:#EDF0F3;
  }
  .frames iframe.active{display:block}

  .tabbar{
    position:fixed;left:0;right:0;bottom:0;height:calc(58px + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom);
    display:flex;background:#1B2836;border-top:1px solid #2E3D4E;
    box-shadow:0 -2px 10px rgba(0,0,0,.25);
  }
  .tab{
    position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    background:none;border:none;color:#8DA0B3;font:inherit;font-size:11.5px;font-weight:600;
    letter-spacing:.02em;cursor:pointer;height:58px;-webkit-tap-highlight-color:transparent;
  }
  .tab .ic{font-size:20px;line-height:1}
  .tab.on{color:#fff}
  .tab.on .ic{filter:none}
  .tab:not(.on) .ic{opacity:.75}
  .tab.on::before{
    content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:30px;height:3px;border-radius:0 0 3px 3px;background:#E48312;
  }

  .zoombar{
    position:fixed;top:calc(8px + env(safe-area-inset-top));right:8px;z-index:50;
    display:flex;align-items:center;gap:2px;background:rgba(27,40,54,.88);backdrop-filter:blur(6px);
    border-radius:999px;padding:4px;box-shadow:0 2px 10px rgba(0,0,0,.3);
  }
  .zoombar button{
    width:32px;height:32px;border:none;border-radius:999px;background:none;color:#fff;
    font-size:17px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;
    display:flex;align-items:center;justify-content:center;font-family:inherit;
  }
  .zoombar button:active{background:rgba(255,255,255,.18)}
  .zoombar .pct{
    font-size:11px;font-weight:600;color:#C9D3DD;min-width:36px;text-align:center;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }

  @media (prefers-reduced-motion:reduce){ *{transition:none!important} }
</style>
</head>
<body>

<div class="frames">
  <iframe id="frameNotes" class="active" src="aws-study-notes.html" title="AWS Study Notes"></iframe>
  <iframe id="frameExam" src="saa-c03-mock-exam_2.html" title="SAA-C03 Mock Exam"></iframe>
</div>

<div class="zoombar" role="group" aria-label="Zoom controls">
  <button id="zoomOut" aria-label="Zoom out">−</button>
  <span class="pct" id="zoomPct" title="Tap to reset">100%</span>
  <button id="zoomIn" aria-label="Zoom in">+</button>
</div>

<nav class="tabbar" role="tablist" aria-label="Sections">
  <button class="tab on" id="tabNotes" role="tab" aria-selected="true">
    <span class="ic">📖</span><span>Notes</span>
  </button>
  <button class="tab" id="tabExam" role="tab" aria-selected="false">
    <span class="ic">📝</span><span>Mock Exam</span>
  </button>
</nav>

<script>
"use strict";
const tabs = {
  notes: { tab: document.getElementById("tabNotes"), frame: document.getElementById("frameNotes") },
  exam:  { tab: document.getElementById("tabExam"),  frame: document.getElementById("frameExam")  }
};

function activate(name){
  Object.entries(tabs).forEach(([k, v])=>{
    const on = k === name;
    v.tab.classList.toggle("on", on);
    v.tab.setAttribute("aria-selected", on ? "true" : "false");
    v.frame.classList.toggle("active", on);
  });
  try{ localStorage.setItem("saa-c03-last-tab", name); }catch(e){}
}

tabs.notes.tab.onclick = ()=> activate("notes");
tabs.exam.tab.onclick  = ()=> activate("exam");

let start = "notes";
try{ start = localStorage.getItem("saa-c03-last-tab") || "notes"; }catch(e){}
activate(start);

if("serviceWorker" in navigator && location.protocol !== "file:"){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}

/* ---------- zoom controls ----------
   iOS disables native pinch-zoom for home-screen standalone apps, so we
   scale the (same-origin) iframe documents ourselves via CSS zoom. */
const ZOOM_KEY = "saa-c03-zoom";
const ZOOM_MIN = 0.7, ZOOM_MAX = 1.6, ZOOM_STEP = 0.1;
let zoom = 1;
try{ zoom = parseFloat(localStorage.getItem(ZOOM_KEY)) || 1; }catch(e){}

function applyZoom(){
  [tabs.notes.frame, tabs.exam.frame].forEach(f=>{
    try{ f.contentDocument.documentElement.style.zoom = zoom; }catch(e){}
  });
  $zoomPct.textContent = Math.round(zoom * 100) + "%";
  try{ localStorage.setItem(ZOOM_KEY, zoom); }catch(e){}
}
function setZoom(z){
  zoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, Math.round(z * 100) / 100));
  applyZoom();
}

const $zoomPct = document.getElementById("zoomPct");
document.getElementById("zoomOut").onclick = ()=> setZoom(zoom - ZOOM_STEP);
document.getElementById("zoomIn").onclick  = ()=> setZoom(zoom + ZOOM_STEP);
$zoomPct.onclick = ()=> setZoom(1);

tabs.notes.frame.addEventListener("load", applyZoom);
tabs.exam.frame.addEventListener("load", applyZoom);
applyZoom();
</script>
</body>
</html>
