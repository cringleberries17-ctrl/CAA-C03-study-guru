<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SAA-C03 Study</title>
<meta name="theme-color" content="#232F3E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SAA-C03">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#232F3E;overflow:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}

  .frames{position:fixed;inset:0;bottom:calc(58px + env(safe-area-inset-bottom));background:#EDF0F3}
  .frames iframe{
    position:absolute;inset:0;width:100%;height:100%;border:none;
    display:none;background:#EDF0F3;
  }
  .frames iframe.active{display:block}

  .tabbar{
    position:fixed;left:0;right:0;bottom:0;height:calc(58px + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom);
    display:flex;background:#1B2836;border-top:1px solid #2E3D4E;
    box-shadow:0 -2px 10px rgba(0,0,0,.25);
  }
  .tab{
    position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    background:none;border:none;color:#8DA0B3;font:inherit;font-size:11.5px;font-weight:600;
    letter-spacing:.02em;cursor:pointer;height:58px;-webkit-tap-highlight-color:transparent;
  }
  .tab .ic{font-size:20px;line-height:1}
  .tab.on{color:#fff}
  .tab.on .ic{filter:none}
  .tab:not(.on) .ic{opacity:.75}
  .tab.on::before{
    content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:30px;height:3px;border-radius:0 0 3px 3px;background:#E48312;
  }

  @media (prefers-reduced-motion:reduce){ *{transition:none!important} }
</style>
</head>
<body>

<div class="frames">
  <iframe id="frameNotes" class="active" src="aws-study-notes.html" title="AWS Study Notes"></iframe>
  <iframe id="frameExam" src="saa-c03-mock-exam_2.html" title="SAA-C03 Mock Exam"></iframe>
</div>

<nav class="tabbar" role="tablist" aria-label="Sections">
  <button class="tab on" id="tabNotes" role="tab" aria-selected="true">
    <span class="ic">📖</span><span>Notes</span>
  </button>
  <button class="tab" id="tabExam" role="tab" aria-selected="false">
    <span class="ic">📝</span><span>Mock Exam</span>
  </button>
</nav>

<script>
"use strict";
const tabs = {
  notes: { tab: document.getElementById("tabNotes"), frame: document.getElementById("frameNotes") },
  exam:  { tab: document.getElementById("tabExam"),  frame: document.getElementById("frameExam")  }
};

function activate(name){
  Object.entries(tabs).forEach(([k, v])=>{
    const on = k === name;
    v.tab.classList.toggle("on", on);
    v.tab.setAttribute("aria-selected", on ? "true" : "false");
    v.frame.classList.toggle("active", on);
  });
  try{ localStorage.setItem("saa-c03-last-tab", name); }catch(e){}
}

tabs.notes.tab.onclick = ()=> activate("notes");
tabs.exam.tab.onclick  = ()=> activate("exam");

let start = "notes";
try{ start = localStorage.getItem("saa-c03-last-tab") || "notes"; }catch(e){}
activate(start);

if("serviceWorker" in navigator && location.protocol !== "file:"){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
