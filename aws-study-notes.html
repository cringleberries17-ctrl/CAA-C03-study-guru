thead>\n<tbody>\n<tr>\n<td><strong>Management<\/strong><\/td>\n<td>AWS manages everything. No OS access.<\/td>\n<td>AWS provisions &amp; patches EC2s. You can access the OS.<\/td>\n<td>You manage the EC2s (ASG, patching, OS updates).<\/td>\n<\/tr>\n<tr>\n<td><strong>Infrastructure<\/strong><\/td>\n<td>Serverless.<\/td>\n<td>Instances in your account, managed by AWS.<\/td>\n<td>Instances in your account, managed by you.<\/td>\n<\/tr>\n<tr>\n<td><strong>Capabilities<\/strong><\/td>\n<td>Limited (No GPU, specific storage limits).<\/td>\n<td><strong>Full EC2 features<\/strong> (GPUs, Local NVMe, Spot).<\/td>\n<td><strong>Full EC2 features<\/strong> (GPUs, Local NVMe, Spot).<\/td>\n<\/tr>\n<tr>\n<td><strong>Use Case<\/strong><\/td>\n<td>Low ops overhead, batch jobs, general web apps.<\/td>\n<td>AI/ML (GPUs) or high-performance apps requiring specific instances but <strong>no ops overhead<\/strong>.<\/td>\n<td>Legacy compliance, granular control, or specific cost optimization strategies.<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2>3. Amazon ECS - Auto Scaling<\/h2>\n<p><em>Scaling in ECS happens at two levels: The Service (Application) and the Cluster (Infrastructure).<\/em><\/p>\n<h3>Service Auto Scaling (Application Level)<\/h3>\n<p>Uses <strong>Application Auto Scaling<\/strong> to increase/decrease the number of Tasks.<\/p>\n<ul>\n<li><strong>Target Tracking:<\/strong> \"Keep CPU utilization at 70%.\" (Most common).<\/li>\n<li><strong>Step Scaling:<\/strong> \"If alarm breaches X, add 2 tasks.\"<\/li>\n<li><strong>Scheduled Scaling:<\/strong> \"At 8 AM, scale to 10 tasks.\"<\/li>\n<\/ul>\n<h3>Cluster Auto Scaling (Infrastructure Level)<\/h3>\n<ul>\n<li><strong>Capacity Providers:<\/strong> The link between ECS and the Auto Scaling Group (ASG).<\/li>\n<li><strong>Scenario:<\/strong> If you have 2 EC2 instances and they are full, and you try to launch a new Task, it will fail.<\/li>\n<li><strong>Solution:<\/strong> The <strong>ECS Capacity Provider<\/strong> detects that a task is in a <code>PROVISIONING<\/code> state (waiting for resources) and triggers the ASG to launch new EC2 instances automatically.<\/li>\n<\/ul>\n<h2>4. Amazon ECS - Solutions Architectures<\/h2>\n<h3>Pattern A: Microservices behind ALB<\/h3>\n<ul>\n<li><strong>Architecture:<\/strong> ALB (Public Subnet) -&gt; ECS Service (Private Subnet).<\/li>\n<li><strong>Dynamic Port Mapping:<\/strong> When using <strong>EC2 Launch Type<\/strong>, you can set the host port to 0. The ALB automatically detects which random port the container was assigned and routes traffic there. This allows multiple copies of the same container on a single EC2 instance.<\/li>\n<\/ul>\n<h3>Pattern B: Event-Driven Tasks<\/h3>\n<ul>\n<li><strong>Architecture:<\/strong> S3 Event -&gt; EventBridge -&gt; ECS Task.<\/li>\n<li><strong>Use Case:<\/strong> An image is uploaded to S3; an ECS task spins up to resize it and then shuts down.<\/li>\n<li><strong>Exam Tip:<\/strong> Use <strong>Fargate<\/strong> here. You don't want to pay for an EC2 instance running 24/7 waiting for an event.<\/li>\n<\/ul>\n<h3>Pattern C: Persistent Storage<\/h3>\n<ul>\n<li><strong>Data Persistence:<\/strong> Containers are ephemeral (data is lost when they stop).<\/li>\n<li><strong>Solution:<\/strong> Mount <strong>Amazon EFS<\/strong> (Elastic File System) to the ECS tasks.<\/li>\n<li><strong>Why EFS?<\/strong> It is regional and can be mounted by multiple containers across different AZs simultaneously. (EBS cannot do this).<\/li>\n<\/ul>\n<h2>5. Amazon ECR (Elastic Container Registry)<\/h2>\n<p><em>A managed Docker registry service. Stores, manages, and deploys container images.<\/em><\/p>\n<ul>\n<li><strong>Private vs. Public:<\/strong> You can host private repositories (internal use) or public ones (Amazon ECR Public Gallery).<\/li>\n<li><strong>Security Scanning:<\/strong> \"Basic Scanning\" (on push) or \"Enhanced Scanning\" (continuous using Amazon Inspector) to find vulnerabilities in images.    <\/li>\n<li><strong>Lifecycle Policies:<\/strong> Automate the cleanup of old images (e.g., \"Expire images older than 30 days\" or \"Keep only the last 10 untagged images\").<\/li>\n<li><strong>Replication:<\/strong> Supports <strong>Cross-Region Replication (CRR)<\/strong> and Cross-Account Replication. Useful for disaster recovery or reducing latency for global deployments.<\/li>\n<\/ul>\n<h2>6. Amazon EKS (Elastic Kubernetes Service)<\/h2>\n<p><em>Managed Kubernetes on AWS. Choose this if you are already using Kubernetes or need open-source compatibility.<\/em><\/p>\n<ul>\n<li><strong>Architecture:<\/strong><ul>\n<li><strong>Control Plane:<\/strong> Managed by AWS (highly available, runs across multiple AZs).<\/li>\n<li><strong>Data Plane (Nodes):<\/strong> Where your pods run. Can be:<ol>\n<li><strong>Managed Node Groups:<\/strong> AWS manages the EC2 provisioning/lifecycle.<\/li>\n<li><strong>Self-Managed Nodes:<\/strong> You manage EC2s manually.<\/li>\n<li><strong>AWS Fargate:<\/strong> Serverless pods (no EC2 management).<\/li>\n<\/ol>\n<\/li>\n<\/ul>\n<\/li>\n<li><strong>ECS vs. EKS:<\/strong><ul>\n<li><strong>ECS:<\/strong> Simpler, AWS-native, easier integration with IAM/ALB.<\/li>\n<li><strong>EKS:<\/strong> steeper learning curve, portable to other clouds (Azure/GCP), huge ecosystem (Helm, Istio).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>7. AWS App Runner<\/h2>\n<p><em>The easiest way to run a containerized web application or API. Fully managed.<\/em><\/p>\n<ul>\n<li><strong>Concept:<\/strong> \"Here is my source code\" or \"Here is my container image\" -&gt; AWS gives you a HTTPS URL.<\/li>\n<li><strong>Under the hood:<\/strong> It builds the image, deploys the load balancer, sets up auto-scaling, and manages encryption certificates automatically.<\/li>\n<li><strong>Use Cases:<\/strong> Request-Response web services (APIs, frontends).<\/li>\n<li><strong>NOT for:<\/strong> Long-running batch jobs (use ECS/Batch) or stateful workloads requiring complex networking.<\/li>\n<\/ul>\n<h2>8. AWS App2Container (A2C)<\/h2>\n<p><em>A migration tool for modernizing legacy applications.<\/em><\/p>\n<ul>\n<li><strong>Function:<\/strong> CLI tool that runs on your server (On-Prem or EC2). It analyzes applications and containerizes them.<\/li>\n<li><strong>Supported Applications:<\/strong><ul>\n<li><strong>Java<\/strong> (Linux).<\/li>\n<li><strong>.NET<\/strong> (Windows IIS).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Workflow:<\/strong><ol>\n<li><strong>Discover:<\/strong> Identifies running apps (IIS websites, Java processes).<\/li>\n<li><strong>Analyze:<\/strong> Creates an analysis report.<\/li>\n<li><strong>Extract:<\/strong> Generates a Dockerfile and builds the container image.<\/li>\n<li><strong>Deploy:<\/strong> Pushes the image to <strong>ECR<\/strong> and generates deployment artifacts (CloudFormation/YAML) for <strong>ECS<\/strong> or <strong>EKS<\/strong>.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Exam Key:<\/strong> If a question asks how to <strong>\"move a legacy Java/.NET app to containers with minimal effort,\"<\/strong> the answer is <strong>App2Container<\/strong>.<\/li>\n<\/ul>\n<h2>Summary Cheat Sheet for SAA-C03<\/h2>\n<table>\n<thead>\n<tr>\n<th>Scenario<\/th>\n<th>Service<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Simple container orchestration, deep AWS integration<\/td>\n<td><strong>ECS<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Kubernetes, open-source compatibility, multi-cloud<\/td>\n<td><strong>EKS<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Easiest way to deploy a containerized web app URL<\/td>\n<td><strong>App Runner<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Run containers without managing servers<\/td>\n<td><strong>Fargate<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Run containers with GPUs but AWS manages the OS<\/td>\n<td><strong>ECS Managed Instances<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Store and scan Docker images<\/td>\n<td><strong>ECR<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Migrate .NET/Java to Containers<\/td>\n<td><strong>App2Container<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Containers need persistent storage across AZs<\/td>\n<td><strong>ECS + EFS<\/strong><\/td>\n<\/tr>\n<\/tbody>\n<\/table>", "text": "AWS SAA-C03 Study Notes: Containers on AWS 1. Docker Introduction For the exam, you don't need to be a Docker expert, but you must understand the terminology to interpret architecture questions. Docker: A platform to develop, ship, and run applications in isolated environments called containers. Container: A lightweight, standalone, executable package that includes everything needed to run a piece of software (code, runtime, system tools, libraries). Dockerfile: A text document that contains all the commands to assemble an image. Docker Image: A read-only template with instructions for creating a Docker container. Registry: A place to store images (e.g., Docker Hub, Amazon ECR ). Key Exam Concept: Containers solve the \"it works on my machine\" problem and provide portability across different computing environments (Dev -> Test -> Prod). 2. Amazon ECS (Elastic Container Service) ECS is AWS's proprietary container orchestration tool. It is highly integrated with other AWS services. Core Components Cluster: A logical grouping of tasks or services. It can run on EC2 instances or Fargate (serverless). Task Definition: A blueprint (JSON file) that describes the container(s) (e.g., Image URI, CPU/Memory, Ports, Environment Variables). Similar to a Docker Compose file. Task: A running instance of a Task Definition. Service: Ensures that a specified number of Tasks are constantly running. Handles replacing failed tasks and registering them with Load Balancers. Compute Options & Launch Types (CRITICAL for Exam) There are now three primary ways to host your tasks, ranging from fully serverless to fully self-managed. Feature Fargate (Serverless) ECS Managed Instances (Hybrid) EC2 Launch Type (Self-Managed) Management AWS manages everything. No OS access. AWS provisions & patches EC2s. You can access the OS. You manage the EC2s (ASG, patching, OS updates). Infrastructure Serverless. Instances in your account, managed by AWS. Instances in your account, managed by you. Capabilities Limited (No GPU, specific storage limits). Full EC2 features (GPUs, Local NVMe, Spot). Full EC2 features (GPUs, Local NVMe, Spot). Use Case Low ops overhead, batch jobs, general web apps. AI/ML (GPUs) or high-performance apps requiring specific instances but no ops overhead . Legacy compliance, granular control, or specific cost optimization strategies. 3. Amazon ECS - Auto Scaling Scaling in ECS happens at two levels: The Service (Application) and the Cluster (Infrastructure). Service Auto Scaling (Application Level) Uses Application Auto Scaling to increase/decrease the number of Tasks. Target Tracking: \"Keep CPU utilization at 70%.\" (Most common). Step Scaling: \"If alarm breaches X, add 2 tasks.\" Scheduled Scaling: \"At 8 AM, scale to 10 tasks.\" Cluster Auto Scaling (Infrastructure Level) Capacity Providers: The link between ECS and the Auto Scaling Group (ASG). Scenario: If you have 2 EC2 instances and they are full, and you try to launch a new Task, it will fail. Solution: The ECS Capacity Provider detects that a task is in a PROVISIONING state (waiting for resources) and triggers the ASG to launch new EC2 instances automatically. 4. Amazon ECS - Solutions Architectures Pattern A: Microservices behind ALB Architecture: ALB (Public Subnet) -> ECS Service (Private Subnet). Dynamic Port Mapping: When using EC2 Launch Type , you can set the host port to 0. The ALB automatically detects which random port the container was assigned and routes traffic there. This allows multiple copies of the same container on a single EC2 instance. Pattern B: Event-Driven Tasks Architecture: S3 Event -> EventBridge -> ECS Task. Use Case: An image is uploaded to S3; an ECS task spins up to resize it and then shuts down. Exam Tip: Use Fargate here. You don't want to pay for an EC2 instance running 24/7 waiting for an event. Pattern C: Persistent Storage Data Persistence: Containers are ephemeral (data is lost when they stop). Solution: Mount Amazon EFS (Elastic File System) to the ECS tasks. Why EFS? It is regional and can be mounted by multiple containers across different AZs simultaneously. (EBS cannot do this). 5. Amazon ECR (Elastic Container Registry) A managed Docker registry service. Stores, manages, and deploys container images. Private vs. Public: You can host private repositories (internal use) or public ones (Amazon ECR Public Gallery). Security Scanning: \"Basic Scanning\" (on push) or \"Enhanced Scanning\" (continuous using Amazon Inspector) to find vulnerabilities in images. Lifecycle Policies: Automate the cleanup of old images (e.g., \"Expire images older than 30 days\" or \"Keep only the last 10 untagged images\"). Replication: Supports Cross-Region Replication (CRR) and Cross-Account Replication. Useful for disaster recovery or reducing latency for global deployments. 6. Amazon EKS (Elastic Kubernetes Service) Managed Kubernetes on AWS. Choose this if you are already using Kubernetes or need open-source compatibility. Architecture: Control Plane: Managed by AWS (highly available, runs across multiple AZs). Data Plane (Nodes): Where your pods run. Can be: Managed Node Groups: AWS manages the EC2 provisioning/lifecycle. Self-Managed Nodes: You manage EC2s manually. AWS Fargate: Serverless pods (no EC2 management). ECS vs. EKS: ECS: Simpler, AWS-native, easier integration with IAM/ALB. EKS: steeper learning curve, portable to other clouds (Azure/GCP), huge ecosystem (Helm, Istio). 7. AWS App Runner The easiest way to run a containerized web application or API. Fully managed. Concept: \"Here is my source code\" or \"Here is my container image\" -> AWS gives you a HTTPS URL. Under the hood: It builds the image, deploys the load balancer, sets up auto-scaling, and manages encryption certificates automatically. Use Cases: Request-Response web services (APIs, frontends). NOT for: Long-running batch jobs (use ECS/Batch) or stateful workloads requiring complex networking. 8. AWS App2Container (A2C) A migration tool for modernizing legacy applications. Function: CLI tool that runs on your server (On-Prem or EC2). It analyzes applications and containerizes them. Supported Applications: Java (Linux). .NET (Windows IIS). Workflow: Discover: Identifies running apps (IIS websites, Java processes). Analyze: Creates an analysis report. Extract: Generates a Dockerfile and builds the container image. Deploy: Pushes the image to ECR and generates deployment artifacts (CloudFormation/YAML) for ECS or EKS . Exam Key: If a question asks how to \"move a legacy Java/.NET app to containers with minimal effort,\" the answer is App2Container . Summary Cheat Sheet for SAA-C03 Scenario Service Simple container orchestration, deep AWS integration ECS Kubernetes, open-source compatibility, multi-cloud EKS Easiest way to deploy a containerized web app URL App Runner Run containers without managing servers Fargate Run containers with GPUs but AWS manages the OS ECS Managed Instances Store and scan Docker images ECR Migrate .NET/Java to Containers App2Container Containers need persistent storage across AZs ECS + EFS"}, {"id": 14, "num": "14", "title": "Serverless Overviews from a Solution Architect Perspective", "html": "<h1>Serverless Overviews - AWS SAA-C03 Study Notes<\/h1>\n<h2>1. Serverless Introduction<\/h2>\n<ul>\n<li><strong>Definition:<\/strong> A model where the cloud provider manages the infrastructure (servers, OS, patching, scaling). You focus solely on code.<\/li>\n<li><strong>Key Traits:<\/strong><ul>\n<li>No infrastructure provisioning or management.<\/li>\n<li>Automatic scaling (scale-to-zero).<\/li>\n<li>Pay-for-value (pay only when code runs or requests are made).<\/li>\n<li>Highly available by default.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>2. AWS Lambda Overview<\/h2>\n<ul>\n<li><strong>Concept:<\/strong> Function-as-a-Service (FaaS). Run code without provisioning servers.<\/li>\n<li><strong>Triggers (Event-Driven):<\/strong><ul>\n<li><strong>Synchronous:<\/strong> API Gateway, ALB, CLI, SDK (Client waits for response).<\/li>\n<li><strong>Asynchronous:<\/strong> S3, SNS, EventBridge (Client gets 202 accepted; Lambda handles retries/DLQ).<\/li>\n<li><strong>Poll-Based (Event Source Mapping):<\/strong> Kinesis, DynamoDB Streams, SQS (Lambda polls the service).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Pricing:<\/strong> Based on <strong># of requests<\/strong> and <strong>duration<\/strong> (GB-seconds: duration * memory allocated).<\/li>\n<\/ul>\n<h2>3. Lambda Limits (Exam Critical)<\/h2>\n<ul>\n<li><strong>Execution Timeout:<\/strong> <strong>15 minutes<\/strong> (900 seconds) hard limit.<ul>\n<li><em>Architectural fix:<\/em> If a task takes &gt;15 mins, use <strong>AWS Batch<\/strong> or <strong>Step Functions<\/strong> or EC2.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Memory:<\/strong> 128 MB to <strong>10 GB<\/strong>. (CPU scales effectively with memory).<\/li>\n<li><strong>Deployment Package:<\/strong><ul>\n<li>Zipped: <strong>50 MB<\/strong>.<\/li>\n<li>Unzipped: <strong>250 MB<\/strong>.<\/li>\n<li>Container Image: <strong>10 GB<\/strong>.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Payload Size:<\/strong><ul>\n<li>Synchronous (e.g., API Gateway): <strong>6 MB<\/strong>.<\/li>\n<li>Asynchronous: <strong>256 KB<\/strong>.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Concurrency:<\/strong> Default <strong>1,000<\/strong> concurrent executions per region (soft limit, can be raised).<\/li>\n<\/ul>\n<h2>4. Lambda Concurrency<\/h2>\n<ul>\n<li><strong>Reserved Concurrency:<\/strong><ul>\n<li>Guarantees a specific number of concurrent instances for a function.<\/li>\n<li><strong>Acts as a limit:<\/strong> The function cannot exceed this cap (good for protecting downstream DBs).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Provisioned Concurrency:<\/strong><ul>\n<li>Pre-initializes execution environments.<\/li>\n<li><strong>Solves \"Cold Start\"<\/strong> latency issues.<\/li>\n<li>Use case: High-frequency trading apps, interactive APIs needing strict low latency.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>5. Lambda SnapStart<\/h2>\n<ul>\n<li><strong>Goal:<\/strong> Dramatically reduce cold start latency (up to 90%) for <strong>Java<\/strong>, <strong>Python<\/strong>, and <strong>.NET<\/strong> functions.<\/li>\n<li><strong>Mechanism:<\/strong> It creates a snapshot of the initialized microVM (memory/disk state) and caches it.<\/li>\n<li><strong>Cost:<\/strong> No extra cost for the feature itself (standard duration/storage apply).<\/li>\n<li><strong>Constraint:<\/strong> Does NOT support Node.js or Ruby (as of current exam scope).<\/li>\n<\/ul>\n<h2>6. Lambda@Edge vs. CloudFront Functions<\/h2>\n<ul>\n<li><strong>Use Case:<\/strong> Running logic at the edge (closer to the user) to customize content delivery.<\/li>\n<\/ul>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th><strong>CloudFront Functions<\/strong><\/th>\n<th><strong>Lambda@Edge<\/strong><\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Runtime<\/strong><\/td>\n<td>JavaScript (ES5) only<\/td>\n<td>Node.js, Python<\/td>\n<\/tr>\n<tr>\n<td><strong>Execution Time<\/strong><\/td>\n<td>Sub-millisecond (&lt; 1ms)<\/td>\n<td>Up to 5 sec (Viewer) / 30 sec (Origin)<\/td>\n<\/tr>\n<tr>\n<td><strong>Scale<\/strong><\/td>\n<td>Millions of requests/sec<\/td>\n<td>Thousands of requests/sec<\/td>\n<\/tr>\n<tr>\n<td><strong>Network Access<\/strong><\/td>\n<td><strong>No<\/strong> (Cannot call external APIs)<\/td>\n<td><strong>Yes<\/strong> (Can call DynamoDB, S3, APIs)<\/td>\n<\/tr>\n<tr>\n<td><strong>Use Cases<\/strong><\/td>\n<td>Header manipulation, URL rewrites, JWT validation (lightweight), Cache key normalization.<\/td>\n<td>Complex logic, resizing images, accessing databases, advanced authentication, calling 3rd party APIs.<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2>7. Lambda in VPC<\/h2>\n<ul>\n<li><strong>Default Behavior:<\/strong> Lambda runs outside your VPC (has internet access but cannot access private VPC resources like RDS).<\/li>\n<li><strong>VPC Configuration:<\/strong> To access private resources (RDS, ElastiCache), you must attach the Lambda to a VPC.<ul>\n<li>Requires: <strong>Private Subnets<\/strong> and <strong>Security Groups<\/strong>.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Internet Access Requirement:<\/strong><ul>\n<li>A Lambda in a VPC <strong>loses default internet access<\/strong>.<\/li>\n<li>To regain internet access (e.g., to call DynamoDB public endpoints or 3rd party APIs), the VPC must have a <strong>NAT Gateway<\/strong> in a public subnet.<\/li>\n<li><em>Exam Trap:<\/em> Do NOT put Lambda in a public subnet to give it public IP access; it won't work. It must go Private Subnet -&gt; NAT Gateway.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>8. RDS &amp; Lambda Integration<\/h2>\n<ul>\n<li><strong>Invoking Lambda from RDS:<\/strong><ul>\n<li>PostgreSQL and Aurora MySQL can invoke Lambda functions directly from SQL queries (stored procedures).<\/li>\n<li>Use case: Data processing during ingestion, sending emails when a row is inserted.<\/li>\n<\/ul>\n<\/li>\n<li><strong>RDS Event Notifications:<\/strong><ul>\n<li>RDS sends notifications about the <em>database instance itself<\/em> (e.g., \"DB shutdown\", \"Failover started\") to <strong>SNS<\/strong>.<\/li>\n<li>SNS can then trigger Lambda.<\/li>\n<li><em>Exam Tip:<\/em> This is for operational events, NOT data changes. For data changes, you usually polling or app-level logic, or DynamoDB.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>9. Amazon DynamoDB (Serverless NoSQL)<\/h2>\n<ul>\n<li><strong>Basics:<\/strong> Key-Value and Document DB. Millisecond latency at any scale.<\/li>\n<li><strong>Primary Key:<\/strong><ul>\n<li><strong>Partition Key (HASH):<\/strong> Determines data distribution.<\/li>\n<li><strong>Sort Key (RANGE):<\/strong> Sorts data within the partition.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Read Consistency:<\/strong><ul>\n<li><strong>Eventual Consistency (Default):<\/strong> Fast, half the cost. Data might be stale (&lt;1s).<\/li>\n<li><strong>Strongly Consistent:<\/strong> Guarantees latest data. Higher latency, double the read cost (RCUs).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Capacity Modes:<\/strong><ul>\n<li><strong>Provisioned:<\/strong> You specify WCU/RCU. Use Auto Scaling. Good for predictable loads.<\/li>\n<li><strong>On-Demand:<\/strong> Scales automatically. Good for unpredictable/spiky loads. More expensive per request.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>10. DynamoDB Advanced Features<\/h2>\n<ul>\n<li><strong>DAX (DynamoDB Accelerator):<\/strong><ul>\n<li>Fully managed <strong>in-memory cache<\/strong> for DynamoDB.<\/li>\n<li>Improves performance from milliseconds to <strong>microseconds<\/strong>.<\/li>\n<li>Transparent (no code changes needed).<\/li>\n<\/ul>\n<\/li>\n<li><strong>DynamoDB Streams:<\/strong><ul>\n<li>Time-ordered sequence of item-level modifications (INSERT, UPDATE, DELETE).<\/li>\n<li>Retention: <strong>24 hours<\/strong>.<\/li>\n<li>Primary Target: <strong>Lambda<\/strong> (to process changes, replicate data to OpenSearch, etc.).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Kinesis Data Streams (for DynamoDB):<\/strong><ul>\n<li>Alternative to DynamoDB Streams for capturing item-level changes.<\/li>\n<li>Retention: Up to <strong>1 year<\/strong> (vs 24h for DynamoDB Streams).<\/li>\n<li>Feature: Supports higher throughput and multiple consumers (fan-out) without throttling.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Global Tables:<\/strong><ul>\n<li><strong>Multi-Region Active-Active<\/strong> replication.<\/li>\n<li>Writes in any region are replicated to all other regions (~1 sec).<\/li>\n<li>Requires DynamoDB Streams to be enabled.<\/li>\n<\/ul>\n<\/li>\n<li><strong>TTL (Time To Live):<\/strong><ul>\n<li>Automatically deletes items after a specific timestamp (stored in an attribute) expires.<\/li>\n<li>Free of charge (doesn't consume WCUs). Great for session storage.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>11. Amazon API Gateway<\/h2>\n<ul>\n<li><strong>Role:<\/strong> The \"front door\" for serverless applications. Exposes Lambda, HTTP endpoints, or AWS services.<\/li>\n<li><strong>Endpoint Types:<\/strong><ul>\n<li><strong>Edge-Optimized:<\/strong> Default. Uses CloudFront edge locations (global clients).<\/li>\n<li><strong>Regional:<\/strong> Clients in the same region.<\/li>\n<li><strong>Private:<\/strong> Accessible only from within a VPC (via Interface VPC Endpoint).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Integrations:<\/strong><ul>\n<li><strong>Lambda Proxy:<\/strong> Passes the raw request to Lambda. Lambda returns the raw response. (Preferred for flexibility).<\/li>\n<li><strong>Mock:<\/strong> Returns a response without sending to backend (good for testing).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Features:<\/strong><ul>\n<li><strong>Caching:<\/strong> Caches responses to reduce load on backend (TTL default 300s).<\/li>\n<li><strong>Throttling:<\/strong> Protects backend limits (Token Bucket algorithm).<\/li>\n<li><strong>Stages:<\/strong> (e.g., Dev, Prod, v1, v2). Can use \"Canary Release\" to send % of traffic to new stage.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>12. AWS Step Functions<\/h2>\n<ul>\n<li><strong>Concept:<\/strong> Serverless orchestration service. Models workflows as <strong>State Machines<\/strong>.<\/li>\n<li><strong>Language:<\/strong> Defined using <strong>Amazon States Language (ASL)<\/strong> (JSON-based).<\/li>\n<li><strong>Use Cases:<\/strong> Long-running processes, human approval steps, chaining Lambdas, error handling (Retry/Catch).<\/li>\n<li><strong>Standard vs. Express Workflows:<\/strong><ul>\n<li><strong>Standard:<\/strong> Long-running (up to <strong>1 year<\/strong>), Exactly-once execution. Good for order fulfillment.<\/li>\n<li><strong>Express:<\/strong> Short-lived (up to <strong>5 mins<\/strong>), At-least-once execution. Good for high-volume event processing (IoT ingestion).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>13. Amazon Cognito Overview<\/h2>\n<ul>\n<li><strong>User Pools (Authentication - \"Who are you?\"):<\/strong><ul>\n<li>User directory (Sign up, Sign in).<\/li>\n<li>Supports MFA, Password policies, Social Sign-in (Google, Facebook, SAML).<\/li>\n<li>Returns a <strong>JWT (JSON Web Token)<\/strong>.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Identity Pools (Authorization - \"What can you do?\"):<\/strong><ul>\n<li>Exchanges a login token (from User Pools or Social) for <strong>Temporary AWS Credentials<\/strong>.<\/li>\n<li>Maps users to <strong>IAM Roles<\/strong>.<\/li>\n<li>Allows users to access AWS services directly (e.g., Upload file to S3 bucket).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Web Identity Federation Pattern:<\/strong><ol>\n<li>User logs in to Cognito User Pool (or Google).<\/li>\n<li>App receives Token.<\/li>\n<li>App sends Token to Cognito Identity Pool.<\/li>\n<li>Identity Pool returns AWS Credentials (Access Key/Secret Key).<\/li>\n<li>App accesses S3/DynamoDB using those credentials.<\/li>\n<\/ol>\n<\/li>\n<\/ul>", "text": "Serverless Overviews - AWS SAA-C03 Study Notes 1. Serverless Introduction Definition: A model where the cloud provider manages the infrastructure (servers, OS, patching, scaling). You focus solely on code. Key Traits: No infrastructure provisioning or management. Automatic scaling (scale-to-zero). Pay-for-value (pay only when code runs or requests are made). Highly available by default. 2. AWS Lambda Overview Concept: Function-as-a-Service (FaaS). Run code without provisioning servers. Triggers (Event-Driven): Synchronous: API Gateway, ALB, CLI, SDK (Client waits for response). Asynchronous: S3, SNS, EventBridge (Client gets 202 accepted; Lambda handles retries/DLQ). Poll-Based (Event Source Mapping): Kinesis, DynamoDB Streams, SQS (Lambda polls the service). Pricing: Based on # of requests and duration (GB-seconds: duration * memory allocated). 3. Lambda Limits (Exam Critical) Execution Timeout: 15 minutes (900 seconds) hard limit. Architectural fix: If a task takes >15 mins, use AWS Batch or Step Functions or EC2. Memory: 128 MB to 10 GB . (CPU scales effectively with memory). Deployment Package: Zipped: 50 MB . Unzipped: 250 MB . Container Image: 10 GB . Payload Size: Synchronous (e.g., API Gateway): 6 MB . Asynchronous: 256 KB . Concurrency: Default 1,000 concurrent executions per region (soft limit, can be raised). 4. Lambda Concurrency Reserved Concurrency: Guarantees a specific number of concurrent instances for a function. Acts as a limit: The function cannot exceed this cap (good for protecting downstream DBs). Provisioned Concurrency: Pre-initializes execution environments. Solves \"Cold Start\" latency issues. Use case: High-frequency trading apps, interactive APIs needing strict low latency. 5. Lambda SnapStart Goal: Dramatically reduce cold start latency (up to 90%) for Java , Python , and .NET functions. Mechanism: It creates a snapshot of the initialized microVM (memory/disk state) and caches it. Cost: No extra cost for the feature itself (standard duration/storage apply). Constraint: Does NOT support Node.js or Ruby (as of current exam scope). 6. Lambda@Edge vs. CloudFront Functions Use Case: Running logic at the edge (closer to the user) to customize content delivery. Feature CloudFront Functions Lambda@Edge Runtime JavaScript (ES5) only Node.js, Python Execution Time Sub-millisecond (< 1ms) Up to 5 sec (Viewer) / 30 sec (Origin) Scale Millions of requests/sec Thousands of requests/sec Network Access No (Cannot call external APIs) Yes (Can call DynamoDB, S3, APIs) Use Cases Header manipulation, URL rewrites, JWT validation (lightweight), Cache key normalization. Complex logic, resizing images, accessing databases, advanced authentication, calling 3rd party APIs. 7. Lambda in VPC Default Behavior: Lambda runs outside your VPC (has internet access but cannot access private VPC resources like RDS). VPC Configuration: To access private resources (RDS, ElastiCache), you must attach the Lambda to a VPC. Requires: Private Subnets and Security Groups . Internet Access Requirement: A Lambda in a VPC loses default internet access . To regain internet access (e.g., to call DynamoDB public endpoints or 3rd party APIs), the VPC must have a NAT Gateway in a public subnet. Exam Trap: Do NOT put Lambda in a public subnet to give it public IP access; it won't work. It must go Private Subnet -> NAT Gateway. 8. RDS & Lambda Integration Invoking Lambda from RDS: PostgreSQL and Aurora MySQL can invoke Lambda functions directly from SQL queries (stored procedures). Use case: Data processing during ingestion, sending emails when a row is inserted. RDS Event Notifications: RDS sends notifications about the database instance itself (e.g., \"DB shutdown\", \"Failover started\") to SNS . SNS can then trigger Lambda. Exam Tip: This is for operational events, NOT data changes. For data changes, you usually polling or app-level logic, or DynamoDB. 9. Amazon DynamoDB (Serverless NoSQL) Basics: Key-Value and Document DB. Millisecond latency at any scale. Primary Key: Partition Key (HASH): Determines data distribution. Sort Key (RANGE): Sorts data within the partition. Read Consistency: Eventual Consistency (Default): Fast, half the cost. Data might be stale (<1s). Strongly Consistent: Guarantees latest data. Higher latency, double the read cost (RCUs). Capacity Modes: Provisioned: You specify WCU/RCU. Use Auto Scaling. Good for predictable loads. On-Demand: Scales automatically. Good for unpredictable/spiky loads. More expensive per request. 10. DynamoDB Advanced Features DAX (DynamoDB Accelerator): Fully managed in-memory cache for DynamoDB. Improves performance from milliseconds to microseconds . Transparent (no code changes needed). DynamoDB Streams: Time-ordered sequence of item-level modifications (INSERT, UPDATE, DELETE). Retention: 24 hours . Primary Target: Lambda (to process changes, replicate data to OpenSearch, etc.). Kinesis Data Streams (for DynamoDB): Alternative to DynamoDB Streams for capturing item-level changes. Retention: Up to 1 year (vs 24h for DynamoDB Streams). Feature: Supports higher throughput and multiple consumers (fan-out) without throttling. Global Tables: Multi-Region Active-Active replication. Writes in any region are replicated to all other regions (~1 sec). Requires DynamoDB Streams to be enabled. TTL (Time To Live): Automatically deletes items after a specific timestamp (stored in an attribute) expires. Free of charge (doesn't consume WCUs). Great for session storage. 11. Amazon API Gateway Role: The \"front door\" for serverless applications. Exposes Lambda, HTTP endpoints, or AWS services. Endpoint Types: Edge-Optimized: Default. Uses CloudFront edge locations (global clients). Regional: Clients in the same region. Private: Accessible only from within a VPC (via Interface VPC Endpoint). Integrations: Lambda Proxy: Passes the raw request to Lambda. Lambda returns the raw response. (Preferred for flexibility). Mock: Returns a response without sending to backend (good for testing). Features: Caching: Caches responses to reduce load on backend (TTL default 300s). Throttling: Protects backend limits (Token Bucket algorithm). Stages: (e.g., Dev, Prod, v1, v2). Can use \"Canary Release\" to send % of traffic to new stage. 12. AWS Step Functions Concept: Serverless orchestration service. Models workflows as State Machines . Language: Defined using Amazon States Language (ASL) (JSON-based). Use Cases: Long-running processes, human approval steps, chaining Lambdas, error handling (Retry/Catch). Standard vs. Express Workflows: Standard: Long-running (up to 1 year ), Exactly-once execution. Good for order fulfillment. Express: Short-lived (up to 5 mins ), At-least-once execution. Good for high-volume event processing (IoT ingestion). 13. Amazon Cognito Overview User Pools (Authentication - \"Who are you?\"): User directory (Sign up, Sign in). Supports MFA, Password policies, Social Sign-in (Google, Facebook, SAML). Returns a JWT (JSON Web Token) . Identity Pools (Authorization - \"What can you do?\"): Exchanges a login token (from User Pools or Social) for Temporary AWS Credentials . Maps users to IAM Roles . Allows users to access AWS services directly (e.g., Upload file to S3 bucket). Web Identity Federation Pattern: User logs in to Cognito User Pool (or Google). App receives Token. App sends Token to Cognito Identity Pool. Identity Pool returns AWS Credentials (Access Key/Secret Key). App accesses S3/DynamoDB using those credentials."}, {"id": 15, "num": "15", "title": "AWS Databases", "html": "<h1>AWS SAA-C03 Study Note: Databases<\/h1>\n<h2>1. Choosing the Right Database (Exam Cheat Sheet)<\/h2>\n<p>The exam often presents a scenario and asks for the <em>best<\/em> database. Use this keyword mapping:<\/p>\n<table>\n<thead>\n<tr>\n<th>Scenario / Keywords<\/th>\n<th>Recommended Service<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Relational (SQL)<\/strong>, OLTP, traditional apps (ERP, CRM)<\/td>\n<td><strong>RDS<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Relational, <strong>High Performance<\/strong>, <strong>Auto-scaling storage<\/strong>, Enterprise-grade<\/td>\n<td><strong>Aurora<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>NoSQL<\/strong>, Key-Value, High Scale, <strong>Single-digit millisecond latency<\/strong><\/td>\n<td><strong>DynamoDB<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>In-memory<\/strong> cache, <strong>Sub-millisecond latency<\/strong>, alleviate DB load<\/td>\n<td><strong>ElastiCache<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Graph<\/strong> data, Social networks, Recommendation engines<\/td>\n<td><strong>Neptune<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>MongoDB<\/strong> compatibility, JSON documents<\/td>\n<td><strong>DocumentDB<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Cassandra<\/strong> migration, Wide-column store<\/td>\n<td><strong>Keyspaces<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Time-series<\/strong> data, IoT streams, DevOps logs<\/td>\n<td><strong>Timestream<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Data Lake<\/strong>, Unstructured data, Static website hosting<\/td>\n<td><strong>S3<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Data Warehousing<\/strong>, OLAP, SQL Analytics<\/td>\n<td><strong>Redshift<\/strong> (Note: distinct from RDS)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2>2. Amazon RDS (Relational Database Service)<\/h2>\n<p><em>Managed service for DBs use SQL as a query language.<\/em><\/p>\n<ul>\n<li><strong>Engines:<\/strong> Postgres, MySQL, MariaDB, Oracle, Microsoft SQL Server.<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li><strong>Multi-AZ (Availability Zones):<\/strong><ul>\n<li><strong>Purpose:<\/strong> <strong>Disaster Recovery (High Availability)<\/strong>.<\/li>\n<li>Synchronous replication to a standby instance in a different AZ.<\/li>\n<li>Automatic failover if the primary goes down (CNAME record flips).<\/li>\n<li><em>Not<\/em> for scaling performance.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Read Replicas:<\/strong><ul>\n<li><strong>Purpose:<\/strong> <strong>Scalability (Performance)<\/strong>.<\/li>\n<li>Asynchronous replication.<\/li>\n<li>Can be within AZ, Cross-AZ, or Cross-Region.<\/li>\n<li>Apps must update the connection string to read from replicas.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Backups:<\/strong><ul>\n<li><strong>Automated Backups:<\/strong> Daily full backup + transaction logs (5-minute point-in-time recovery). Retention 1-35 days.<\/li>\n<li><strong>Snapshots:<\/strong> Manual, user-initiated, stored indefinitely.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Storage:<\/strong><ul>\n<li><strong>General Purpose SSD (gp2/gp3):<\/strong> Cost-effective, burstable.<\/li>\n<li><strong>Provisioned IOPS (io1/io2):<\/strong> For high I/O, latency-sensitive workloads.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Encryption:<\/strong> Can strictly only be enabled at creation time. To encrypt an unencrypted DB, you must snapshot it -&gt; copy snapshot (encrypting it) -&gt; restore from encrypted snapshot.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>3. Amazon Aurora<\/h2>\n<p><em>AWS-proprietary relational database compatible with MySQL and Postgres. 5x faster than MySQL, 3x faster than Postgres.<\/em><\/p>\n<ul>\n<li><strong>Architecture:<\/strong><ul>\n<li><strong>Separation of Compute and Storage.<\/strong><\/li>\n<li><strong>Storage:<\/strong> Data is replicated <strong>6 times across 3 AZs<\/strong>. Self-healing.<\/li>\n<li>Storage auto-expands (no need to provision storage size manually).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Endpoints:<\/strong><ul>\n<li><strong>Cluster Endpoint:<\/strong> Points to the <em>Writer<\/em> instance.<\/li>\n<li><strong>Reader Endpoint:<\/strong> Load balances connections across all <em>Read Replicas<\/em>.<\/li>\n<\/ul>\n<\/li>\n<li><strong>High Availability:<\/strong><ul>\n<li>Can have up to <strong>15 Read Replicas<\/strong> (RDS limit is 5).<\/li>\n<li>Failover is faster than RDS (usually &lt; 30 seconds).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Aurora Serverless:<\/strong><ul>\n<li>Auto-scales compute based on demand.<\/li>\n<li>Good for: Infrequent, intermittent, or unpredictable workloads.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Aurora Global Database:<\/strong><ul>\n<li>One primary region (R/W), up to 5 secondary read-only regions.<\/li>\n<li>Latency &lt; 1 second across regions. Promotes secondary to primary in &lt; 1 minute.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>4. Amazon ElastiCache<\/h2>\n<p><em>Managed Redis or Memcached. In-memory caching to improve read performance.<\/em><\/p>\n<ul>\n<li><strong>Use Cases:<\/strong> Reduce load on RDS/DynamoDB, store user sessions, leaderboards.<\/li>\n<li><strong>Redis vs. Memcached (Crucial for Exam):<\/strong><\/li>\n<\/ul>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th><strong>Redis<\/strong><\/th>\n<th><strong>Memcached<\/strong><\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Data Structure<\/strong><\/td>\n<td>Complex (Sets, Lists, Sorted Sets)<\/td>\n<td>Simple String/Object<\/td>\n<\/tr>\n<tr>\n<td><strong>Persistence<\/strong><\/td>\n<td>Yes (can save to disk)<\/td>\n<td>No (Purely in-memory)<\/td>\n<\/tr>\n<tr>\n<td><strong>Availability<\/strong><\/td>\n<td>Multi-AZ, Failover, Replication<\/td>\n<td>No Replication<\/td>\n<\/tr>\n<tr>\n<td><strong>Scaling<\/strong><\/td>\n<td>Scale Read Replicas<\/td>\n<td>Multi-thread architecture (Scale Up)<\/td>\n<\/tr>\n<tr>\n<td><strong>Exam Tip<\/strong><\/td>\n<td>Choose if you need <strong>High Availability<\/strong>, <strong>Backup<\/strong>, or <strong>Sorting<\/strong>.<\/td>\n<td>Choose for <strong>simple<\/strong> caching or <strong>multithreaded<\/strong> performance.<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<ul>\n<li><strong>Caching Strategies:<\/strong><ul>\n<li><strong>Lazy Loading:<\/strong> Load data only when requested. (Pros: Only requested data cached. Cons: Cache miss penalty).<\/li>\n<li><strong>Write-Through:<\/strong> Add data to cache whenever DB is updated. (Pros: Data never stale. Cons: Write penalty, potentially unused data).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>5. Amazon DynamoDB<\/h2>\n<p><em>Fully managed, Serverless, NoSQL Key-Value store.<\/em><\/p>\n<ul>\n<li><strong>Performance:<\/strong> Single-digit millisecond latency at any scale.<\/li>\n<li><strong>Capacity Modes:<\/strong><ul>\n<li><strong>Provisioned:<\/strong> You set RCU (Read Capacity Units) and WCU (Write Capacity Units). Use when traffic is predictable.<\/li>\n<li><strong>On-Demand:<\/strong> Auto-scales instantly. Use for unpredictable/spiky traffic.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Keys:<\/strong><ul>\n<li><strong>Partition Key (Hash):<\/strong> Determines data distribution.<\/li>\n<li><strong>Sort Key (Range):<\/strong> Sorts data within the partition.<\/li>\n<\/ul>\n<\/li>\n<li><strong>DAX (DynamoDB Accelerator):<\/strong><ul>\n<li>Fully managed, in-memory cache for DynamoDB.<\/li>\n<li><strong>Keyword:<\/strong> Improves latency from milliseconds to <strong>microseconds<\/strong>.<\/li>\n<li>Use when you have a \"hot key\" problem or extreme read loads.<\/li>\n<\/ul>\n<\/li>\n<li><strong>DynamoDB Streams:<\/strong><ul>\n<li>Captures item-level changes (INSERT, UPDATE, DELETE).<\/li>\n<li>Triggers Lambda functions (e.g., \"When a new user signs up, send a welcome email\").<\/li>\n<\/ul>\n<\/li>\n<li><strong>Global Tables:<\/strong><ul>\n<li>Multi-Region, Active-Active replication.<\/li>\n<li>High availability and local reads/writes in multiple regions.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>6. Amazon S3 (As a Database)<\/h2>\n<p><em>While essentially Object Storage, S3 is often a component in database architectures.<\/em><\/p>\n<ul>\n<li><strong>Data Lake:<\/strong> S3 acts as the central repository for structured and unstructured data.<\/li>\n<li><strong>Query in Place:<\/strong><ul>\n<li><strong>Amazon Athena:<\/strong> Serverless SQL queries directly on S3 data.<\/li>\n<li><strong>S3 Select:<\/strong> Retrieve only a subset of data from an object (improves performance).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Consistency:<\/strong> Strong consistency for all GETs, PUTs, and LISTs.<\/li>\n<\/ul>\n<h2>7. Amazon DocumentDB (with MongoDB compatibility)<\/h2>\n<ul>\n<li><strong>Keyword:<\/strong> <strong>MongoDB<\/strong>.<\/li>\n<li>Used for managing JSON data.<\/li>\n<li>Architecture similar to Aurora (storage replicates 6 ways across 3 AZs).<\/li>\n<\/ul>\n<h2>8. Amazon Neptune<\/h2>\n<ul>\n<li><strong>Keyword:<\/strong> <strong>Graph Database<\/strong>.<\/li>\n<li><strong>Use Cases:<\/strong><ul>\n<li>Social Networking (Who is friends with whom?).<\/li>\n<li>Recommendation Engines (If you bought A, you might like B).<\/li>\n<li>Fraud Detection (Pattern matching).<\/li>\n<li>Knowledge Graphs.<\/li>\n<\/ul>\n<\/li>\n<li>Query Languages: Gremlin (Apache TinkerPop), SPARQL.<\/li>\n<\/ul>\n<h2>9. Amazon Keyspaces (for Apache Cassandra)<\/h2>\n<ul>\n<li><strong>Keyword:<\/strong> <strong>Cassandra<\/strong>.<\/li>\n<li>Serverless, scalable, highly available wide-column store.<\/li>\n<li>Compatible with CQL (Cassandra Query Language).<\/li>\n<li>Use this if migration questions mention existing Cassandra workloads.<\/li>\n<\/ul>\n<h2>10. Amazon Timestream<\/h2>\n<ul>\n<li><strong>Keyword:<\/strong> <strong>Time-series<\/strong>.<\/li>\n<li><strong>Use Cases:<\/strong><ul>\n<li>IoT applications (sensor readings every second).<\/li>\n<li>DevOps (tracking CPU/Memory usage over time).<\/li>\n<li>Industrial telemetry.<\/li>\n<\/ul>\n<\/li>\n<li>Architecture:<ul>\n<li><strong>Memory Store:<\/strong> For recent data (fast ingestion).<\/li>\n<li><strong>Magnetic Store:<\/strong> For historical data (cost-optimized).<\/li>\n<li>Built-in retention policies to move data between stores automatically.<\/li>\n<\/ul>\n<\/li>\n<\/ul>", "text": "AWS SAA-C03 Study Note: Databases 1. Choosing the Right Database (Exam Cheat Sheet) The exam often presents a scenario and asks for the best database. Use this keyword mapping: Scenario / Keywords Recommended Service Relational (SQL) , OLTP, traditional apps (ERP, CRM) RDS Relational, High Performance , Auto-scaling storage , Enterprise-grade Aurora NoSQL , Key-Value, High Scale, Single-digit millisecond latency DynamoDB In-memory cache, Sub-millisecond latency , alleviate DB load ElastiCache Graph data, Social networks, Recommendation engines Neptune MongoDB compatibility, JSON documents DocumentDB Cassandra migration, Wide-column store Keyspaces Time-series data, IoT streams, DevOps logs Timestream Data Lake , Unstructured data, Static website hosting S3 Data Warehousing , OLAP, SQL Analytics Redshift (Note: distinct from RDS) 2. Amazon RDS (Relational Database Service) Managed service for DBs use SQL as a query language. Engines: Postgres, MySQL, MariaDB, Oracle, Microsoft SQL Server. Key Features: Multi-AZ (Availability Zones): Purpose: Disaster Recovery (High Availability) . Synchronous replication to a standby instance in a different AZ. Automatic failover if the primary goes down (CNAME record flips). Not for scaling performance. Read Replicas: Purpose: Scalability (Performance) . Asynchronous replication. Can be within AZ, Cross-AZ, or Cross-Region. Apps must update the connection string to read from replicas. Backups: Automated Backups: Daily full backup + transaction logs (5-minute point-in-time recovery). Retention 1-35 days. Snapshots: Manual, user-initiated, stored indefinitely. Storage: General Purpose SSD (gp2/gp3): Cost-effective, burstable. Provisioned IOPS (io1/io2): For high I/O, latency-sensitive workloads. Encryption: Can strictly only be enabled at creation time. To encrypt an unencrypted DB, you must snapshot it -> copy snapshot (encrypting it) -> restore from encrypted snapshot. 3. Amazon Aurora AWS-proprietary relational database compatible with MySQL and Postgres. 5x faster than MySQL, 3x faster than Postgres. Architecture: Separation of Compute and Storage. Storage: Data is replicated 6 times across 3 AZs . Self-healing. Storage auto-expands (no need to provision storage size manually). Endpoints: Cluster Endpoint: Points to the Writer instance. Reader Endpoint: Load balances connections across all Read Replicas . High Availability: Can have up to 15 Read Replicas (RDS limit is 5). Failover is faster than RDS (usually < 30 seconds). Aurora Serverless: Auto-scales compute based on demand. Good for: Infrequent, intermittent, or unpredictable workloads. Aurora Global Database: One primary region (R/W), up to 5 secondary read-only regions. Latency < 1 second across regions. Promotes secondary to primary in < 1 minute. 4. Amazon ElastiCache Managed Redis or Memcached. In-memory caching to improve read performance. Use Cases: Reduce load on RDS/DynamoDB, store user sessions, leaderboards. Redis vs. Memcached (Crucial for Exam): Feature Redis Memcached Data Structure Complex (Sets, Lists, Sorted Sets) Simple String/Object Persistence Yes (can save to disk) No (Purely in-memory) Availability Multi-AZ, Failover, Replication No Replication Scaling Scale Read Replicas Multi-thread architecture (Scale Up) Exam Tip Choose if you need High Availability , Backup , or Sorting . Choose for simple caching or multithreaded performance. Caching Strategies: Lazy Loading: Load data only when requested. (Pros: Only requested data cached. Cons: Cache miss penalty). Write-Through: Add data to cache whenever DB is updated. (Pros: Data never stale. Cons: Write penalty, potentially unused data). 5. Amazon DynamoDB Fully managed, Serverless, NoSQL Key-Value store. Performance: Single-digit millisecond latency at any scale. Capacity Modes: Provisioned: You set RCU (Read Capacity Units) and WCU (Write Capacity Units). Use when traffic is predictable. On-Demand: Auto-scales instantly. Use for unpredictable/spiky traffic. Keys: Partition Key (Hash): Determines data distribution. Sort Key (Range): Sorts data within the partition. DAX (DynamoDB Accelerator): Fully managed, in-memory cache for DynamoDB. Keyword: Improves latency from milliseconds to microseconds . Use when you have a \"hot key\" problem or extreme read loads. DynamoDB Streams: Captures item-level changes (INSERT, UPDATE, DELETE). Triggers Lambda functions (e.g., \"When a new user signs up, send a welcome email\"). Global Tables: Multi-Region, Active-Active replication. High availability and local reads/writes in multiple regions. 6. Amazon S3 (As a Database) While essentially Object Storage, S3 is often a component in database architectures. Data Lake: S3 acts as the central repository for structured and unstructured data. Query in Place: Amazon Athena: Serverless SQL queries directly on S3 data. S3 Select: Retrieve only a subset of data from an object (improves performance). Consistency: Strong consistency for all GETs, PUTs, and LISTs. 7. Amazon DocumentDB (with MongoDB compatibility) Keyword: MongoDB . Used for managing JSON data. Architecture similar to Aurora (storage replicates 6 ways across 3 AZs). 8. Amazon Neptune Keyword: Graph Database . Use Cases: Social Networking (Who is friends with whom?). Recommendation Engines (If you bought A, you might like B). Fraud Detection (Pattern matching). Knowledge Graphs. Query Languages: Gremlin (Apache TinkerPop), SPARQL. 9. Amazon Keyspaces (for Apache Cassandra) Keyword: Cassandra . Serverless, scalable, highly available wide-column store. Compatible with CQL (Cassandra Query Language). Use this if migration questions mention existing Cassandra workloads. 10. Amazon Timestream Keyword: Time-series . Use Cases: IoT applications (sensor readings every second). DevOps (tracking CPU/Memory usage over time). Industrial telemetry. Architecture: Memory Store: For recent data (fast ingestion). Magnetic Store: For historical data (cost-optimized). Built-in retention policies to move data between stores automatically."}, {"id": 16, "num": "16", "title": "AWS Data Analytics", "html": "<h1>AWS SAA-C03 Study Notes: Data Analytics &amp; Big Data<\/h1>\n<p>This guide covers the key Data Analytics services and architectural patterns frequently tested in the AWS Certified Solutions Architect - Associate (SAA-C03) exam.<\/p>\n<h2>1. Key Services Overview<\/h2>\n<h3>Amazon Athena<\/h3>\n<ul>\n<li><strong>What it is:<\/strong> Serverless, interactive query service.<\/li>\n<li><strong>Key Function:<\/strong> Analyze data directly in <strong>Amazon S3<\/strong> using standard <strong>SQL<\/strong>.<\/li>\n<li><strong>Performance &amp; Cost Optimization (Exam Critical):<\/strong><ul>\n<li><strong>Columnar Data:<\/strong> Use <strong>Parquet<\/strong> or <strong>ORC<\/strong> formats. Athena scans <em>only<\/em> the columns needed (saves money/time) vs. CSV/JSON where it scans the whole file.<\/li>\n<li><strong>Compression:<\/strong> Compress data (Snappy, Zlib, GZIP) to reduce scan size.<\/li>\n<li><strong>Partitioning:<\/strong> Organize S3 folders by date/category (e.g., <code>s3://bucket/year=2024/month=01/<\/code>). Athena scans only the relevant folder (\"partition pruning\").<\/li>\n<\/ul>\n<\/li>\n<li><strong>Federated Query:<\/strong><ul>\n<li>Allows running SQL queries across data stored in relational, non-relational, object, and custom data sources (e.g., DynamoDB, RDS, Redshift) <em>without<\/em> moving data to S3.<\/li>\n<li>Uses <strong>Data Source Connectors<\/strong> running on <strong>AWS Lambda<\/strong>.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Keywords:<\/strong> Serverless, Ad-hoc queries, S3, SQL, Parquet/ORC, \"no infrastructure to manage.\"<\/li>\n<\/ul>\n<h3>Amazon Redshift<\/h3>\n<ul>\n<li><strong>What it is:<\/strong> Petabyte-scale, fully managed <strong>Data Warehouse<\/strong> (OLAP).<\/li>\n<li><strong>Architecture:<\/strong><ul>\n<li><strong>Leader Node:<\/strong> Handles client connections (JDBC/ODBC), parses SQL, creates execution plans, and aggregates results. <em>You only interact with this node.<\/em><\/li>\n<li><strong>Compute Nodes:<\/strong> Execute the queries in parallel and store the data. Data is distributed across \"slices\" in these nodes.<\/li>\n<li><strong>Redshift Spectrum:<\/strong> A serverless feature that lets Redshift query data directly in S3 (using the Leader Node) without loading it. Ideal for \"cold\" data or infrequent queries.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Data Loading &amp; Ingestion:<\/strong><ul>\n<li><strong>COPY Command:<\/strong> The fastest way to load batch data from S3.<\/li>\n<li><strong>Kinesis Data Firehose:<\/strong> For <strong>streaming ingestion<\/strong> directly into Redshift (near real-time).<\/li>\n<li><strong>JDBC/ODBC Driver:<\/strong> Standard drivers for connecting BI tools (Tableau, QuickSight) or applications.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Security &amp; Networking:<\/strong><ul>\n<li><strong>Enhanced VPC Routing:<\/strong> Forces all COPY and UNLOAD traffic between Redshift and S3 to go through your VPC (using VPC Endpoints), bypassing the public internet. Critical for strict compliance.<\/li>\n<li><strong>Disaster Recovery (DR):<\/strong><ul>\n<li><strong>Snapshots:<\/strong> Automated or manual point-in-time backups stored in S3.<\/li>\n<li><strong>Cross-Region Replication:<\/strong> Configure Redshift to automatically copy snapshots to another region for DR.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>Amazon OpenSearch Service (formerly Elasticsearch)<\/h3>\n<ul>\n<li><strong>What it is:<\/strong> Managed service for search, analytics, and log monitoring.<\/li>\n<li><strong>Key Function:<\/strong> Operational analytics (application monitoring), full-text search, and log analysis.<\/li>\n<li><strong>Exam Keywords:<\/strong> Search, Indexing, Kibana (dashboards), Log analytics, \"fuzzy search.\"<\/li>\n<li><strong>Integration:<\/strong> Often acts as the destination for logs coming from Kinesis Data Firehose or CloudWatch Logs.<\/li>\n<\/ul>\n<h3>Amazon EMR (Elastic MapReduce)<\/h3>\n<ul>\n<li><strong>What it is:<\/strong> Managed cluster platform for big data frameworks (Hadoop, Spark, Hive, Presto).<\/li>\n<li><strong>Cluster Architecture (Node Types):<\/strong><ul>\n<li><strong>Master Node:<\/strong> Manages the cluster (YARN ResourceManager, HDFS NameNode). Coordinates the distribution of data and tasks.<\/li>\n<li><strong>Core Node:<\/strong> Runs tasks <em>and<\/em> stores data in HDFS. <strong>Do not<\/strong> terminate these easily (risk data loss).<\/li>\n<li><strong>Task Node:<\/strong> Runs tasks <em>only<\/em> (no data storage). You can add/remove these to scale compute power. <strong>Perfect usage for Spot Instances<\/strong>.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Keywords:<\/strong> Hadoop, Spark, Big Data migration, Spot Instances (Task nodes).<\/li>\n<\/ul>\n<h3>Amazon QuickSight<\/h3>\n<ul>\n<li><strong>What it is:<\/strong> Serverless Business Intelligence (BI) service.<\/li>\n<li><strong>Key Function:<\/strong> Create and publish interactive dashboards and visualizations.<\/li>\n<li><strong>User &amp; Group Management:<\/strong><ul>\n<li><strong>Standard Edition:<\/strong> Manage users via IAM or email invites.<\/li>\n<li><strong>Enterprise Edition:<\/strong> Supports <strong>Active Directory (AD)<\/strong> integration and Federated Login.<\/li>\n<li><strong>Row-Level Security (RLS):<\/strong> Restrict access to specific data rows based on User or Group (e.g., \"Sales group sees only Sales data\").<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Keywords:<\/strong> BI, Visualizations, Dashboards, Machine Learning Insights, \"pay-per-session.\"<\/li>\n<\/ul>\n<h3>AWS Glue<\/h3>\n<ul>\n<li><strong>What it is:<\/strong> Serverless Data Integration (ETL - Extract, Transform, Load) service.<\/li>\n<li><strong>Key Function:<\/strong> Prepare and load data for analytics.<\/li>\n<li><strong>Components:<\/strong><ul>\n<li><strong>Data Catalog:<\/strong> Central repository for metadata (schema definitions). Required for Athena and Redshift Spectrum.<\/li>\n<li><strong>Crawler:<\/strong> Automatically scans S3 data to infer schema and update the Data Catalog.<\/li>\n<li><strong>Glue Jobs:<\/strong> Python/Scala scripts to transform data (e.g., convert CSV to Parquet).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Keywords:<\/strong> ETL, Serverless, Data Catalog, Schema discovery.<\/li>\n<\/ul>\n<h3>AWS Lake Formation<\/h3>\n<ul>\n<li><strong>What it is:<\/strong> Service to set up, secure, and manage a Data Lake.<\/li>\n<li><strong>Key Function:<\/strong> Simplifies security and governance. It sits <em>on top<\/em> of Glue and S3.<\/li>\n<li><strong>Exam Keywords:<\/strong> \"Fine-grained access control\" (row-level/column-level security), \"Blueprint,\" Governance, \"secure data lake in days.\"<\/li>\n<\/ul>\n<h3>Amazon Managed Service for Apache Flink<\/h3>\n<ul>\n<li><strong>Note:<\/strong> Formerly <em>Kinesis Data Analytics<\/em>.<\/li>\n<li><strong>What it is:<\/strong> Fully managed service for real-time stream processing.<\/li>\n<li><strong>Key Function:<\/strong> Run stateful applications to process data streams using Java, Scala, Python, or SQL.<\/li>\n<li><strong>Exam Keywords:<\/strong> Real-time analytics, Stateful processing, Windowing (e.g., \"calculate average every 5 minutes\"), Flink.<\/li>\n<\/ul>\n<h3>Amazon MSK (Managed Streaming for Apache Kafka)<\/h3>\n<ul>\n<li><strong>What it is:<\/strong> Fully managed Apache Kafka service.<\/li>\n<li><strong>Key Function:<\/strong> Ingest and process streaming data using Kafka.<\/li>\n<li><strong>Exam Keywords:<\/strong> \"Migrate existing Kafka cluster,\" Open-source compatibility, High throughput.<\/li>\n<\/ul>\n<h2>2. Common Big Data Ingestion Pipelines (Architectural Patterns)<\/h2>\n<p>The SAA-C03 exam loves to test how these services connect. Here are the three most common patterns:<\/p>\n<h3>Pattern A: The \"Modern Data Lake\" (Batch Processing)<\/h3>\n<p><strong>Scenario:<\/strong> Ingest raw data, transform it, and analyze it using SQL.<\/p>\n<ol>\n<li><strong>Ingest:<\/strong> Data lands in <strong>S3<\/strong> (Raw Bucket).<\/li>\n<li><strong>Catalog:<\/strong> <strong>Glue Crawler<\/strong> scans S3 and updates <strong>Glue Data Catalog<\/strong>.<\/li>\n<li><strong>Process (ETL):<\/strong> <strong>Glue Jobs<\/strong> (or EMR) clean data and convert to Parquet.<\/li>\n<li><strong>Store:<\/strong> Transformed data saved to <strong>S3<\/strong> (Processed Bucket) or loaded into <strong>Redshift<\/strong>.<\/li>\n<li><strong>Analyze:<\/strong><ul>\n<li><strong>Athena<\/strong> queries S3 directly (Ad-hoc).<\/li>\n<li><strong>Redshift<\/strong> queries data warehouse (Complex BI).<\/li>\n<li><strong>QuickSight<\/strong> visualizes the results.<\/li>\n<\/ul>\n<\/li>\n<\/ol>\n<h3>Pattern B: The \"Real-Time Streaming\" Pipeline<\/h3>\n<p><strong>Scenario:<\/strong> Analyze clickstream data or IoT sensors in real-time.<\/p>\n<ol>\n<li><strong>Ingest:<\/strong> <strong>Kinesis Data Streams<\/strong> (or MSK) captures high-velocity data.<\/li>\n<li><strong>Process:<\/strong> <strong>Managed Service for Apache Flink<\/strong> processes the stream (e.g., aggregates metrics).<\/li>\n<li><strong>Store/Deliver:<\/strong><ul>\n<li><strong>Kinesis Data Firehose<\/strong> delivers the processed data to <strong>S3<\/strong>, <strong>Redshift<\/strong>, or <strong>OpenSearch<\/strong>.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Analyze:<\/strong> Real-time dashboards in <strong>OpenSearch<\/strong> (Kibana) or <strong>QuickSight<\/strong>.<\/li>\n<\/ol>\n<h3>Pattern C: Log Analytics<\/h3>\n<p><strong>Scenario:<\/strong> Centralized analysis of application logs.<\/p>\n<ol>\n<li><strong>Source:<\/strong> CloudWatch Logs or EC2 logs.<\/li>\n<li><strong>Stream:<\/strong> <strong>Kinesis Data Firehose<\/strong>.<\/li>\n<li><strong>Destination:<\/strong> <strong>Amazon OpenSearch Service<\/strong>.<\/li>\n<li><strong>Visualize:<\/strong> <strong>Kibana<\/strong> (built into OpenSearch) for searching and visualizing error logs.<\/li>\n<\/ol>\n<h2>3. Quick Comparison Cheat Sheet<\/h2>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th><strong>Athena<\/strong><\/th>\n<th><strong>Redshift<\/strong><\/th>\n<th><strong>EMR<\/strong><\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Primary Use<\/strong><\/td>\n<td>Ad-hoc S3 queries<\/td>\n<td>Data Warehousing / BI<\/td>\n<td>Big Data Processing (Spark/Hadoop)<\/td>\n<\/tr>\n<tr>\n<td><strong>Infrastructure<\/strong><\/td>\n<td>Serverless<\/td>\n<td>Clusters (Managed)<\/td>\n<td>Clusters (Managed)<\/td>\n<\/tr>\n<tr>\n<td><strong>Pricing<\/strong><\/td>\n<td>Per TB scanned<\/td>\n<td>Per Node / Hour<\/td>\n<td>Per Instance / Hour<\/td>\n<\/tr>\n<tr>\n<td><strong>Speed<\/strong><\/td>\n<td>Seconds/Minutes<\/td>\n<td>Milliseconds/Seconds<\/td>\n<td>Minutes/Hours (Batch)<\/td>\n<\/tr>\n<tr>\n<td><strong>Exam Trigger<\/strong><\/td>\n<td>\"Serverless SQL on S3\"<\/td>\n<td>\"Complex joins\", \"Warehouse\"<\/td>\n<td>\"Apache Spark\", \"Hadoop migration\"<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th><strong>Kinesis Data Streams<\/strong><\/th>\n<th><strong>Kinesis Data Firehose<\/strong><\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Real-time?<\/strong><\/td>\n<td>Yes (Real-time)<\/td>\n<td>Near Real-time (60s buffer)<\/td>\n<\/tr>\n<tr>\n<td><strong>Function<\/strong><\/td>\n<td>Ingest custom streams<\/td>\n<td><strong>Load<\/strong> data into destinations<\/td>\n<\/tr>\n<tr>\n<td><strong>Destinations<\/strong><\/td>\n<td>Lambda, Flink, EC2<\/td>\n<td>S3, Redshift, OpenSearch, Splunk<\/td>\n<\/tr>\n<tr>\n<td><strong>Management<\/strong><\/td>\n<td>Manual scaling (shards)<\/td>\n<td>Fully Serverless (Auto-scaling)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>", "text": "AWS SAA-C03 Study Notes: Data Analytics & Big Data This guide covers the key Data Analytics services and architectural patterns frequently tested in the AWS Certified Solutions Architect - Associate (SAA-C03) exam. 1. Key Services Overview Amazon Athena What it is: Serverless, interactive query service. Key Function: Analyze data directly in Amazon S3 using standard SQL . Performance & Cost Optimization (Exam Critical): Columnar Data: Use Parquet or ORC formats. Athena scans only the columns needed (saves money/time) vs. CSV/JSON where it scans the whole file. Compression: Compress data (Snappy, Zlib, GZIP) to reduce scan size. Partitioning: Organize S3 folders by date/category (e.g., s3://bucket/year=2024/month=01/ ). Athena scans only the relevant folder (\"partition pruning\"). Federated Query: Allows running SQL queries across data stored in relational, non-relational, object, and custom data sources (e.g., DynamoDB, RDS, Redshift) without moving data to S3. Uses Data Source Connectors running on AWS Lambda . Exam Keywords: Serverless, Ad-hoc queries, S3, SQL, Parquet/ORC, \"no infrastructure to manage.\" Amazon Redshift What it is: Petabyte-scale, fully managed Data Warehouse (OLAP). Architecture: Leader Node: Handles client connections (JDBC/ODBC), parses SQL, creates execution plans, and aggregates results. You only interact with this node. Compute Nodes: Execute the queries in parallel and store the data. Data is distributed across \"slices\" in these nodes. Redshift Spectrum: A serverless feature that lets Redshift query data directly in S3 (using the Leader Node) without loading it. Ideal for \"cold\" data or infrequent queries. Data Loading & Ingestion: COPY Command: The fastest way to load batch data from S3. Kinesis Data Firehose: For streaming ingestion directly into Redshift (near real-time). JDBC/ODBC Driver: Standard drivers for connecting BI tools (Tableau, QuickSight) or applications. Security & Networking: Enhanced VPC Routing: Forces all COPY and UNLOAD traffic between Redshift and S3 to go through your VPC (using VPC Endpoints), bypassing the public internet. Critical for strict compliance. Disaster Recovery (DR): Snapshots: Automated or manual point-in-time backups stored in S3. Cross-Region Replication: Configure Redshift to automatically copy snapshots to another region for DR. Amazon OpenSearch Service (formerly Elasticsearch) What it is: Managed service for search, analytics, and log monitoring. Key Function: Operational analytics (application monitoring), full-text search, and log analysis. Exam Keywords: Search, Indexing, Kibana (dashboards), Log analytics, \"fuzzy search.\" Integration: Often acts as the destination for logs coming from Kinesis Data Firehose or CloudWatch Logs. Amazon EMR (Elastic MapReduce) What it is: Managed cluster platform for big data frameworks (Hadoop, Spark, Hive, Presto). Cluster Architecture (Node Types): Master Node: Manages the cluster (YARN ResourceManager, HDFS NameNode). Coordinates the distribution of data and tasks. Core Node: Runs tasks and stores data in HDFS. Do not terminate these easily (risk data loss). Task Node: Runs tasks only (no data storage). You can add/remove these to scale compute power. Perfect usage for Spot Instances . Exam Keywords: Hadoop, Spark, Big Data migration, Spot Instances (Task nodes). Amazon QuickSight What it is: Serverless Business Intelligence (BI) service. Key Function: Create and publish interactive dashboards and visualizations. User & Group Management: Standard Edition: Manage users via IAM or email invites. Enterprise Edition: Supports Active Directory (AD) integration and Federated Login. Row-Level Security (RLS): Restrict access to specific data rows based on User or Group (e.g., \"Sales group sees only Sales data\"). Exam Keywords: BI, Visualizations, Dashboards, Machine Learning Insights, \"pay-per-session.\" AWS Glue What it is: Serverless Data Integration (ETL - Extract, Transform, Load) service. Key Function: Prepare and load data for analytics. Components: Data Catalog: Central repository for metadata (schema definitions). Required for Athena and Redshift Spectrum. Crawler: Automatically scans S3 data to infer schema and update the Data Catalog. Glue Jobs: Python/Scala scripts to transform data (e.g., convert CSV to Parquet). Exam Keywords: ETL, Serverless, Data Catalog, Schema discovery. AWS Lake Formation What it is: Service to set up, secure, and manage a Data Lake. Key Function: Simplifies security and governance. It sits on top of Glue and S3. Exam Keywords: \"Fine-grained access control\" (row-level/column-level security), \"Blueprint,\" Governance, \"secure data lake in days.\" Amazon Managed Service for Apache Flink Note: Formerly Kinesis Data Analytics . What it is: Fully managed service for real-time stream processing. Key Function: Run stateful applications to process data streams using Java, Scala, Python, or SQL. Exam Keywords: Real-time analytics, Stateful processing, Windowing (e.g., \"calculate average every 5 minutes\"), Flink. Amazon MSK (Managed Streaming for Apache Kafka) What it is: Fully managed Apache Kafka service. Key Function: Ingest and process streaming data using Kafka. Exam Keywords: \"Migrate existing Kafka cluster,\" Open-source compatibility, High throughput. 2. Common Big Data Ingestion Pipelines (Architectural Patterns) The SAA-C03 exam loves to test how these services connect. Here are the three most common patterns: Pattern A: The \"Modern Data Lake\" (Batch Processing) Scenario: Ingest raw data, transform it, and analyze it using SQL. Ingest: Data lands in S3 (Raw Bucket). Catalog: Glue Crawler scans S3 and updates Glue Data Catalog . Process (ETL): Glue Jobs (or EMR) clean data and convert to Parquet. Store: Transformed data saved to S3 (Processed Bucket) or loaded into Redshift . Analyze: Athena queries S3 directly (Ad-hoc). Redshift queries data warehouse (Complex BI). QuickSight visualizes the results. Pattern B: The \"Real-Time Streaming\" Pipeline Scenario: Analyze clickstream data or IoT sensors in real-time. Ingest: Kinesis Data Streams (or MSK) captures high-velocity data. Process: Managed Service for Apache Flink processes the stream (e.g., aggregates metrics). Store/Deliver: Kinesis Data Firehose delivers the processed data to S3 , Redshift , or OpenSearch . Analyze: Real-time dashboards in OpenSearch (Kibana) or QuickSight . Pattern C: Log Analytics Scenario: Centralized analysis of application logs. Source: CloudWatch Logs or EC2 logs. Stream: Kinesis Data Firehose . Destination: Amazon OpenSearch Service . Visualize: Kibana (built into OpenSearch) for searching and visualizing error logs. 3. Quick Comparison Cheat Sheet Feature Athena Redshift EMR Primary Use Ad-hoc S3 queries Data Warehousing / BI Big Data Processing (Spark/Hadoop) Infrastructure Serverless Clusters (Managed) Clusters (Managed) Pricing Per TB scanned Per Node / Hour Per Instance / Hour Speed Seconds/Minutes Milliseconds/Seconds Minutes/Hours (Batch) Exam Trigger \"Serverless SQL on S3\" \"Complex joins\", \"Warehouse\" \"Apache Spark\", \"Hadoop migration\" Feature Kinesis Data Streams Kinesis Data Firehose Real-time? Yes (Real-time) Near Real-time (60s buffer) Function Ingest custom streams Load data into destinations Destinations Lambda, Flink, EC2 S3, Redshift, OpenSearch, Splunk Management Manual scaling (shards) Fully Serverless (Auto-scaling)"}, {"id": 17, "num": "17", "title": "AWS Machine Learning", "html": "<h1>AWS Machine Learning Services - SAA-C03 Study Note<\/h1>\n<p>For the <strong>AWS Certified Solutions Architect - Associate (SAA-C03)<\/strong> exam, you generally do not need to know how to <em>code<\/em> these services. Instead, focus on <strong>identifying the right service for a specific business problem<\/strong>.<\/p>\n<p>Key Concept: Most of these are \"Serverless\" and \"Managed Services\" (High Availability is built-in).<\/p>\n<h2>1. Amazon Rekognition<\/h2>\n<p><strong>\"Computer Vision / Image &amp; Video Analysis\"<\/strong><\/p>\n<ul>\n<li><strong>What it does:<\/strong> Uses ML to analyze images and videos. You send it an image; it tells you what is inside.<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li><strong>Object &amp; Scene Detection:<\/strong> Identifies cars, pets, beaches, cities.<\/li>\n<li><strong>Facial Analysis:<\/strong> Detects faces, gender, age range, emotions (happy/sad).<\/li>\n<li><strong>Facial Recognition:<\/strong> Matches a face against a private collection (e.g., employee badge entry).<\/li>\n<li><strong>Content Moderation:<\/strong> Automatically detects unsafe, offensive, or inappropriate content (nudity, violence).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Scenario:<\/strong><ul>\n<li>\"A company needs to automatically flag inappropriate images uploaded by users to a social media app.\" -&gt; <strong>Use Rekognition Content Moderation.<\/strong><\/li>\n<li>\"A store wants to track the path of customers walking through aisles.\" -&gt; <strong>Use Rekognition Video Pathing.<\/strong><\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>2. Amazon Transcribe<\/h2>\n<p><strong>\"Speech-to-Text\"<\/strong><\/p>\n<ul>\n<li><strong>What it does:<\/strong> Converts audio (MP3, WAV, etc.) into text.<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li><strong>Speaker Identification:<\/strong> Can tell \"Speaker A\" from \"Speaker B\".<\/li>\n<li><strong>Automatic Language Identification:<\/strong> Detects the dominant language.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Scenario:<\/strong><ul>\n<li>\"A company needs to generate subtitles/captions for their video content automatically.\"    -&gt; <strong>Use Transcribe.<\/strong><\/li>\n<li>\"You need to create searchable text transcripts from customer service call recordings.\" -&gt; <strong>Use Transcribe.<\/strong><\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>3. Amazon Polly<\/h2>\n<p><strong>\"Text-to-Speech\"<\/strong><\/p>\n<ul>\n<li><strong>What it does:<\/strong> Converts text into lifelike speech (MP3). It is the opposite of Transcribe.<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li><strong>Neural TTS:<\/strong> Higher quality, more natural sounding voices.<\/li>\n<li><strong>Lexicons:<\/strong> Customize pronunciation of specific words (e.g., \"AWS\" as \"A-W-S\" instead of \"Aws\").<\/li>\n<li><strong>SSML (Speech Synthesis Markup Language):<\/strong> Markup tags to control breathing, volume, speed, and emphasis.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Scenario:<\/strong><ul>\n<li>\"An app needs to read articles aloud to visually impaired users.\" -&gt; <strong>Use Polly.<\/strong><\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>4. Amazon Translate<\/h2>\n<p><strong>\"Language Translation\"<\/strong><\/p>\n<ul>\n<li><strong>What it does:<\/strong> Provides high-quality neural machine translation between languages.<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li>Real-time and Batch translation.<\/li>\n<li>Supports custom terminology (e.g., ensuring brand names aren't translated literally).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Scenario:<\/strong><ul>\n<li>\"A company wants to localize their website content into 10 different languages dynamically.\" -&gt; <strong>Use Translate.<\/strong><\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>5. Amazon Lex + Amazon Connect<\/h2>\n<p><strong>\"Chatbots &amp; Call Centers\"<\/strong><\/p>\n<h3>Amazon Lex (The \"Brain\")<\/h3>\n<ul>\n<li><strong>What it does:<\/strong> Provides Automatic Speech Recognition (ASR) and Natural Language Understanding (NLU). It is the technology behind <strong>Alexa<\/strong>.<\/li>\n<li><strong>Use Case:<\/strong> Building conversational interfaces (Chatbots) for text or voice.<\/li>\n<\/ul>\n<h3>Amazon Connect (The \"Phone System\")<\/h3>\n<ul>\n<li><strong>What it does:<\/strong> A cloud-based <strong>Contact Center<\/strong> as a Service.<\/li>\n<li><strong>Integration:<\/strong> You use <strong>Connect<\/strong> to handle the phone lines and routing, and you use <strong>Lex<\/strong> to build the automated \"IVR\" (Interactive Voice Response) that talks to the customer before an agent picks up.<\/li>\n<li><strong>Exam Scenario:<\/strong><ul>\n<li>\"A company needs a cloud-based call center that can handle spikes in traffic and uses AI to answer common questions.\" -&gt; <strong>Use Amazon Connect integrated with Amazon Lex.<\/strong><\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>6. Amazon Comprehend<\/h2>\n<p><strong>\"Natural Language Processing (NLP)\"<\/strong><\/p>\n<ul>\n<li><strong>What it does:<\/strong> Analyzes text to understand the <em>meaning<\/em> and <em>relationships<\/em> within it.<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li><strong>Sentiment Analysis:<\/strong> Determines if text is Positive, Negative, Neutral, or Mixed.<\/li>\n<li><strong>Entity Recognition:<\/strong> Extracts people, places, brands, dates.<\/li>\n<li><strong>PII Detection:<\/strong> Detects Personally Identifiable Information (emails, SSNs) for redaction.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Scenario:<\/strong><ul>\n<li>\"A company wants to analyze customer emails to determine if they are happy or angry.\" -&gt; <strong>Use Comprehend Sentiment Analysis.<\/strong><\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>7. Amazon Comprehend Medical<\/h2>\n<p><strong>\"NLP for Healthcare\"<\/strong><\/p>\n<ul>\n<li><strong>What it does:<\/strong> Specifically trained on medical text to identify medical conditions, medications, dosages, and Protected Health Information (PHI).<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li><strong>HIPAA Eligible.<\/strong><\/li>\n<li>Detects PHI (Patient Health Information) for anonymization.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Scenario:<\/strong><ul>\n<li>\"A hospital needs to index doctor's notes and identify patient diagnosis and prescribed medication.\" -&gt; <strong>Use Comprehend Medical.<\/strong> (Do not choose standard Comprehend).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>8. Amazon SageMaker<\/h2>\n<p><strong>\"ML for Developers / Custom Models\"<\/strong><\/p>\n<ul>\n<li><strong>What it does:<\/strong> A fully managed service to build, train, and deploy <strong>custom<\/strong> machine learning models.<\/li>\n<li><strong>Key Concept:<\/strong> Used when the \"ready-made\" AI services (like Rekognition or Polly) are not enough and you need to build your own algorithm.<\/li>\n<li><strong>Exam Scenario:<\/strong><ul>\n<li>\"A data science team needs a managed environment to run Jupyter Notebooks and train TensorFlow models.\" -&gt; <strong>Use SageMaker.<\/strong><\/li>\n<li>\"You need to deploy a custom fraud detection model with auto-scaling.\" -&gt; <strong>Use SageMaker.<\/strong><\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>9. Amazon Kendra<\/h2>\n<p><strong>\"Enterprise Search\"<\/strong><\/p>\n<ul>\n<li><strong>What it does:<\/strong> An intelligent document search service powered by ML. Think of it as \"Google Search\" for your internal company documents.<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li>Extracts answers from PDFs, Word docs, HTML, SharePoint, etc.<\/li>\n<li>Supports <strong>Natural Language Queries<\/strong> (e.g., \"Where is the IT support desk?\" vs. matching keyword \"IT\").<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Scenario:<\/strong><ul>\n<li>\"A company wants to allow employees to search through an internal repository of PDF manuals using natural language questions.\" -&gt; <strong>Use Kendra.<\/strong><\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>10. Amazon Personalize<\/h2>\n<p><strong>\"Real-time Recommendations\"<\/strong><\/p>\n<ul>\n<li><strong>What it does:<\/strong> Machine learning service for creating real-time personalized recommendations. Same technology used by Amazon.com for \"Items you might like\".<\/li>\n<li><strong>Exam Scenario:<\/strong><ul>\n<li>\"An e-commerce website wants to show a 'Recommended for you' section based on user purchase history.\" -&gt; <strong>Use Personalize.<\/strong> (Do not build a custom model in SageMaker if Personalize can do it).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>11. Amazon Textract<\/h2>\n<p><strong>\"OCR on Steroids / Document Analysis\"<\/strong><\/p>\n<ul>\n<li><strong>What it does:<\/strong> Extracts text, handwriting, and <strong>data<\/strong> from scanned documents.<\/li>\n<li><strong>Key Difference vs. OCR:<\/strong> Standard OCR just gives you a blob of text. Textract understands <strong>Structure<\/strong> (Tables, Forms, Key-Value pairs).<\/li>\n<li><strong>Exam Scenario:<\/strong><ul>\n<li>\"A company needs to extract total amounts and vendor names from thousands of scanned PDF invoices and load them into a database.\" -&gt; <strong>Use Textract.<\/strong><\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>Machine Learning Summary Cheat Sheet<\/h2>\n<table>\n<thead>\n<tr>\n<th>Service<\/th>\n<th>Keyword / Trigger<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Rekognition<\/strong><\/td>\n<td>Images, Video, Faces, Content Moderation (Safety), Labels.<\/td>\n<\/tr>\n<tr>\n<td><strong>Transcribe<\/strong><\/td>\n<td>Speech-to-Text, Subtitles, Meeting minutes, Audio files to text.<\/td>\n<\/tr>\n<tr>\n<td><strong>Polly<\/strong><\/td>\n<td>Text-to-Speech, Talking app, SSML, Voices.<\/td>\n<\/tr>\n<tr>\n<td><strong>Translate<\/strong><\/td>\n<td>Localization, Language Translation.<\/td>\n<\/tr>\n<tr>\n<td><strong>Lex<\/strong><\/td>\n<td>Chatbots, Conversational AI, Alexa tech.<\/td>\n<\/tr>\n<tr>\n<td><strong>Connect<\/strong><\/td>\n<td>Cloud Contact Center, Call Center, Phone system.<\/td>\n<\/tr>\n<tr>\n
