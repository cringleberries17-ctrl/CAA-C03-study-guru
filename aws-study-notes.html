<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS SAA-C03 · Study Notes</title>
<style>
  :root{
    --bg:#EDF0F3; --panel:#FFFFFF; --ink:#1B2733; --ink-soft:#5A6B7B;
    --line:#D8DEE5; --accent:#E48312; --accent-deep:#B5650A; --navy:#232F3E;
    --tip-bg:#FDF3E3; --tip-line:#EBC58A;
    --font-display:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    --font-body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --font-mono:"SF Mono","Cascadia Code",Consolas,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-body);font-size:16px;line-height:1.62}

  .app{display:grid;grid-template-columns:300px minmax(0,1fr) 230px;min-height:100vh}

  /* ---------- sidebar ---------- */
  .side{
    background:var(--navy);color:#C9D3DD;padding:22px 0 30px;
    position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .side::-webkit-scrollbar{width:8px}
  .side::-webkit-scrollbar-thumb{background:#3B4B5E;border-radius:4px}
  .brand{padding:0 20px 16px;border-bottom:1px solid #38485B;margin-bottom:12px}
  .brand .mark{font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.06em;
    background:var(--accent);color:#fff;padding:3px 8px;border-radius:5px;display:inline-block;margin-bottom:8px}
  .brand h1{font-family:var(--font-display);font-size:19px;font-weight:600;color:#fff;line-height:1.3}
  .brand .sub{font-size:12px;color:#8DA0B3;margin-top:4px}
  .searchbox{padding:0 20px 12px}
  .searchbox input{
    width:100%;padding:9px 12px;border-radius:8px;border:1px solid #3B4B5E;background:#1B2836;color:#fff;
    font:inherit;font-size:13.5px;
  }
  .searchbox input::placeholder{color:#7B8FA3}
  .searchbox input:focus{outline:2px solid var(--accent);border-color:var(--accent)}
  .chlist{list-style:none}
  .chlist button{
    display:flex;gap:10px;align-items:baseline;width:100%;text-align:left;
    background:none;border:none;color:#C9D3DD;font:inherit;font-size:13.5px;line-height:1.4;
    padding:8px 20px;cursor:pointer;border-left:3px solid transparent;
  }
  .chlist button:hover{background:#2B3A4C;color:#fff}
  .chlist button.on{background:#2B3A4C;color:#fff;border-left-color:var(--accent)}
  .chlist .n{font-family:var(--font-mono);font-size:11px;color:#8DA0B3;flex:none;width:30px}
  .chlist button.on .n{color:var(--accent)}
  .chlist .done-mark{margin-left:auto;color:#5FBF8F;font-size:12px;flex:none}
  .side-foot{padding:14px 20px 0;font-size:11.5px;color:#7B8FA3;line-height:1.5}

  /* ---------- search results ---------- */
  .results{padding:4px 12px 20px;display:none}
  .results.show{display:block}
  .results .r-item{
    background:#1B2836;border:1px solid #3B4B5E;border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;
  }
  .results .r-item:hover{border-color:var(--accent)}
  .results .r-title{font-size:12.5px;color:#fff;font-weight:600;margin-bottom:3px}
  .results .r-snip{font-size:11.5px;color:#8DA0B3;line-height:1.5}
  .results .r-snip b{color:var(--accent);font-weight:700}
  .results .r-none{font-size:12.5px;color:#8DA0B3;padding:6px 4px}

  /* ---------- content ---------- */
  .main{padding:36px 48px 80px;max-width:860px;width:100%;justify-self:center}
  .crumb{font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);margin-bottom:6px}
  .ch-title{font-family:var(--font-display);font-size:34px;font-weight:600;letter-spacing:-.01em;margin-bottom:6px}
  .ch-meta{display:flex;align-items:center;gap:14px;margin-bottom:26px;flex-wrap:wrap}
  .done-toggle{
    display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-soft);
    background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 14px;cursor:pointer;font-family:inherit;
  }
  .done-toggle.on{border-color:#2E7D5B;color:#2E7D5B;background:#E8F4EE}
  .content{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:34px 40px;box-shadow:0 1px 2px rgba(27,39,51,.05)}

  .content h2{font-family:var(--font-display);font-size:23px;font-weight:600;margin:34px 0 12px;padding-top:10px}
  .content h2:first-child{margin-top:0}
  .content h3{font-size:16.5px;font-weight:700;margin:24px 0 8px;color:var(--navy)}
  .content h4{font-size:15px;font-weight:700;margin:18px 0 6px}
  .content p{margin:10px 0}
  .content ul,.content ol{margin:10px 0 10px 24px}
  .content li{margin:5px 0}
  .content li ul,.content li ol{margin:5px 0 5px 22px}
  .content code{
    font-family:var(--font-mono);font-size:.86em;background:#F0F3F6;border:1px solid var(--line);
    border-radius:5px;padding:1px 5px;color:#9C4221;
  }
  .content pre{background:var(--navy);border-radius:10px;padding:16px;overflow-x:auto;margin:14px 0}
  .content pre code{background:none;border:none;color:#DCE3EA;padding:0;font-size:12.5px;line-height:1.6}
  .content table{border-collapse:collapse;width:100%;margin:16px 0;font-size:14px}
  .content th{
    background:var(--navy);color:#fff;text-align:left;padding:9px 12px;font-weight:600;font-size:13px;
  }
  .content td{border:1px solid var(--line);padding:9px 12px;vertical-align:top}
  .content tr:nth-child(even) td{background:#F7F9FB}
  .content blockquote{border-left:3px solid var(--accent);padding:6px 16px;margin:14px 0;color:var(--ink-soft);background:#FBF8F3;border-radius:0 8px 8px 0}
  .content hr{border:none;border-top:1px solid var(--line);margin:26px 0}
  .content a{color:var(--accent-deep)}
  .content strong{color:var(--navy)}
  .content mark{background:#FFE9A8;border-radius:3px;padding:0 2px}

  /* signature: exam tip callouts */
  .content .exam-tip{
    list-style:none;display:block;background:var(--tip-bg);border:1px solid var(--tip-line);
    border-left:4px solid var(--accent);border-radius:8px;padding:10px 14px;margin:12px 0 12px -18px;
  }
  .content li.exam-tip{margin-left:0}
  .content .exam-tip em:first-of-type{
    font-style:normal;font-weight:700;color:var(--accent-deep);
  }
  .content .exam-tip em:first-of-type::before{content:"💡 "}

  .pager{display:flex;justify-content:space-between;gap:14px;margin-top:26px}
  .pager button{
    flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:14px 18px;text-align:left;cursor:pointer;font:inherit;transition:border-color .15s;
  }
  .pager button:hover{border-color:var(--accent)}
  .pager .dir{font-size:11.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);display:block;margin-bottom:4px}
  .pager .t{font-weight:600;color:var(--navy);font-size:14.5px}
  .pager button.next{text-align:right}
  .pager button[disabled]{opacity:.35;cursor:default}
  .pager button[disabled]:hover{border-color:var(--line)}
  .kbd-note{text-align:center;font-size:12px;color:var(--ink-soft);margin-top:14px}
  kbd{font-family:var(--font-mono);font-size:11px;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 5px;background:#fff}

  /* ---------- toc ---------- */
  .toc{
    padding:36px 18px 30px 4px;position:sticky;top:0;height:100vh;overflow-y:auto;font-size:12.5px;
  }
  .toc .toc-head{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin-bottom:10px;font-weight:700}
  .toc a{display:block;color:var(--ink-soft);text-decoration:none;padding:4px 10px;border-left:2px solid var(--line);line-height:1.4}
  .toc a.h3{padding-left:22px;font-size:11.5px}
  .toc a:hover{color:var(--accent-deep)}
  .toc a.now{color:var(--accent-deep);border-left-color:var(--accent);font-weight:600}

  /* ---------- mobile ---------- */
  .menu-btn{display:none}
  @media (max-width:1180px){ .toc{display:none} .app{grid-template-columns:280px minmax(0,1fr)} }
  @media (max-width:820px){
    .app{grid-template-columns:1fr}
    .side{position:fixed;left:0;top:0;width:290px;z-index:40;transform:translateX(-100%);transition:transform .22s ease}
    .side.open{transform:none;box-shadow:0 0 40px rgba(0,0,0,.35)}
    .menu-btn{
      display:flex;align-items:center;gap:8px;position:sticky;top:12px;z-index:30;
      background:var(--navy);color:#fff;border:none;border-radius:10px;padding:10px 16px;
      font:inherit;font-size:14px;cursor:pointer;margin:12px 0 4px;
    }
    .main{padding:8px 18px 60px}
    .content{padding:22px 18px}
    .ch-title{font-size:26px}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important} html{scroll-behavior:auto} }
  button:focus-visible,input:focus-visible,a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
</style>
</head>

<div class="app">
  <nav class="side" id="side">
    <div class="brand">
      <span class="mark">SAA-C03</span>
      <h1>AWS Study Notes</h1>
      <div class="sub" id="progressLine"></div>

</div>

<script>
"use strict";
const CHAPTERS = [{"id": 0, "num": "1", "title": "EC2 Fundamentals", "html": "<h2>1. EC2 Basics<\/h2>\n<p><strong>Amazon Elastic Compute Cloud (Amazon EC2)<\/strong> provides scalable computing capacity in the AWS Cloud. It eliminates the need to invest in hardware up front, so you can develop and deploy applications faster.<\/p>\n<ul>\n<li><strong>AMI (Amazon Machine Image):<\/strong><ul>\n<li>A template that contains the software configuration (OS, application server, and applications) required to launch your instance.<\/li>\n<li><strong>Region Scoped:<\/strong> AMIs are locked to a specific region. To use an AMI in another region, you must <strong>copy<\/strong> it.<\/li>\n<li><strong>Public vs. Private:<\/strong> You can create your own AMIs and choose to keep them private or share them publicly.<\/li>\n<\/ul>\n<\/li>\n<li><strong>User Data:<\/strong><ul>\n<li>Script used to run commands when an instance <strong>first launches<\/strong>.<\/li>\n<li>Used to bootstrap instances (e.g., install updates, install software, download files from S3).<\/li>\n<li>Runs with <code>root<\/code> privileges.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Instance Metadata:<\/strong><ul>\n<li>Data <em>about<\/em> your instance (e.g., private IP, public IP, hostname, IAM role name).<\/li>\n<li>Accessible from within the instance via URL: <code>http://169.254.169.254/latest/meta-data/<\/code><\/li>\n<li><em>Exam Tip:<\/em> Do not confuse <strong>User Data<\/strong> (boot script) with <strong>Metadata<\/strong> (instance info).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>2. EC2 Instance Types Basics<\/h2>\n<p>Understanding instance families is crucial for selecting the right resource for a workload.<\/p>\n<p><strong>Naming Convention:<\/strong> e.g., <code>m5.2xlarge<\/code><\/p>\n<ul>\n<li><strong>m<\/strong>: Instance Class (Family)<\/li>\n<li><strong>5<\/strong>: Generation (Higher is newer)<\/li>\n<li><strong>2xlarge<\/strong>: Size (CPU/RAM capacity)<\/li>\n<\/ul>\n<h3>Key Instance Families (Mnemonic: \"FIGHT DR MC. P.X.\")<\/h3>\n<table>\n<thead>\n<tr>\n<th>Family Code<\/th>\n<th>Type<\/th>\n<th>Use Case<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>G, P, Tr, Inf<\/strong><\/td>\n<td><strong>Accelerated Computing<\/strong><\/td>\n<td>Graphics, Graphics Processing, Floating Point Number calculations, Machine Learning, AI.<\/td>\n<\/tr>\n<tr>\n<td><strong>I, D, H<\/strong><\/td>\n<td><strong>Storage Optimized<\/strong><\/td>\n<td>High IOPS, Data Warehousing, Distributed File Systems. <strong>I<\/strong> instances are great for databases needing high I/O (NoSQL).<\/td>\n<\/tr>\n<tr>\n<td><strong>M<\/strong><\/td>\n<td><strong>General Purpose<\/strong><\/td>\n<td>Balanced Compute/Memory/Networking. Good for application servers, gaming servers, small DBs.<\/td>\n<\/tr>\n<tr>\n<td><strong>C<\/strong><\/td>\n<td><strong>Compute Optimized<\/strong><\/td>\n<td>High performance processors. Batch processing, media transcoding, scientific modeling, dedicated gaming servers.<\/td>\n<\/tr>\n<tr>\n<td><strong>R, X, Z<\/strong><\/td>\n<td><strong>Memory Optimized<\/strong><\/td>\n<td>High RAM. In-memory databases (Redis, Memcached), Real-time processing of big data (Apache Spark).<\/td>\n<\/tr>\n<tr>\n<td><strong>T<\/strong><\/td>\n<td><strong>Burstable<\/strong><\/td>\n<td>General Purpose but with the ability to \"burst\" CPU. Uses <strong>CPU Credits<\/strong>. Good for workloads with idle time (e.g., dev environments).<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<ul>\n<li><em>Exam Tip:<\/em> If the scenario mentions \"High Performance Computing (HPC)\" or \"Batch Processing,\" think <strong>C<\/strong> family. If it mentions \"In-memory database\" or \"Cache,\" think <strong>R<\/strong> family.<\/li>\n<\/ul>\n<h2>3. Security Groups &amp; Classic Ports Overview<\/h2>\n<p>A <strong>Security Group<\/strong> acts as a <strong>virtual firewall<\/strong> for your EC2 instances to control incoming and outgoing traffic.<\/p>\n<ul>\n<li><strong>Scope:<\/strong> Acting at the <strong>Instance level<\/strong>, not the subnet level.<\/li>\n<li><strong>Stateful:<\/strong> If you allow traffic IN, the response traffic is automatically allowed OUT (and vice versa).<\/li>\n<li><strong>Rules:<\/strong><ul>\n<li>Can only <strong>ALLOW<\/strong> rules (cannot create DENY rules).<\/li>\n<li>Implicitly <strong>DENIES ALL<\/strong> inbound traffic by default.<\/li>\n<li>Allows <strong>ALL OUTBOUND<\/strong> traffic by default.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Referencing:<\/strong> You can authorize a specific Security Group ID instead of a CIDR block. This is best practice for multi-tier apps (e.g., Allow DB SG to accept traffic only from WebApp SG).<\/li>\n<\/ul>\n<h3>Common Ports to Know<\/h3>\n<table>\n<thead>\n<tr>\n<th>Port<\/th>\n<th>Protocol<\/th>\n<th>Service<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>22<\/strong><\/td>\n<td>SSH<\/td>\n<td>Linux Login (Secure Shell)<\/td>\n<\/tr>\n<tr>\n<td><strong>3389<\/strong><\/td>\n<td>RDP<\/td>\n<td>Windows Login (Remote Desktop)<\/td>\n<\/tr>\n<tr>\n<td><strong>80<\/strong><\/td>\n<td>HTTP<\/td>\n<td>Unsecured Web Traffic<\/td>\n<\/tr>\n<tr>\n<td><strong>443<\/strong><\/td>\n<td>HTTPS<\/td>\n<td>Secured Web Traffic<\/td>\n<\/tr>\n<tr>\n<td><strong>21<\/strong><\/td>\n<td>FTP<\/td>\n<td>File Transfer<\/td>\n<\/tr>\n<tr>\n<td><strong>3306<\/strong><\/td>\n<td>TCP<\/td>\n<td>MySQL / Aurora / MariaDB<\/td>\n<\/tr>\n<tr>\n<td><strong>5432<\/strong><\/td>\n<td>TCP<\/td>\n<td>PostgreSQL<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<ul>\n<li><em>Exam Tip:<\/em> If you cannot connect to your instance, it is almost always a <strong>Security Group<\/strong> issue (time out). If you get a \"Connection Refused\" error, the Security Group is likely fine, but the application on the instance isn't running.<\/li>\n<\/ul>\n<h2>4. SSH Overview<\/h2>\n<p><strong>SSH (Secure Shell)<\/strong> is used to command a Linux instance remotely.<\/p>\n<ul>\n<li><strong>Key Pairs:<\/strong> AWS uses public-key cryptography.<ul>\n<li><strong>Public Key:<\/strong> Stored by AWS on the EC2 instance.<\/li>\n<li><strong>Private Key:<\/strong> Stored by you (the <code>.pem<\/code> file). <strong>If you lose this, you cannot recover it.<\/strong><\/li>\n<\/ul>\n<\/li>\n<li><strong>Putty (Windows &lt; 10):<\/strong> Requires converting <code>.pem<\/code> to <code>.ppk<\/code> using PuttyGen.<\/li>\n<li><strong>Chmod 400:<\/strong> On Mac/Linux, you must secure your key file permissions before connecting: <code>chmod 400 my-key-pair.pem<\/code>.<\/li>\n<li><strong>EC2 Instance Connect:<\/strong> A browser-based SSH connection that works without managing key files manually (uses IAM permissions).<\/li>\n<\/ul>\n<h2>5. EC2 Instance Purchasing Options<\/h2>\n<p>Choosing the right pricing model is a common cost-optimization question on the exam.<\/p>\n<table>\n<thead>\n<tr>\n<th>Option<\/th>\n<th>Description<\/th>\n<th>Best For<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>On-Demand<\/strong><\/td>\n<td>Pay by the second (Linux/Win) or hour. No commitment, highest cost.<\/td>\n<td>Short-term, spiky, or unpredictable workloads. First-time apps.<\/td>\n<\/tr>\n<tr>\n<td><strong>Reserved (Standard)<\/strong><\/td>\n<td>1 or 3-year commitment. Up to 72% discount. Can modify AZ, scope, networking type.<\/td>\n<td>Steady-state usage (e.g., core database).<\/td>\n<\/tr>\n<tr>\n<td><strong>Reserved (Convertible)<\/strong><\/td>\n<td>1 or 3-year commitment. Up to 54% discount. Can change instance <strong>family<\/strong>, OS, tenancy, and payment option.<\/td>\n<td>Steady-state usage where software needs might change.<\/td>\n<\/tr>\n<tr>\n<td><strong>Savings Plans<\/strong><\/td>\n<td>Commitment to a specific usage (e.g., $10/hour) for 1 or 3 years. <strong>EC2 Instance Savings Plan<\/strong> (specific family/region) or <strong>Compute Savings Plan<\/strong> (flexible across EC2, Fargate, Lambda).<\/td>\n<td>Most flexible long-term option. Compute Savings Plans are very popular for exam answers regarding flexibility + cost.<\/td>\n<\/tr>\n<tr>\n<td><strong>Spot Instances<\/strong><\/td>\n<td>Use spare capacity. Up to 90% discount. Can be interrupted with 2 minutes notice.<\/td>\n<td>Stateless, fault-tolerant, flexible workloads (Batch jobs, Image processing, CI/CD).<\/td>\n<\/tr>\n<tr>\n<td><strong>Dedicated Host<\/strong><\/td>\n<td>Physical server fully dedicated to your use. Visibility into sockets/cores.<\/td>\n<td>Compliance requirements (BYOL - Bring Your Own License) that charge per socket/core.<\/td>\n<\/tr>\n<tr>\n<td><strong>Dedicated Instance<\/strong><\/td>\n<td>Instances run on hardware dedicated to you (single tenant), but you don't control placement.<\/td>\n<td>Compliance requirements needing single-tenancy but NOT specific hardware control.<\/td>\n<\/tr>\n<tr>\n<td><strong>Capacity Reservation<\/strong><\/td>\n<td>Reserves capacity in a specific AZ. <strong>No billing discount<\/strong> (charged On-Demand rate whether you run it or not).<\/td>\n<td>Ensuring you can launch an instance in a specific AZ during a critical event (e.g., Black Friday).<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2>6. Spot Instances &amp; Spot Fleet<\/h2>\n<p>Spot instances are the cheapest option but come with the risk of termination.<\/p>\n<ul>\n<li><strong>Spot Price:<\/strong> Market price changes based on supply/demand. You define a max price.<\/li>\n<li><strong>Interruption:<\/strong> If Spot Price &gt; Max Price, or if AWS needs capacity back, you get a <strong>2-minute warning<\/strong>.<\/li>\n<li><strong>Spot Request Types:<\/strong><ul>\n<li><em>One-time:<\/em> If interrupted, the request is closed.<\/li>\n<li><em>Persistent:<\/em> If interrupted, the request opens again to try and launch a new instance when capacity is available.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Spot Fleet:<\/strong> A collection of Spot Instances and (optionally) On-Demand Instances.<ul>\n<li>It attempts to meet a target capacity (e.g., 50 vCPUs) using a mix of instance types.<\/li>\n<li><strong>Strategies:<\/strong><ul>\n<li><strong>lowestPrice:<\/strong> Launches from the pool with the lowest price (Cost optimization, but higher interruption risk).<\/li>\n<li><strong>diversified:<\/strong> Distributed across all pools (High availability, lower interruption risk).<\/li>\n<li><strong>capacityOptimized:<\/strong> Launches from pools with optimal capacity for the number of instances (Best for minimizing interruptions). <em>Exam Favorite.<\/em><\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<\/li>\n<li><em>Exam Tip:<\/em> If a question asks for \"Cost optimization\" for a \"Critical workload\" or \"Database,\" <strong>NEVER<\/strong> choose Spot Instances. Spot is only for <strong>interruptible<\/strong> workloads.<\/li>\n<\/ul>", "text": "1. EC2 Basics Amazon Elastic Compute Cloud (Amazon EC2) provides scalable computing capacity in the AWS Cloud. It eliminates the need to invest in hardware up front, so you can develop and deploy applications faster. AMI (Amazon Machine Image): A template that contains the software configuration (OS, application server, and applications) required to launch your instance. Region Scoped: AMIs are locked to a specific region. To use an AMI in another region, you must copy it. Public vs. Private: You can create your own AMIs and choose to keep them private or share them publicly. User Data: Script used to run commands when an instance first launches . Used to bootstrap instances (e.g., install updates, install software, download files from S3). Runs with root privileges. Instance Metadata: Data about your instance (e.g., private IP, public IP, hostname, IAM role name). Accessible from within the instance via URL: http://169.254.169.254/latest/meta-data/ Exam Tip: Do not confuse User Data (boot script) with Metadata (instance info). 2. EC2 Instance Types Basics Understanding instance families is crucial for selecting the right resource for a workload. Naming Convention: e.g., m5.2xlarge m : Instance Class (Family) 5 : Generation (Higher is newer) 2xlarge : Size (CPU/RAM capacity) Key Instance Families (Mnemonic: \"FIGHT DR MC. P.X.\") Family Code Type Use Case G, P, Tr, Inf Accelerated Computing Graphics, Graphics Processing, Floating Point Number calculations, Machine Learning, AI. I, D, H Storage Optimized High IOPS, Data Warehousing, Distributed File Systems. I instances are great for databases needing high I/O (NoSQL). M General Purpose Balanced Compute/Memory/Networking. Good for application servers, gaming servers, small DBs. C Compute Optimized High performance processors. Batch processing, media transcoding, scientific modeling, dedicated gaming servers. R, X, Z Memory Optimized High RAM. In-memory databases (Redis, Memcached), Real-time processing of big data (Apache Spark). T Burstable General Purpose but with the ability to \"burst\" CPU. Uses CPU Credits . Good for workloads with idle time (e.g., dev environments). Exam Tip: If the scenario mentions \"High Performance Computing (HPC)\" or \"Batch Processing,\" think C family. If it mentions \"In-memory database\" or \"Cache,\" think R family. 3. Security Groups & Classic Ports Overview A Security Group acts as a virtual firewall for your EC2 instances to control incoming and outgoing traffic. Scope: Acting at the Instance level , not the subnet level. Stateful: If you allow traffic IN, the response traffic is automatically allowed OUT (and vice versa). Rules: Can only ALLOW rules (cannot create DENY rules). Implicitly DENIES ALL inbound traffic by default. Allows ALL OUTBOUND traffic by default. Referencing: You can authorize a specific Security Group ID instead of a CIDR block. This is best practice for multi-tier apps (e.g., Allow DB SG to accept traffic only from WebApp SG). Common Ports to Know Port Protocol Service 22 SSH Linux Login (Secure Shell) 3389 RDP Windows Login (Remote Desktop) 80 HTTP Unsecured Web Traffic 443 HTTPS Secured Web Traffic 21 FTP File Transfer 3306 TCP MySQL / Aurora / MariaDB 5432 TCP PostgreSQL Exam Tip: If you cannot connect to your instance, it is almost always a Security Group issue (time out). If you get a \"Connection Refused\" error, the Security Group is likely fine, but the application on the instance isn't running. 4. SSH Overview SSH (Secure Shell) is used to command a Linux instance remotely. Key Pairs: AWS uses public-key cryptography. Public Key: Stored by AWS on the EC2 instance. Private Key: Stored by you (the .pem file). If you lose this, you cannot recover it. Putty (Windows < 10): Requires converting .pem to .ppk using PuttyGen. Chmod 400: On Mac/Linux, you must secure your key file permissions before connecting: chmod 400 my-key-pair.pem . EC2 Instance Connect: A browser-based SSH connection that works without managing key files manually (uses IAM permissions). 5. EC2 Instance Purchasing Options Choosing the right pricing model is a common cost-optimization question on the exam. Option Description Best For On-Demand Pay by the second (Linux/Win) or hour. No commitment, highest cost. Short-term, spiky, or unpredictable workloads. First-time apps. Reserved (Standard) 1 or 3-year commitment. Up to 72% discount. Can modify AZ, scope, networking type. Steady-state usage (e.g., core database). Reserved (Convertible) 1 or 3-year commitment. Up to 54% discount. Can change instance family , OS, tenancy, and payment option. Steady-state usage where software needs might change. Savings Plans Commitment to a specific usage (e.g., $10/hour) for 1 or 3 years. EC2 Instance Savings Plan (specific family/region) or Compute Savings Plan (flexible across EC2, Fargate, Lambda). Most flexible long-term option. Compute Savings Plans are very popular for exam answers regarding flexibility + cost. Spot Instances Use spare capacity. Up to 90% discount. Can be interrupted with 2 minutes notice. Stateless, fault-tolerant, flexible workloads (Batch jobs, Image processing, CI/CD). Dedicated Host Physical server fully dedicated to your use. Visibility into sockets/cores. Compliance requirements (BYOL - Bring Your Own License) that charge per socket/core. Dedicated Instance Instances run on hardware dedicated to you (single tenant), but you don't control placement. Compliance requirements needing single-tenancy but NOT specific hardware control. Capacity Reservation Reserves capacity in a specific AZ. No billing discount (charged On-Demand rate whether you run it or not). Ensuring you can launch an instance in a specific AZ during a critical event (e.g., Black Friday). 6. Spot Instances & Spot Fleet Spot instances are the cheapest option but come with the risk of termination. Spot Price: Market price changes based on supply/demand. You define a max price. Interruption: If Spot Price > Max Price, or if AWS needs capacity back, you get a 2-minute warning . Spot Request Types: One-time: If interrupted, the request is closed. Persistent: If interrupted, the request opens again to try and launch a new instance when capacity is available. Spot Fleet: A collection of Spot Instances and (optionally) On-Demand Instances. It attempts to meet a target capacity (e.g., 50 vCPUs) using a mix of instance types. Strategies: lowestPrice: Launches from the pool with the lowest price (Cost optimization, but higher interruption risk). diversified: Distributed across all pools (High availability, lower interruption risk). capacityOptimized: Launches from pools with optimal capacity for the number of instances (Best for minimizing interruptions). Exam Favorite. Exam Tip: If a question asks for \"Cost optimization\" for a \"Critical workload\" or \"Database,\" NEVER choose Spot Instances. Spot is only for interruptible workloads."}, {"id": 1, "num": "2", "title": "EC2 - Solutions Architect Associate Level", "html": "<h1>AWS Solutions Architect Associate (SAA-C03) Study Notes<\/h1>\n<h2>Topic: EC2 Advanced Networking &amp; Features<\/h2>\n<h3>1. Private vs. Public vs. Elastic IP<\/h3>\n<p>Understanding IP addressing behavior is critical for the exam, especially regarding instance lifecycle events (Stop/Start).<\/p>\n<h4>Private IP<\/h4>\n<ul>\n<li><strong>Definition:<\/strong> The internal IP address used for communication within the VPC.<\/li>\n<li><strong>Persistence:<\/strong> Retained for the life of the instance. If you Stop and Start the instance, the Private IP <strong>does not change<\/strong>.<\/li>\n<li><strong>Scope:<\/strong> Only reachable within the VPC or via VPN/Direct Connect (unless NAT is used).<\/li>\n<\/ul>\n<h4>Public IP<\/h4>\n<ul>\n<li><strong>Definition:<\/strong> An IP address reachable from the internet.<\/li>\n<li><strong>Behavior:<\/strong><ul>\n<li>Assigned automatically if <code>Auto-assign Public IP<\/code> is enabled in the subnet settings or requested at launch.<\/li>\n<li><strong>Dynamic:<\/strong> If you Stop and then Start the instance, the Public IP <strong>will change<\/strong>.<\/li>\n<li><strong>Hostname:<\/strong> Cannot be manually moved between instances.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h4>Elastic IP (EIP)<\/h4>\n<ul>\n<li><strong>Definition:<\/strong> A static, fixed Public IP address allocated to your AWS account.<\/li>\n<li><strong>Use Case:<\/strong> Masking instance failures by rapidly remaping the address to another instance.<\/li>\n<li><strong>Behavior:<\/strong><ul>\n<li>You own it until you release it.<\/li>\n<li><strong>Static:<\/strong> It does not change if you stop/start the instance.<\/li>\n<li><strong>Scope:<\/strong> Region-specific (cannot move an EIP from us-east-1 to us-west-2).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Cost:<\/strong><ul>\n<li>Free if attached to a running instance and it is the <em>only<\/em> EIP attached.<\/li>\n<li><strong>Charges apply if:<\/strong> The instance is stopped, the EIP is unattached, or you have more than one EIP attached to a running instance.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>2. EC2 Placement Groups<\/h3>\n<p>Placement groups determine how instances are placed on underlying hardware to optimize for performance, durability, or availability.<\/p>\n<table>\n<thead>\n<tr>\n<th>Type<\/th>\n<th>Description<\/th>\n<th>Use Case<\/th>\n<th>Constraint<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Cluster<\/strong><\/td>\n<td>Instances are packed close together inside a single Availability Zone (AZ). Provides low latency and high network throughput (10Gbps+).<\/td>\n<td>High Performance Computing (HPC), tightly coupled applications, supercomputing.<\/td>\n<td><strong>Single AZ only.<\/strong> High risk of concurrent failure if the rack fails.<\/td>\n<\/tr>\n<tr>\n<td><strong>Spread<\/strong><\/td>\n<td>Instances are placed on distinct underlying hardware (different racks). Maximizes availability.<\/td>\n<td>Critical applications where individual instances must be isolated from each other's hardware failure.<\/td>\n<td>Max <strong>7 instances per AZ<\/strong> per placement group.<\/td>\n<\/tr>\n<tr>\n<td><strong>Partition<\/strong><\/td>\n<td>Instances are spread across logical partitions (groups of racks). Instances in one partition do not share hardware with instances in other partitions.<\/td>\n<td>Distributed &amp; Big Data workloads: Hadoop, Cassandra, Kafka.<\/td>\n<td>Can span multiple AZs. Scales to 100s of instances.<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>3. Elastic Network Interfaces (ENI) - Overview<\/h3>\n<p>An ENI is a logical networking component in a VPC that represents a virtual network card.<\/p>\n<ul>\n<li><strong>Scope:<\/strong> Bound to a specific <strong>Availability Zone (AZ)<\/strong>. You cannot attach an ENI created in AZ A to an instance in AZ B.<\/li>\n<li><strong>Attributes:<\/strong> An ENI can have:<ul>\n<li>A primary private IPv4 address.<\/li>\n<li>One or more secondary private IPv4 addresses.<\/li>\n<li>One Elastic IP address (per private IPv4).<\/li>\n<li>One Public IPv4 address.<\/li>\n<li>One or more security groups.<\/li>\n<li>A MAC address.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h4>Types of ENI Attachment<\/h4>\n<ol>\n<li><strong>Primary ENI (eth0):<\/strong> Created automatically when an instance is launched. <strong>Cannot be detached<\/strong> from the instance.<\/li>\n<li><strong>Secondary ENI (eth1+):<\/strong> Can be created independently and attached/detached from instances on the fly.<\/li>\n<\/ol>\n<h3>4. ENI - Extra Reading (Exam Tips)<\/h3>\n<ul>\n<li><strong>Failover Scenarios:<\/strong> You can create a low-cost failover solution by creating a secondary ENI with a private IP and an Elastic IP attached. If the primary instance fails, you can move the ENI to a standby instance.<\/li>\n<li><strong>Dual Homing:<\/strong> You might attach two ENIs to an instance:<ul>\n<li><strong>ENI 1:<\/strong> Connected to a management subnet (for SSH/RDP access).<\/li>\n<li><strong>ENI 2:<\/strong> Connected to a data subnet (for application traffic).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Security Groups:<\/strong> Security Groups are attached to the <strong>ENI<\/strong>, not the instance itself. This means different ENIs on the same instance can have different security group rules.<\/li>\n<\/ul>\n<h3>5. EC2 Hibernate<\/h3>\n<p>EC2 Hibernate allows you to pause an instance and resume it later, saving the state of the RAM.<\/p>\n<ul>\n<li><strong>How it works:<\/strong> When you hibernate, the contents of the RAM (memory) are written to the <strong>Root EBS Volume<\/strong>. When you start it again, the RAM is reloaded from the disk.<\/li>\n<li><strong>Benefits:<\/strong><ul>\n<li>Much faster boot time than a full Stop/Start.<\/li>\n<li>Applications do not need to \"warm up\" or reload caches.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Requirements (Important for Exam):<\/strong><ul>\n<li>The Root EBS Volume must be <strong>Encrypted<\/strong>.<\/li>\n<li>Must be enabled at <strong>Launch<\/strong> (cannot enable on an existing running instance).<\/li>\n<li>Root volume must have enough space to store the RAM contents.<\/li>\n<li>Not supported for bare metal instances or instances with Instance Store.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Lifecycle:<\/strong><ul>\n<li><strong>Instance ID:<\/strong> Retained.<\/li>\n<li><strong>Private IP:<\/strong> Retained.<\/li>\n<li><strong>Elastic IP:<\/strong> Retained.<\/li>\n<li><strong>Public IP (Standard):<\/strong> Lost (same as Stop/Start).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Maximum Duration:<\/strong> You cannot keep an instance in hibernation for more than 60 days.<\/li>\n<\/ul>", "text": "AWS Solutions Architect Associate (SAA-C03) Study Notes Topic: EC2 Advanced Networking & Features 1. Private vs. Public vs. Elastic IP Understanding IP addressing behavior is critical for the exam, especially regarding instance lifecycle events (Stop/Start). Private IP Definition: The internal IP address used for communication within the VPC. Persistence: Retained for the life of the instance. If you Stop and Start the instance, the Private IP does not change . Scope: Only reachable within the VPC or via VPN/Direct Connect (unless NAT is used). Public IP Definition: An IP address reachable from the internet. Behavior: Assigned automatically if Auto-assign Public IP is enabled in the subnet settings or requested at launch. Dynamic: If you Stop and then Start the instance, the Public IP will change . Hostname: Cannot be manually moved between instances. Elastic IP (EIP) Definition: A static, fixed Public IP address allocated to your AWS account. Use Case: Masking instance failures by rapidly remaping the address to another instance. Behavior: You own it until you release it. Static: It does not change if you stop/start the instance. Scope: Region-specific (cannot move an EIP from us-east-1 to us-west-2). Cost: Free if attached to a running instance and it is the only EIP attached. Charges apply if: The instance is stopped, the EIP is unattached, or you have more than one EIP attached to a running instance. 2. EC2 Placement Groups Placement groups determine how instances are placed on underlying hardware to optimize for performance, durability, or availability. Type Description Use Case Constraint Cluster Instances are packed close together inside a single Availability Zone (AZ). Provides low latency and high network throughput (10Gbps+). High Performance Computing (HPC), tightly coupled applications, supercomputing. Single AZ only. High risk of concurrent failure if the rack fails. Spread Instances are placed on distinct underlying hardware (different racks). Maximizes availability. Critical applications where individual instances must be isolated from each other's hardware failure. Max 7 instances per AZ per placement group. Partition Instances are spread across logical partitions (groups of racks). Instances in one partition do not share hardware with instances in other partitions. Distributed & Big Data workloads: Hadoop, Cassandra, Kafka. Can span multiple AZs. Scales to 100s of instances. 3. Elastic Network Interfaces (ENI) - Overview An ENI is a logical networking component in a VPC that represents a virtual network card. Scope: Bound to a specific Availability Zone (AZ) . You cannot attach an ENI created in AZ A to an instance in AZ B. Attributes: An ENI can have: A primary private IPv4 address. One or more secondary private IPv4 addresses. One Elastic IP address (per private IPv4). One Public IPv4 address. One or more security groups. A MAC address. Types of ENI Attachment Primary ENI (eth0): Created automatically when an instance is launched. Cannot be detached from the instance. Secondary ENI (eth1+): Can be created independently and attached/detached from instances on the fly. 4. ENI - Extra Reading (Exam Tips) Failover Scenarios: You can create a low-cost failover solution by creating a secondary ENI with a private IP and an Elastic IP attached. If the primary instance fails, you can move the ENI to a standby instance. Dual Homing: You might attach two ENIs to an instance: ENI 1: Connected to a management subnet (for SSH/RDP access). ENI 2: Connected to a data subnet (for application traffic). Security Groups: Security Groups are attached to the ENI , not the instance itself. This means different ENIs on the same instance can have different security group rules. 5. EC2 Hibernate EC2 Hibernate allows you to pause an instance and resume it later, saving the state of the RAM. How it works: When you hibernate, the contents of the RAM (memory) are written to the Root EBS Volume . When you start it again, the RAM is reloaded from the disk. Benefits: Much faster boot time than a full Stop/Start. Applications do not need to \"warm up\" or reload caches. Requirements (Important for Exam): The Root EBS Volume must be Encrypted . Must be enabled at Launch (cannot enable on an existing running instance). Root volume must have enough space to store the RAM contents. Not supported for bare metal instances or instances with Instance Store. Lifecycle: Instance ID: Retained. Private IP: Retained. Elastic IP: Retained. Public IP (Standard): Lost (same as Stop/Start). Maximum Duration: You cannot keep an instance in hibernation for more than 60 days."}, {"id": 2, "num": "3", "title": "EC2 Instance Storage", "html": "<h1>EC2 Instance Storage &amp; EFS - AWS SAA-C03 Study Notes<\/h1>\n<h2>1. EBS (Elastic Block Store) Overview<\/h2>\n<ul>\n<li><strong>Definition:<\/strong> A durable, block-level storage device that you can attach to a single EC2 instance. It acts like a virtual hard drive (network drive).<\/li>\n<li><strong>Availability Zone (AZ) Locked:<\/strong> An EBS volume is bound to a specific AZ. To move a volume to another AZ, you must take a snapshot and restore it in the new AZ.<\/li>\n<li><strong>Persistence:<\/strong><ul>\n<li>By default, the <strong>Root Volume<\/strong> (where the OS is installed) is set to <strong>Delete on Termination<\/strong>.<\/li>\n<li>Additional (data) volumes are usually set to <strong>Keep<\/strong> by default.<\/li>\n<li>You can change this behavior via the \"DeleteOnTermination\" attribute.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>2. EBS Volume Types<\/h2>\n<p>You must know the difference between SSD (performance) and HDD (throughput) for the exam.<\/p>\n<h3>Solid State Drives (SSD) - Optimized for transactional workloads (IOPS)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Type<\/th>\n<th>Name<\/th>\n<th>Use Case<\/th>\n<th>Key Features<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>General Purpose<\/strong><\/td>\n<td><strong>gp3<\/strong><\/td>\n<td><strong>Default choice<\/strong>. Boot volumes, virtual desktops, dev/test.<\/td>\n<td><strong>Independent<\/strong> scaling of IOPS and Throughput. Baseline 3,000 IOPS &amp; 125 MiB/s. Cheaper than gp2.<\/td>\n<\/tr>\n<tr>\n<td><strong>General Purpose<\/strong><\/td>\n<td><strong>gp2<\/strong><\/td>\n<td>Legacy choice.<\/td>\n<td>IOPS linked to volume size (3 IOPS per GB). Max 16,000 IOPS. Uses \"Burst Balance\" for small volumes.<\/td>\n<\/tr>\n<tr>\n<td><strong>Provisioned IOPS<\/strong><\/td>\n<td><strong>io2 Block Express<\/strong><\/td>\n<td><strong>Mission-critical<\/strong>, sub-millisecond latency.<\/td>\n<td>Highest durability (<strong>99.999%<\/strong>). Max 256,000 IOPS. Supports <strong>Multi-Attach<\/strong>.<\/td>\n<\/tr>\n<tr>\n<td><strong>Provisioned IOPS<\/strong><\/td>\n<td><strong>io1<\/strong><\/td>\n<td>Critical DBs requiring sustained IOPS.<\/td>\n<td>Max 64,000 IOPS. Supports <strong>Multi-Attach<\/strong>. Legacy compared to io2.<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>Hard Disk Drives (HDD) - Optimized for large streaming workloads (Throughput)<\/h3>\n<p><em>Cannot be used as a Boot Volume.<\/em><\/p>\n<table>\n<thead>\n<tr>\n<th>Type<\/th>\n<th>Name<\/th>\n<th>Use Case<\/th>\n<th>Key Features<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Throughput Optimized<\/strong><\/td>\n<td><strong>st1<\/strong><\/td>\n<td>Big Data, Data Warehousing, Log processing (Kafka, Splunk).<\/td>\n<td>Max throughput 500 MiB/s. Optimized for sequential I/O.<\/td>\n<\/tr>\n<tr>\n<td><strong>Cold HDD<\/strong><\/td>\n<td><strong>sc1<\/strong><\/td>\n<td>Infrequent access, archive data.<\/td>\n<td><strong>Lowest cost<\/strong> EBS volume. Max throughput 250 MiB/s.<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2>3. EBS Snapshots<\/h2>\n<ul>\n<li><strong>Mechanism:<\/strong> Incremental backups. Only blocks that have changed since the last snapshot are saved.<\/li>\n<li><strong>Storage:<\/strong> Stored in <strong>Amazon S3<\/strong> (but you cannot access them directly in your S3 buckets).<\/li>\n<li><strong>Scope:<\/strong> Regional. To use a snapshot in another region, you must <strong>Copy<\/strong> it.<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li><strong>Recycle Bin:<\/strong> Can retain deleted snapshots for a specified period (1 day to 1 year) to recover from accidental deletions.<\/li>\n<li><strong>Fast Snapshot Restore (FSR):<\/strong> Eliminates the latency of \"initializing\" (warming up) a volume created from a snapshot. Expensive.<\/li>\n<li><strong>Data Lifecycle Manager (DLM):<\/strong> Automates the creation, retention, and deletion of snapshots based on schedules and tags.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>4. AMI (Amazon Machine Image)<\/h2>\n<ul>\n<li><strong>Definition:<\/strong> A blueprint used to create EC2 instances (contains OS, app server, and applications).<\/li>\n<li><strong>Scope:<\/strong> <strong>Region-bound<\/strong>. To launch an AMI in another region, you must first copy the AMI to that region.<\/li>\n<li><strong>Sources:<\/strong><ul>\n<li><strong>Public AMIs:<\/strong> AWS provided (Amazon Linux 2, Ubuntu, etc.).<\/li>\n<li><strong>Your Own AMIs:<\/strong> Created from your customized instances.<\/li>\n<li><strong>AWS Marketplace:<\/strong> Paid/Subscription AMIs from vendors (e.g., hardened security images, firewall appliances).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Lifecycle:<\/strong> Create (from instance/snapshot) -&gt; Register -&gt; Copy (cross-region) -&gt; Deregister (delete).<\/li>\n<\/ul>\n<h2>5. EC2 Instance Store (\"Ephemeral Storage\")<\/h2>\n<ul>\n<li><strong>Definition:<\/strong> Physical storage directly attached to the host computer running your instance.<\/li>\n<li><strong>Performance:<\/strong> extremely high I/O (millions of IOPS) and low latency.<\/li>\n<li><strong>Volatility (Exam Critical):<\/strong> It is <strong>ephemeral<\/strong>.<ul>\n<li><strong>Data Persists:<\/strong> On <strong>Reboot<\/strong>.<\/li>\n<li><strong>Data LOST:<\/strong> On <strong>Stop<\/strong>, <strong>Terminate<\/strong>, or <strong>Hardware Failure<\/strong>.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Use Cases:<\/strong> Cache, buffers, scratch data, high-performance computing (HPC), temporary content that is replicated elsewhere.<\/li>\n<li><strong>Snapshots:<\/strong> You <strong>cannot<\/strong> snapshot Instance Store volumes.<\/li>\n<\/ul>\n<h2>6. EBS Multi-Attach<\/h2>\n<ul>\n<li><strong>Function:<\/strong> Allows a <em>single<\/em> EBS volume to be attached to <em>multiple<\/em> EC2 instances simultaneously.<\/li>\n<li><strong>Constraints:<\/strong><ul>\n<li><strong>Same AZ<\/strong> only.<\/li>\n<li><strong>io1<\/strong> and <strong>io2 Block Express<\/strong> volumes only.<\/li>\n<li>Supported on Nitro-based instances.<\/li>\n<li><strong>Filesystem Warning:<\/strong> You need a <strong>Cluster-aware file system<\/strong> (e.g., GFS2, OCFS2). Standard filesystems (ext4, XFS, NTFS) will result in data corruption.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Use Case:<\/strong> Clustered Linux applications (e.g., Teradata), high availability updates.<\/li>\n<\/ul>\n<h2>7. EBS Encryption<\/h2>\n<ul>\n<li><strong>Mechanism:<\/strong> Uses AWS KMS (Key Management Service) with AES-256.<\/li>\n<li><strong>Scope:<\/strong> When encryption is enabled:<ol>\n<li>Data at rest inside the volume.<\/li>\n<li>Data in transit between the instance and the volume.<\/li>\n<li>All snapshots created from the volume.<\/li>\n<li>All volumes created from those snapshots.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Performance:<\/strong> Minimal impact on latency.<\/li>\n<li><strong>Encryption by Default:<\/strong> You can enable account-level encryption by default for a specific region.<\/li>\n<\/ul>\n<h2>8. Amazon EFS (Elastic File System)<\/h2>\n<ul>\n<li><strong>Definition:<\/strong> Managed NFS (Network File System) that can be mounted on many EC2 instances simultaneously.<\/li>\n<li><strong>Protocol:<\/strong> NFSv4. Works with <strong>Linux<\/strong> instances only (POSIX compliant).<\/li>\n<li><strong>Scope:<\/strong> <strong>Multi-AZ<\/strong>. Data is stored across multiple AZs in a region (High Availability).<\/li>\n<li><strong>Scaling:<\/strong> Automatically scales storage capacity and throughput (Petabyte scale).<\/li>\n<li><strong>Storage Classes:<\/strong><ul>\n<li><strong>EFS Standard:<\/strong> Frequent access, Multi-AZ.<\/li>\n<li><strong>EFS Standard-IA (Infrequent Access):<\/strong> Lower cost for files not accessed daily.<\/li>\n<li><strong>EFS One Zone:<\/strong> Stores data in a single AZ (lower cost, lower availability).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Performance Modes:<\/strong><ul>\n<li><strong>General Purpose:<\/strong> Web serving, CMS (default).<\/li>\n<li><strong>Max I/O:<\/strong> Big Data, parallel processing (higher latency, higher throughput).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>9. Comparison: EBS vs. EFS vs. Instance Store<\/h2>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th>EBS (Elastic Block Store)<\/th>\n<th>EFS (Elastic File System)<\/th>\n<th>Instance Store<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Type<\/strong><\/td>\n<td>Block Storage (Network Drive)<\/td>\n<td>File Storage (Network File System)<\/td>\n<td>Block Storage (Physical Disk)<\/td>\n<\/tr>\n<tr>\n<td><strong>Persistence<\/strong><\/td>\n<td>Durable (persists across stops)<\/td>\n<td>Durable (persists across stops)<\/td>\n<td><strong>Ephemeral<\/strong> (lost on stop)<\/td>\n<\/tr>\n<tr>\n<td><strong>Access<\/strong><\/td>\n<td>Single Instance (mostly)<\/td>\n<td><strong>1000s of Instances<\/strong> simultaneously<\/td>\n<td>Single Instance only<\/td>\n<\/tr>\n<tr>\n<td><strong>Availability<\/strong><\/td>\n<td>Single AZ<\/td>\n<td><strong>Multi-AZ<\/strong> (Regional)<\/td>\n<td>Single AZ (Host bound)<\/td>\n<\/tr>\n<tr>\n<td><strong>Performance<\/strong><\/td>\n<td>Low Latency<\/td>\n<td>Higher Latency than EBS<\/td>\n<td><strong>Lowest Latency<\/strong> (Highest IOPS)<\/td>\n<\/tr>\n<tr>\n<td><strong>Backup<\/strong><\/td>\n<td>Snapshots<\/td>\n<td>AWS Backup / EFS Backup<\/td>\n<td>None (Data is temporary)<\/td>\n<\/tr>\n<tr>\n<td><strong>OS Support<\/strong><\/td>\n<td>Linux &amp; Windows<\/td>\n<td><strong>Linux Only<\/strong><\/td>\n<td>Linux &amp; Windows<\/td>\n<\/tr>\n<\/tbody>\n<\/table>", "text": "EC2 Instance Storage & EFS - AWS SAA-C03 Study Notes 1. EBS (Elastic Block Store) Overview Definition: A durable, block-level storage device that you can attach to a single EC2 instance. It acts like a virtual hard drive (network drive). Availability Zone (AZ) Locked: An EBS volume is bound to a specific AZ. To move a volume to another AZ, you must take a snapshot and restore it in the new AZ. Persistence: By default, the Root Volume (where the OS is installed) is set to Delete on Termination . Additional (data) volumes are usually set to Keep by default. You can change this behavior via the \"DeleteOnTermination\" attribute. 2. EBS Volume Types You must know the difference between SSD (performance) and HDD (throughput) for the exam. Solid State Drives (SSD) - Optimized for transactional workloads (IOPS) Type Name Use Case Key Features General Purpose gp3 Default choice . Boot volumes, virtual desktops, dev/test. Independent scaling of IOPS and Throughput. Baseline 3,000 IOPS & 125 MiB/s. Cheaper than gp2. General Purpose gp2 Legacy choice. IOPS linked to volume size (3 IOPS per GB). Max 16,000 IOPS. Uses \"Burst Balance\" for small volumes. Provisioned IOPS io2 Block Express Mission-critical , sub-millisecond latency. Highest durability ( 99.999% ). Max 256,000 IOPS. Supports Multi-Attach . Provisioned IOPS io1 Critical DBs requiring sustained IOPS. Max 64,000 IOPS. Supports Multi-Attach . Legacy compared to io2. Hard Disk Drives (HDD) - Optimized for large streaming workloads (Throughput) Cannot be used as a Boot Volume. Type Name Use Case Key Features Throughput Optimized st1 Big Data, Data Warehousing, Log processing (Kafka, Splunk). Max throughput 500 MiB/s. Optimized for sequential I/O. Cold HDD sc1 Infrequent access, archive data. Lowest cost EBS volume. Max throughput 250 MiB/s. 3. EBS Snapshots Mechanism: Incremental backups. Only blocks that have changed since the last snapshot are saved. Storage: Stored in Amazon S3 (but you cannot access them directly in your S3 buckets). Scope: Regional. To use a snapshot in another region, you must Copy it. Key Features: Recycle Bin: Can retain deleted snapshots for a specified period (1 day to 1 year) to recover from accidental deletions. Fast Snapshot Restore (FSR): Eliminates the latency of \"initializing\" (warming up) a volume created from a snapshot. Expensive. Data Lifecycle Manager (DLM): Automates the creation, retention, and deletion of snapshots based on schedules and tags. 4. AMI (Amazon Machine Image) Definition: A blueprint used to create EC2 instances (contains OS, app server, and applications). Scope: Region-bound . To launch an AMI in another region, you must first copy the AMI to that region. Sources: Public AMIs: AWS provided (Amazon Linux 2, Ubuntu, etc.). Your Own AMIs: Created from your customized instances. AWS Marketplace: Paid/Subscription AMIs from vendors (e.g., hardened security images, firewall appliances). Lifecycle: Create (from instance/snapshot) -> Register -> Copy (cross-region) -> Deregister (delete). 5. EC2 Instance Store (\"Ephemeral Storage\") Definition: Physical storage directly attached to the host computer running your instance. Performance: extremely high I/O (millions of IOPS) and low latency. Volatility (Exam Critical): It is ephemeral . Data Persists: On Reboot . Data LOST: On Stop , Terminate , or Hardware Failure . Use Cases: Cache, buffers, scratch data, high-performance computing (HPC), temporary content that is replicated elsewhere. Snapshots: You cannot snapshot Instance Store volumes. 6. EBS Multi-Attach Function: Allows a single EBS volume to be attached to multiple EC2 instances simultaneously. Constraints: Same AZ only. io1 and io2 Block Express volumes only. Supported on Nitro-based instances. Filesystem Warning: You need a Cluster-aware file system (e.g., GFS2, OCFS2). Standard filesystems (ext4, XFS, NTFS) will result in data corruption. Use Case: Clustered Linux applications (e.g., Teradata), high availability updates. 7. EBS Encryption Mechanism: Uses AWS KMS (Key Management Service) with AES-256. Scope: When encryption is enabled: Data at rest inside the volume. Data in transit between the instance and the volume. All snapshots created from the volume. All volumes created from those snapshots. Performance: Minimal impact on latency. Encryption by Default: You can enable account-level encryption by default for a specific region. 8. Amazon EFS (Elastic File System) Definition: Managed NFS (Network File System) that can be mounted on many EC2 instances simultaneously. Protocol: NFSv4. Works with Linux instances only (POSIX compliant). Scope: Multi-AZ . Data is stored across multiple AZs in a region (High Availability). Scaling: Automatically scales storage capacity and throughput (Petabyte scale). Storage Classes: EFS Standard: Frequent access, Multi-AZ. EFS Standard-IA (Infrequent Access): Lower cost for files not accessed daily. EFS One Zone: Stores data in a single AZ (lower cost, lower availability). Performance Modes: General Purpose: Web serving, CMS (default). Max I/O: Big Data, parallel processing (higher latency, higher throughput). 9. Comparison: EBS vs. EFS vs. Instance Store Feature EBS (Elastic Block Store) EFS (Elastic File System) Instance Store Type Block Storage (Network Drive) File Storage (Network File System) Block Storage (Physical Disk) Persistence Durable (persists across stops) Durable (persists across stops) Ephemeral (lost on stop) Access Single Instance (mostly) 1000s of Instances simultaneously Single Instance only Availability Single AZ Multi-AZ (Regional) Single AZ (Host bound) Performance Low Latency Higher Latency than EBS Lowest Latency (Highest IOPS) Backup Snapshots AWS Backup / EFS Backup None (Data is temporary) OS Support Linux & Windows Linux Only Linux & Windows"}, {"id": 3, "num": "4.1", "title": "AWS Load Balancers", "html": "<h1>AWS SAA-C03 Study Notes: Availability, Scalability &amp; Load Balancers<\/h1>\n<h2>1. Availability &amp; Scalability<\/h2>\n<h3><strong>Scalability<\/strong><\/h3>\n<ul>\n<li><strong>Definition:<\/strong> The ability of a system to handle greater loads by adapting.<\/li>\n<li><strong>Scalability != High Availability.<\/strong> You can be scalable but not highly available (e.g., a massive single server).<\/li>\n<\/ul>\n<h3><strong>High Availability (HA)<\/strong><\/h3>\n<ul>\n<li><strong>Definition:<\/strong> Running your application in at least <strong>2 Availability Zones (AZs)<\/strong>.<\/li>\n<li><strong>Goal:<\/strong> Survive a data center loss.<\/li>\n<li><strong>Formula:<\/strong> Availability = (Total Time - Downtime) / Total Time.<\/li>\n<\/ul>\n<h2>2. Vertical vs. Horizontal Scaling<\/h2>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th>Vertical Scaling (Scale Up)<\/th>\n<th>Horizontal Scaling (Scale Out)<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Concept<\/strong><\/td>\n<td>Upgrade the machine (e.g., <code>t2.micro<\/code> -&gt; <code>t2.large<\/code>).<\/td>\n<td>Add <em>more<\/em> machines (e.g., 1 instance -&gt; 3 instances).<\/td>\n<\/tr>\n<tr>\n<td><strong>Downtime<\/strong><\/td>\n<td><strong>Yes<\/strong> (usually need to stop/start to upgrade hardware).<\/td>\n<td><strong>No<\/strong> (seamlessly add/remove nodes).<\/td>\n<\/tr>\n<tr>\n<td><strong>Limit<\/strong><\/td>\n<td>Hardware limit (you hit a ceiling).<\/td>\n<td>Theoretically infinite.<\/td>\n<\/tr>\n<tr>\n<td><strong>Use Case<\/strong><\/td>\n<td>Databases (RDS), Legacy non-distributed apps.<\/td>\n<td>Web Apps, Modern distributed systems.<\/td>\n<\/tr>\n<tr>\n<td><strong>Tools<\/strong><\/td>\n<td>Change Instance Type.<\/td>\n<td>Auto Scaling Group (ASG), Load Balancer.<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2>3. Elastic Load Balancers (ELB) Overview<\/h2>\n<p>ELBs distribute incoming traffic across multiple downstream targets (EC2, Containers, IP addresses) in multiple AZs.<\/p>\n<h3><strong>Types of Load Balancers<\/strong><\/h3>\n<ol>\n<li><strong>Application Load Balancer (ALB):<\/strong> Layer 7 (HTTP/HTTPS/gRPC). Smart routing.<\/li>\n<li><strong>Network Load Balancer (NLB):<\/strong> Layer 4 (TCP/UDP). Ultra-high performance.<\/li>\n<li><strong>Gateway Load Balancer (GLB):<\/strong> Layer 3 (IP). Security appliances.<\/li>\n<\/ol>\n<h2>4. Application Load Balancer (ALB) - Layer 7<\/h2>\n<ul>\n<li><strong>Ideal for:<\/strong> Microservices, Container-based apps (Docker), Web Applications.<\/li>\n<li><strong>Protocols:<\/strong> HTTP, HTTPS, HTTP/2, WebSocket, gRPC.<\/li>\n<\/ul>\n<h3><strong>Listeners &amp; Rules<\/strong><\/h3>\n<ul>\n<li><strong>One Listener -&gt; Many Target Groups:<\/strong> An ALB is \"smart.\" A single listener (e.g., Port 443) can route traffic to different backends based on rules.<\/li>\n<li><strong>Routing Rules:<\/strong><ol>\n<li><strong>Path-based:<\/strong> <code>example.com/users<\/code> -&gt; Target Group A, <code>example.com/orders<\/code> -&gt; Target Group B.<\/li>\n<li><strong>Host-based:<\/strong> <code>one.example.com<\/code> -&gt; Target Group A, <code>two.example.com<\/code> -&gt; Target Group B.<\/li>\n<li><strong>Query String / Headers:<\/strong> Route based on <code>?id=123<\/code> or custom headers.<\/li>\n<\/ol>\n<\/li>\n<\/ul>\n<h3><strong>Target Groups<\/strong><\/h3>\n<ul>\n<li>Can target: <strong>EC2 Instances<\/strong>, <strong>ECS Tasks<\/strong>, <strong>Lambda Functions<\/strong>, <strong>Private IP Addresses<\/strong>.<\/li>\n<\/ul>\n<h2>5. Network Load Balancer (NLB) - Layer 4<\/h2>\n<ul>\n<li><strong>Ideal for:<\/strong> Real-time data, Gaming, Finance, TCP/UDP traffic.<\/li>\n<li><strong>Protocols:<\/strong> TCP, UDP, TCP_UDP, TLS.<\/li>\n<li><strong>Performance:<\/strong> Millions of requests per second with ultra-low latency.<\/li>\n<\/ul>\n<h3><strong>Key Features<\/strong><\/h3>\n<ul>\n<li><strong>Static IP:<\/strong> NLB provides <strong>one static IP per AZ<\/strong>. (ALB does <em>not<\/em>; ALB gives you a DNS name only).<\/li>\n<li><strong>Cross-Zone Load Balancing:<\/strong> <strong>Disabled by default<\/strong> (to save cost). You must enable it manually.<\/li>\n<li><strong>One Listener -&gt; One Target Group:<\/strong> Generally, NLB is \"dumb\" (pass-through). It forwards TCP traffic to a target group. It does <em>not<\/em> look at paths or headers.<\/li>\n<\/ul>\n<h3><strong>NLB Targeting an ALB<\/strong><\/h3>\n<ul>\n<li><strong>Pattern:<\/strong> <strong>Client -&gt; NLB -&gt; ALB -&gt; EC2<\/strong>.<\/li>\n<li><strong>Why do this? (Exam Question):<\/strong><ol>\n<li>You need a <strong>Fixed Static IP<\/strong> for your application (NLB feature), but you also need <strong>HTTP Path-Based Routing<\/strong> (ALB feature).<\/li>\n<li>You want to use <strong>AWS PrivateLink<\/strong> (requires NLB) to expose a web app (ALB).<\/li>\n<\/ol>\n<\/li>\n<\/ul>\n<h2>6. Gateway Load Balancer (GLB) - Layer 3 (Gateway)<\/h2>\n<ul>\n<li><strong>Use Case:<\/strong> Deploying, scaling, and managing <strong>3rd Party Virtual Appliances<\/strong> (Firewalls, IDS/IPS, Deep Packet Inspection).<\/li>\n<li><strong>How it works:<\/strong><ol>\n<li>Traffic enters VPC.<\/li>\n<li>Route Table directs traffic to the <strong>GLB Endpoint<\/strong>.<\/li>\n<li>GLB routes traffic to the 3rd Party Appliance for inspection.<\/li>\n<li>Appliance inspects and sends it back.<\/li>\n<li>Traffic goes to the application.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Protocol:<\/strong> Uses <strong>GENEVE<\/strong> protocol on <strong>Port 6081<\/strong>.<\/li>\n<li><strong>Transparent:<\/strong> The source and destination IP addresses are preserved (the application sees the original client IP).<\/li>\n<\/ul>\n<h2>7. Key ELB Features &amp; Mechanics<\/h2>\n<h3><strong>Sticky Sessions (Session Affinity)<\/strong><\/h3>\n<ul>\n<li><strong>Concept:<\/strong> Ensures a client always connects to the <em>same<\/em> backend instance behind the LB.<\/li>\n<li><strong>ALB:<\/strong> Uses <strong>Cookies<\/strong>.<ul>\n<li><em>Application-based cookie:<\/em> Custom application cookie.<\/li>\n<li><em>Duration-based cookie:<\/em> Generated by LB (<code>AWSALB<\/code> cookie).<\/li>\n<\/ul>\n<\/li>\n<li><strong>NLB:<\/strong> Uses <strong>Source IP Affinity<\/strong> (Client IP is hashed to pick a server).<\/li>\n<\/ul>\n<h3><strong>Cross-Zone Load Balancing<\/strong><\/h3>\n<ul>\n<li><strong>Without it:<\/strong> Traffic is split evenly between <em>AZs<\/em>, not instances. (If AZ A has 1 instance and AZ B has 9 instances, the one in AZ A gets 50% of traffic -&gt; Overload).<\/li>\n<li><strong>With it (Enabled):<\/strong> Traffic is split evenly between <em>all instances<\/em> regardless of AZ.<\/li>\n<li><strong>Defaults:<\/strong><ul>\n<li><strong>ALB:<\/strong> <strong>Enabled<\/strong> by default.<\/li>\n<li><strong>NLB/GLB:<\/strong> <strong>Disabled<\/strong> by default.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3><strong>SSL/TLS Certificates &amp; SNI<\/strong><\/h3>\n<ul>\n<li><strong>SSL Termination:<\/strong> The Load Balancer handles the encryption/decryption (offloading CPU work from EC2).<\/li>\n<li><strong>SNI (Server Name Indication):<\/strong><ul>\n<li><strong>Problem:<\/strong> You have one ALB listener (Port 443) but host multiple domains (<code>a.com<\/code>, <code>b.com<\/code>) with different SSL certificates.<\/li>\n<li><strong>Solution:<\/strong> SNI allows the client to \"say\" which hostname it wants during the TLS handshake. The ALB loads the <strong>correct certificate<\/strong> for that specific hostname.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3><strong>Connection Draining (Deregistration Delay)<\/strong><\/h3>\n<ul>\n<li><strong>Scenario:<\/strong> An instance is marked \"Unhealthy\" or is scaling in.<\/li>\n<li><strong>Mechanism:<\/strong><ol>\n<li>ELB stops sending <em>new<\/em> requests to that instance.<\/li>\n<li>ELB waits for <em>existing<\/em> \"in-flight\" requests to complete.<\/li>\n<li><strong>Deregistration Delay:<\/strong> The time it waits (default <strong>300 seconds<\/strong>).<\/li>\n<\/ol>\n<\/li>\n<li><strong>State:<\/strong> The instance status will show as <code>Draining<\/code>.<\/li>\n<li><strong>Use Case:<\/strong> Prevents users from getting \"Connection Reset\" errors during deployments or scaling.<\/li>\n<\/ul>\n<h2>8. Advanced Exam Scenarios (Critical)<\/h2>\n<h3><strong>Client IP Preservation (X-Forwarded-For)<\/strong><\/h3>\n<ul>\n<li><strong>The Problem:<\/strong> When ALB forwards traffic, the EC2 instance sees the <strong>ALB's Private IP<\/strong> as the source, not the user's IP.<\/li>\n<li><strong>The Solution (ALB):<\/strong> The instance must read the <strong><code>X-Forwarded-For<\/code><\/strong> HTTP header to get the original Client IP.<ul>\n<li><code>X-Forwarded-Port<\/code> and <code>X-Forwarded-Proto<\/code> provide the port and protocol.<\/li>\n<\/ul>\n<\/li>\n<li><strong>NLB Note:<\/strong> NLB preserves the client IP <strong>automatically<\/strong> when the target type is <strong>Instance ID<\/strong>. If the target type is <strong>IP Address<\/strong>, client IP preservation must be manually enabled.<\/li>\n<\/ul>\n<h3><strong>Security Group Chaining (Security)<\/strong><\/h3>\n<ul>\n<li><strong>Scenario:<\/strong> Ensure no one can bypass the Load Balancer and access EC2 directly.<\/li>\n<li><strong>Configuration:<\/strong><ol>\n<li><strong>ALB Security Group:<\/strong> Allow Inbound HTTP/HTTPS from <code>0.0.0.0/0<\/code> (The World).<\/li>\n<li><strong>EC2 Security Group:<\/strong> Allow Inbound HTTP <strong>ONLY<\/strong> from the <strong>ALB Security Group ID<\/strong>.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Key:<\/strong> Do not use IP ranges for the EC2 SG; always reference the ALB's SG ID.<\/li>\n<\/ul>\n<h3><strong>Weighted Target Groups (Blue/Green Deployment)<\/strong><\/h3>\n<ul>\n<li><strong>Feature:<\/strong> Assign weights to Target Groups for a single listener.<\/li>\n<li><strong>Use Case:<\/strong> Migrating safely from Version 1 (Blue) to Version 2 (Green).<ul>\n<li>Set V1 to 90% traffic, V2 to 10% traffic.<\/li>\n<li>Monitor errors on V2, then gradually shift weights (50/50 -&gt; 0/100).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3><strong>WAF (Web Application Firewall) Integration<\/strong><\/h3>\n<ul>\n<li><strong>ALB:<\/strong> Supports WAF natively. You can attach a WAF Web ACL to block SQL injection or XSS.<\/li>\n<li><strong>NLB:<\/strong> <strong>Does NOT support WAF.<\/strong> To use WAF with NLB, you must place CloudFront or an ALB in front of it.<\/li>\n<\/ul>\n<h3><strong>Access Logs<\/strong><\/h3>\n<ul>\n<li>ELBs capture detailed information about requests (client IP, latency, request path, server response).<\/li>\n<li><strong>Storage:<\/strong> Logs are stored in an <strong>S3 Bucket<\/strong>.<\/li>\n<li><strong>Requirement:<\/strong> You must attach a Bucket Policy to S3 allowing the ELB service to write to it. They are <em>not<\/em> enabled by default.<\/li>\n<\/ul>\n<h3><strong>Slow Start Mode<\/strong><\/h3>\n<ul>\n<li><strong>Concept:<\/strong> When a new target joins the target group (e.g., after scaling out), the LB sends traffic to it linearly (ramp-up) rather than all at once.<\/li>\n<li><strong>Goal:<\/strong> Prevents overwhelming a \"cold\" instance that needs time to warm up caches.<\/li>\n<\/ul>", "text": "AWS SAA-C03 Study Notes: Availability, Scalability & Load Balancers 1. Availability & Scalability Scalability Definition: The ability of a system to handle greater loads by adapting. Scalability != High Availability. You can be scalable but not highly available (e.g., a massive single server). High Availability (HA) Definition: Running your application in at least 2 Availability Zones (AZs) . Goal: Survive a data center loss. Formula: Availability = (Total Time - Downtime) / Total Time. 2. Vertical vs. Horizontal Scaling Feature Vertical Scaling (Scale Up) Horizontal Scaling (Scale Out) Concept Upgrade the machine (e.g., t2.micro -> t2.large ). Add more machines (e.g., 1 instance -> 3 instances). Downtime Yes (usually need to stop/start to upgrade hardware). No (seamlessly add/remove nodes). Limit Hardware limit (you hit a ceiling). Theoretically infinite. Use Case Databases (RDS), Legacy non-distributed apps. Web Apps, Modern distributed systems. Tools Change Instance Type. Auto Scaling Group (ASG), Load Balancer. 3. Elastic Load Balancers (ELB) Overview ELBs distribute incoming traffic across multiple downstream targets (EC2, Containers, IP addresses) in multiple AZs. Types of Load Balancers Application Load Balancer (ALB): Layer 7 (HTTP/HTTPS/gRPC). Smart routing. Network Load Balancer (NLB): Layer 4 (TCP/UDP). Ultra-high performance. Gateway Load Balancer (GLB): Layer 3 (IP). Security appliances. 4. Application Load Balancer (ALB) - Layer 7 Ideal for: Microservices, Container-based apps (Docker), Web Applications. Protocols: HTTP, HTTPS, HTTP/2, WebSocket, gRPC. Listeners & Rules One Listener -> Many Target Groups: An ALB is \"smart.\" A single listener (e.g., Port 443) can route traffic to different backends based on rules. Routing Rules: Path-based: example.com/users -> Target Group A, example.com/orders -> Target Group B. Host-based: one.example.com -> Target Group A, two.example.com -> Target Group B. Query String / Headers: Route based on ?id=123 or custom headers. Target Groups Can target: EC2 Instances , ECS Tasks , Lambda Functions , Private IP Addresses . 5. Network Load Balancer (NLB) - Layer 4 Ideal for: Real-time data, Gaming, Finance, TCP/UDP traffic. Protocols: TCP, UDP, TCP_UDP, TLS. Performance: Millions of requests per second with ultra-low latency. Key Features Static IP: NLB provides one static IP per AZ . (ALB does not ; ALB gives you a DNS name only). Cross-Zone Load Balancing: Disabled by default (to save cost). You must enable it manually. One Listener -> One Target Group: Generally, NLB is \"dumb\" (pass-through). It forwards TCP traffic to a target group. It does not look at paths or headers. NLB Targeting an ALB Pattern: Client -> NLB -> ALB -> EC2 . Why do this? (Exam Question): You need a Fixed Static IP for your application (NLB feature), but you also need HTTP Path-Based Routing (ALB feature). You want to use AWS PrivateLink (requires NLB) to expose a web app (ALB). 6. Gateway Load Balancer (GLB) - Layer 3 (Gateway) Use Case: Deploying, scaling, and managing 3rd Party Virtual Appliances (Firewalls, IDS/IPS, Deep Packet Inspection). How it works: Traffic enters VPC. Route Table directs traffic to the GLB Endpoint . GLB routes traffic to the 3rd Party Appliance for inspection. Appliance inspects and sends it back. Traffic goes to the application. Protocol: Uses GENEVE protocol on Port 6081 . Transparent: The source and destination IP addresses are preserved (the application sees the original client IP). 7. Key ELB Features & Mechanics Sticky Sessions (Session Affinity) Concept: Ensures a client always connects to the same backend instance behind the LB. ALB: Uses Cookies . Application-based cookie: Custom application cookie. Duration-based cookie: Generated by LB ( AWSALB cookie). NLB: Uses Source IP Affinity (Client IP is hashed to pick a server). Cross-Zone Load Balancing Without it: Traffic is split evenly between AZs , not instances. (If AZ A has 1 instance and AZ B has 9 instances, the one in AZ A gets 50% of traffic -> Overload). With it (Enabled): Traffic is split evenly between all instances regardless of AZ. Defaults: ALB: Enabled by default. NLB/GLB: Disabled by default. SSL/TLS Certificates & SNI SSL Termination: The Load Balancer handles the encryption/decryption (offloading CPU work from EC2). SNI (Server Name Indication): Problem: You have one ALB listener (Port 443) but host multiple domains ( a.com , b.com ) with different SSL certificates. Solution: SNI allows the client to \"say\" which hostname it wants during the TLS handshake. The ALB loads the correct certificate for that specific hostname. Connection Draining (Deregistration Delay) Scenario: An instance is marked \"Unhealthy\" or is scaling in. Mechanism: ELB stops sending new requests to that instance. ELB waits for existing \"in-flight\" requests to complete. Deregistration Delay: The time it waits (default 300 seconds ). State: The instance status will show as Draining . Use Case: Prevents users from getting \"Connection Reset\" errors during deployments or scaling. 8. Advanced Exam Scenarios (Critical) Client IP Preservation (X-Forwarded-For) The Problem: When ALB forwards traffic, the EC2 instance sees the ALB's Private IP as the source, not the user's IP. The Solution (ALB): The instance must read the X-Forwarded-For HTTP header to get the original Client IP. X-Forwarded-Port and X-Forwarded-Proto provide the port and protocol. NLB Note: NLB preserves the client IP automatically when the target type is Instance ID . If the target type is IP Address , client IP preservation must be manually enabled. Security Group Chaining (Security) Scenario: Ensure no one can bypass the Load Balancer and access EC2 directly. Configuration: ALB Security Group: Allow Inbound HTTP/HTTPS from 0.0.0.0/0 (The World). EC2 Security Group: Allow Inbound HTTP ONLY from the ALB Security Group ID . Key: Do not use IP ranges for the EC2 SG; always reference the ALB's SG ID. Weighted Target Groups (Blue/Green Deployment) Feature: Assign weights to Target Groups for a single listener. Use Case: Migrating safely from Version 1 (Blue) to Version 2 (Green). Set V1 to 90% traffic, V2 to 10% traffic. Monitor errors on V2, then gradually shift weights (50/50 -> 0/100). WAF (Web Application Firewall) Integration ALB: Supports WAF natively. You can attach a WAF Web ACL to block SQL injection or XSS. NLB: Does NOT support WAF. To use WAF with NLB, you must place CloudFront or an ALB in front of it. Access Logs ELBs capture detailed information about requests (client IP, latency, request path, server response). Storage: Logs are stored in an S3 Bucket . Requirement: You must attach a Bucket Policy to S3 allowing the ELB service to write to it. They are not enabled by default. Slow Start Mode Concept: When a new target joins the target group (e.g., after scaling out), the LB sends traffic to it linearly (ramp-up) rather than all at once. Goal: Prevents overwhelming a \"cold\" instance that needs time to warm up caches."}, {"id": 4, "num": "4.2", "title": "ASG", "html": "<h1>AWS SAA-C03 Study Notes: Auto Scaling Groups (ASG)<\/h1>\n<h2>1. Auto Scaling Group (ASG) Basics<\/h2>\n<p><strong>Goal:<\/strong> Scale EC2 instances out (add) to match increased load and scale in (remove) to save money when load decreases. Ensure a minimum and maximum number of instances run.<\/p>\n<ul>\n<li><strong>Min Size:<\/strong> The ASG will never go below this number of instances.<\/li>\n<li><strong>Max Size:<\/strong> The ASG will never go above this number.<\/li>\n<li><strong>Desired Capacity:<\/strong> The number of instances you want running <em>right now<\/em>.<ul>\n<li><em>Note:<\/em> If you manually change Desired Capacity, the ASG will immediately launch or terminate instances to match it.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3><strong>Launch Template vs. Launch Configuration (Critical for Exam)<\/strong><\/h3>\n<p>The exam often asks which one to use. <strong>Always choose Launch Templates.<\/strong><\/p>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th>Launch Template (Newer/Recommended)<\/th>\n<th>Launch Configuration (Legacy)<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Modifiable?<\/strong><\/td>\n<td><strong>Yes<\/strong> (Versioning supported)<\/td>\n<td><strong>No<\/strong> (Immutable - must recreate)<\/td>\n<\/tr>\n<tr>\n<td><strong>Instance Types<\/strong><\/td>\n<td>Mixed Instances (Spot + On-Demand)<\/td>\n<td>Single Instance Type only<\/td>\n<\/tr>\n<tr>\n<td><strong>Features<\/strong><\/td>\n<td>T2/T3 Unlimited, Dedicated Hosts<\/td>\n<td>Limited feature set<\/td>\n<\/tr>\n<tr>\n<td><strong>Exam Verdict<\/strong><\/td>\n<td><strong>ALWAYS USE THIS<\/strong><\/td>\n<td>Only use if explicitly forced by legacy constraints<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2>2. Scaling Policies (Detailed)<\/h2>\n<p>The SAA-C03 exam focuses heavily on knowing <em>which<\/em> policy fits a specific scenario.<\/p>\n<h3><strong>A. Dynamic Scaling Policies<\/strong><\/h3>\n<p>Reactive scaling based on real-time metrics (e.g., CPU, Network In/Out).<\/p>\n<h4><strong>1. Target Tracking Scaling (Most Common)<\/strong><\/h4>\n<ul>\n<li><strong>Concept:<\/strong> \"I want to keep the average CPU at 50%.\"<\/li>\n<li><strong>How it works:<\/strong> You set a target value (e.g., 40% ASG Average CPU). The ASG automatically creates CloudWatch alarms. If CPU &gt; 40%, it adds instances. If CPU &lt; 40%, it removes them.<\/li>\n<li><strong>Exam Keyword:<\/strong> \"Maintain average metric,\" \"Easiest to set up.\"<\/li>\n<\/ul>\n<h4><strong>2. Step Scaling<\/strong><\/h4>\n<ul>\n<li><strong>Concept:<\/strong> \"If CPU is slightly high, add 1 instance. If CPU is VERY high, add 5 instances.\"<\/li>\n<li><strong>How it works:<\/strong> You define steps based on alarm breach size.<ul>\n<li><em>Example:<\/em> * CPU 50-60% -&gt; Add 1 instance.<ul>\n<li>CPU &gt; 60% -&gt; Add 3 instances.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<\/li>\n<li><strong>Key Feature:<\/strong> Does <strong>NOT<\/strong> wait for the cooldown period during scale-out (reacts faster to spikes than Simple Scaling).<\/li>\n<\/ul>\n<h4><strong>3. Simple Scaling (Legacy)<\/strong><\/h4>\n<ul>\n<li><strong>Concept:<\/strong> \"If alarm breaches, add 1 instance.\"<\/li>\n<li><strong>How it works:<\/strong> Relies on a single CloudWatch alarm.<\/li>\n<li><strong>Downside:<\/strong> It must wait for a <strong>Cooldown Period<\/strong> (default 300s) to expire before scaling again. Step Scaling is generally preferred.<\/li>\n<\/ul>\n<h3><strong>B. Predictive Scaling<\/strong><\/h3>\n<ul>\n<li><strong>Concept:<\/strong> Uses Machine Learning to look at historical data and predict future traffic.<\/li>\n<li><strong>How it works:<\/strong> Forecasts load for the next 48 hours and schedules scaling actions <em>in advance<\/em>.<\/li>\n<li><strong>Exam Scenario:<\/strong> \"Recurring business patterns\" or \"Scale proactively <em>before<\/em> the load hits.\"<\/li>\n<\/ul>\n<h3><strong>C. Scheduled Scaling<\/strong><\/h3>\n<ul>\n<li><strong>Concept:<\/strong> Scaling based on a known time schedule.<\/li>\n<li><strong>Exam Scenario:<\/strong><ul>\n<li>\"Every Friday at 5 PM, traffic spikes.\"<\/li>\n<li>\"Big marketing event next Monday at 9 AM.\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>3. Important ASG Mechanics<\/h2>\n<h3><strong>Scaling Cooldowns<\/strong><\/h3>\n<ul>\n<li><strong>Definition:<\/strong> A \"pause\" period after a scaling activity (default 300 seconds) to allow metrics to stabilize.<\/li>\n<li><strong>Effect:<\/strong> During a cooldown, the ASG will not launch or terminate additional instances (Simple Scaling respects this; Step Scaling can override it for scale-out).<\/li>\n<li><strong>Tip:<\/strong> If your ASG is scaling up and down too rapidly (\"thrashing\"), increase the cooldown.<\/li>\n<\/ul>\n<h3><strong>Health Checks (EC2 vs. ELB)<\/strong><\/h3>\n<ul>\n<li><strong>EC2 Status Checks (Default):<\/strong> The ASG checks if the instance VM is running. If the hardware fails, ASG replaces it.<\/li>\n<li><strong>ELB Health Checks (Optional but Important):<\/strong> The ASG checks the <em>application<\/em> health via the Load Balancer.<ul>\n<li><em>Scenario:<\/em> The instance is running (EC2 check PASS), but the App crashed (HTTP 500 error).<\/li>\n<li><em>If ELB Check Enabled:<\/em> ASG sees the App is down, terminates the instance, and replaces it.<\/li>\n<li><em>If ELB Check Disabled:<\/em> ASG thinks the instance is healthy and keeps sending traffic to a broken app.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3><strong>Termination Policy<\/strong><\/h3>\n<p>When scaling in (removing instances), which one gets killed first?<\/p>\n<ol>\n<li><strong>Default Policy:<\/strong><ol>\n<li>Find the Availability Zone (AZ) with the <em>most<\/em> instances (to maintain balance).<\/li>\n<li>Delete the instance with the <strong>Oldest Launch Configuration/Template<\/strong>.<\/li>\n<li>If multiple exist, delete the one closest to the <strong>next billing hour<\/strong>.\n- <strong>Exam Tip:<\/strong> You can enable <strong>Instance Scale-In Protection<\/strong> to prevent specific instances from being terminated during scale-in (useful for long-running jobs).<\/li>\n<\/ol>\n<\/li>\n<\/ol>\n<h2>4. Advanced Features (High Exam Probability)<\/h2>\n<h3><strong>Lifecycle Hooks<\/strong><\/h3>\n<p>Allows you to pause the creation or termination of an instance to perform a custom action.<\/p>\n<ul>\n<li><strong>Pending:Wait:<\/strong> Instance is created but paused before serving traffic. (Use case: Installing software, downloading large datasets).<\/li>\n<li><strong>Terminating:Wait:<\/strong> Instance is paused before destruction. (Use case: Uploading logs to S3, extracting final data).<\/li>\n<li><strong>Integration:<\/strong> Usually triggers EventBridge or SNS -&gt; Lambda Function.<\/li>\n<\/ul>\n<h3><strong>Instance Refresh<\/strong><\/h3>\n<ul>\n<li><strong>Goal:<\/strong> Update all instances in the ASG to a new Launch Template (e.g., new AMI or User Data) without downtime.<\/li>\n<li><strong>Mechanism:<\/strong> Performs a \"Rolling Update.\" It replaces instances bat
