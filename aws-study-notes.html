<td><strong>Comprehend<\/strong><\/td>\n<td>Sentiment Analysis, NLP, Entities, PII redaction.<\/td>\n<\/tr>\n<tr>\n<td><strong>SageMaker<\/strong><\/td>\n<td>Custom Models, Jupyter Notebooks, Build/Train/Deploy own algorithm.<\/td>\n<\/tr>\n<tr>\n<td><strong>Kendra<\/strong><\/td>\n<td>Internal Search, Document Search, Natural Language Queries.<\/td>\n<\/tr>\n<tr>\n<td><strong>Personalize<\/strong><\/td>\n<td>Recommendations, \"Users who bought this also bought...\", Retail ML.<\/td>\n<\/tr>\n<tr>\n<td><strong>Textract<\/strong><\/td>\n<td>Scanned Documents, Forms, Tables, Invoices, Receipts, OCR.<\/td>\n<\/tr>\n<\/tbody>\n<\/table>", "text": "AWS Machine Learning Services - SAA-C03 Study Note For the AWS Certified Solutions Architect - Associate (SAA-C03) exam, you generally do not need to know how to code these services. Instead, focus on identifying the right service for a specific business problem . Key Concept: Most of these are \"Serverless\" and \"Managed Services\" (High Availability is built-in). 1. Amazon Rekognition \"Computer Vision / Image & Video Analysis\" What it does: Uses ML to analyze images and videos. You send it an image; it tells you what is inside. Key Features: Object & Scene Detection: Identifies cars, pets, beaches, cities. Facial Analysis: Detects faces, gender, age range, emotions (happy/sad). Facial Recognition: Matches a face against a private collection (e.g., employee badge entry). Content Moderation: Automatically detects unsafe, offensive, or inappropriate content (nudity, violence). Exam Scenario: \"A company needs to automatically flag inappropriate images uploaded by users to a social media app.\" -> Use Rekognition Content Moderation. \"A store wants to track the path of customers walking through aisles.\" -> Use Rekognition Video Pathing. 2. Amazon Transcribe \"Speech-to-Text\" What it does: Converts audio (MP3, WAV, etc.) into text. Key Features: Speaker Identification: Can tell \"Speaker A\" from \"Speaker B\". Automatic Language Identification: Detects the dominant language. Exam Scenario: \"A company needs to generate subtitles/captions for their video content automatically.\" -> Use Transcribe. \"You need to create searchable text transcripts from customer service call recordings.\" -> Use Transcribe. 3. Amazon Polly \"Text-to-Speech\" What it does: Converts text into lifelike speech (MP3). It is the opposite of Transcribe. Key Features: Neural TTS: Higher quality, more natural sounding voices. Lexicons: Customize pronunciation of specific words (e.g., \"AWS\" as \"A-W-S\" instead of \"Aws\"). SSML (Speech Synthesis Markup Language): Markup tags to control breathing, volume, speed, and emphasis. Exam Scenario: \"An app needs to read articles aloud to visually impaired users.\" -> Use Polly. 4. Amazon Translate \"Language Translation\" What it does: Provides high-quality neural machine translation between languages. Key Features: Real-time and Batch translation. Supports custom terminology (e.g., ensuring brand names aren't translated literally). Exam Scenario: \"A company wants to localize their website content into 10 different languages dynamically.\" -> Use Translate. 5. Amazon Lex + Amazon Connect \"Chatbots & Call Centers\" Amazon Lex (The \"Brain\") What it does: Provides Automatic Speech Recognition (ASR) and Natural Language Understanding (NLU). It is the technology behind Alexa . Use Case: Building conversational interfaces (Chatbots) for text or voice. Amazon Connect (The \"Phone System\") What it does: A cloud-based Contact Center as a Service. Integration: You use Connect to handle the phone lines and routing, and you use Lex to build the automated \"IVR\" (Interactive Voice Response) that talks to the customer before an agent picks up. Exam Scenario: \"A company needs a cloud-based call center that can handle spikes in traffic and uses AI to answer common questions.\" -> Use Amazon Connect integrated with Amazon Lex. 6. Amazon Comprehend \"Natural Language Processing (NLP)\" What it does: Analyzes text to understand the meaning and relationships within it. Key Features: Sentiment Analysis: Determines if text is Positive, Negative, Neutral, or Mixed. Entity Recognition: Extracts people, places, brands, dates. PII Detection: Detects Personally Identifiable Information (emails, SSNs) for redaction. Exam Scenario: \"A company wants to analyze customer emails to determine if they are happy or angry.\" -> Use Comprehend Sentiment Analysis. 7. Amazon Comprehend Medical \"NLP for Healthcare\" What it does: Specifically trained on medical text to identify medical conditions, medications, dosages, and Protected Health Information (PHI). Key Features: HIPAA Eligible. Detects PHI (Patient Health Information) for anonymization. Exam Scenario: \"A hospital needs to index doctor's notes and identify patient diagnosis and prescribed medication.\" -> Use Comprehend Medical. (Do not choose standard Comprehend). 8. Amazon SageMaker \"ML for Developers / Custom Models\" What it does: A fully managed service to build, train, and deploy custom machine learning models. Key Concept: Used when the \"ready-made\" AI services (like Rekognition or Polly) are not enough and you need to build your own algorithm. Exam Scenario: \"A data science team needs a managed environment to run Jupyter Notebooks and train TensorFlow models.\" -> Use SageMaker. \"You need to deploy a custom fraud detection model with auto-scaling.\" -> Use SageMaker. 9. Amazon Kendra \"Enterprise Search\" What it does: An intelligent document search service powered by ML. Think of it as \"Google Search\" for your internal company documents. Key Features: Extracts answers from PDFs, Word docs, HTML, SharePoint, etc. Supports Natural Language Queries (e.g., \"Where is the IT support desk?\" vs. matching keyword \"IT\"). Exam Scenario: \"A company wants to allow employees to search through an internal repository of PDF manuals using natural language questions.\" -> Use Kendra. 10. Amazon Personalize \"Real-time Recommendations\" What it does: Machine learning service for creating real-time personalized recommendations. Same technology used by Amazon.com for \"Items you might like\". Exam Scenario: \"An e-commerce website wants to show a 'Recommended for you' section based on user purchase history.\" -> Use Personalize. (Do not build a custom model in SageMaker if Personalize can do it). 11. Amazon Textract \"OCR on Steroids / Document Analysis\" What it does: Extracts text, handwriting, and data from scanned documents. Key Difference vs. OCR: Standard OCR just gives you a blob of text. Textract understands Structure (Tables, Forms, Key-Value pairs). Exam Scenario: \"A company needs to extract total amounts and vendor names from thousands of scanned PDF invoices and load them into a database.\" -> Use Textract. Machine Learning Summary Cheat Sheet Service Keyword / Trigger Rekognition Images, Video, Faces, Content Moderation (Safety), Labels. Transcribe Speech-to-Text, Subtitles, Meeting minutes, Audio files to text. Polly Text-to-Speech, Talking app, SSML, Voices. Translate Localization, Language Translation. Lex Chatbots, Conversational AI, Alexa tech. Connect Cloud Contact Center, Call Center, Phone system. Comprehend Sentiment Analysis, NLP, Entities, PII redaction. SageMaker Custom Models, Jupyter Notebooks, Build/Train/Deploy own algorithm. Kendra Internal Search, Document Search, Natural Language Queries. Personalize Recommendations, \"Users who bought this also bought...\", Retail ML. Textract Scanned Documents, Forms, Tables, Invoices, Receipts, OCR."}, {"id": 18, "num": "18", "title": "AWS Monitoring & Audit (CloudWatch, CloudTrail & Config)", "html": "<h1>AWS Monitoring &amp; Audit: CloudWatch, CloudTrail &amp; Config<\/h1>\n<p><strong>Exam: AWS Certified Solutions Architect - Associate (SAA-C03)<\/strong><\/p>\n<h2>1. AWS Monitoring - Section Introduction<\/h2>\n<p>To maintain operational excellence and performance efficiency (two pillars of the Well-Architected Framework), you must understand how AWS resources are performing and who is accessing them.<\/p>\n<ul>\n<li><strong>CloudWatch:<\/strong> \"What is happening right now?\" (Performance &amp; Logs)<\/li>\n<li><strong>CloudTrail:<\/strong> \"Who did what?\" (Audit &amp; API History)<\/li>\n<li><strong>Config:<\/strong> \"What does the resource look like?\" (Configuration &amp; Compliance)<\/li>\n<\/ul>\n<h2>2. CloudWatch Metrics<\/h2>\n<p>CloudWatch provides data and actionable insights to monitor your applications, respond to system-wide performance changes, optimize resource utilization, and get a unified view of operational health.<\/p>\n<ul>\n<li><strong>Metrics:<\/strong> A variable to monitor (e.g., <code>CPUUtilization<\/code>).<\/li>\n<li><strong>Namespaces:<\/strong> A container for CloudWatch metrics (e.g., <code>AWS/EC2<\/code>).<\/li>\n<li><strong>Dimensions:<\/strong> A name/value pair that helps you uniquely identify a metric (e.g., <code>InstanceId<\/code>).<\/li>\n<li><strong>Timestamps:<\/strong> All metrics have a timestamp.<\/li>\n<li><strong>Metric Resolution:<\/strong><ul>\n<li><strong>Standard Resolution:<\/strong> 1-minute granularity (default for custom metrics).<\/li>\n<li><strong>High Resolution:<\/strong> 1-second granularity (cost is higher).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Dashboards:<\/strong> Global access (can view dashboards from different regions).<\/li>\n<\/ul>\n<p><strong>Exam Tip:<\/strong><\/p>\n<ul>\n<li>By default, EC2 metrics are sent every <strong>5 minutes<\/strong> (basic monitoring). You can enable <strong>Detailed Monitoring<\/strong> to get data every <strong>1 minute<\/strong> (costs extra).<\/li>\n<li><strong>RAM/Memory usage is NOT a default metric<\/strong> for EC2. You must push this as a <em>Custom Metric<\/em>.<\/li>\n<\/ul>\n<h2>3. CloudWatch Logs<\/h2>\n<p>Centralized log management. You can store, access, and monitor logs from EC2 instances, AWS CloudTrail, Route 53, and other sources.<\/p>\n<ul>\n<li><strong>Log Groups:<\/strong> Usually represent an application or a specific source (e.g., <code>/aws/lambda/my-function<\/code>).<\/li>\n<li><strong>Log Streams:<\/strong> Instances within a specific application or log files (e.g., a specific container instance log).<\/li>\n<li><strong>Metric Filters:<\/strong> You can search logs for a specific phrase (e.g., \"Error\" or \"404\") and turn that into a numerical metric to trigger alarms.<\/li>\n<li><strong>Export:<\/strong> Logs can be exported to <strong>S3<\/strong> (for long-term archival) or streamed to <strong>Kinesis/Lambda/OpenSearch<\/strong> (for real-time analysis).<\/li>\n<\/ul>\n<p><strong>Exam Tip:<\/strong><\/p>\n<ul>\n<li>Logs in S3 can take up to 12 hours to become available for export. For real-time processing, use <strong>Subscription Filters<\/strong> to send logs to Kinesis or Lambda.<\/li>\n<li>Logs never expire by default (indefinite retention). You must set a retention policy to delete them automatically.<\/li>\n<\/ul>\n<h2>4. CloudWatch Logs - Live Tail<\/h2>\n<ul>\n<li>Provides an interactive, scrolling view of new log events as they are ingested.<\/li>\n<li>Similar to the <code>tail -f<\/code> command in Linux.<\/li>\n<li>Helps dev/ops teams debug issues quickly in real-time without needing to constantly refresh the console or run queries.<\/li>\n<\/ul>\n<h2>5. CloudWatch Agent &amp; CloudWatch Logs Agent<\/h2>\n<p>To get logs or system-level metrics (like disk space or RAM) from inside an EC2 instance, you need an agent.<\/p>\n<ul>\n<li><strong>CloudWatch Logs Agent (Old):<\/strong> Only sent logs. Deprecated.<\/li>\n<li><strong>Unified CloudWatch Agent (New):<\/strong><ul>\n<li>Collects <strong>both<\/strong> logs and system-level metrics (RAM, Swap, Disk Space, Netstat, etc.).<\/li>\n<li>Works on EC2 and on-premises servers.<\/li>\n<li>Configuration is stored in the Parameter Store (SSM) for easy deployment across fleets.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<p><strong>Exam Tip:<\/strong><\/p>\n<ul>\n<li>If a question asks how to monitor \"Memory Utilization\" or \"Disk Space Available\" on EC2, the answer is always <strong>CloudWatch Agent<\/strong> (Push Custom Metric).<\/li>\n<\/ul>\n<h2>6. CloudWatch Alarms<\/h2>\n<p>Alarms are used to trigger notifications or actions based on metric thresholds.<\/p>\n<ul>\n<li><strong>Three States:<\/strong><ol>\n<li><strong>OK:<\/strong> Metric is within the threshold.<\/li>\n<li><strong>ALARM:<\/strong> Metric crosses the threshold.<\/li>\n<li><strong>INSUFFICIENT_DATA:<\/strong> Not enough data (e.g., new instance, connectivity issue).<\/li>\n<\/ol>\n<\/li>\n<li><strong>Actions (Targets):<\/strong><ul>\n<li><strong>SNS:<\/strong> Send an email/SMS.<\/li>\n<li><strong>Auto Scaling:<\/strong> Scale out or Scale in (ASG).<\/li>\n<li><strong>EC2 Actions:<\/strong> Stop, Terminate, Reboot, or <strong>Recover<\/strong> an instance.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<p><strong>Exam Tip:<\/strong><\/p>\n<ul>\n<li><strong>EC2 Instance Recovery:<\/strong> If an instance fails a <em>System Status Check<\/em> (hardware issue), a CloudWatch Alarm can automatically \"Recover\" the instance. This moves the instance to new hardware but keeps the Instance ID, Private IP, and Elastic IP the same.<\/li>\n<\/ul>\n<h2>7. CloudWatch Synthetics (Canaries)<\/h2>\n<ul>\n<li><strong>What it is:<\/strong> Configurable scripts (Node.js or Python) that run on a schedule to monitor your endpoints and APIs.<\/li>\n<li><strong>Function:<\/strong> It simulates a user navigating your application (\"Synthetic traffic\").<\/li>\n<li><strong>Use Case:<\/strong> Verify your application is up, check latency, and ensure UI elements (like a checkout button) are working even when there is no real user traffic.<\/li>\n<\/ul>\n<h2>8. EventBridge Overview (formerly CloudWatch Events)<\/h2>\n<p>EventBridge is a serverless event bus that connects applications using data from your own apps, SaaS apps, and AWS services.<\/p>\n<ul>\n<li><strong>Evolution:<\/strong> CloudWatch Events is being replaced by EventBridge (same underlying technology, more features).<\/li>\n<li><strong>Structure:<\/strong><ul>\n<li><strong>Source:<\/strong> The service generating the event (e.g., \"EC2 Instance State Change\").<\/li>\n<li><strong>Rules:<\/strong> Filter incoming events (e.g., \"Only look for EC2 stopped events\").<\/li>\n<li><strong>Target:<\/strong> The service to trigger (Lambda, SNS, SQS, Kinesis, Step Functions).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Schema Registry:<\/strong> Allows you to discover, create, and manage schemas for events.<\/li>\n<li><strong>Scheduled Events:<\/strong> Functions like a \"Cron Job\" (e.g., Trigger a Lambda function every night at 2 AM).<\/li>\n<\/ul>\n<h2>9. CloudWatch Insights and Operational Visibility<\/h2>\n<p>Advanced features for deeper analysis.<\/p>\n<ul>\n<li><strong>Container Insights:<\/strong> Collects metrics/logs from containerized applications (ECS, EKS, Fargate, Kubernetes).<\/li>\n<li><strong>Lambda Insights:<\/strong> Monitoring and troubleshooting for serverless functions (cold starts, memory usage).<\/li>\n<li><strong>Contributor Insights:<\/strong> Analyzes log data to find \"Top N\" contributors (e.g., \"Who are the top 10 IP addresses hitting my load balancer?\").<\/li>\n<li><strong>Application Insights:<\/strong> Detects errors/problems in .NET and SQL Server databases (and other stacks) using AI/ML.<\/li>\n<\/ul>\n<h2>10. CloudTrail Overview<\/h2>\n<p>Governance, compliance, and operational and risk auditing. CloudTrail records <strong>API calls<\/strong> made within your AWS account.<\/p>\n<ul>\n<li><strong>What it records:<\/strong> Who (User/Role), When (Time), What (API Action), Where (Resource &amp; Source IP).<\/li>\n<li><strong>Default:<\/strong> Enabled by default. Keeps 90 days of history in the console (Management Events).<\/li>\n<li><strong>Types of Events:<\/strong><ol>\n<li><strong>Management Events:<\/strong> Operations on the AWS account (e.g., <code>AttachRolePolicy<\/code>, <code>CreateVPC<\/code>, <code>ConsoleLogin<\/code>). Enabled by default.<\/li>\n<li><strong>Data Events:<\/strong> Operations within a resource (e.g., S3 object upload, Lambda function invocation, DynamoDB item put). <strong>High volume, disabled by default.<\/strong><\/li>\n<li><strong>Insights Events:<\/strong> Detects unusual activity (spikes in resource provisioning).<\/li>\n<\/ol>\n<\/li>\n<li><strong>Storage:<\/strong> To keep logs longer than 90 days, you must configure a <strong>Trail<\/strong> to send logs to S3.<\/li>\n<\/ul>\n<p><strong>Exam Tip:<\/strong><\/p>\n<ul>\n<li>If you need to know \"Who terminated the EC2 instance?\" or \"Who deleted the S3 bucket?\", the answer is <strong>CloudTrail<\/strong>.<\/li>\n<\/ul>\n<h2>11. CloudTrail - EventBridge Integration<\/h2>\n<p>CloudTrail allows you to <em>react<\/em> to API calls. CloudTrail logs the API call -&gt; Sends event to EventBridge -&gt; EventBridge triggers a target.<\/p>\n<ul>\n<li><strong>Use Case:<\/strong> Security automation.<ul>\n<li><em>Scenario:<\/em> A user creates an S3 bucket that is Public.<\/li>\n<li><em>Flow:<\/em> CloudTrail records <code>CreateBucket<\/code> -&gt; EventBridge Rule matches pattern -&gt; Triggers Lambda -&gt; Lambda deletes the bucket or fixes the policy.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>12. AWS Config - Overview<\/h2>\n<p>Detailed view of the configuration of AWS resources in your AWS account.<\/p>\n<ul>\n<li><strong>Inventory:<\/strong> Records resource configurations and changes over time (Versioning for infrastructure).<\/li>\n<li><strong>Compliance:<\/strong> You can set \"Config Rules\" (Managed or Custom).<ul>\n<li><em>Example:<\/em> \"Is SSH (port 22) unrestricted?\" \"Are EBS volumes encrypted?\"<\/li>\n<\/ul>\n<\/li>\n<li><strong>Remediation:<\/strong> Can automatically fix non-compliant resources using SSM Automation Documents.<\/li>\n<li><strong>Notifications:<\/strong> Sends SNS notifications when a resource violates a rule.<\/li>\n<\/ul>\n<p><strong>Exam Tip:<\/strong><\/p>\n<ul>\n<li>If you need to view the <strong>history of configuration changes<\/strong> (e.g., \"What did the Security Group rules look like yesterday?\"), use <strong>AWS Config<\/strong>.<\/li>\n<li>It is <em>Regional<\/em> service.<\/li>\n<\/ul>\n<h2>13. Summary: CloudWatch vs. CloudTrail vs. Config<\/h2>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th><strong>CloudWatch<\/strong><\/th>\n<th><strong>CloudTrail<\/strong><\/th>\n<th><strong>AWS Config<\/strong><\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Primary Question<\/strong><\/td>\n<td>\"What is the performance?\"<\/td>\n<td>\"Who made the call?\"<\/td>\n<td>\"How is it configured?\"<\/td>\n<\/tr>\n<tr>\n<td><strong>Focus<\/strong><\/td>\n<td>Performance, Metrics, Logs, Alarms<\/td>\n<td>Auditing, Security, API History<\/td>\n<td>Compliance, Inventory, Change History<\/td>\n<\/tr>\n<tr>\n<td><strong>Key Use Case<\/strong><\/td>\n<td>CPU is high; App is throwing 500 errors.<\/td>\n<td>Who deleted the production DB?<\/td>\n<td>Is my S3 bucket public? Did the SG change?<\/td>\n<\/tr>\n<tr>\n<td><strong>Real-time action<\/strong><\/td>\n<td>Alarms &amp; EventBridge<\/td>\n<td>EventBridge Integration<\/td>\n<td>Config Rules &amp; Remediation<\/td>\n<\/tr>\n<tr>\n<td><strong>Retention<\/strong><\/td>\n<td>Metrics: 15 months; Logs: Indefinite<\/td>\n<td>90 days (Console); S3 (Indefinite)<\/td>\n<td>Indefinite (based on settings)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p><strong>Cheat Sheet Mnemonic:<\/strong><\/p>\n<ul>\n<li><strong>Watch<\/strong> = Performance (Speed, Errors, Load)<\/li>\n<li><strong>Trail<\/strong> = Audit (Spy on users, API calls)<\/li>\n<li><strong>Config<\/strong> = Rules (Policy, Settings, History)<\/li>\n<\/ul>", "text": "AWS Monitoring & Audit: CloudWatch, CloudTrail & Config Exam: AWS Certified Solutions Architect - Associate (SAA-C03) 1. AWS Monitoring - Section Introduction To maintain operational excellence and performance efficiency (two pillars of the Well-Architected Framework), you must understand how AWS resources are performing and who is accessing them. CloudWatch: \"What is happening right now?\" (Performance & Logs) CloudTrail: \"Who did what?\" (Audit & API History) Config: \"What does the resource look like?\" (Configuration & Compliance) 2. CloudWatch Metrics CloudWatch provides data and actionable insights to monitor your applications, respond to system-wide performance changes, optimize resource utilization, and get a unified view of operational health. Metrics: A variable to monitor (e.g., CPUUtilization ). Namespaces: A container for CloudWatch metrics (e.g., AWS/EC2 ). Dimensions: A name/value pair that helps you uniquely identify a metric (e.g., InstanceId ). Timestamps: All metrics have a timestamp. Metric Resolution: Standard Resolution: 1-minute granularity (default for custom metrics). High Resolution: 1-second granularity (cost is higher). Dashboards: Global access (can view dashboards from different regions). Exam Tip: By default, EC2 metrics are sent every 5 minutes (basic monitoring). You can enable Detailed Monitoring to get data every 1 minute (costs extra). RAM/Memory usage is NOT a default metric for EC2. You must push this as a Custom Metric . 3. CloudWatch Logs Centralized log management. You can store, access, and monitor logs from EC2 instances, AWS CloudTrail, Route 53, and other sources. Log Groups: Usually represent an application or a specific source (e.g., /aws/lambda/my-function ). Log Streams: Instances within a specific application or log files (e.g., a specific container instance log). Metric Filters: You can search logs for a specific phrase (e.g., \"Error\" or \"404\") and turn that into a numerical metric to trigger alarms. Export: Logs can be exported to S3 (for long-term archival) or streamed to Kinesis/Lambda/OpenSearch (for real-time analysis). Exam Tip: Logs in S3 can take up to 12 hours to become available for export. For real-time processing, use Subscription Filters to send logs to Kinesis or Lambda. Logs never expire by default (indefinite retention). You must set a retention policy to delete them automatically. 4. CloudWatch Logs - Live Tail Provides an interactive, scrolling view of new log events as they are ingested. Similar to the tail -f command in Linux. Helps dev/ops teams debug issues quickly in real-time without needing to constantly refresh the console or run queries. 5. CloudWatch Agent & CloudWatch Logs Agent To get logs or system-level metrics (like disk space or RAM) from inside an EC2 instance, you need an agent. CloudWatch Logs Agent (Old): Only sent logs. Deprecated. Unified CloudWatch Agent (New): Collects both logs and system-level metrics (RAM, Swap, Disk Space, Netstat, etc.). Works on EC2 and on-premises servers. Configuration is stored in the Parameter Store (SSM) for easy deployment across fleets. Exam Tip: If a question asks how to monitor \"Memory Utilization\" or \"Disk Space Available\" on EC2, the answer is always CloudWatch Agent (Push Custom Metric). 6. CloudWatch Alarms Alarms are used to trigger notifications or actions based on metric thresholds. Three States: OK: Metric is within the threshold. ALARM: Metric crosses the threshold. INSUFFICIENT_DATA: Not enough data (e.g., new instance, connectivity issue). Actions (Targets): SNS: Send an email/SMS. Auto Scaling: Scale out or Scale in (ASG). EC2 Actions: Stop, Terminate, Reboot, or Recover an instance. Exam Tip: EC2 Instance Recovery: If an instance fails a System Status Check (hardware issue), a CloudWatch Alarm can automatically \"Recover\" the instance. This moves the instance to new hardware but keeps the Instance ID, Private IP, and Elastic IP the same. 7. CloudWatch Synthetics (Canaries) What it is: Configurable scripts (Node.js or Python) that run on a schedule to monitor your endpoints and APIs. Function: It simulates a user navigating your application (\"Synthetic traffic\"). Use Case: Verify your application is up, check latency, and ensure UI elements (like a checkout button) are working even when there is no real user traffic. 8. EventBridge Overview (formerly CloudWatch Events) EventBridge is a serverless event bus that connects applications using data from your own apps, SaaS apps, and AWS services. Evolution: CloudWatch Events is being replaced by EventBridge (same underlying technology, more features). Structure: Source: The service generating the event (e.g., \"EC2 Instance State Change\"). Rules: Filter incoming events (e.g., \"Only look for EC2 stopped events\"). Target: The service to trigger (Lambda, SNS, SQS, Kinesis, Step Functions). Schema Registry: Allows you to discover, create, and manage schemas for events. Scheduled Events: Functions like a \"Cron Job\" (e.g., Trigger a Lambda function every night at 2 AM). 9. CloudWatch Insights and Operational Visibility Advanced features for deeper analysis. Container Insights: Collects metrics/logs from containerized applications (ECS, EKS, Fargate, Kubernetes). Lambda Insights: Monitoring and troubleshooting for serverless functions (cold starts, memory usage). Contributor Insights: Analyzes log data to find \"Top N\" contributors (e.g., \"Who are the top 10 IP addresses hitting my load balancer?\"). Application Insights: Detects errors/problems in .NET and SQL Server databases (and other stacks) using AI/ML. 10. CloudTrail Overview Governance, compliance, and operational and risk auditing. CloudTrail records API calls made within your AWS account. What it records: Who (User/Role), When (Time), What (API Action), Where (Resource & Source IP). Default: Enabled by default. Keeps 90 days of history in the console (Management Events). Types of Events: Management Events: Operations on the AWS account (e.g., AttachRolePolicy , CreateVPC , ConsoleLogin ). Enabled by default. Data Events: Operations within a resource (e.g., S3 object upload, Lambda function invocation, DynamoDB item put). High volume, disabled by default. Insights Events: Detects unusual activity (spikes in resource provisioning). Storage: To keep logs longer than 90 days, you must configure a Trail to send logs to S3. Exam Tip: If you need to know \"Who terminated the EC2 instance?\" or \"Who deleted the S3 bucket?\", the answer is CloudTrail . 11. CloudTrail - EventBridge Integration CloudTrail allows you to react to API calls. CloudTrail logs the API call -> Sends event to EventBridge -> EventBridge triggers a target. Use Case: Security automation. Scenario: A user creates an S3 bucket that is Public. Flow: CloudTrail records CreateBucket -> EventBridge Rule matches pattern -> Triggers Lambda -> Lambda deletes the bucket or fixes the policy. 12. AWS Config - Overview Detailed view of the configuration of AWS resources in your AWS account. Inventory: Records resource configurations and changes over time (Versioning for infrastructure). Compliance: You can set \"Config Rules\" (Managed or Custom). Example: \"Is SSH (port 22) unrestricted?\" \"Are EBS volumes encrypted?\" Remediation: Can automatically fix non-compliant resources using SSM Automation Documents. Notifications: Sends SNS notifications when a resource violates a rule. Exam Tip: If you need to view the history of configuration changes (e.g., \"What did the Security Group rules look like yesterday?\"), use AWS Config . It is Regional service. 13. Summary: CloudWatch vs. CloudTrail vs. Config Feature CloudWatch CloudTrail AWS Config Primary Question \"What is the performance?\" \"Who made the call?\" \"How is it configured?\" Focus Performance, Metrics, Logs, Alarms Auditing, Security, API History Compliance, Inventory, Change History Key Use Case CPU is high; App is throwing 500 errors. Who deleted the production DB? Is my S3 bucket public? Did the SG change? Real-time action Alarms & EventBridge EventBridge Integration Config Rules & Remediation Retention Metrics: 15 months; Logs: Indefinite 90 days (Console); S3 (Indefinite) Indefinite (based on settings) Cheat Sheet Mnemonic: Watch = Performance (Speed, Errors, Load) Trail = Audit (Spy on users, API calls) Config = Rules (Policy, Settings, History)"}, {"id": 19, "num": "19", "title": "Identity and Access Management (IAM) - Advanced", "html": "<h1>AWS SAA-C03 Study Notes: IAM Advanced &amp; Organizations<\/h1>\n<h2>1. AWS Organizations - Overview<\/h2>\n<p>AWS Organizations helps you centrally manage and govern your environment as you grow and scale your AWS resources. It allows you to consolidate multiple AWS accounts into an organization that you create and centrally manage.<\/p>\n<ul>\n<li><strong>Key Concepts:<\/strong><ul>\n<li><strong>Management Account:<\/strong> The account that creates the Organization. It pays the bills (Consolidated Billing) and has full administrative control. <strong>Critical:<\/strong> Service Control Policies (SCPs) do <em>not<\/em> apply to the Management Account.<\/li>\n<li><strong>Member Accounts:<\/strong> All other accounts in the organization.<\/li>\n<li><strong>Organizational Units (OUs):<\/strong> A container for accounts within a root. You can apply policies to an OU, which then apply to all accounts within that OU.<\/li>\n<li><strong>Consolidated Billing:<\/strong> Aggregates usage costs across all accounts. You get volume discounts (e.g., S3 storage tiers, EC2 data transfer) by combining usage.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Service Control Policies (SCPs):<\/strong><ul>\n<li>SCPs allow you to restrict which AWS services, resources, and API actions can be accessed by users and roles in member accounts.<\/li>\n<li>SCPs constitute a <strong>permission boundary<\/strong> for the account. They do <em>not<\/em> grant permissions; they only filter them. A user needs both an IAM permission <em>and<\/em> an SCP allowance to perform an action.<\/li>\n<li><strong>Inheritance:<\/strong> Policies filter down from Root -&gt; OU -&gt; Member Account.<\/li>\n<li><strong>Allow vs. Deny:<\/strong> Explicit Deny in an SCP overrides any Allow in IAM.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<blockquote>\n<p><strong>Exam Tip:<\/strong> If a user in a Member Account has full AdministratorAccess in IAM but the SCP denies <code>ec2:*<\/code>, the user cannot access EC2. SCPs are the ultimate guardrail.<\/p>\n<\/blockquote>\n<h2>2. Organizations - Tag Policies<\/h2>\n<p>Tag policies represent a type of policy that helps you standardize tags across resources in your organization's accounts.<\/p>\n<ul>\n<li>\n<p><strong>Purpose:<\/strong> Enforce consistent tagging schema (e.g., ensuring every resource has a <code>CostCenter<\/code> tag with specific allowed values).<\/p>\n<\/li>\n<li>\n<p><strong>Enforcement:<\/strong><\/p>\n<ul>\n<li>You can define compliant tag keys and values.<\/li>\n<li>You can prevent non-compliant tagging operations on supported resources.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Integration:<\/strong> Works with AWS Resource Groups and Tag Editor to audit compliance.<\/li>\n<\/ul>\n<blockquote>\n<p><strong>Exam Tip:<\/strong> Use Tag Policies for cost allocation and governance. If a question asks how to ensure all specific resources created in the org have a specific tag key/value, the answer is Tag Policies.<\/p>\n<\/blockquote>\n<h2>3. IAM - Advanced Policies<\/h2>\n<p>Beyond basic Allow/Deny, IAM supports advanced conditions and boundaries.<\/p>\n<ul>\n<li><strong>IAM Permission Boundaries:<\/strong><ul>\n<li>An advanced feature used to set the <strong>maximum permissions<\/strong> that an identity-based policy can grant to an IAM entity (User or Role).<\/li>\n<li>Commonly used when delegating administration (e.g., letting a developer create roles but restricting those roles to only S3 access).<\/li>\n<li><em>Logic:<\/em> Effective Permissions = intersection of (Identity-based Policy) AND (Permissions Boundary).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Policy Structure &amp; Global Condition Keys:<\/strong><ul>\n<li><code>aws:SourceIp<\/code>: Restrict access to specific IP ranges.<\/li>\n<li><code>aws:RequestedRegion<\/code>: Restrict calls to specific AWS Regions.<\/li>\n<li><code>aws:PrincipalOrgID<\/code>: Limit resource access to principals belonging to your specific AWS Organization (prevents access from external accounts).<\/li>\n<li><code>aws:MultiFactorAuthPresent<\/code>: Enforce MFA for sensitive operations.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<pre><code>/* Example: Deny access outside of specific regions */\n{\n    &quot;Effect&quot;: &quot;Deny&quot;,\n    &quot;NotAction&quot;: [\n        &quot;cloudfront:*&quot;,\n        &quot;iam:*&quot;,\n        &quot;route53:*&quot;,\n        &quot;support:*&quot;\n    ],\n    &quot;Resource&quot;: &quot;*&quot;,\n    &quot;Condition&quot;: {\n        &quot;StringNotEquals&quot;: {\n            &quot;aws:RequestedRegion&quot;: [\n                &quot;us-east-1&quot;,\n                &quot;us-west-1&quot;\n            ]\n        }\n    }\n}\n<\/code><\/pre>\n<h2>4. IAM - Resource-based Policies vs IAM Roles<\/h2>\n<p>There are two primary ways to grant cross-account access or complex permissions.<\/p>\n<h3>Resource-based Policies<\/h3>\n<ul>\n<li><strong>Definition:<\/strong> Policy attached directly to the resource (e.g., S3 Bucket Policy, SQS Queue Policy, SNS Topic Policy, Lambda Function Policy, KMS Key Policy).<\/li>\n<li><strong>Principal:<\/strong> You specify the <code>Principal<\/code> (User, Role, or Account ID) in the policy itself.<\/li>\n<li><strong>Use Case:<\/strong> Simple cross-account access for supported resources (S3, SQS, SNS).<\/li>\n<li><strong>Benefit:<\/strong> The principal does not need to give up their current permissions to access the resource; they stay in their own account context.<\/li>\n<\/ul>\n<h3>IAM Roles (Identity-based)<\/h3>\n<ul>\n<li><strong>Definition:<\/strong> An identity with specific permissions that can be assumed by a trusted entity.<\/li>\n<li><strong>Mechanism:<\/strong> The user assumes the role via <code>sts:AssumeRole<\/code>. This returns temporary security credentials.<\/li>\n<li><strong>Use Case:<\/strong> Cross-account access for services <em>without<\/em> resource-based policies (e.g., DynamoDB, EC2), or when a user needs to \"switch contexts\" completely.<\/li>\n<li><strong>The \"Confused Deputy\" Problem:<\/strong> When a third party uses their access to your resources to access other resources.<ul>\n<li><strong>Solution:<\/strong> Use <code>sts:ExternalId<\/code> condition in the Trust Policy when allowing 3rd party vendors to assume roles in your account.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<blockquote>\n<p><strong>Exam Tip:<\/strong><\/p>\n<ul>\n<li>S3 Cross-Account Access? -&gt; S3 Bucket Policy (Resource-based) is often the simplest answer unless you need programmatic access to many services.<\/li>\n<li>EC2 Cross-Account Access? -&gt; Must use IAM Roles.<\/li>\n<\/ul>\n<\/blockquote>\n<h2>5. IAM - Policy Evaluation Logic<\/h2>\n<p>How does AWS decide to Allow or Deny a request?<\/p>\n<ol>\n<li><strong>Implicit Deny:<\/strong> By default, everything is denied.<\/li>\n<li><strong>Explicit Deny:<\/strong> The evaluator looks for any policy (Identity, Resource, SCP, Boundary) that says <code>\"Effect\": \"Deny\"<\/code>.<ul>\n<li><strong>RULE:<\/strong> An Explicit Deny <strong>always<\/strong> overrides any Allow.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Explicit Allow:<\/strong> If there is no Explicit Deny, the evaluator looks for at least one <code>\"Effect\": \"Allow\"<\/code>.<\/li>\n<li><strong>Final Decision:<\/strong><ul>\n<li>If Explicit Deny found -&gt; <strong>DENY<\/strong><\/li>\n<li>If No Allow found -&gt; <strong>DENY<\/strong> (Implicit Deny)<\/li>\n<li>If Allow found + No Explicit Deny -&gt; <strong>ALLOW<\/strong><\/li>\n<\/ul>\n<\/li>\n<\/ol>\n<p><strong>Evaluation Boundary intersection:<\/strong><\/p>\n<ul>\n<li>Identity Policy AND Permissions Boundary<\/li>\n<li>Identity Policy AND SCP (if in an Organization)<\/li>\n<li>Identity Policy AND Resource Policy (Union logic generally applies here, except for cross-account where <em>both<\/em> sides need to allow it).<\/li>\n<\/ul>\n<h2>6. AWS IAM Identity Center (Successor to AWS SSO)<\/h2>\n<ul>\n<li><strong>Purpose:<\/strong> Centralized login for all AWS accounts and business applications (Office 365, Salesforce).<\/li>\n<li><strong>Identity Source:<\/strong><ul>\n<li>Can use the built-in identity store.<\/li>\n<li>Can connect to external Identity Providers (IdP) via <strong>SAML 2.0<\/strong> (e.g., Okta, Ping, Azure AD).<\/li>\n<li>Can connect to Active Directory (via AWS Directory Services).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Features:<\/strong><ul>\n<li><strong>Single Sign-On:<\/strong> Users log in once to a portal and click tiles to access specific AWS accounts with specific permission sets.<\/li>\n<li><strong>Multi-Account Permissions:<\/strong> Assign Permission Sets to groups for specific accounts.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<blockquote>\n<p><strong>Exam Tip:<\/strong> If a question asks about \"centrally managing access to multiple AWS accounts\" or \"integrating existing corporate credentials (SAML 2.0) for console access,\" the answer is IAM Identity Center.<\/p>\n<\/blockquote>\n<h2>7. AWS Directory Services<\/h2>\n<p>Brings Microsoft Active Directory (AD) to AWS.<\/p>\n<table>\n<thead>\n<tr>\n<th>Type<\/th>\n<th>Description<\/th>\n<th>Key Use Cases<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>AWS Managed Microsoft AD<\/strong><\/td>\n<td>Actual AD running on AWS infrastructure. Two domain controllers in different AZs.<\/td>\n<td>• Establish <strong>Trust Relationships<\/strong> with on-prem AD.<br><br>• Requires complex AD features (Group Policy, Schema extensions).<br><br>• Seamlessly join EC2 Windows instances.<\/td>\n<\/tr>\n<tr>\n<td><strong>AD Connector<\/strong><\/td>\n<td>A proxy (gateway) to your on-premise AD. Does not cache credentials.<\/td>\n<td>• You want to use on-prem credentials <em>without<\/em> syncing them to cloud.<br><br>• Use on-prem AD for authentication for AWS services (Workspaces, QuickSight).<\/td>\n<\/tr>\n<tr>\n<td><strong>Simple AD<\/strong><\/td>\n<td>Standalone Directory based on Samba 4.<\/td>\n<td>• Low cost.<br><br>• <strong>Cannot<\/strong> set up trust relationships with on-prem AD.<br><br>• Basic user management for small cloud-only deployments.<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<blockquote>\n<p><strong>Exam Tip:<\/strong><\/p>\n<ul>\n<li>Need Trust Relationship? -&gt; <strong>Managed Microsoft AD<\/strong>.<\/li>\n<li>Keep users solely on-prem but auth against them? -&gt; <strong>AD Connector<\/strong>.<\/li>\n<li>Cheap, cloud-only, no on-prem connection needed? -&gt; <strong>Simple AD<\/strong>.<\/li>\n<\/ul>\n<\/blockquote>\n<h2>8. AWS Control Tower<\/h2>\n<p>An abstraction layer on top of AWS Organizations.<\/p>\n<ul>\n<li><strong>Purpose:<\/strong> The easiest way to set up and govern a secure, multi-account AWS environment. It automates the setup of a \"Landing Zone.\"<\/li>\n<li><strong>Key Functionality:<\/strong><ul>\n<li><strong>Landing Zone:<\/strong> Sets up a multi-account environment based on best practices (Logging account, Audit account).<\/li>\n<li><strong>Guardrails:<\/strong><ul>\n<li><strong>Preventive Guardrails:<\/strong> Stop non-compliant actions (implemented via <strong>SCPs<\/strong>). E.g., \"Disallow creation of public S3 buckets.\"<\/li>\n<li><strong>Detective Guardrails:<\/strong> Alert on non-compliance (implemented via <strong>AWS Config<\/strong>).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Account Factory:<\/strong> Automates the provisioning of new accounts with pre-approved network and security configurations.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<blockquote>\n<p><strong>Exam Tip:<\/strong> If the question mentions \"automating the setup of a multi-account environment,\" \"Landing Zone,\" or \"Blueprints,\" choose Control Tower.<\/p>\n<\/blockquote>", "text": "AWS SAA-C03 Study Notes: IAM Advanced & Organizations 1. AWS Organizations - Overview AWS Organizations helps you centrally manage and govern your environment as you grow and scale your AWS resources. It allows you to consolidate multiple AWS accounts into an organization that you create and centrally manage. Key Concepts: Management Account: The account that creates the Organization. It pays the bills (Consolidated Billing) and has full administrative control. Critical: Service Control Policies (SCPs) do not apply to the Management Account. Member Accounts: All other accounts in the organization. Organizational Units (OUs): A container for accounts within a root. You can apply policies to an OU, which then apply to all accounts within that OU. Consolidated Billing: Aggregates usage costs across all accounts. You get volume discounts (e.g., S3 storage tiers, EC2 data transfer) by combining usage. Service Control Policies (SCPs): SCPs allow you to restrict which AWS services, resources, and API actions can be accessed by users and roles in member accounts. SCPs constitute a permission boundary for the account. They do not grant permissions; they only filter them. A user needs both an IAM permission and an SCP allowance to perform an action. Inheritance: Policies filter down from Root -> OU -> Member Account. Allow vs. Deny: Explicit Deny in an SCP overrides any Allow in IAM. Exam Tip: If a user in a Member Account has full AdministratorAccess in IAM but the SCP denies ec2:* , the user cannot access EC2. SCPs are the ultimate guardrail. 2. Organizations - Tag Policies Tag policies represent a type of policy that helps you standardize tags across resources in your organization's accounts. Purpose: Enforce consistent tagging schema (e.g., ensuring every resource has a CostCenter tag with specific allowed values). Enforcement: You can define compliant tag keys and values. You can prevent non-compliant tagging operations on supported resources. Integration: Works with AWS Resource Groups and Tag Editor to audit compliance. Exam Tip: Use Tag Policies for cost allocation and governance. If a question asks how to ensure all specific resources created in the org have a specific tag key/value, the answer is Tag Policies. 3. IAM - Advanced Policies Beyond basic Allow/Deny, IAM supports advanced conditions and boundaries. IAM Permission Boundaries: An advanced feature used to set the maximum permissions that an identity-based policy can grant to an IAM entity (User or Role). Commonly used when delegating administration (e.g., letting a developer create roles but restricting those roles to only S3 access). Logic: Effective Permissions = intersection of (Identity-based Policy) AND (Permissions Boundary). Policy Structure & Global Condition Keys: aws:SourceIp : Restrict access to specific IP ranges. aws:RequestedRegion : Restrict calls to specific AWS Regions. aws:PrincipalOrgID : Limit resource access to principals belonging to your specific AWS Organization (prevents access from external accounts). aws:MultiFactorAuthPresent : Enforce MFA for sensitive operations. /* Example: Deny access outside of specific regions */ { \"Effect\": \"Deny\", \"NotAction\": [ \"cloudfront:*\", \"iam:*\", \"route53:*\", \"support:*\" ], \"Resource\": \"*\", \"Condition\": { \"StringNotEquals\": { \"aws:RequestedRegion\": [ \"us-east-1\", \"us-west-1\" ] } } } 4. IAM - Resource-based Policies vs IAM Roles There are two primary ways to grant cross-account access or complex permissions. Resource-based Policies Definition: Policy attached directly to the resource (e.g., S3 Bucket Policy, SQS Queue Policy, SNS Topic Policy, Lambda Function Policy, KMS Key Policy). Principal: You specify the Principal (User, Role, or Account ID) in the policy itself. Use Case: Simple cross-account access for supported resources (S3, SQS, SNS). Benefit: The principal does not need to give up their current permissions to access the resource; they stay in their own account context. IAM Roles (Identity-based) Definition: An identity with specific permissions that can be assumed by a trusted entity. Mechanism: The user assumes the role via sts:AssumeRole . This returns temporary security credentials. Use Case: Cross-account access for services without resource-based policies (e.g., DynamoDB, EC2), or when a user needs to \"switch contexts\" completely. The \"Confused Deputy\" Problem: When a third party uses their access to your resources to access other resources. Solution: Use sts:ExternalId condition in the Trust Policy when allowing 3rd party vendors to assume roles in your account. Exam Tip: S3 Cross-Account Access? -> S3 Bucket Policy (Resource-based) is often the simplest answer unless you need programmatic access to many services. EC2 Cross-Account Access? -> Must use IAM Roles. 5. IAM - Policy Evaluation Logic How does AWS decide to Allow or Deny a request? Implicit Deny: By default, everything is denied. Explicit Deny: The evaluator looks for any policy (Identity, Resource, SCP, Boundary) that says \"Effect\": \"Deny\" . RULE: An Explicit Deny always overrides any Allow. Explicit Allow: If there is no Explicit Deny, the evaluator looks for at least one \"Effect\": \"Allow\" . Final Decision: If Explicit Deny found -> DENY If No Allow found -> DENY (Implicit Deny) If Allow found + No Explicit Deny -> ALLOW Evaluation Boundary intersection: Identity Policy AND Permissions Boundary Identity Policy AND SCP (if in an Organization) Identity Policy AND Resource Policy (Union logic generally applies here, except for cross-account where both sides need to allow it). 6. AWS IAM Identity Center (Successor to AWS SSO) Purpose: Centralized login for all AWS accounts and business applications (Office 365, Salesforce). Identity Source: Can use the built-in identity store. Can connect to external Identity Providers (IdP) via SAML 2.0 (e.g., Okta, Ping, Azure AD). Can connect to Active Directory (via AWS Directory Services). Features: Single Sign-On: Users log in once to a portal and click tiles to access specific AWS accounts with specific permission sets. Multi-Account Permissions: Assign Permission Sets to groups for specific accounts. Exam Tip: If a question asks about \"centrally managing access to multiple AWS accounts\" or \"integrating existing corporate credentials (SAML 2.0) for console access,\" the answer is IAM Identity Center. 7. AWS Directory Services Brings Microsoft Active Directory (AD) to AWS. Type Description Key Use Cases AWS Managed Microsoft AD Actual AD running on AWS infrastructure. Two domain controllers in different AZs. • Establish Trust Relationships with on-prem AD. • Requires complex AD features (Group Policy, Schema extensions). • Seamlessly join EC2 Windows instances. AD Connector A proxy (gateway) to your on-premise AD. Does not cache credentials. • You want to use on-prem credentials without syncing them to cloud. • Use on-prem AD for authentication for AWS services (Workspaces, QuickSight). Simple AD Standalone Directory based on Samba 4. • Low cost. • Cannot set up trust relationships with on-prem AD. • Basic user management for small cloud-only deployments. Exam Tip: Need Trust Relationship? -> Managed Microsoft AD . Keep users solely on-prem but auth against them? -> AD Connector . Cheap, cloud-only, no on-prem connection needed? -> Simple AD . 8. AWS Control Tower An abstraction layer on top of AWS Organizations. Purpose: The easiest way to set up and govern a secure, multi-account AWS environment. It automates the setup of a \"Landing Zone.\" Key Functionality: Landing Zone: Sets up a multi-account environment based on best practices (Logging account, Audit account). Guardrails: Preventive Guardrails: Stop non-compliant actions (implemented via SCPs ). E.g., \"Disallow creation of public S3 buckets.\" Detective Guardrails: Alert on non-compliance (implemented via AWS Config ). Account Factory: Automates the provisioning of new accounts with pre-approved network and security configurations. Exam Tip: If the question mentions \"automating the setup of a multi-account environment,\" \"Landing Zone,\" or \"Blueprints,\" choose Control Tower."}, {"id": 20, "num": "20", "title": "AWS Security & Encryption (KMS, SSM Parameter Store, Shield, WAF)", "html": "<h1>AWS Security &amp; Encryption: SAA-C03 Exam Notes<\/h1>\n<h2>1. AWS Security - Section Introduction<\/h2>\n<ul>\n<li><strong>Shared Responsibility Model:<\/strong><ul>\n<li><strong>AWS:<\/strong> Security <em>of<\/em> the Cloud (Physical, Hardware, Hypervisor, Managed Services).<\/li>\n<li><strong>Customer:<\/strong> Security <em>in<\/em> the Cloud (Data, OS patching, Firewall configuration, IAM, Encryption).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Principle of Least Privilege:<\/strong> Always grant only the permissions required to perform a task.<\/li>\n<li><strong>Exam Tip:<\/strong> If a question asks about \"Patching the Guest OS\" (EC2) or \"Configuring Security Groups,\" that is ALWAYS the <strong>Customer's<\/strong> responsibility. If it asks about \"Disposing of failed hard drives,\" that is <strong>AWS's<\/strong> responsibility.<\/li>\n<\/ul>\n<h2>2. Encryption 101<\/h2>\n<ul>\n<li><strong>Encryption in Flight (TLS/SSL):<\/strong><ul>\n<li>Data is encrypted before sending and decrypted after receiving.<\/li>\n<li>Protects against Man-in-the-Middle (MITM) attacks.<\/li>\n<li>Handled by HTTPS endpoints.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Encryption at Rest:<\/strong><ul>\n<li>Data is encrypted while stored (disk, database, S3).<\/li>\n<li>Implemented via keys (KMS) or client-side encryption.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> Any scenario mentioning \"compliance requirements to encrypt data traversing the network\" refers to <strong>Encryption in Flight<\/strong> (HTTPS/TLS).<\/li>\n<\/ul>\n<h2>3. KMS (Key Management Service) Overview<\/h2>\n<ul>\n<li><strong>Function:<\/strong> Managed service to create and control encryption keys.<\/li>\n<li><strong>Scope:<\/strong> Regional service.<\/li>\n<li><strong>Exam Concept - Envelope Encryption:<\/strong><ul>\n<li>KMS <code>Encrypt<\/code> API has a limit (4KB).<\/li>\n<li>For large data (files), use <strong>Envelope Encryption<\/strong>:<ol>\n<li>KMS generates a Data Key (<code>GenerateDataKey<\/code> API).<\/li>\n<li>You use the Data Key to encrypt the file locally.<\/li>\n<li>The encrypted Data Key is stored with the file.<\/li>\n<\/ol>\n<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> If you need to encrypt a file <strong>larger than 4KB<\/strong>, you cannot use the <code>Encrypt<\/code> API directly. You MUST use <strong>Envelope Encryption<\/strong> (GenerateDataKey).<\/li>\n<\/ul>\n<h2>4. Types of KMS Keys (Critical for Exam)<\/h2>\n<p>The exam tests your ability to distinguish keys based on <strong>Management<\/strong> (Cost/Control) and <strong>Key Material Origin<\/strong>.<\/p>\n<h3>A. By Management (Who manages it?)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th><strong>AWS Owned Keys<\/strong><\/th>\n<th><strong>AWS Managed Keys<\/strong><\/th>\n<th><strong>Customer Managed Keys (CMK)<\/strong><\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Example<\/strong><\/td>\n<td>S3 default encryption (SSE-S3)<\/td>\n<td><code>aws/s3<\/code>, <code>aws/ebs<\/code><\/td>\n<td>Keys you create (<code>my-app-key<\/code>)<\/td>\n<\/tr>\n<tr>\n<td><strong>Visibility<\/strong><\/td>\n<td><strong>Invisible<\/strong> (Not in KMS console)<\/td>\n<td><strong>Visible<\/strong><\/td>\n<td><strong>Visible<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Rotation<\/strong><\/td>\n<td>Managed by AWS<\/td>\n<td>Automatic every <strong>1 year<\/strong> (Mandatory)<\/td>\n<td>Automatic every <strong>1 year<\/strong> (Optional - must enable)<\/td>\n<\/tr>\n<tr>\n<td><strong>Permissions<\/strong><\/td>\n<td>No control<\/td>\n<td>No control (Policy is Read-Only)<\/td>\n<td><strong>Full Control<\/strong> (Key Policy)<\/td>\n<\/tr>\n<tr>\n<td><strong>Cost<\/strong><\/td>\n<td>Free<\/td>\n<td>Free<\/td>\n<td>Paid (~$1/mo + API calls)<\/td>\n<\/tr>\n<tr>\n<td><strong>Use Case<\/strong><\/td>\n<td>Basic compliance<\/td>\n<td>Low overhead, audit needed<\/td>\n<td><strong>Sharing AMIs<\/strong>, Cross-account access, specific rotation needs<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>B. By Cryptography<\/h3>\n<ul>\n<li><strong>Symmetric (AES-256):<\/strong> Single key for encrypt/decrypt. Used by AWS services (S3, EBS). Key never leaves KMS unencrypted.<\/li>\n<li><strong>Asymmetric (RSA/ECC):<\/strong> Public/Private pair. Used for <strong>Signing<\/strong> operations or encryption outside of AWS by users without AWS credentials.<\/li>\n<\/ul>\n<h3>C. By Key Material Origin<\/h3>\n<ul>\n<li><strong>AWS Generated (Default):<\/strong> AWS creates the randomness.<\/li>\n<li><strong>Imported (BYOK - Bring Your Own Key):<\/strong><ul>\n<li>You generate material on-premise and upload it.<\/li>\n<li><strong>Constraint:<\/strong> <strong>No Automatic Rotation<\/strong>. You must manually re-import to rotate.<\/li>\n<li><strong>Risk:<\/strong> You are responsible for durability; if you lose the source key, data is lost.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Custom Key Store:<\/strong> Keys generated in <strong>CloudHSM<\/strong> (Single-tenant hardware) but managed via KMS.<\/li>\n<\/ul>\n<h2>5. KMS - Multi-Region Keys<\/h2>\n<ul>\n<li><strong>Standard KMS Keys:<\/strong> Are strictly regional. You cannot use a key from <code>us-east-1<\/code> to decrypt data in <code>eu-west-1<\/code>.<\/li>\n<li><strong>Multi-Region Keys:<\/strong><ul>\n<li>Allow you to replicate a Primary Key into other regions as Replica Keys.<\/li>\n<li><strong>Key ID:<\/strong> The Key ID remains the <strong>same<\/strong> across regions.<\/li>\n<li><strong>Use Case:<\/strong> Disaster Recovery (DR) or Global Tables (DynamoDB) where you need to decrypt data instantly in a failover region without re-encrypting.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> If a scenario involves \"Global Tables\" or \"Disaster Recovery\" where re-encrypting data in the new region is \"too time-consuming,\" the answer is <strong>Multi-Region Keys<\/strong>.<\/li>\n<\/ul>\n<h2>6. S3 Replication with Encryption<\/h2>\n<ul>\n<li><strong>Scenario:<\/strong> Replicating objects from Source Bucket (Region A) to Destination Bucket (Region B).<\/li>\n<li><strong>Unencrypted objects:<\/strong> Replicate automatically (if enabled).<\/li>\n<li><strong>Encrypted objects (SSE-KMS):<\/strong><ul>\n<li>By default, these are <strong>NOT<\/strong> replicated. You must specifically enable it in the replication config.<\/li>\n<li><strong>Permissions needed:<\/strong><ol>\n<li>IAM Role for replication must have <code>kms:Decrypt<\/code> permission for the Source Key.<\/li>\n<li>IAM Role must have <code>kms:Encrypt<\/code> permission for the Destination Key.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Throttling:<\/strong> If KMS limits are hit during replication, you may receive a <code>ServiceUnavailable<\/code> error (Request KMS quota increase).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> If S3 Replication is failing for <strong>only<\/strong> encrypted objects, verify the <strong>IAM Role permissions<\/strong> regarding the KMS keys in <em>both<\/em> regions.<\/li>\n<\/ul>\n<h2>7. Encrypted AMI Sharing Process<\/h2>\n<ul>\n<li><strong>Rule:<\/strong> You <strong>cannot<\/strong> directly share an AMI encrypted with the default AWS Managed Key.<\/li>\n<li><strong>Rule:<\/strong> You <strong>cannot<\/strong> share an AMI directly if it is encrypted with a custom key belonging to the <em>sharer<\/em> (the recipient can't access that key).<\/li>\n<li><strong>The Workflow:<\/strong><ol>\n<li>Create an AMI from the EC2 instance.<\/li>\n<li><strong>Copy<\/strong> the AMI (Image) to the same or new region.<\/li>\n<li>During the Copy process, check \"Re-encrypt\" and select a <strong>Customer Managed Key (CMK)<\/strong> that you control.<\/li>\n<li>Add the Target Account ID to the CMK's <strong>Key Policy<\/strong>.<\/li>\n<li>Share the AMI with the Target Account.<\/li>\n<li>(Optional but recommended) Target Account copies the shared AMI and re-encrypts it with <em>their own<\/em> key to become independent.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Exam Tip:<\/strong> You can never share an AMI encrypted with the \"Default\" AWS key. You MUST copy it and re-encrypt it with a <strong>CMK<\/strong> (Customer Managed Key) first.<\/li>\n<\/ul>\n<h2>8. SSM Parameter Store Overview<\/h2>\n<ul>\n<li><strong>Service:<\/strong> AWS Systems Manager (SSM).<\/li>\n<li><strong>Purpose:<\/strong> Secure, hierarchical storage for configuration data management and secrets management.<\/li>\n<li><strong>Types:<\/strong> String, StringList, SecureString (uses KMS).<\/li>\n<li><strong>Tiers:<\/strong><ul>\n<li><strong>Standard:<\/strong> Free, 10,000 parameter limit, 4KB max size.<\/li>\n<li><strong>Advanced:<\/strong> Paid, 100,000+ parameters, 8KB max size, supports Policies (expiration).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Hierarchy:<\/strong> <code>/prod/db/password<\/code> or <code>/dev/app/url<\/code>. (Allows path-based IAM permissions).<\/li>\n<li><strong>Exam Tip:<\/strong> If the question asks for \"storage of configuration strings\" or \"secrets\" <strong>without<\/strong> mentioning automatic rotation, choose <strong>SSM Parameter Store<\/strong> (it's cheaper/free).<\/li>\n<\/ul>\n<h2>9. AWS Secrets Manager - Overview<\/h2>\n<ul>\n<li><strong>Purpose:<\/strong> Newer service specifically for secrets (passwords, API keys).<\/li>\n<li><strong>Key Differentiator vs. SSM Parameter Store:<\/strong><ul>\n<li><strong>Automatic Rotation:<\/strong> Secrets Manager can automatically rotate credentials for RDS, Redshift, and DocumentDB using Lambda functions.<\/li>\n<li><strong>Cross-Account Access:<\/strong> Easier to share secrets across accounts.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Cost:<\/strong> More expensive than SSM Parameter Store.<\/li>\n<li><strong>Exam Tip:<\/strong> The keyword is <strong>\"Automatic Rotation\"<\/strong>. If the scenario requires rotating DB passwords automatically every X days, the answer is <strong>Secrets Manager<\/strong>.<\/li>\n<\/ul>\n<h2>10. AWS Certificate Manager (ACM)<\/h2>\n<ul>\n<li><strong>Purpose:<\/strong> Provision, manage, and deploy SSL/TLS Certificates.<\/li>\n<li><strong>Integrations:<\/strong> Load Balancers (ALB/NLB), CloudFront, API Gateway.<\/li>\n<li><strong>Public Certificates:<\/strong> Free, auto-renewing (if DNS is validated via CNAME).<\/li>\n<li><strong>Private Certificates:<\/strong> Paid (via private CA).<\/li>\n<li><strong>Limitations:<\/strong><ul>\n<li>You <strong>cannot<\/strong> export public ACM certificates (private keys) to use on EC2 instances directly. You must put the EC2 behind a Load Balancer or CloudFront to use the ACM cert.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> If you have a legacy application on EC2 that needs a certificate installed <em>directly<\/em> on the OS (not on a Load Balancer), you <strong>cannot<\/strong> use ACM public certs. You must buy a cert externally and import it, or use ACM Private CA.<\/li>\n<\/ul>\n<h2>11. AWS CloudHSM (Hardware Security Module) - Overview<\/h2>\n<ul>\n<li><strong>Definition:<\/strong> A dedicated physical hardware security module in the AWS cloud.<\/li>\n<li><strong>Key Characteristic:<\/strong> Single-tenant (Dedicated) hardware.<\/li>\n<li><strong>Access Control:<\/strong> You have full control over the hardware and user accounts. AWS has <strong>zero access<\/strong> (even they cannot recover lost keys).<\/li>\n<li><strong>Compliance:<\/strong> <strong>FIPS 140-2 Level 3<\/strong> (Higher security standard than KMS).<\/li>\n<li><strong>Supported Interfaces:<\/strong> Standard industry protocols:<ul>\n<li><strong>PKCS#11<\/strong><\/li>\n<li><strong>JCE<\/strong> (Java Cryptography Extension)<\/li>\n<li><strong>Microsoft CNG<\/strong> (Cryptography Next Generation)<\/li>\n<\/ul>\n<\/li>\n<li><strong>Use Cases:<\/strong><ul>\n<li>Strict regulatory compliance requiring dedicated hardware.<\/li>\n<li>SSL Offloading for Web Servers (e.g., Nginx/Apache) to dedicated hardware.<\/li>\n<li>Oracle TDE (Transparent Data Encryption) with master keys in HSM.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>12. AWS CloudHSM vs. AWS KMS (Comparison)<\/h2>\n<ul>\n<li><strong>AWS KMS:<\/strong> Multi-tenant managed service. AWS manages the hardware root of trust.<\/li>\n<li><strong>AWS CloudHSM:<\/strong> Single-tenant dedicated hardware. You manage the hardware.<\/li>\n<\/ul>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th>AWS KMS<\/th>\n<th>AWS CloudHSM<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Tenancy<\/strong><\/td>\n<td><strong>Multi-tenant<\/strong> (Shared Hardware)<\/td>\n<td><strong>Single-tenant<\/strong> (Dedicated Hardware)<\/td>\n<\/tr>\n<tr>\n<td><strong>Key Recovery<\/strong><\/td>\n<td>AWS ensures durability.<\/td>\n<td><strong>Lost forever<\/strong> if you lose credentials.<\/td>\n<\/tr>\n<tr>\n<td><strong>Compliance<\/strong><\/td>\n<td>FIPS 140-2 Level 2 (Standard).<\/td>\n<td><strong>FIPS 140-2 Level 3<\/strong> (High Security).<\/td>\n<\/tr>\n<tr>\n<td><strong>Protocols<\/strong><\/td>\n<td>AWS API / CLI / SDK Only.<\/td>\n<td>PKCS#11, JCE, Microsoft CNG.<\/td>\n<\/tr>\n<tr>\n<td><strong>Management<\/strong><\/td>\n<td>AWS manages administration.<\/td>\n<td>YOU manage administration.<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<ul>\n<li><strong>Exam Tip:<\/strong> Look for keywords: \"Single-tenant,\" \"Dedicated Hardware,\" \"FIPS 140-2 Level 3,\" or \"PKCS#11.\" These <strong>always<\/strong> point to <strong>CloudHSM<\/strong>.<\/li>\n<\/ul>\n<h2>13. Web Application Firewall (WAF)<\/h2>\n<ul>\n<li><strong>Layer:<\/strong> Layer 7 (Application Layer).<\/li>\n<li><strong>Protects Against:<\/strong> Common web exploits (SQL Injection, Cross-Site Scripting (XSS), Bad bots).<\/li>\n<li><strong>Deployable On:<\/strong><ul>\n<li>Application Load Balancer (ALB).<\/li>\n<li>API Gateway.<\/li>\n<li>CloudFront.<\/li>\n<li>AppSync.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Components:<\/strong> Web ACLs (Access Control Lists) -&gt; Rules (IP Sets, Geo-Match, String Match).<\/li>\n<li><strong>Exam Tip:<\/strong> If you need to block an attack containing <strong>SQL Injection<\/strong> or block traffic from a <strong>specific country<\/strong>, use <strong>WAF<\/strong>.<\/li>\n<\/ul>\n<h2>14. AWS Shield - DDoS Protection<\/h2>\n<ul>\n<li><strong>Shield Standard:<\/strong><ul>\n<li>Free, enabled by default for all customers.<\/li>\n<li>Protects against Layer 3 (Network) &amp; Layer 4 (Transport) attacks (SYN Floods, UDP Floods).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Shield Advanced:<\/strong><ul>\n<li>Paid (approx $3,000/month).<\/li>\n<li>Protects against sophisticated Layer 3, 4, and 7 attacks.<\/li>\n<li><strong>Benefits:<\/strong><ul>\n<li>24/7 access to DDoS Response Team (DRT).<\/li>\n<li><strong>Cost Protection:<\/strong> Reimburses bill spikes caused by DDoS (e.g., scaling up due to attack traffic).<\/li>\n<li>Includes WAF for free.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> If a company is worried about <strong>\"cost spikes\"<\/strong> due to a DDoS attack scaling up their ASG, the answer is <strong>Shield Advanced<\/strong> (Cost Protection).<\/li>\n<\/ul>\n<h2>15. AWS Firewall Manager<\/h2>\n<ul>\n<li><strong>Purpose:<\/strong> Manage security rules across <strong>all<\/strong> accounts in an AWS Organization from a central location.<\/li>\n<li><strong>Prerequisite:<\/strong> Requires AWS Organizations.<\/li>\n<li><strong>What it manages:<\/strong> WAF rules, AWS Shield Advanced, Security Groups, Network Firewall policies.<\/li>\n<li><strong>Use Case:<\/strong> \"Ensure a specific WAF rule is applied to every ALB in the organization.\"<\/li>\n<li><strong>Exam Tip:<\/strong> If the question asks for \"Centralized management of WAF rules across <strong>multiple accounts<\/strong>,\" choose <strong>Firewall Manager<\/strong>.<\/li>\n<\/ul>\n<h2>16. DDoS Protection Best Practices (Exam Scenarios)<\/h2>\n<ol>\n<li><strong>Reduce Attack Surface:<\/strong> Use <strong>CloudFront<\/strong> (caches content at edge) + <strong>WAF<\/strong> (filters bad requests) + <strong>Shield<\/strong> (DDoS mitigation).<\/li>\n<li><strong>Scale:<\/strong> Use <strong>Auto Scaling Groups<\/strong> to absorb attack traffic.<\/li>\n<li><strong>Hide Origins:<\/strong> Use Security Groups to ensure ALBs/EC2s only accept traffic from CloudFront IP ranges (Managed Prefix Lists).<\/li>\n<\/ol>\n<ul>\n<li><strong>Exam Tip:<\/strong> The \"Ultimate\" DDoS architecture almost always involves <strong>CloudFront<\/strong> sitting in front of your application (S3 or ALB).<\/li>\n<\/ul>\n<h2>17. Amazon GuardDuty<\/h2>\n<ul>\n<li><strong>Type:<\/strong> Intelligent Threat Detection.<\/li>\n<li><strong>Mechanism:<\/strong> Uses Machine Learning to analyze logs.<\/li>\n<li><strong>Data Sources:<\/strong><ol>\n<li>CloudTrail Management Events.<\/li>\n<li>VPC Flow Logs.<\/li>\n<li>DNS Logs.<\/li>\n<li>EKS Audit Logs / RDS Login events.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Example Alerts:<\/strong> \"Instance communicating with known malicious IP,\" \"Cryptocurrency mining detected,\" \"Unusual API calls.\"<\/li>\n<li><strong>Action:<\/strong> It does <em>not<\/em> block traffic automatically. It sends findings to Security Hub / EventBridge (which can trigger Lambda to remediate).<\/li>\n<li><strong>Exam Tip:<\/strong> GuardDuty detects <strong>\"Cryptocurrency Mining\"<\/strong>. Also, remember it only <em>detects<\/em> (using logs); it does not <em>block<\/em> (it's not a firewall).<\/li>\n<\/ul>\n<h2>18. Amazon Inspector<\/h2>\n<ul>\n<li><strong>Type:<\/strong> Automated Vulnerability Management.<\/li>\n<li><strong>Scope:<\/strong><ul>\n<li><strong>EC2 Instances:<\/strong> Scans for OS vulnerabilities (CVEs) and unintended network exposure. Requires SSM Agent (Systems Manager) for deep scanning.<\/li>\n<li><strong>Container Images (ECR):<\/strong> Scans images pushed to ECR for vulnerabilities.<\/li>\n<li><strong>Lambda Functions:<\/strong> Scans code for vulnerabilities.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Keyword:<\/strong> \"Assess application for vulnerabilities/exposure,\" \"CVE Check.\"<\/li>\n<li><strong>Exam Tip:<\/strong> If the question mentions <strong>\"Package Vulnerabilities\"<\/strong> or <strong>\"Common Vulnerabilities and Exposures (CVE),\"<\/strong> the answer is <strong>Inspector<\/strong>.<\/li>\n<\/ul>\n<h2>19. Amazon Macie<\/h2>\n<ul>\n<li><strong>Type:<\/strong> Data Privacy and Security.<\/li>\n<li><strong>Target:<\/strong> <strong>Amazon S3<\/strong> only.<\/li>\n<li><strong>Mechanism:<\/strong> Uses ML and pattern matching to discover <strong>Sensitive Data<\/strong> (PII - Personally Identifiable Information like Credit Cards, SSNs, Passports).<\/li>\n<li><strong>Alerts:<\/strong> Generates alerts in EventBridge when sensitive data is found in unencrypted/public buckets.<\/li>\n<li><strong>Exam Tip:<\/strong> Macie = <strong>PII<\/strong> (Personally Identifiable Information) in <strong>S3<\/strong>. It does not work for databases (DynamoDB/RDS), only S3.<\/li>\n<\/ul>", "text": "AWS Security & Encryption: SAA-C03 Exam Notes 1. AWS Security - Section Introduction Shared Responsibility Model: AWS: Security of the Cloud (Physical, Hardware, Hypervisor, Managed Services). Customer: Security in the Cloud (Data, OS patching, Firewall configuration, IAM, Encryption). Principle of Least Privilege: Always grant only the permissions required to perform a task. Exam Tip: If a question asks about \"Patching the Guest OS\" (EC2) or \"Configuring Security Groups,\" that is ALWAYS the Customer's responsibility. If it asks about \"Disposing of failed hard drives,\" that is AWS's responsibility. 2. Encryption 101 Encryption in Flight (TLS/SSL): Data is encrypted before sending and decrypted after receiving. Protects against Man-in-the-Middle (MITM) attacks. Handled by HTTPS endpoints. Encryption at Rest: Data is encrypted while stored (disk, database, S3). Implemented via keys (KMS) or client-side encryption. Exam Tip: Any scenario mentioning \"compliance requirements to encrypt data traversing the network\" refers to Encryption in Flight (HTTPS/TLS). 3. KMS (Key Management Service) Overview Function: Managed service to create and control encryption keys. Scope: Regional service. Exam Concept - Envelope Encryption: KMS Encrypt API has a limit (4KB). For large data (files), use Envelope Encryption : KMS generates a Data Key ( GenerateDataKey API). You use the Data Key to encrypt the file locally. The encrypted Data Key is stored with the file. Exam Tip: If you need to encrypt a file larger than 4KB , you cannot use the Encrypt API directly. You MUST use Envelope Encryption (GenerateDataKey). 4. Types of KMS Keys (Critical for Exam) The exam tests your ability to distinguish keys based on Management (Cost/Control) and Key Material Origin . A. By Management (Who manages it?) Feature AWS Owned Keys AWS Managed Keys Customer Managed Keys (CMK) Example S3 default encryption (SSE-S3) aws/s3 , aws/ebs Keys you create ( my-app-key ) Visibility Invisible (Not in KMS console) Visible Visible Rotation Managed by AWS Automatic every 1 year (Mandatory) Automatic every 1 year (Optional - must enable) Permissions No control No control (Policy is Read-Only) Full Control (Key Policy) Cost Free Free Paid (~$1/mo + API calls) Use Case Basic compliance Low overhead, audit needed Sharing AMIs , Cross-account access, specific rotation needs B. By Cryptography Symmetric (AES-256): Single key for encrypt/decrypt. Used by AWS services (S3, EBS). Key never leaves KMS unencrypted. Asymmetric (RSA/ECC): Public/Private pair. Used for Signing operations or encryption outside of AWS by users without AWS credentials. C. By Key Material Origin AWS Generated (Default): AWS creates the randomness. Imported (BYOK - Bring Your Own Key): You generate material on-premise and upload it. Constraint: No Automatic Rotation . You must manually re-import to rotate. Risk: You are responsible for durability; if you lose the source key, data is lost. Custom Key Store: Keys generated in CloudHSM (Single-tenant hardware) but managed via KMS. 5. KMS - Multi-Region Keys Standard KMS Keys: Are strictly regional. You cannot use a key from us-east-1 to decrypt data in eu-west-1 . Multi-Region Keys: Allow you to replicate a Primary Key into other regions as Replica Keys. Key ID: The Key ID remains the same across regions. Use Case: Disaster Recovery (DR) or Global Tables (DynamoDB) where you need to decrypt data instantly in a failover region without re-encrypting. Exam Tip: If a scenario involves \"Global Tables\" or \"Disaster Recovery\" where re-encrypting data in the new region is \"too time-consuming,\" the answer is Multi-Region Keys . 6. S3 Replication with Encryption Scenario: Replicating objects from Source Bucket (Region A) to Destination Bucket (Region B). Unencrypted objects: Replicate automatically (if enabled). Encrypted objects (SSE-KMS): By default, these are NOT replicated. You must specifically enable it in the replication config. Permissions needed: IAM Role for replication must have kms:Decrypt permission for the Source Key. IAM Role must have kms:Encrypt permission for the Destination Key. Throttling: If KMS limits are hit during replication, you may receive a ServiceUnavailable error (Request KMS quota increase). Exam Tip: If S3 Replication is failing for only encrypted objects, verify the IAM Role permissions regarding the KMS keys in both regions. 7. Encrypted AMI Sharing Process Rule: You cannot directly share an AMI encrypted with the default AWS Managed Key. Rule: You cannot share an AMI directly if it is encrypted with a custom key belonging to the sharer (the recipient can't access that key). The Workflow: Create an AMI from the EC2 instance. Copy the AMI (Image) to the same or new region. During the Copy process, check \"Re-encrypt\" and select a Customer Managed Key (CMK) that you control. Add the Target Account ID to the CMK's Key Policy . Share the AMI with the Target Account. (Optional but recommended) Target Account copies the shared AMI and re-encrypts it with their own key to become independent. Exam Tip: You can never share an AMI encrypted with the \"Default\" AWS key. You MUST copy it and re-encrypt it with a CMK (Customer Managed Key) first. 8. SSM Parameter Store Overview Service: AWS Systems Manager (SSM). Purpose: Secure, hierarchical storage for configuration data management and secrets management. Types: String, StringList, SecureString (uses KMS). Tiers: Standard: Free, 10,000 parameter limit, 4KB max size. Advanced: Paid, 100,000+ parameters, 8KB max size, supports Policies (expiration). Hierarchy: /prod/db/password or /dev/app/url . (Allows path-based IAM permissions). Exam Tip: If the question asks for \"storage of configuration strings\" or \"secrets\" without mentioning automatic rotation, choose SSM Parameter Store (it's cheaper/free). 9. AWS Secrets Manager - Overview Purpose: Newer service specifically for secrets (passwords, API keys). Key Differentiator vs. SSM Parameter Store: Automatic Rotation: Secrets Manager can automatically rotate credentials for RDS, Redshift, and DocumentDB using Lambda functions. Cross-Account Access: Easier to share secrets across accounts. Cost: More expensive than SSM Parameter Store. Exam Tip: The keyword is \"Automatic Rotation\" . If the scenario requires rotating DB passwords automatically every X days, the answer is Secrets Manager . 10. AWS Certificate Manager (ACM) Purpose: Provision, manage, and deploy SSL/TLS Certificates. Integrations: Load Balancers (ALB/NLB), CloudFront, API Gateway. Public Certificates: Free, auto-renewing (if DNS is validated via CNAME). Private Certificates: Paid (via private CA). Limitations: You cannot export public ACM certificates (private keys) to use on EC2 instances directly. You must put the EC2 behind a Load Balancer or CloudFront to use the ACM cert. Exam Tip: If you have a legacy application on EC2 that needs a certificate installed directly on the OS (not on a Load Balancer), you cannot use ACM public certs. You must buy a cert externally and import it, or use ACM Private CA. 11. AWS CloudHSM (Hardware Security Module) - Overview Definition: A dedicated physical hardware security module in the AWS cloud. Key Characteristic: Single-tenant (Dedicated) hardware. Access Control: You have full control over the hardware and user accounts. AWS has zero access (even they cannot recover lost keys). Compliance: FIPS 140-2 Level 3 (Higher security standard than KMS). Supported Interfaces: Standard industry protocols: PKCS#11 JCE (Java Cryptography Extension) Microsoft CNG (Cryptography Next Generation) Use Cases: Strict regulatory compliance requiring dedicated hardware. SSL Offloading for Web Servers (e.g., Nginx/Apache) to dedicated hardware. Oracle TDE (Transparent Data Encryption) with master keys in HSM. 12. AWS CloudHSM vs. AWS KMS (Comparison) AWS KMS: Multi-tenant managed service. AWS manages the hardware root of trust. AWS CloudHSM: Single-tenant dedicated hardware. You manage the hardware. Feature AWS KMS AWS CloudHSM Tenancy Multi-tenant (Shared Hardware) Single-tenant (Dedicated Hardware) Key Recovery AWS ensures durability. Lost forever if you lose credentials. Compliance FIPS 140-2 Level 2 (Standard). FIPS 140-2 Level 3 (High Security). Protocols AWS API / CLI / SDK Only. PKCS#11, JCE, Microsoft CNG. Management AWS manages administration. YOU manage administration. Exam Tip: Look for keywords: \"Single-tenant,\" \"Dedicated Hardware,\" \"FIPS 140-2 Level 3,\" or \"PKCS#11.\" These always point to CloudHSM . 13. Web Application Firewall (WAF) Layer: Layer 7 (Application Layer). Protects Against: Common web exploits (SQL Injection, Cross-Site Scripting (XSS), Bad bots). Deployable On: Application Load Balancer (ALB). API Gateway. CloudFront. AppSync. Components: Web ACLs (Access Control Lists) -> Rules (IP Sets, Geo-Match, String Match). Exam Tip: If you need to block an attack containing SQL Injection or block traffic from a specific country , use WAF . 14. AWS Shield - DDoS Protection Shield Standard: Free, enabled by default for all customers. Protects against Layer 3 (Network) & Layer 4 (Transport) attacks (SYN Floods, UDP Floods). Shield Advanced: Paid (approx $3,000/month). Protects against sophisticated Layer 3, 4, and 7 attacks. Benefits: 24/7 access to DDoS Response Team (DRT). Cost Protection: Reimburses bill spikes caused by DDoS (e.g., scaling up due to attack traffic). Includes WAF for free. Exam Tip: If a company is worried about \"cost spikes\" due to a DDoS attack scaling up their ASG, the answer is Shield Advanced (Cost Protection). 15. AWS Firewall Manager Purpose: Manage security rules across all accounts in an AWS Organization from a central location. Prerequisite: Requires AWS Organizations. What it manages: WAF rules, AWS Shield Advanced, Security Groups, Network Firewall policies. Use Case: \"Ensure a specific WAF rule is applied to every ALB in the organization.\" Exam Tip: If the question asks for \"Centralized management of WAF rules across multiple accounts ,\" choose Firewall Manager . 16. DDoS Protection Best Practices (Exam Scenarios) Reduce Attack Surface: Use CloudFront (caches content at edge) + WAF (filters bad requests) + Shield (DDoS mitigation). Scale: Use Auto Scaling Groups to absorb attack traffic. Hide Origins: Use Security Groups to ensure ALBs/EC2s only accept traffic from CloudFront IP ranges (Managed Prefix Lists). Exam Tip: The \"Ultimate\" DDoS architecture almost always involves CloudFront sitting in front of your application (S3 or ALB). 17. Amazon GuardDuty Type: Intelligent Threat Detection. Mechanism: Uses Machine Learning to analyze logs. Data Sources: CloudTrail Management Events. VPC Flow Logs. DNS Logs. EKS Audit Logs / RDS Login events. Example Alerts: \"Instance communicating with known malicious IP,\" \"Cryptocurrency mining detected,\" \"Unusual API calls.\" Action: It does not block traffic automatically. It sends findings to Security Hub / EventBridge (which can trigger Lambda to remediate). Exam Tip: GuardDuty detects \"Cryptocurrency Mining\" . Also, remember it only detects (using logs); it does not block (it's not a firewall). 18. Amazon Inspector Type: Automated Vulnerability Management. Scope: EC2 Instances: Scans for OS vulnerabilities (CVEs) and unintended network exposure. Requires SSM Agent (Systems Manager) for deep scanning. Container Images (ECR): Scans images pushed to ECR for vulnerabilities. Lambda Functions: Scans code for vulnerabilities. Keyword: \"Assess application for vulnerabilities/exposure,\" \"CVE Check.\" Exam Tip: If the question mentions \"Package Vulnerabilities\" or \"Common Vulnerabilities and Exposures (CVE),\" the answer is Inspector . 19. Amazon Macie Type: Data Privacy and Security. Target: Amazon S3 only. Mechanism: Uses ML and pattern matching to discover Sensitive Data (PII - Personally Identifiable Information like Credit Cards, SSNs, Passports). Alerts: Generates alerts in EventBridge when sensitive data is found in unencrypted/public buckets. Exam Tip: Macie = PII (Personally Identifiable Information) in S3 . It does not work for databases (DynamoDB/RDS), only S3."}, {"id": 21, "num": "21", "title": "Networking - VPC", "html": "<h1>AWS SAA-C03 Exam Notes: Networking &amp; VPC<\/h1>\n<h2>1. Section Introduction<\/h2>\n<p>Networking is a significant portion of the Solutions Architect Associate exam. This section focuses on the Virtual Private Cloud (VPC), which acts as your isolated network environment within the AWS Cloud. Understanding how to secure, route, and connect VPCs is critical for passing.<\/p>\n<ul>\n<li><strong>Exam Tip:<\/strong> Networking and Security combined often make up ~50% of the exam scenarios. Master VPC fundamentals early.<\/li>\n<\/ul>\n<h2>2. CIDR, Private vs Public IP<\/h2>\n<p><strong>CIDR (Classless Inter-Domain Routing):<\/strong><\/p
