>\n<ul>\n<li>Used to define IP ranges (e.g., <code>10.0.0.0/16<\/code>).<\/li>\n<li><strong>Slash notation (Subnet Mask):<\/strong><ul>\n<li><code>/32<\/code> = 1 IP address.<\/li>\n<li><code>/24<\/code> = 256 IP addresses.<\/li>\n<li><code>/16<\/code> = 65,536 IP addresses.<\/li>\n<\/ul>\n<\/li>\n<li><strong>VPC CIDR:<\/strong> Minimum size <code>/28<\/code> (16 IPs), Maximum size <code>/16<\/code> (65,536 IPs).<\/li>\n<\/ul>\n<p><strong>Private vs Public IPs (RFC 1918):<\/strong><\/p>\n<ul>\n<li><strong>Private IPs:<\/strong> Only accessible within the network. Not routable on the internet.<ul>\n<li><code>10.0.0.0<\/code> - <code>10.255.255.255<\/code> (Class A)<\/li>\n<li><code>172.16.0.0<\/code> - <code>172.31.255.255<\/code> (Class B)<\/li>\n<li><code>192.168.0.0<\/code> - <code>192.168.255.255<\/code> (Class C)<\/li>\n<\/ul>\n<\/li>\n<li><strong>Public IPs:<\/strong> Accessible from the internet. Unique across the web.<\/li>\n<li><strong>Exam Tip:<\/strong> Memorize the RFC 1918 private ranges. If you see a question with a public IP (e.g., <code>54.x.x.x<\/code>) on a private database, it's a security flag.<\/li>\n<\/ul>\n<h2>3. Default VPC Overview<\/h2>\n<p>Every new AWS account comes with a Default VPC in every region.<\/p>\n<ul>\n<li><strong>Attributes:<\/strong><ul>\n<li>Has a CIDR block of <code>172.31.0.0/16<\/code>.<\/li>\n<li>Has a Public Subnet in each Availability Zone (AZ).<\/li>\n<li>Has an Internet Gateway attached.<\/li>\n<li>Default Route Table routes <code>0.0.0.0/0<\/code> to the Internet Gateway.<\/li>\n<li><strong>Use Case:<\/strong> Getting started quickly.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> For production scenarios or \"secure architecture\" questions, the answer is usually to create a <strong>custom VPC<\/strong>, not use the Default VPC.<\/li>\n<\/ul>\n<h2>4. VPC Overview<\/h2>\n<ul>\n<li><strong>VPC (Virtual Private Cloud):<\/strong> logically isolated portion of the AWS cloud.<\/li>\n<li><strong>Scope:<\/strong> Region-bound (VPCs cannot span regions).<\/li>\n<li><strong>Limit:<\/strong> Soft limit of 5 VPCs per Region per account.<\/li>\n<li><strong>Tenancy:<\/strong><ul>\n<li><strong>Default:<\/strong> Shared hardware.<\/li>\n<li><strong>Dedicated:<\/strong> Dedicated hardware for your VPC (expensive).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> Remember that VPCs belong to a specific <strong>Region<\/strong>, while Subnets belong to a specific <strong>Availability Zone<\/strong>.<\/li>\n<\/ul>\n<h2>5. Subnet Overview<\/h2>\n<ul>\n<li><strong>Scope:<\/strong> Availability Zone (AZ) bound (Subnets cannot span AZs).<\/li>\n<li><strong>AWS Reserved IPs:<\/strong> AWS reserves the first 4 and the last 1 IP in <em>every<\/em> subnet CIDR block (5 total).<ul>\n<li>Example: <code>10.0.0.0<\/code> (Network), <code>10.0.0.1<\/code> (Router), <code>10.0.0.2<\/code> (DNS), <code>10.0.0.3<\/code> (Reserved), <code>10.0.0.255<\/code> (Broadcast).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Public Subnet:<\/strong> Has a Route Table entry pointing <code>0.0.0.0/0<\/code> to an Internet Gateway (IGW).<\/li>\n<li><strong>Private Subnet:<\/strong> Does <em>not<\/em> have a route to an IGW.<\/li>\n<li><strong>Exam Tip:<\/strong> If a question asks how many usable IPs are in a <code>/28<\/code> subnet, the answer is $16 - 5 = 11$. Always subtract 5.<\/li>\n<\/ul>\n<h2>6. Internet Gateways (IGW) &amp; Route Tables<\/h2>\n<p><strong>Internet Gateway (IGW):<\/strong><\/p>\n<ul>\n<li>Enables access to the internet for resources in a VPC.<\/li>\n<li>Horizontally scaled, redundant, and highly available (no bottleneck).<\/li>\n<li><strong>One<\/strong> IGW per VPC.<\/li>\n<\/ul>\n<p><strong>Route Tables (RT):<\/strong><\/p>\n<ul>\n<li>Contains rules (routes) to determine where network traffic is directed.<\/li>\n<li><strong>Main Route Table:<\/strong> Automatically created.<\/li>\n<li><strong>Custom Route Table:<\/strong> Can be created and associated with specific subnets.<\/li>\n<li><strong>Rule:<\/strong> The most specific route matches (Longest Prefix Match).<\/li>\n<li><strong>Exam Tip:<\/strong> You cannot attach more than one IGW to a VPC. If you need high availability for internet access, the IGW itself handles it internally; you don't need two.<\/li>\n<\/ul>\n<h2>7. Bastion Hosts (Jump Boxes)<\/h2>\n<ul>\n<li>An EC2 instance in a <strong>Public Subnet<\/strong> used to SSH/RDP into private instances in a Private Subnet.<\/li>\n<li><strong>Security:<\/strong><ul>\n<li>Security Group should only allow SSH (port 22) from your corporate/home IP (not <code>0.0.0.0/0<\/code>).<\/li>\n<li>Use Key Pairs securely.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> If a scenario mentions \"securely managing instances in a private subnet\" and Session Manager isn't an option, select Bastion Host. Ensure the Security Group restricts ingress to a specific IP range (CIDR).<\/li>\n<\/ul>\n<h2>8. NAT Instances (Legacy)<\/h2>\n<ul>\n<li><strong>Concept:<\/strong> An EC2 instance launched in a public subnet to allow private instances to talk to the internet (outbound only).<\/li>\n<li><strong>Configuration:<\/strong> Must disable <strong>Source/Destination Check<\/strong> on the instance.<\/li>\n<li><strong>Downsides:<\/strong><ul>\n<li>Not highly available out of the box.<\/li>\n<li>Bandwidth limited by instance type.<\/li>\n<li>User creates and manages security patches.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> The critical step for NAT Instances is disabling the <strong>Source/Destination Check<\/strong>. Without this, it won't route traffic.<\/li>\n<\/ul>\n<h2>9. NAT Gateways<\/h2>\n<ul>\n<li><strong>Concept:<\/strong> AWS managed service for NAT (Network Address Translation). Allows outbound internet access for private subnets, but prevents inbound initiation.<\/li>\n<li><strong>Scope:<\/strong> Created in a specific AZ.<\/li>\n<li><strong>Requirement:<\/strong> Must be launched in a <strong>Public Subnet<\/strong> and requires an <strong>Elastic IP (EIP)<\/strong>.<\/li>\n<li><strong>High Availability:<\/strong> For HA, create one NAT Gateway in each AZ.<\/li>\n<li><strong>Bandwidth:<\/strong> Scales automatically up to 45 Gbps.<\/li>\n<li><strong>Cost:<\/strong> Hourly charge + data processing charge.<\/li>\n<li><strong>Exam Tip:<\/strong> If the question asks for \"High Availability\" for NAT, you must deploy one NAT Gateway in <strong>each<\/strong> Availability Zone. One NAT Gateway does not span multiple AZs.<\/li>\n<\/ul>\n<h2>10. NACL &amp; Security Groups (Crucial Exam Topic)<\/h2>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th>Security Group (SG)<\/th>\n<th>Network ACL (NACL)<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Level<\/strong><\/td>\n<td>Instance Level<\/td>\n<td>Subnet Level<\/td>\n<\/tr>\n<tr>\n<td><strong>State<\/strong><\/td>\n<td><strong>Stateful:<\/strong> If you allow traffic IN, the return traffic is automatically allowed OUT.<\/td>\n<td><strong>Stateless:<\/strong> You must explicitly allow traffic IN and OUT.<\/td>\n<\/tr>\n<tr>\n<td><strong>Rules<\/strong><\/td>\n<td>Allow rules only. (Implicit deny at end).<\/td>\n<td>Allow and Deny rules.<\/td>\n<\/tr>\n<tr>\n<td><strong>Order<\/strong><\/td>\n<td>All rules evaluated before decision.<\/td>\n<td>Processed in number order (lowest first).<\/td>\n<\/tr>\n<tr>\n<td><strong>Scope<\/strong><\/td>\n<td>Applied to specific ENIs/Instances.<\/td>\n<td>Applied to all instances in the Subnet.<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<ul>\n<li><strong>Ephemeral Ports:<\/strong> For NACLs, remember to allow return traffic on ephemeral ports (1024–65535).<\/li>\n<li><strong>Exam Tip:<\/strong> If you need to <strong>block<\/strong> a specific bad IP address, you MUST use a <strong>NACL<\/strong>. Security Groups cannot explicitly deny traffic (they only \"Allow\").<\/li>\n<\/ul>\n<h2>11. VPC Peering<\/h2>\n<ul>\n<li>Connects two VPCs using AWS private network.<\/li>\n<li><strong>Function:<\/strong> Instances behave as if they are on the same network.<\/li>\n<li><strong>Rules:<\/strong><ul>\n<li>No overlapping CIDR blocks.<\/li>\n<li><strong>Non-Transitive:<\/strong> If A peers with B, and B peers with C, A cannot talk to C. (A needs to peer with C directly).<\/li>\n<li>Works across Regions and Accounts.<\/li>\n<li>You must update Route Tables in both VPCs.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> Look out for \"Transitive Peering\" traps. A cannot talk to C through B. A must peer directly with C.<\/li>\n<\/ul>\n<h2>12. VPC Endpoints (PrivateLink)<\/h2>\n<p>Allows you to connect to AWS services using a private network (no Internet Gateway required).<\/p>\n<ol>\n<li><strong>Interface Endpoints:<\/strong><ul>\n<li>Uses <strong>ENI (Elastic Network Interface)<\/strong> with a private IP.<\/li>\n<li>Powered by PrivateLink.<\/li>\n<li>Supports most AWS services (CloudWatch, SageMaker, etc.).<\/li>\n<li>Costs money ($/hour + data).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Gateway Endpoints:<\/strong><ul>\n<li>Uses a target in the <strong>Route Table<\/strong>.<\/li>\n<li>Supports only <strong>S3<\/strong> and <strong>DynamoDB<\/strong>.<\/li>\n<li><strong>Free<\/strong> of charge.<\/li>\n<\/ul>\n<\/li>\n<\/ol>\n<ul>\n<li><strong>Exam Tip:<\/strong> If the question mentions \"S3\" or \"DynamoDB\" specifically, look for <strong>Gateway Endpoint<\/strong>. For almost any other AWS service (like Kinesis, CloudWatch), look for <strong>Interface Endpoint<\/strong>.<\/li>\n<\/ul>\n<h2>13. VPC Flow Logs<\/h2>\n<ul>\n<li>Captures information about the IP traffic going to and from network interfaces.<\/li>\n<li><strong>Levels:<\/strong> VPC, Subnet, or ENI level.<\/li>\n<li><strong>Destinations:<\/strong> S3, CloudWatch Logs, or Kinesis Data Firehose.<\/li>\n<li><strong>Usage:<\/strong> Troubleshooting connectivity, security monitoring.<\/li>\n<li><strong>Note:<\/strong> It captures metadata (Source IP, Dest IP, Port, Action), not the actual content of the packet.<\/li>\n<li><strong>Exam Tip:<\/strong> Flow Logs do <strong>not<\/strong> capture the packet content (payload). If the question asks to inspect the <em>content<\/em> (e.g., for malware signature), Flow Logs is the wrong answer (use Traffic Mirroring or Network Firewall).<\/li>\n<\/ul>\n<h2>14. Site-to-Site VPN, Virtual Private Gateway &amp; Customer Gateway<\/h2>\n<p>Connects On-Premises data center to AWS VPC over the <strong>public internet<\/strong>.<\/p>\n<ul>\n<li><strong>Virtual Private Gateway (VGW):<\/strong> The VPN concentrator on the <strong>AWS side<\/strong>.<\/li>\n<li><strong>Customer Gateway (CGW):<\/strong> Physical device or software application on the <strong>Customer (On-prem) side<\/strong>.<\/li>\n<li><strong>Site-to-Site VPN:<\/strong> The IPsec encrypted tunnel connecting VGW and CGW.<\/li>\n<li><strong>Setup:<\/strong> Quick to set up, but latency is dependent on internet conditions.<\/li>\n<li><strong>Exam Tip:<\/strong> The VGW is attached to the VPC. The CGW represents the physical device at the customer's office. Don't mix them up.<\/li>\n<\/ul>\n<h2>15. AWS VPN CloudHub<\/h2>\n<ul>\n<li><strong>Concept:<\/strong> Allows you to securely communicate from one remote site to another using the AWS VPN infrastructure.<\/li>\n<li><strong>Architecture:<\/strong> Operates on a <strong>Hub-and-Spoke<\/strong> model where the AWS VPC (specifically the Virtual Private Gateway) acts as the Hub.<\/li>\n<li><strong>Requirement:<\/strong> Multiple Customer Gateways (one for each remote site) must connect to the <em>same<\/em> Virtual Private Gateway (VGW).<\/li>\n<li><strong>Routing:<\/strong> Uses <strong>BGP<\/strong> (Border Gateway Protocol). Each Customer Gateway must use a unique BGP Autonomous System Number (ASN).<\/li>\n<li><strong>Cost:<\/strong> Low cost; leverages the public internet.<\/li>\n<li><strong>Exam Tip:<\/strong> If a scenario describes multiple branch offices that need to talk to each other AND to AWS, and asks for a low-cost solution (avoiding MPLS/Direct Connect), choose <strong>VPN CloudHub<\/strong>.<\/li>\n<\/ul>\n<h2>16. Direct Connect (DX) &amp; Direct Connect Gateway<\/h2>\n<p>Connects On-Premises to AWS via a <strong>dedicated private physical fiber connection<\/strong>.<\/p>\n<ul>\n<li><strong>Benefits:<\/strong> Consistent network performance, high bandwidth, lower data egress rates.<\/li>\n<li><strong>Security:<\/strong> Traffic is private but <strong>not encrypted<\/strong> by default.<\/li>\n<li><strong>Direct Connect Gateway:<\/strong> Allows a Direct Connect connection to interface with VPCs in <strong>multiple regions<\/strong>.<\/li>\n<li><strong>Setup:<\/strong> Takes weeks/months (physical cabling required).<\/li>\n<li><strong>Exam Tip:<\/strong> Direct Connect is <strong>not<\/strong> encrypted by default. If the requirements are \"Dedicated connection\" AND \"Encryption\", you need DX + VPN.<\/li>\n<\/ul>\n<h2>17. Direct Connect + Site-to-Site VPN<\/h2>\n<ul>\n<li>If you need a <strong>dedicated connection<\/strong> (Direct Connect) AND <strong>encryption<\/strong> (VPN).<\/li>\n<li>You establish a public Virtual Interface (VIF) on Direct Connect, then create an IPsec VPN tunnel over that connection.<\/li>\n<li>Result: Secure, encrypted, dedicated, high-bandwidth connection.<\/li>\n<li><strong>Exam Tip:<\/strong> This is the standard answer for \"High security compliance (encryption)\" + \"High bandwidth/reliability\".<\/li>\n<\/ul>\n<h2>18. Transit Gateway (TGW)<\/h2>\n<ul>\n<li><strong>Hub-and-Spoke model:<\/strong> Connects thousands of VPCs and on-prem networks.<\/li>\n<li><strong>Transitive Routing:<\/strong> Unlike peering, TGW allows transitive routing (A ↔ TGW ↔ B).<\/li>\n<li><strong>Cross-Region:<\/strong> Can peer TGWs across regions.<\/li>\n<li><strong>Complexity:<\/strong> Reduces complexity of mesh peering networks.<\/li>\n<li><strong>Multicast:<\/strong> TGW is the only service that supports IP Multicast.<\/li>\n<li><strong>Exam Tip:<\/strong> If the question mentions \"simplifying network topology\" or connecting \"hundreds/thousands of VPCs,\" the answer is <strong>Transit Gateway<\/strong>.<\/li>\n<\/ul>\n<h2>19. VPC Traffic Mirroring<\/h2>\n<ul>\n<li>Allows you to capture and inspect network traffic.<\/li>\n<li><strong>Mechanism:<\/strong> Copies traffic from an elastic network interface (Source) and sends it to a target (Target).<\/li>\n<li><strong>Target:<\/strong> Network Load Balancer (NLB) or another ENI.<\/li>\n<li><strong>Use Case:<\/strong> Intrusion Detection Systems (IDS), packet inspection, compliance monitoring.<\/li>\n<li><strong>Exam Tip:<\/strong> This is used for \"Deep Packet Inspection\" or analyzing actual payloads for security threats, which Flow Logs cannot do.<\/li>\n<\/ul>\n<h2>20. IPv6 for VPC<\/h2>\n<ul>\n<li>VPCs can operate in Dual Stack mode (IPv4 and IPv6).<\/li>\n<li><strong>Addressing:<\/strong> IPv6 addresses are globally unique (Public). There are no private IPv6 ranges in AWS VPC context.<\/li>\n<li><strong>OSI:<\/strong> Every instance gets a global Unicast IPv6 address.<\/li>\n<li><strong>Exam Tip:<\/strong> You cannot disable IPv4 for a VPC (yet); you enable IPv6 <em>in addition<\/em> to IPv4 (Dual Stack).<\/li>\n<\/ul>\n<h2>21. Egress Only Internet Gateway<\/h2>\n<ul>\n<li><strong>IPv6 Only.<\/strong><\/li>\n<li>Similar to a NAT Gateway but for IPv6.<\/li>\n<li>Allows instances to initiate outbound connections to the internet over IPv6 but <strong>prevents inbound<\/strong> connections.<\/li>\n<li><strong>Update Route Table:<\/strong> Route <code>::/0<\/code> to the Egress-Only Internet Gateway.<\/li>\n<li><strong>Exam Tip:<\/strong> Egress Only Internet Gateway is <strong>exclusive to IPv6<\/strong>. Do not pick it for IPv4 scenarios.<\/li>\n<\/ul>\n<h2>22. VPC Section Summary<\/h2>\n<ul>\n<li><strong>Security:<\/strong> Use NACLs for stateless subnet blocking, SGs for stateful instance allowance.<\/li>\n<li><strong>Connectivity:<\/strong> Peering for simple 1:1, Transit Gateway for complex Many:Many.<\/li>\n<li><strong>Hybrid:<\/strong> VPN for quick/encrypted, Direct Connect for reliable/high-throughput.<\/li>\n<li><strong>Access:<\/strong> Bastion for SSH, Endpoints for internal AWS service access.<\/li>\n<li><strong>Outbound:<\/strong> NAT Gateway (IPv4) / Egress-Only IGW (IPv6).<\/li>\n<li><strong>Exam Tip:<\/strong> Always verify if the traffic needs to be encrypted. DX is private but unencrypted. VPN is public but encrypted.<\/li>\n<\/ul>\n<h2>23. Networking Costs in AWS<\/h2>\n<ul>\n<li><strong>Inbound Data:<\/strong> Generally free.<\/li>\n<li><strong>Outbound Data:<\/strong> Costs money.<\/li>\n<li><strong>Private IP communication:<\/strong> Generally cheaper than Public IP.<\/li>\n<li><strong>NAT Gateway:<\/strong> Hourly charge + Per GB data processing fee (can get expensive).<\/li>\n<li><strong>VPC Endpoints:<\/strong> Interface endpoints cost hourly; Gateway endpoints are free.<\/li>\n<li><strong>Data Transfer between AZs:<\/strong> Costs money (if using public IPs or peering).<\/li>\n<li><strong>Exam Tip:<\/strong> Using Private IPs to transfer data between instances in the same region is usually the most cost-effective method.<\/li>\n<\/ul>\n<h2>24. AWS Network Firewall<\/h2>\n<ul>\n<li>Managed, stateful, network firewall and intrusion detection/prevention service (IDS/IPS).<\/li>\n<li><strong>OSI Layer:<\/strong> Protects Layers 3-7.<\/li>\n<li><strong>Capabilities:<\/strong><ul>\n<li>Web filtering (domain names).<\/li>\n<li>Inspection of VPC traffic.<\/li>\n<li>Compatible with \"Suricata\" rules.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Deployment:<\/strong> Deployed using a \"Firewall Subnet\" in the VPC. Route tables must be updated to send traffic through the firewall endpoint.<\/li>\n<li><strong>Exam Tip:<\/strong> If a question asks for \"Domain Name filtering\" (e.g., block <code>facebook.com<\/code> for corporate instances) across the entire VPC, AWS Network Firewall is a strong candidate (DNS Firewall is another, but Network Firewall is broader).<\/li>\n<\/ul>", "text": "AWS SAA-C03 Exam Notes: Networking & VPC 1. Section Introduction Networking is a significant portion of the Solutions Architect Associate exam. This section focuses on the Virtual Private Cloud (VPC), which acts as your isolated network environment within the AWS Cloud. Understanding how to secure, route, and connect VPCs is critical for passing. Exam Tip: Networking and Security combined often make up ~50% of the exam scenarios. Master VPC fundamentals early. 2. CIDR, Private vs Public IP CIDR (Classless Inter-Domain Routing): Used to define IP ranges (e.g., 10.0.0.0/16 ). Slash notation (Subnet Mask): /32 = 1 IP address. /24 = 256 IP addresses. /16 = 65,536 IP addresses. VPC CIDR: Minimum size /28 (16 IPs), Maximum size /16 (65,536 IPs). Private vs Public IPs (RFC 1918): Private IPs: Only accessible within the network. Not routable on the internet. 10.0.0.0 - 10.255.255.255 (Class A) 172.16.0.0 - 172.31.255.255 (Class B) 192.168.0.0 - 192.168.255.255 (Class C) Public IPs: Accessible from the internet. Unique across the web. Exam Tip: Memorize the RFC 1918 private ranges. If you see a question with a public IP (e.g., 54.x.x.x ) on a private database, it's a security flag. 3. Default VPC Overview Every new AWS account comes with a Default VPC in every region. Attributes: Has a CIDR block of 172.31.0.0/16 . Has a Public Subnet in each Availability Zone (AZ). Has an Internet Gateway attached. Default Route Table routes 0.0.0.0/0 to the Internet Gateway. Use Case: Getting started quickly. Exam Tip: For production scenarios or \"secure architecture\" questions, the answer is usually to create a custom VPC , not use the Default VPC. 4. VPC Overview VPC (Virtual Private Cloud): logically isolated portion of the AWS cloud. Scope: Region-bound (VPCs cannot span regions). Limit: Soft limit of 5 VPCs per Region per account. Tenancy: Default: Shared hardware. Dedicated: Dedicated hardware for your VPC (expensive). Exam Tip: Remember that VPCs belong to a specific Region , while Subnets belong to a specific Availability Zone . 5. Subnet Overview Scope: Availability Zone (AZ) bound (Subnets cannot span AZs). AWS Reserved IPs: AWS reserves the first 4 and the last 1 IP in every subnet CIDR block (5 total). Example: 10.0.0.0 (Network), 10.0.0.1 (Router), 10.0.0.2 (DNS), 10.0.0.3 (Reserved), 10.0.0.255 (Broadcast). Public Subnet: Has a Route Table entry pointing 0.0.0.0/0 to an Internet Gateway (IGW). Private Subnet: Does not have a route to an IGW. Exam Tip: If a question asks how many usable IPs are in a /28 subnet, the answer is $16 - 5 = 11$. Always subtract 5. 6. Internet Gateways (IGW) & Route Tables Internet Gateway (IGW): Enables access to the internet for resources in a VPC. Horizontally scaled, redundant, and highly available (no bottleneck). One IGW per VPC. Route Tables (RT): Contains rules (routes) to determine where network traffic is directed. Main Route Table: Automatically created. Custom Route Table: Can be created and associated with specific subnets. Rule: The most specific route matches (Longest Prefix Match). Exam Tip: You cannot attach more than one IGW to a VPC. If you need high availability for internet access, the IGW itself handles it internally; you don't need two. 7. Bastion Hosts (Jump Boxes) An EC2 instance in a Public Subnet used to SSH/RDP into private instances in a Private Subnet. Security: Security Group should only allow SSH (port 22) from your corporate/home IP (not 0.0.0.0/0 ). Use Key Pairs securely. Exam Tip: If a scenario mentions \"securely managing instances in a private subnet\" and Session Manager isn't an option, select Bastion Host. Ensure the Security Group restricts ingress to a specific IP range (CIDR). 8. NAT Instances (Legacy) Concept: An EC2 instance launched in a public subnet to allow private instances to talk to the internet (outbound only). Configuration: Must disable Source/Destination Check on the instance. Downsides: Not highly available out of the box. Bandwidth limited by instance type. User creates and manages security patches. Exam Tip: The critical step for NAT Instances is disabling the Source/Destination Check . Without this, it won't route traffic. 9. NAT Gateways Concept: AWS managed service for NAT (Network Address Translation). Allows outbound internet access for private subnets, but prevents inbound initiation. Scope: Created in a specific AZ. Requirement: Must be launched in a Public Subnet and requires an Elastic IP (EIP) . High Availability: For HA, create one NAT Gateway in each AZ. Bandwidth: Scales automatically up to 45 Gbps. Cost: Hourly charge + data processing charge. Exam Tip: If the question asks for \"High Availability\" for NAT, you must deploy one NAT Gateway in each Availability Zone. One NAT Gateway does not span multiple AZs. 10. NACL & Security Groups (Crucial Exam Topic) Feature Security Group (SG) Network ACL (NACL) Level Instance Level Subnet Level State Stateful: If you allow traffic IN, the return traffic is automatically allowed OUT. Stateless: You must explicitly allow traffic IN and OUT. Rules Allow rules only. (Implicit deny at end). Allow and Deny rules. Order All rules evaluated before decision. Processed in number order (lowest first). Scope Applied to specific ENIs/Instances. Applied to all instances in the Subnet. Ephemeral Ports: For NACLs, remember to allow return traffic on ephemeral ports (1024–65535). Exam Tip: If you need to block a specific bad IP address, you MUST use a NACL . Security Groups cannot explicitly deny traffic (they only \"Allow\"). 11. VPC Peering Connects two VPCs using AWS private network. Function: Instances behave as if they are on the same network. Rules: No overlapping CIDR blocks. Non-Transitive: If A peers with B, and B peers with C, A cannot talk to C. (A needs to peer with C directly). Works across Regions and Accounts. You must update Route Tables in both VPCs. Exam Tip: Look out for \"Transitive Peering\" traps. A cannot talk to C through B. A must peer directly with C. 12. VPC Endpoints (PrivateLink) Allows you to connect to AWS services using a private network (no Internet Gateway required). Interface Endpoints: Uses ENI (Elastic Network Interface) with a private IP. Powered by PrivateLink. Supports most AWS services (CloudWatch, SageMaker, etc.). Costs money ($/hour + data). Gateway Endpoints: Uses a target in the Route Table . Supports only S3 and DynamoDB . Free of charge. Exam Tip: If the question mentions \"S3\" or \"DynamoDB\" specifically, look for Gateway Endpoint . For almost any other AWS service (like Kinesis, CloudWatch), look for Interface Endpoint . 13. VPC Flow Logs Captures information about the IP traffic going to and from network interfaces. Levels: VPC, Subnet, or ENI level. Destinations: S3, CloudWatch Logs, or Kinesis Data Firehose. Usage: Troubleshooting connectivity, security monitoring. Note: It captures metadata (Source IP, Dest IP, Port, Action), not the actual content of the packet. Exam Tip: Flow Logs do not capture the packet content (payload). If the question asks to inspect the content (e.g., for malware signature), Flow Logs is the wrong answer (use Traffic Mirroring or Network Firewall). 14. Site-to-Site VPN, Virtual Private Gateway & Customer Gateway Connects On-Premises data center to AWS VPC over the public internet . Virtual Private Gateway (VGW): The VPN concentrator on the AWS side . Customer Gateway (CGW): Physical device or software application on the Customer (On-prem) side . Site-to-Site VPN: The IPsec encrypted tunnel connecting VGW and CGW. Setup: Quick to set up, but latency is dependent on internet conditions. Exam Tip: The VGW is attached to the VPC. The CGW represents the physical device at the customer's office. Don't mix them up. 15. AWS VPN CloudHub Concept: Allows you to securely communicate from one remote site to another using the AWS VPN infrastructure. Architecture: Operates on a Hub-and-Spoke model where the AWS VPC (specifically the Virtual Private Gateway) acts as the Hub. Requirement: Multiple Customer Gateways (one for each remote site) must connect to the same Virtual Private Gateway (VGW). Routing: Uses BGP (Border Gateway Protocol). Each Customer Gateway must use a unique BGP Autonomous System Number (ASN). Cost: Low cost; leverages the public internet. Exam Tip: If a scenario describes multiple branch offices that need to talk to each other AND to AWS, and asks for a low-cost solution (avoiding MPLS/Direct Connect), choose VPN CloudHub . 16. Direct Connect (DX) & Direct Connect Gateway Connects On-Premises to AWS via a dedicated private physical fiber connection . Benefits: Consistent network performance, high bandwidth, lower data egress rates. Security: Traffic is private but not encrypted by default. Direct Connect Gateway: Allows a Direct Connect connection to interface with VPCs in multiple regions . Setup: Takes weeks/months (physical cabling required). Exam Tip: Direct Connect is not encrypted by default. If the requirements are \"Dedicated connection\" AND \"Encryption\", you need DX + VPN. 17. Direct Connect + Site-to-Site VPN If you need a dedicated connection (Direct Connect) AND encryption (VPN). You establish a public Virtual Interface (VIF) on Direct Connect, then create an IPsec VPN tunnel over that connection. Result: Secure, encrypted, dedicated, high-bandwidth connection. Exam Tip: This is the standard answer for \"High security compliance (encryption)\" + \"High bandwidth/reliability\". 18. Transit Gateway (TGW) Hub-and-Spoke model: Connects thousands of VPCs and on-prem networks. Transitive Routing: Unlike peering, TGW allows transitive routing (A ↔ TGW ↔ B). Cross-Region: Can peer TGWs across regions. Complexity: Reduces complexity of mesh peering networks. Multicast: TGW is the only service that supports IP Multicast. Exam Tip: If the question mentions \"simplifying network topology\" or connecting \"hundreds/thousands of VPCs,\" the answer is Transit Gateway . 19. VPC Traffic Mirroring Allows you to capture and inspect network traffic. Mechanism: Copies traffic from an elastic network interface (Source) and sends it to a target (Target). Target: Network Load Balancer (NLB) or another ENI. Use Case: Intrusion Detection Systems (IDS), packet inspection, compliance monitoring. Exam Tip: This is used for \"Deep Packet Inspection\" or analyzing actual payloads for security threats, which Flow Logs cannot do. 20. IPv6 for VPC VPCs can operate in Dual Stack mode (IPv4 and IPv6). Addressing: IPv6 addresses are globally unique (Public). There are no private IPv6 ranges in AWS VPC context. OSI: Every instance gets a global Unicast IPv6 address. Exam Tip: You cannot disable IPv4 for a VPC (yet); you enable IPv6 in addition to IPv4 (Dual Stack). 21. Egress Only Internet Gateway IPv6 Only. Similar to a NAT Gateway but for IPv6. Allows instances to initiate outbound connections to the internet over IPv6 but prevents inbound connections. Update Route Table: Route ::/0 to the Egress-Only Internet Gateway. Exam Tip: Egress Only Internet Gateway is exclusive to IPv6 . Do not pick it for IPv4 scenarios. 22. VPC Section Summary Security: Use NACLs for stateless subnet blocking, SGs for stateful instance allowance. Connectivity: Peering for simple 1:1, Transit Gateway for complex Many:Many. Hybrid: VPN for quick/encrypted, Direct Connect for reliable/high-throughput. Access: Bastion for SSH, Endpoints for internal AWS service access. Outbound: NAT Gateway (IPv4) / Egress-Only IGW (IPv6). Exam Tip: Always verify if the traffic needs to be encrypted. DX is private but unencrypted. VPN is public but encrypted. 23. Networking Costs in AWS Inbound Data: Generally free. Outbound Data: Costs money. Private IP communication: Generally cheaper than Public IP. NAT Gateway: Hourly charge + Per GB data processing fee (can get expensive). VPC Endpoints: Interface endpoints cost hourly; Gateway endpoints are free. Data Transfer between AZs: Costs money (if using public IPs or peering). Exam Tip: Using Private IPs to transfer data between instances in the same region is usually the most cost-effective method. 24. AWS Network Firewall Managed, stateful, network firewall and intrusion detection/prevention service (IDS/IPS). OSI Layer: Protects Layers 3-7. Capabilities: Web filtering (domain names). Inspection of VPC traffic. Compatible with \"Suricata\" rules. Deployment: Deployed using a \"Firewall Subnet\" in the VPC. Route tables must be updated to send traffic through the firewall endpoint. Exam Tip: If a question asks for \"Domain Name filtering\" (e.g., block facebook.com for corporate instances) across the entire VPC, AWS Network Firewall is a strong candidate (DNS Firewall is another, but Network Firewall is broader)."}, {"id": 22, "num": "22", "title": "AWS Disaster Recovery & Migrations", "html": "<h1>AWS SAA-C03 Study Guide: Disaster Recovery &amp; Migrations<\/h1>\n<h2>1. Disaster Recovery (DR) in AWS<\/h2>\n<p>The SAA-C03 exam focuses heavily on the trade-off between <strong>RTO/RPO<\/strong> and <strong>Cost<\/strong>.<\/p>\n<ul>\n<li><strong>RPO (Recovery Point Objective):<\/strong> Maximum acceptable data loss (measured in time, e.g., \"1 hour of data\").<\/li>\n<li><strong>RTO (Recovery Time Objective):<\/strong> Maximum acceptable downtime (how long until services are back up).<\/li>\n<\/ul>\n<h3>The 4 DR Strategies (From Cheapest/Slowest to Expensive/Fastest)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Strategy<\/th>\n<th>Description<\/th>\n<th>RTO/RPO<\/th>\n<th>Cost<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Backup &amp; Restore<\/strong><\/td>\n<td>Back up data to S3 or Snapshots. Restore only when disaster strikes. Infrastructure is provisioned <em>after<\/em> the disaster.<\/td>\n<td>High (Hours/Days)<\/td>\n<td>$ (Lowest)<\/td>\n<\/tr>\n<tr>\n<td><strong>Pilot Light<\/strong><\/td>\n<td>Core data is replicated (e.g., RDS RR), but app servers are off or very small. \"Turn on\" and scale up servers during disaster.<\/td>\n<td>Medium (Tens of minutes)<\/td>\n<td>$$<\/td>\n<\/tr>\n<tr>\n<td><strong>Warm Standby<\/strong><\/td>\n<td>A scaled-down version of the full environment is always running (e.g., min capacity Autoscaling Group). Scale up on failover.<\/td>\n<td>Low (Minutes)<\/td>\n<td>$$$<\/td>\n<\/tr>\n<tr>\n<td><strong>Multi-Site (Active/Active)<\/strong><\/td>\n<td>Full capacity running in multiple regions/AZs simultaneously. Traffic is load balanced (Route53).<\/td>\n<td>Near Zero<\/td>\n<td>$$$$ (Highest)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2>2. Elastic Disaster Recovery (AWS DRS)<\/h2>\n<ul>\n<li><strong>Purpose:<\/strong> The standard AWS service for Disaster Recovery (replaces CloudEndure DR).<\/li>\n<li><strong>How it works:<\/strong><ol>\n<li>Install the DRS Agent on source servers (On-prem or other clouds).<\/li>\n<li>Continuous block-level replication to a <strong>Staging Area<\/strong> in AWS (low-cost, lightweight EC2 instances).<\/li>\n<li><strong>Failover:<\/strong> When triggered, DRS launches fully provisioned EC2 instances based on the replicated data.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Exam Keyword:<\/strong> \"Continuous replication,\" \"Block-level,\" \"Physical-to-Cloud DR,\" \"Sub-second RPO.\"<\/li>\n<\/ul>\n<h2>3. Database Migration Service (DMS)<\/h2>\n<ul>\n<li><strong>Purpose:<\/strong> Migrate databases to AWS quickly and securely.<\/li>\n<li><strong>Key Feature:<\/strong> The source database remains <strong>fully operational<\/strong> during the migration.<\/li>\n<li><strong>Homogeneous Migrations:<\/strong> Same engine (e.g., Oracle to Oracle on EC2/RDS). No schema conversion needed.<\/li>\n<li><strong>Heterogeneous Migrations:<\/strong> Different engine (e.g., Oracle to Aurora PostgreSQL). Requires <strong>SCT<\/strong>.<\/li>\n<li><strong>AWS Schema Conversion Tool (SCT):<\/strong> Must run <em>before<\/em> DMS to convert the schema (tables, indexes, views) of the source engine to the target engine.<\/li>\n<li><strong>CDC (Change Data Capture):<\/strong> Enable this in DMS for continuous replication after the initial load.<\/li>\n<\/ul>\n<h2>4. RDS &amp; Aurora Migrations<\/h2>\n<h3>RDS<\/h3>\n<ul>\n<li><strong>Snapshot &amp; Restore:<\/strong> Standard way to move data or create environments.<\/li>\n<li><strong>Read Replicas:<\/strong><ul>\n<li>Can be within the same region or <strong>Cross-Region<\/strong>.<\/li>\n<li><strong>DR Strategy:<\/strong> Create a Cross-Region Read Replica. If the primary region fails, <strong>Promote<\/strong> the replica to be the standalone primary (RTO is minutes).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>Aurora<\/h3>\n<ul>\n<li><strong>Aurora Global Database:<\/strong><ul>\n<li>Spans multiple AWS regions.<\/li>\n<li>Physical replication (very fast, &lt; 1 second latency).<\/li>\n<li><strong>Fast Failover:<\/strong> If primary region goes down, promote secondary region (RTO &lt; 1 minute).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Aurora Cloning:<\/strong><ul>\n<li>Create a new cluster from an existing one almost instantly.<\/li>\n<li><strong>Use Case:<\/strong> Testing/Staging. <em>Not<\/em> typically used for DR because it resides in the same region.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>⚡ Specific Migration Scenarios (Exam Favorites)<\/h3>\n<h4>1. RDS MySQL -&gt; Aurora MySQL (or RDS Postgres -&gt; Aurora Postgres)<\/h4>\n<ul>\n<li><strong>Option A: Aurora Read Replica (Recommended for Min Downtime)<\/strong><ol>\n<li>Create an <strong>Aurora Read Replica<\/strong> from the source RDS instance.<\/li>\n<li>Wait for replication lag to drop to 0.<\/li>\n<li>Stop writes to the RDS instance.<\/li>\n<li><strong>Promote<\/strong> the Aurora Read Replica to a standalone Aurora Cluster.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Option B: Migrate from Snapshot<\/strong><ul>\n<li>Create a snapshot of RDS -&gt; \"Migrate Snapshot\" to Aurora.<\/li>\n<li><strong>Cons:<\/strong> Slower, requires downtime to restore data to a new cluster.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h4>2. External (On-Prem/EC2) -&gt; Aurora<\/h4>\n<ul>\n<li><strong>External MySQL -&gt; Aurora MySQL<\/strong><ul>\n<li><strong>Percona XtraBackup (Physical):<\/strong> Create a physical backup using Percona XtraBackup -&gt; Upload to <strong>S3<\/strong> -&gt; Restore directly to Aurora. (Much faster than logical dumps).<\/li>\n<li><strong>mysqldump (Logical):<\/strong> Standard SQL dump (Slower for large datasets).<\/li>\n<\/ul>\n<\/li>\n<li><strong>External PostgreSQL -&gt; Aurora PostgreSQL<\/strong><ul>\n<li><strong>Import from S3:<\/strong> Use <code>pg_dump<\/code> to export data -&gt; Upload to <strong>S3<\/strong> -&gt; Use the <code>aws_s3<\/code> Aurora extension to import data.<\/li>\n<li><strong>DMS:<\/strong> Use for continuous replication and minimal downtime cutover.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>5. On-Premises Strategies with AWS (Hybrid)<\/h2>\n<h3>VM Management &amp; Migration Planning<\/h3>\n<ul>\n<li><strong>Amazon Linux 2 AMI:<\/strong><ul>\n<li>You can download the Amazon Linux 2 AMI as a VM image (<code>.iso<\/code> format).<\/li>\n<li>Runs on: VMWare, KVM, VirtualBox (Oracle VM), and Microsoft Hyper-V.<\/li>\n<li><strong>Use Case:<\/strong> Develop and test applications locally on the exact same OS used in AWS.<\/li>\n<\/ul>\n<\/li>\n<li><strong>VM Import/Export:<\/strong><ul>\n<li><strong>Migrate:<\/strong> Import existing VM images into EC2 instances.<\/li>\n<li><strong>DR Strategy:<\/strong> Create a DR repository for your on-premise VMs in AWS.<\/li>\n<li><strong>Export:<\/strong> You can export instances back from EC2 to your on-premises virtualization environment.<\/li>\n<\/ul>\n<\/li>\n<li><strong>AWS Application Discovery Service:<\/strong><ul>\n<li><strong>Purpose:<\/strong> Gather information about on-premise servers to plan a migration.<\/li>\n<li><strong>Data Collected:<\/strong> Server utilization (CPU/RAM) and <strong>dependency mappings<\/strong> (which server talks to which).<\/li>\n<li><strong>Tracking:<\/strong> Integrates with <strong>AWS Migration Hub<\/strong> to track the status of migrations.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Strategic Migration Services (On-Prem Context):<\/strong><ul>\n<li><strong>DMS:<\/strong> Replicate On-prem =&gt; AWS, AWS =&gt; AWS, or AWS =&gt; On-prem. Works with various DBs (Oracle, MySQL, DynamoDB, etc.).<\/li>\n<li><strong>MGN (Application Migration Service):<\/strong> Incremental replication of on-premises live servers to AWS.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>Storage Strategies<\/h3>\n<ol>\n<li><strong>AWS Storage Gateway<\/strong> Connects on-prem applications to cloud storage.<ul>\n<li><strong>S3 File Gateway:<\/strong><ul>\n<li>Interface: NFS or SMB.<\/li>\n<li>Backend: S3.<\/li>\n<li>Use Case: Moving files to S3, content repositories. Local cache keeps frequently accessed files fast.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Volume Gateway:<\/strong><ul>\n<li>Interface: iSCSI (Block storage).<\/li>\n<li><strong>Stored Mode:<\/strong> All data stays on-prem; async backup to S3 (Good for low latency access to <em>all<\/em> data).<\/li>\n<li><strong>Cached Mode:<\/strong> Primary data is in S3; frequently accessed data is cached on-prem (Good for storage extension).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Tape Gateway:<\/strong><ul>\n<li>Interface: Virtual Tape Library (VTL).<\/li>\n<li>Backend: S3 Glacier / Deep Archive.<\/li>\n<li>Use Case: Replacing physical tape backups (i.e., BackupExec, Veeam).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<\/li>\n<li><strong>AWS DataSync<\/strong><ul>\n<li><strong>Purpose:<\/strong> Automate moving large amounts of data between on-prem and AWS storage (S3, EFS, FSx).<\/li>\n<li><strong>Tech:<\/strong> Uses a proprietary protocol (not standard NFS/SMB over WAN) which is up to <strong>10x faster<\/strong> than open-source tools.<\/li>\n<li><strong>Agent:<\/strong> Requires a DataSync agent on-prem.<\/li>\n<\/ul>\n<\/li>\n<\/ol>\n<h2>6. AWS Backup<\/h2>\n<ul>\n<li><strong>Purpose:<\/strong> Centralized, managed service to automate backups across AWS services.<\/li>\n<li><strong>Supported Services:<\/strong> EC2, EBS, RDS, DynamoDB, Aurora, EFS, FSx, Storage Gateway, S3.<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li><strong>Backup Plans:<\/strong> Define frequency (cron) and retention.<\/li>\n<li><strong>Cross-Region Backup:<\/strong> automatically copy backups to another region for DR.<\/li>\n<li><strong>Cross-Account Backup:<\/strong> Managed via AWS Organizations.<\/li>\n<li><strong>Vault Lock:<\/strong> Enforces <strong>WORM<\/strong> (Write Once Read Many) compliance. Prevents deletion of backups (protection against Ransomware).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>7. Application Migration Service (MGN)<\/h2>\n<ul>\n<li><strong>Purpose:<\/strong> The primary \"Lift and Shift\" (Rehost) tool for migrating servers to AWS.<\/li>\n<li><strong>Replaces:<\/strong> Server Migration Service (SMS) and CloudEndure Migration.<\/li>\n<li><strong>How it works:<\/strong><ul>\n<li>Agent-based block-level replication.<\/li>\n<li>Converts source servers (Physical, VMware, Hyper-V, Azure VMs) to native AWS EC2 instances.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Cutover:<\/strong> Minimal downtime. You define a \"Cutover window.\"<\/li>\n<\/ul>\n<h2>8. Transferring Large Datasets (The \"Snow\" Family)<\/h2>\n<p><strong>Rule of Thumb:<\/strong> If data transfer over the internet/Direct Connect takes &gt; 1 week, use Snowball.<\/p>\n<table>\n<thead>\n<tr>\n<th>Device<\/th>\n<th>Capacity<\/th>\n<th>Use Case<\/th>\n<th>Compute Capability?<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Snowcone<\/strong><\/td>\n<td>8 TB<\/td>\n<td>Small, portable, harsh environments. Can be mailed.<\/td>\n<td>Basic (IoT/Validation)<\/td>\n<\/tr>\n<tr>\n<td><strong>Snowball Edge Storage Optimized<\/strong><\/td>\n<td>80 TB<\/td>\n<td>Massive data transfer (Petabytes scale).<\/td>\n<td>Standard EC2/Lambda<\/td>\n<\/tr>\n<tr>\n<td><strong>Snowball Edge Compute Optimized<\/strong><\/td>\n<td>42 TB<\/td>\n<td>Edge computing (AI/ML inference at the edge) + Transfer.<\/td>\n<td>Powerful EC2/GPU<\/td>\n<\/tr>\n<tr>\n<td><strong>Snowmobile<\/strong><\/td>\n<td>100 PB<\/td>\n<td>Exabyte scale data transfer (Literal truck).<\/td>\n<td>No<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<ul>\n<li><strong>OpsHub:<\/strong> The GUI software used to manage Snow devices locally.<\/li>\n<li><strong>Direct Connect (DX):<\/strong> Dedicated private fiber connection. Good for consistent high throughput, but takes time to set up (months). Use DX for <em>ongoing<\/em> hybrid connectivity, use Snowball for <em>one-time<\/em> massive migration.<\/li>\n<\/ul>\n<h2>9. VMware Cloud on AWS<\/h2>\n<ul>\n<li><strong>Concept:<\/strong> Run the full VMware software stack (vSphere, vSAN, NSX) on AWS <strong>Bare Metal<\/strong> infrastructure.<\/li>\n<li><strong>Key Use Case:<\/strong><ul>\n<li>Rapid migration without re-architecting applications.<\/li>\n<li>Keep using existing VMware tools (vCenter) to manage AWS resources.<\/li>\n<\/ul>\n<\/li>\n<li><strong>vMotion:<\/strong> You can live migrate (vMotion) VMs from on-prem data centers to VMware Cloud on AWS with <strong>zero downtime<\/strong>.<\/li>\n<li><strong>Integration:<\/strong> Can directly access native AWS services (S3, RDS, etc.) via the Elastic Network Interface (ENI).<\/li>\n<\/ul>\n<h3>⚡ Quick Exam Cheat Codes<\/h3>\n<ol>\n<li><strong>Heterogeneous Database Migration?<\/strong> -&gt; <strong>DMS + SCT<\/strong>.<\/li>\n<li><strong>Lift and Shift Servers?<\/strong> -&gt; <strong>Application Migration Service (MGN)<\/strong>.<\/li>\n<li><strong>Physical Tapes?<\/strong> -&gt; <strong>Tape Gateway<\/strong>.<\/li>\n<li><strong>NFS/SMB to S3?<\/strong> -&gt; <strong>File Gateway<\/strong>.<\/li>\n<li><strong>iSCSI Block Storage?<\/strong> -&gt; <strong>Volume Gateway<\/strong>.<\/li>\n<li><strong>Need &lt; 15 min RPO/RTO but save money?<\/strong> -&gt; <strong>Pilot Light<\/strong> (or Warm Standby if RTO needs to be minutes).<\/li>\n<li><strong>Transfer 500 TB where internet is slow?<\/strong> -&gt; <strong>Snowball Edge<\/strong>.<\/li>\n<li><strong>Prevention against accidental backup deletion?<\/strong> -&gt; <strong>AWS Backup Vault Lock<\/strong>.<\/li>\n<li><strong>External MySQL to Aurora Migration?<\/strong> -&gt; <strong>Percona XtraBackup to S3<\/strong>.<\/li>\n<\/ol>", "text": "AWS SAA-C03 Study Guide: Disaster Recovery & Migrations 1. Disaster Recovery (DR) in AWS The SAA-C03 exam focuses heavily on the trade-off between RTO/RPO and Cost . RPO (Recovery Point Objective): Maximum acceptable data loss (measured in time, e.g., \"1 hour of data\"). RTO (Recovery Time Objective): Maximum acceptable downtime (how long until services are back up). The 4 DR Strategies (From Cheapest/Slowest to Expensive/Fastest) Strategy Description RTO/RPO Cost Backup & Restore Back up data to S3 or Snapshots. Restore only when disaster strikes. Infrastructure is provisioned after the disaster. High (Hours/Days) $ (Lowest) Pilot Light Core data is replicated (e.g., RDS RR), but app servers are off or very small. \"Turn on\" and scale up servers during disaster. Medium (Tens of minutes) $$ Warm Standby A scaled-down version of the full environment is always running (e.g., min capacity Autoscaling Group). Scale up on failover. Low (Minutes) $$$ Multi-Site (Active/Active) Full capacity running in multiple regions/AZs simultaneously. Traffic is load balanced (Route53). Near Zero $$$$ (Highest) 2. Elastic Disaster Recovery (AWS DRS) Purpose: The standard AWS service for Disaster Recovery (replaces CloudEndure DR). How it works: Install the DRS Agent on source servers (On-prem or other clouds). Continuous block-level replication to a Staging Area in AWS (low-cost, lightweight EC2 instances). Failover: When triggered, DRS launches fully provisioned EC2 instances based on the replicated data. Exam Keyword: \"Continuous replication,\" \"Block-level,\" \"Physical-to-Cloud DR,\" \"Sub-second RPO.\" 3. Database Migration Service (DMS) Purpose: Migrate databases to AWS quickly and securely. Key Feature: The source database remains fully operational during the migration. Homogeneous Migrations: Same engine (e.g., Oracle to Oracle on EC2/RDS). No schema conversion needed. Heterogeneous Migrations: Different engine (e.g., Oracle to Aurora PostgreSQL). Requires SCT . AWS Schema Conversion Tool (SCT): Must run before DMS to convert the schema (tables, indexes, views) of the source engine to the target engine. CDC (Change Data Capture): Enable this in DMS for continuous replication after the initial load. 4. RDS & Aurora Migrations RDS Snapshot & Restore: Standard way to move data or create environments. Read Replicas: Can be within the same region or Cross-Region . DR Strategy: Create a Cross-Region Read Replica. If the primary region fails, Promote the replica to be the standalone primary (RTO is minutes). Aurora Aurora Global Database: Spans multiple AWS regions. Physical replication (very fast, < 1 second latency). Fast Failover: If primary region goes down, promote secondary region (RTO < 1 minute). Aurora Cloning: Create a new cluster from an existing one almost instantly. Use Case: Testing/Staging. Not typically used for DR because it resides in the same region. ⚡ Specific Migration Scenarios (Exam Favorites) 1. RDS MySQL -> Aurora MySQL (or RDS Postgres -> Aurora Postgres) Option A: Aurora Read Replica (Recommended for Min Downtime) Create an Aurora Read Replica from the source RDS instance. Wait for replication lag to drop to 0. Stop writes to the RDS instance. Promote the Aurora Read Replica to a standalone Aurora Cluster. Option B: Migrate from Snapshot Create a snapshot of RDS -> \"Migrate Snapshot\" to Aurora. Cons: Slower, requires downtime to restore data to a new cluster. 2. External (On-Prem/EC2) -> Aurora External MySQL -> Aurora MySQL Percona XtraBackup (Physical): Create a physical backup using Percona XtraBackup -> Upload to S3 -> Restore directly to Aurora. (Much faster than logical dumps). mysqldump (Logical): Standard SQL dump (Slower for large datasets). External PostgreSQL -> Aurora PostgreSQL Import from S3: Use pg_dump to export data -> Upload to S3 -> Use the aws_s3 Aurora extension to import data. DMS: Use for continuous replication and minimal downtime cutover. 5. On-Premises Strategies with AWS (Hybrid) VM Management & Migration Planning Amazon Linux 2 AMI: You can download the Amazon Linux 2 AMI as a VM image ( .iso format). Runs on: VMWare, KVM, VirtualBox (Oracle VM), and Microsoft Hyper-V. Use Case: Develop and test applications locally on the exact same OS used in AWS. VM Import/Export: Migrate: Import existing VM images into EC2 instances. DR Strategy: Create a DR repository for your on-premise VMs in AWS. Export: You can export instances back from EC2 to your on-premises virtualization environment. AWS Application Discovery Service: Purpose: Gather information about on-premise servers to plan a migration. Data Collected: Server utilization (CPU/RAM) and dependency mappings (which server talks to which). Tracking: Integrates with AWS Migration Hub to track the status of migrations. Strategic Migration Services (On-Prem Context): DMS: Replicate On-prem => AWS, AWS => AWS, or AWS => On-prem. Works with various DBs (Oracle, MySQL, DynamoDB, etc.). MGN (Application Migration Service): Incremental replication of on-premises live servers to AWS. Storage Strategies AWS Storage Gateway Connects on-prem applications to cloud storage. S3 File Gateway: Interface: NFS or SMB. Backend: S3. Use Case: Moving files to S3, content repositories. Local cache keeps frequently accessed files fast. Volume Gateway: Interface: iSCSI (Block storage). Stored Mode: All data stays on-prem; async backup to S3 (Good for low latency access to all data). Cached Mode: Primary data is in S3; frequently accessed data is cached on-prem (Good for storage extension). Tape Gateway: Interface: Virtual Tape Library (VTL). Backend: S3 Glacier / Deep Archive. Use Case: Replacing physical tape backups (i.e., BackupExec, Veeam). AWS DataSync Purpose: Automate moving large amounts of data between on-prem and AWS storage (S3, EFS, FSx). Tech: Uses a proprietary protocol (not standard NFS/SMB over WAN) which is up to 10x faster than open-source tools. Agent: Requires a DataSync agent on-prem. 6. AWS Backup Purpose: Centralized, managed service to automate backups across AWS services. Supported Services: EC2, EBS, RDS, DynamoDB, Aurora, EFS, FSx, Storage Gateway, S3. Key Features: Backup Plans: Define frequency (cron) and retention. Cross-Region Backup: automatically copy backups to another region for DR. Cross-Account Backup: Managed via AWS Organizations. Vault Lock: Enforces WORM (Write Once Read Many) compliance. Prevents deletion of backups (protection against Ransomware). 7. Application Migration Service (MGN) Purpose: The primary \"Lift and Shift\" (Rehost) tool for migrating servers to AWS. Replaces: Server Migration Service (SMS) and CloudEndure Migration. How it works: Agent-based block-level replication. Converts source servers (Physical, VMware, Hyper-V, Azure VMs) to native AWS EC2 instances. Cutover: Minimal downtime. You define a \"Cutover window.\" 8. Transferring Large Datasets (The \"Snow\" Family) Rule of Thumb: If data transfer over the internet/Direct Connect takes > 1 week, use Snowball. Device Capacity Use Case Compute Capability? Snowcone 8 TB Small, portable, harsh environments. Can be mailed. Basic (IoT/Validation) Snowball Edge Storage Optimized 80 TB Massive data transfer (Petabytes scale). Standard EC2/Lambda Snowball Edge Compute Optimized 42 TB Edge computing (AI/ML inference at the edge) + Transfer. Powerful EC2/GPU Snowmobile 100 PB Exabyte scale data transfer (Literal truck). No OpsHub: The GUI software used to manage Snow devices locally. Direct Connect (DX): Dedicated private fiber connection. Good for consistent high throughput, but takes time to set up (months). Use DX for ongoing hybrid connectivity, use Snowball for one-time massive migration. 9. VMware Cloud on AWS Concept: Run the full VMware software stack (vSphere, vSAN, NSX) on AWS Bare Metal infrastructure. Key Use Case: Rapid migration without re-architecting applications. Keep using existing VMware tools (vCenter) to manage AWS resources. vMotion: You can live migrate (vMotion) VMs from on-prem data centers to VMware Cloud on AWS with zero downtime . Integration: Can directly access native AWS services (S3, RDS, etc.) via the Elastic Network Interface (ENI). ⚡ Quick Exam Cheat Codes Heterogeneous Database Migration? -> DMS + SCT . Lift and Shift Servers? -> Application Migration Service (MGN) . Physical Tapes? -> Tape Gateway . NFS/SMB to S3? -> File Gateway . iSCSI Block Storage? -> Volume Gateway . Need < 15 min RPO/RTO but save money? -> Pilot Light (or Warm Standby if RTO needs to be minutes). Transfer 500 TB where internet is slow? -> Snowball Edge . Prevention against accidental backup deletion? -> AWS Backup Vault Lock . External MySQL to Aurora Migration? -> Percona XtraBackup to S3 ."}, {"id": 23, "num": "23", "title": "More Solution Architectures", "html": "<h1>AWS Certified Solutions Architect Associate (SAA-C03) Study Notes<\/h1>\n<h3>Based on \"More Solution Architectures\" Section<\/h3>\n<h2>1. Event Processing in AWS<\/h2>\n<p>Decoupling applications using SQS, SNS, and Lambda.<\/p>\n<h3>SQS &amp; Lambda<\/h3>\n<ul>\n<li><strong>Pattern:<\/strong> SQS Queue $\\rightarrow$ Lambda Function.<\/li>\n<li><strong>Mechanism:<\/strong> Lambda <strong>polls<\/strong> the SQS queue.<\/li>\n<li><strong>Behavior:<\/strong> If processing fails, the message is returned to the queue and retried. Eventually, it can go to a Dead Letter Queue (DLQ).<\/li>\n<\/ul>\n<h3>SNS &amp; Lambda<\/h3>\n<ul>\n<li><strong>Pattern:<\/strong> SNS Topic $\\rightarrow$ Lambda Function.<\/li>\n<li><strong>Mechanism:<\/strong> <strong>Asynchronous<\/strong> push. SNS pushes the message to Lambda.<\/li>\n<li><strong>Behavior:<\/strong> If Lambda fails, SNS can retry (configurable). A DLQ can be attached to Lambda for failed events.<\/li>\n<\/ul>\n<h3>Fan Out Pattern<\/h3>\n<ul>\n<li><strong>Problem:<\/strong> You want to send one message to multiple independent processing queues.<\/li>\n<li><strong>Solution:<\/strong> Push once to SNS $\\rightarrow$ SQS Queues subscribe to the SNS Topic.<\/li>\n<li><strong>Architecture:<\/strong> SDK $\\rightarrow$ SNS Topic $\\rightarrow$ Queue A (Process A) &amp; Queue B (Process B).<\/li>\n<\/ul>\n<h3>S3 Event Notifications<\/h3>\n<ul>\n<li><strong>Triggers:<\/strong> <code>S3:ObjectCreated<\/code>, <code>S3:ObjectRemoved<\/code>, etc.<\/li>\n<li><strong>Features:<\/strong> Filter by object name (e.g., <code>*.jpg<\/code>).<\/li>\n<li><strong>Destinations:<\/strong> SNS, SQS, Lambda.<\/li>\n<li><strong>Latency:<\/strong> Typically seconds, but can take minutes.<\/li>\n<li><strong>Pattern:<\/strong> Upload Image $\\rightarrow$ S3 $\\rightarrow$ SQS $\\rightarrow$ Lambda (to generate thumbnail). <em>Using SQS ensures messages aren't lost if Lambda is overwhelmed.<\/em><\/li>\n<\/ul>\n<h3>S3 &amp; EventBridge<\/h3>\n<ul>\n<li><strong>Evolution:<\/strong> S3 can send events to <strong>Amazon EventBridge<\/strong>.<\/li>\n<li><strong>Capabilities:<\/strong><ul>\n<li>Advanced filtering (metadata, object size).<\/li>\n<li>Over 18 AWS service destinations (Step Functions, Kinesis, etc.).<\/li>\n<li>Archive/Replay events capabilities.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>Intercepting API Calls (EventBridge)<\/h3>\n<ul>\n<li><strong>Use Case:<\/strong> React to infrastructure changes (e.g., a DynamoDB table deletion).<\/li>\n<li><strong>Flow:<\/strong> User calls <code>DeleteTable<\/code> $\\rightarrow$ CloudTrail logs API call $\\rightarrow$ EventBridge Rule matches event $\\rightarrow$ SNS (Alert).<\/li>\n<\/ul>\n<h3>API Gateway &amp; Kinesis<\/h3>\n<ul>\n<li><strong>Pattern:<\/strong> High throughput data ingestion.<\/li>\n<li><strong>Flow:<\/strong> Client $\\rightarrow$ API Gateway $\\rightarrow$ Kinesis Data Streams $\\rightarrow$ Kinesis Data Firehose $\\rightarrow$ Amazon S3 (store as <code>.json<\/code>).<\/li>\n<\/ul>\n<h2>2. Caching Strategies in AWS<\/h2>\n<p>Caching reduces latency and offloads compute/database resources.<\/p>\n<table>\n<thead>\n<tr>\n<th>Layer<\/th>\n<th>Technology<\/th>\n<th>Details<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Edge<\/strong><\/td>\n<td><strong>CloudFront<\/strong><\/td>\n<td>Caches content close to the user. TTL, Geographic routing. Best for static content.<\/td>\n<\/tr>\n<tr>\n<td><strong>Gateway<\/strong><\/td>\n<td><strong>API Gateway<\/strong><\/td>\n<td>Caches API responses. Reduces load on backend Lambda/EC2.<\/td>\n<\/tr>\n<tr>\n<td><strong>Compute<\/strong><\/td>\n<td><strong>EC2 / Lambda<\/strong><\/td>\n<td>Local caching (if applicable/stateful) or managing logic.<\/td>\n<\/tr>\n<tr>\n<td><strong>Database<\/strong><\/td>\n<td><strong>ElastiCache / DAX<\/strong><\/td>\n<td><strong>Redis/Memcached:<\/strong> Cache for RDS/DB.<br><br><strong>DAX:<\/strong> In-memory cache specifically for DynamoDB.<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2>3. Blocking an IP Address in AWS<\/h2>\n<p>Strategies depend on where the traffic is entering.<\/p>\n<h3>1. VPC / Subnet Level (NACL)<\/h3>\n<ul>\n<li><strong>Component:<\/strong> Network ACL (NACL).<\/li>\n<li><strong>Mechanism:<\/strong> NACLs allow <strong>Deny<\/strong> rules.<\/li>\n<li><strong>Action:<\/strong> Create a Deny rule for the specific IP address as the first rule (low number).<\/li>\n<li><strong>Pros:<\/strong> Efficient, blocks traffic before it hits the instance.<\/li>\n<\/ul>\n<h3>2. EC2 Instance Level (Security Group)<\/h3>\n<ul>\n<li><strong>Component:<\/strong> Security Group (SG).<\/li>\n<li><strong>Mechanism:<\/strong> SG <em>only<\/em> supports <strong>Allow<\/strong> rules.<\/li>\n<li><strong>Limitation:<\/strong> You <strong>cannot<\/strong> explicitly block an IP. You can only \"block\" it by <em>not<\/em> having an allow rule for it (which is hard if you need to allow <code>0.0.0.0/0<\/code> for a public web server).<\/li>\n<li><strong>Verdict:<\/strong> NOT helpful for blocking specific IPs while allowing the rest of the world.<\/li>\n<\/ul>\n<h3>3. Application Load Balancer (ALB) Level<\/h3>\n<ul>\n<li><strong>Component:<\/strong> <strong>AWS WAF<\/strong> (Web Application Firewall) or NACL (at ALB subnet).<\/li>\n<li><strong>WAF:<\/strong> Attach a Web ACL to the ALB. Use <strong>IP Address Filtering<\/strong> rules to block malicious IPs.<\/li>\n<li><strong>NACL:<\/strong> Can block IPs at the subnet where ALB resides.<\/li>\n<\/ul>\n<h3>4. CloudFront Level (Edge)<\/h3>\n<ul>\n<li><strong>Scenario:<\/strong> Client $\\rightarrow$ CloudFront $\\rightarrow$ ALB $\\rightarrow$ EC2.<\/li>\n<li><strong>Issue:<\/strong> The ALB sees CloudFront's IP, not the Client's IP. Therefore, <strong>NACLs at the ALB subnet are NOT helpful<\/strong> for blocking the Client IP.<\/li>\n<li><strong>Solution:<\/strong><ul>\n<li><strong>AWS WAF:<\/strong> Attach WAF to <strong>CloudFront<\/strong>. Block IPs at the edge.<\/li>\n<li><strong>CloudFront Geo Restriction:<\/strong> Block entire countries.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>4. High Performance Computing (HPC) on AWS<\/h2>\n<p>Running complex, compute-intensive workloads.<\/p>\n<h3>Data Management &amp; Transfer<\/h3>\n<ul>\n<li><strong>AWS Direct Connect:<\/strong> Move GB/s of data over private secure networks.<\/li>\n<li><strong>Snowball / Snowmobile:<\/strong> Move PB of data physically.<\/li>\n<li><strong>AWS DataSync:<\/strong> Automate data transfer between on-prem and S3/EFS/FSx.<\/li>\n<\/ul>\n<h3>Compute &amp; Networking<\/h3>\n<ul>\n<li><strong>EC2 Instances:<\/strong> Use CPU-optimized or GPU-optimized instances.<\/li>\n<li><strong>Spot Fleets:<\/strong> Cost savings for stateless workloads.<\/li>\n<li><strong>Placement Groups:<\/strong> Use <strong>Cluster<\/strong> placement groups for low-latency, 10Gbps+ networking between instances (Same Rack/AZ).<\/li>\n<li><strong>Enhanced Networking (ENA):<\/strong> Up to 100 Gbps.<\/li>\n<li><strong>Elastic Fabric Adapter (EFA):<\/strong><ul>\n<li>Bypasses Linux OS for low-latency transport.<\/li>\n<li>Great for <strong>MPI<\/strong> (Message Passing Interface) and tightly coupled workloads.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>Storage<\/h3>\n<ul>\n<li><strong>Instance Store:<\/strong> Highest performance (millions of IOPS), low latency, but ephemeral (data lost on stop).<\/li>\n<li><strong>EBS (io2 Block Express):<\/strong> Up to 256,000 IOPS.<\/li>\n<li><strong>Amazon FSx for Lustre:<\/strong> HPC-optimized distributed file system backed by S3.<\/li>\n<\/ul>\n<h3>Automation<\/h3>\n<ul>\n<li><strong>AWS Batch:<\/strong> Multi-node parallel jobs, schedules instances.<\/li>\n<li><strong>AWS ParallelCluster:<\/strong> Open-source tool to deploy HPC clusters (automates VPC, Subnet, EFA setup).<\/li>\n<\/ul>\n<h2>5. EC2 Instance High Availability<\/h2>\n<p>Methods to ensure an EC2 instance (or its service) remains available or recovers quickly.<\/p>\n<h3>Method 1: CloudWatch Events + Lambda (Passive)<\/h3>\n<ul>\n<li><strong>Architecture:<\/strong><ul>\n<li>Active Instance: Has an <strong>Elastic IP<\/strong>.<\/li>\n<li>Standby Instance: Stopped.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Flow:<\/strong> CloudWatch Alarm (monitor) $\\rightarrow$ Triggers Lambda $\\rightarrow$ Lambda starts Standby Instance &amp; moves the Elastic IP to it.<\/li>\n<\/ul>\n<h3>Method 2: Auto Scaling Group (ASG) + User Data<\/h3>\n<ul>\n<li><strong>Architecture:<\/strong><ul>\n<li>ASG Settings: Min 1, Max 1, Desired 1. Spans $\\ge$ 2 AZs.<\/li>\n<li><strong>Elastic IP<\/strong> is unattached initially or detached from failed instance.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Flow:<\/strong><ul>\n<li>Instance fails. ASG terminates it.<\/li>\n<li>ASG launches new instance in a new AZ.<\/li>\n<li><strong>EC2 User Data<\/strong> script runs on boot $\\rightarrow$ API call to <strong>attach the specific Elastic IP<\/strong> to itself.<\/li>\n<li><em>Requirement:<\/em> EC2 Instance Role must allow API calls for IP attachment.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>Method 3: ASG + EBS Snapshots (Stateful Recovery)<\/h3>\n<ul>\n<li><strong>Scenario:<\/strong> You need to preserve data (state) upon recovery.<\/li>\n<li><strong>Flow:<\/strong><ul>\n<li><strong>On Terminate (Lifecycle Hook):<\/strong> Take EBS Snapshot of the volume.<\/li>\n<li><strong>On Launch (Lifecycle Hook):<\/strong> New instance searches for latest snapshot $\\rightarrow$ Creates Volume from Snapshot $\\rightarrow$ Attaches Volume.<\/li>\n<\/ul>\n<\/li>\n<\/ul>", "text": "AWS Certified Solutions Architect Associate (SAA-C03) Study Notes Based on \"More Solution Architectures\" Section 1. Event Processing in AWS Decoupling applications using SQS, SNS, and Lambda. SQS & Lambda Pattern: SQS Queue $\\rightarrow$ Lambda Function. Mechanism: Lambda polls the SQS queue. Behavior: If processing fails, the message is returned to the queue and retried. Eventually, it can go to a Dead Letter Queue (DLQ). SNS & Lambda Pattern: SNS Topic $\\rightarrow$ Lambda Function. Mechanism: Asynchronous push. SNS pushes the message to Lambda. Behavior: If Lambda fails, SNS can retry (configurable). A DLQ can be attached to Lambda for failed events. Fan Out Pattern Problem: You want to send one message to multiple independent processing queues. Solution: Push once to SNS $\\rightarrow$ SQS Queues subscribe to the SNS Topic. Architecture: SDK $\\rightarrow$ SNS Topic $\\rightarrow$ Queue A (Process A) & Queue B (Process B). S3 Event Notifications Triggers: S3:ObjectCreated , S3:ObjectRemoved , etc. Features: Filter by object name (e.g., *.jpg ). Destinations: SNS, SQS, Lambda. Latency: Typically seconds, but can take minutes. Pattern: Upload Image $\\rightarrow$ S3 $\\rightarrow$ SQS $\\rightarrow$ Lambda (to generate thumbnail). Using SQS ensures messages aren't lost if Lambda is overwhelmed. S3 & EventBridge Evolution: S3 can send events to Amazon EventBridge . Capabilities: Advanced filtering (metadata, object size). Over 18 AWS service destinations (Step Functions, Kinesis, etc.). Archive/Replay events capabilities. Intercepting API Calls (EventBridge) Use Case: React to infrastructure changes (e.g., a DynamoDB table deletion). Flow: User calls DeleteTable $\\rightarrow$ CloudTrail logs API call $\\rightarrow$ EventBridge Rule matches event $\\rightarrow$ SNS (Alert). API Gateway & Kinesis Pattern: High throughput data ingestion. Flow: Client $\\rightarrow$ API Gateway $\\rightarrow$ Kinesis Data Streams $\\rightarrow$ Kinesis Data Firehose $\\rightarrow$ Amazon S3 (store as .json ). 2. Caching Strategies in AWS Caching reduces latency and offloads compute/database resources. Layer Technology Details Edge CloudFront Caches content close to the user. TTL, Geographic routing. Best for static content. Gateway API Gateway Caches API responses. Reduces load on backend Lambda/EC2. Compute EC2 / Lambda Local caching (if applicable/stateful) or managing logic. Database ElastiCache / DAX Redis/Memcached: Cache for RDS/DB. DAX: In-memory cache specifically for DynamoDB. 3. Blocking an IP Address in AWS Strategies depend on where the traffic is entering. 1. VPC / Subnet Level (NACL) Component: Network ACL (NACL). Mechanism: NACLs allow Deny rules. Action: Create a Deny rule for the specific IP address as the first rule (low number). Pros: Efficient, blocks traffic before it hits the instance. 2. EC2 Instance Level (Security Group) Component: Security Group (SG). Mechanism: SG only supports Allow rules. Limitation: You cannot explicitly block an IP. You can only \"block\" it by not having an allow rule for it (which is hard if you need to allow 0.0.0.0/0 for a public web server). Verdict: NOT helpful for blocking specific IPs while allowing the rest of the world. 3. Application Load Balancer (ALB) Level Component: AWS WAF (Web Application Firewall) or NACL (at ALB subnet). WAF: Attach a Web ACL to the ALB. Use IP Address Filtering rules to block malicious IPs. NACL: Can block IPs at the subnet where ALB resides. 4. CloudFront Level (Edge) Scenario: Client $\\rightarrow$ CloudFront $\\rightarrow$ ALB $\\rightarrow$ EC2. Issue: The ALB sees CloudFront's IP, not the Client's IP. Therefore, NACLs at the ALB subnet are NOT helpful for blocking the Client IP. Solution: AWS WAF: Attach WAF to CloudFront . Block IPs at the edge. CloudFront Geo Restriction: Block entire countries. 4. High Performance Computing (HPC) on AWS Running complex, compute-intensive workloads. Data Management & Transfer AWS Direct Connect: Move GB/s of data over private secure networks. Snowball / Snowmobile: Move PB of data physically. AWS DataSync: Automate data transfer between on-prem and S3/EFS/FSx. Compute & Networking EC2 Instances: Use CPU-optimized or GPU-optimized instances. Spot Fleets: Cost savings for stateless workloads. Placement Groups: Use Cluster placement groups for low-latency, 10Gbps+ networking between instances (Same Rack/AZ). Enhanced Networking (ENA): Up to 100 Gbps. Elastic Fabric Adapter (EFA): Bypasses Linux OS for low-latency transport. Great for MPI (Message Passing Interface) and tightly coupled workloads. Storage Instance Store: Highest performance (millions of IOPS), low latency, but ephemeral (data lost on stop). EBS (io2 Block Express): Up to 256,000 IOPS. Amazon FSx for Lustre: HPC-optimized distributed file system backed by S3. Automation AWS Batch: Multi-node parallel jobs, schedules instances. AWS ParallelCluster: Open-source tool to deploy HPC clusters (automates VPC, Subnet, EFA setup). 5. EC2 Instance High Availability Methods to ensure an EC2 instance (or its service) remains available or recovers quickly. Method 1: CloudWatch Events + Lambda (Passive) Architecture: Active Instance: Has an Elastic IP . Standby Instance: Stopped. Flow: CloudWatch Alarm (monitor) $\\rightarrow$ Triggers Lambda $\\rightarrow$ Lambda starts Standby Instance & moves the Elastic IP to it. Method 2: Auto Scaling Group (ASG) + User Data Architecture: ASG Settings: Min 1, Max 1, Desired 1. Spans $\\ge$ 2 AZs. Elastic IP is unattached initially or detached from failed instance. Flow: Instance fails. ASG terminates it. ASG launches new instance in a new AZ. EC2 User Data script runs on boot $\\rightarrow$ API call to attach the specific Elastic IP to itself. Requirement: EC2 Instance Role must allow API calls for IP attachment. Method 3: ASG + EBS Snapshots (Stateful Recovery) Scenario: You need to preserve data (state) upon recovery. Flow: On Terminate (Lifecycle Hook): Take EBS Snapshot of the volume. On Launch (Lifecycle Hook): New instance searches for latest snapshot $\\rightarrow$ Creates Volume from Snapshot $\\rightarrow$ Attaches Volume."}, {"id": 24, "num": "24", "title": "Other Services", "html": "<h1>AWS SAA-C03 Exam Notes: Targeted Topics<\/h1>\n<h2>1. AWS CloudFormation<\/h2>\n<ul>\n<li><strong>Concept:<\/strong> Infrastructure as Code (IaC). You define your infrastructure in a JSON or YAML template, and CloudFormation provisions it.<\/li>\n<li><strong>Key Exam Scenarios:<\/strong><ul>\n<li><strong>Drift Detection:<\/strong> Use this to detect if someone manually changed a resource (e.g., changed a Security Group rule) outside of the CloudFormation stack.<\/li>\n<li><strong>StackSets:<\/strong> Used to create, update, or delete stacks across <em>multiple accounts<\/em> and <em>AWS Regions<\/em> with a single operation.<\/li>\n<li><strong>DeletionPolicy:<\/strong> Controls what happens to a resource when the stack is deleted.<ul>\n<li><code>Retain<\/code>: Keeps the resource (good for S3 buckets/databases you don't want to lose).<\/li>\n<li><code>Snapshot<\/code>: Creates a snapshot before deleting (for RDS/EBS).<\/li>\n<\/ul>\n<\/li>\n<li><strong>DependsOn:<\/strong> Use this to control the creation order of resources (e.g., ensure an S3 bucket is created before the Lambda function that uses it).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>2. CloudFormation - Service Role<\/h2>\n<ul>\n<li><strong>The Problem:<\/strong> A user (e.g., a Junior Dev) needs to create a stack that includes IAM roles or VPCs, but they don't have permission to create those specific resources directly.<\/li>\n<li><strong>The Solution:<\/strong> Assign a <strong>Service Role<\/strong> to the CloudFormation Stack.<\/li>\n<li><strong>How it works:<\/strong><ol>\n<li>An Admin creates an IAM Role (Service Role) with powerful permissions (e.g., <code>AdministratorAccess<\/code>).<\/li>\n<li>The Admin grants the Junior Dev permission to <em>PassRole<\/em> to CloudFormation.<\/li>\n<li>The Junior Dev launches the stack and selects this Service Role.<\/li>\n<li>CloudFormation uses the <strong>Service Role's permissions<\/strong> to create the resources, not the Junior Dev's permissions.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Exam Keyword:<\/strong> \"Least Privilege\" for users while allowing them to deploy approved infrastructure.<\/li>\n<\/ul>\n<h2>3. Amazon SES (Simple Email Service)<\/h2>\n<ul>\n<li><strong>Primary Use Case:<\/strong> Sending and receiving <strong>transactional emails<\/strong> at scale.<\/li>\n<li><strong>Scenarios:<\/strong><ul>\n<li>Application needs to send password resets, order confirmations, or OTPs.<\/li>\n<li>Marketing emails where you manage the list and content logic yourself.<\/li>\n<li><strong>Hybrid:<\/strong> specific need to send email from an on-premises app through AWS (uses SMTP interface).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Differentiation:<\/strong> If the question mentions \"marketing campaigns,\" \"user engagement,\" or \"analytics,\" look at Pinpoint instead. SES is the raw engine; Pinpoint is the marketing brain.<\/li>\n<\/ul>\n<h2>4. Amazon Pinpoint<\/h2>\n<ul>\n<li><strong>Primary Use Case:<\/strong> <strong>Marketing communications<\/strong>, user engagement, and segmentation.<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li><strong>Channels:<\/strong> Sends Email, SMS, Push Notifications, and Voice messages.<\/li>\n<li><strong>Segmentation:<\/strong> \"Send a coupon to all users who haven't opened the app in 30 days.\"<\/li>\n<li><strong>Campaigns &amp; Journeys:<\/strong> Orchestrates multi-step user experiences.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Hint:<\/strong> Look for keywords like \"marketing campaigns,\" \"user behavior analysis,\" \"targeted segments,\" or \"push notifications.\"<\/li>\n<\/ul>\n<h2>5. SSM Session Manager (Systems Manager)<\/h2>\n<ul>\n<li><strong>Concept:<\/strong> Securely manage EC2 instances without opening inbound ports (No SSH/Port 22 required).<\/li>\n<li><strong>Architecture:<\/strong><ul>\n<li>Agent-based (SSM Agent must be installed/running).<\/li>\n<li>Instance needs an IAM role with <code>AmazonSSMManagedInstanceCore<\/code>.<\/li>\n<li>Traffic flows via AWS Systems Manager API (HTTPS), not SSH.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Scenarios:<\/strong><ul>\n<li>\"How to securely access an instance in a private subnet with no Bastion Host?\" -&gt; <strong>Session Manager<\/strong>.<\/li>\n<li>\"Need to audit who accessed an instance and what commands they ran?\" -&gt; <strong>Session Manager<\/strong> (logs session data to S3 or CloudWatch Logs).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>6. SSM Other Services (High Probability)<\/h2>\n<ul>\n<li><strong>SSM Parameter Store:<\/strong><ul>\n<li>Stores configuration data (database strings, license codes) and secrets (passwords).<\/li>\n<li><strong>Free tier available<\/strong> (Standard).<\/li>\n<li><strong>Integration:<\/strong> Works natively with CloudFormation, ECS, and Lambda.<\/li>\n<li><em>Vs. Secrets Manager:<\/em> Parameter Store is cheaper/free but lacks automatic rotation (unless you write a custom Lambda). Secrets Manager has built-in rotation.<\/li>\n<\/ul>\n<\/li>\n<li><strong>SSM Patch Manager:<\/strong><ul>\n<li>Automates patching for managed instances (OS updates).<\/li>\n<li>Uses <strong>Patch Baselines<\/strong> to define approved patches (e.g., \"Critical updates only\").<\/li>\n<li>Can patch large fleets of EC2 instances and on-prem servers during a <strong>Maintenance Window<\/strong>.<\/li>\n<\/ul>\n<\/li>\n<li><strong>SSM Run Command:<\/strong><ul>\n<li>Execute scripts/commands on a fleet of instances remotely and securely (no SSH).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>7. AWS Cost Explorer<\/h2>\n<ul>\n<li><strong>Primary Use Case:<\/strong> Visualizing and analyzing <strong>historical<\/strong> cost and usage data.<\/li>\n<li><strong>Features:<\/strong><ul>\n<li>View costs for the last 12 months.<\/li>\n<li>Forecast spend for the next 12 months.<\/li>\n<li><strong>Rightsizing Recommendations:<\/strong> Identifies underutilized EC2 instances (e.g., \"You are using m5.large but only need m5.medium\").<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Hint:<\/strong> If the question asks to \"analyze spending trends\" or \"forecast future costs,\" it's Cost Explorer.<\/li>\n<\/ul>\n<h2>8. AWS Cost Anomaly Detection<\/h2>\n<ul>\n<li><strong>Primary Use Case:<\/strong> <strong>Automated monitoring<\/strong> to detect unusual spending spikes using Machine Learning.<\/li>\n<li><strong>How it works:<\/strong> It learns your baseline usage patterns. If costs spike unexpectedly (e.g., a developer accidentally left a large instance running), it sends an alert (SNS email).<\/li>\n<li><strong>Differentiation:<\/strong><ul>\n<li><strong>Cost Explorer:<\/strong> You go to look at the data.<\/li>\n<li><strong>Anomaly Detection:<\/strong> It alerts you when something is wrong.<\/li>\n<li><strong>AWS Budgets:<\/strong> You set a static limit (e.g., \"Alert me if spend &gt; $100\"). Anomaly Detection finds the \"unknown unknowns.\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>9. AWS Outposts<\/h2>\n<ul>\n<li><strong>Concept:<\/strong> Hybrid Cloud. Run AWS infrastructure and services (EC2, EBS, RDS, EKS) <strong>on-premises<\/strong> in your own data center.<\/li>\n<li><strong>Physical Form:<\/strong> A physical rack of servers delivered by AWS to your location.<\/li>\n<li><strong>Use Cases:<\/strong><ul>\n<li><strong>Low Latency:<\/strong> Applications that need single-digit millisecond latency to on-prem machinery/systems.<\/li>\n<li><strong>Data Residency:<\/strong> Data must remain in a specific physical location for regulatory reasons (where no AWS Region exists).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Vs. Local Zones:<\/strong> Outposts = Your Data Center. Local Zones = AWS infrastructure in a specific city (managed by AWS, not in your building).<\/li>\n<\/ul>\n<h2>10. AWS Batch<\/h2>\n<ul>\n<li><strong>Primary Use Case:<\/strong> Running hundreds/thousands of <strong>batch computing jobs<\/strong> efficiently.<\/li>\n<li><strong>Architecture:<\/strong><ul>\n<li>Dynamically provisions compute resources (e.g., EC2 Spot Instances) based on job volume.<\/li>\n<li>Uses Docker containers.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Vs. Lambda:<\/strong><ul>\n<li>Lambda has a <strong>15-minute timeout<\/strong>.<\/li>\n<li>If a job takes &gt; 15 minutes, use <strong>AWS Batch<\/strong>.<\/li>\n<li>If the workload involves complex dependencies or huge disk requirements, use <strong>AWS Batch<\/strong><\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>11. Amazon AppFlow<\/h2>\n<ul>\n<li><strong>Concept:<\/strong> Fully managed integration service to securely transfer data between <strong>SaaS applications<\/strong> and AWS.<\/li>\n<li><strong>Connectors:<\/strong> Salesforce, ServiceNow, Slack, Zendesk, Marketo, Google Analytics.<\/li>\n<li><strong>Destinations:<\/strong> S3, Redshift, Snowflake.<\/li>\n<li><strong>Exam Scenario:<\/strong> \"Company wants to analyze Salesforce data in Redshift. How to transfer the data with the least operational overhead?\" -&gt; <strong>Amazon AppFlow<\/strong>. (No coding required).<\/li>\n<\/ul>\n<h2>12. AWS Amplify<\/h2>\n<ul>\n<li><strong>Target Audience:<\/strong> Front-end web and mobile developers.<\/li>\n<li><strong>Function:<\/strong> A set of tools to build, deploy, and host full-stack applications.<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li><strong>Amplify Hosting:<\/strong> CI/CD for static web apps (connects to Git repo).<\/li>\n<li><strong>Amplify Studio:<\/strong> Visual interface to build backend (Auth, DataStore/Storage) without deep cloud expertise.<\/li>\n<li><strong>Authentication:<\/strong> Easy wrapper around Amazon Cognito.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>13. Instance Scheduler on AWS<\/h2>\n<ul>\n<li><strong>Important:<\/strong> This is an <strong>AWS Solution<\/strong> (a pre-built CloudFormation template you deploy), not a standalone service in the console \"Service\" dropdown.<\/li>\n<li><strong>Function:<\/strong> Automatically starts and stops EC2 and RDS instances on a schedule (e.g., Stop at 6 PM Friday, Start at 8 AM Monday).<\/li>\n<li><strong>Architecture (Exam setup):<\/strong><ul>\n<li>Uses <strong>Amazon EventBridge<\/strong> to trigger a <strong>Lambda function<\/strong>.<\/li>\n<li>Configuration (schedules) is stored in <strong>DynamoDB<\/strong>.<\/li>\n<li>Tags are used to identify which instances to schedule.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Benefit:<\/strong> drastic cost reduction for non-production environments (dev/test).<\/li>\n<\/ul>", "text": "AWS SAA-C03 Exam Notes: Targeted Topics 1. AWS CloudFormation Concept: Infrastructure as Code (IaC). You define your infrastructure in a JSON or YAML template, and CloudFormation provisions it. Key Exam Scenarios: Drift Detection: Use this to detect if someone manually changed a resource (e.g., changed a Security Group rule) outside of the CloudFormation stack. StackSets: Used to create, update, or delete stacks across multiple accounts and AWS Regions with a single operation. DeletionPolicy: Controls what happens to a resource when the stack is deleted. Retain : Keeps the resource (good for S3 buckets/databases you don't want to lose). Snapshot : Creates a snapshot before deleting (for RDS/EBS). DependsOn: Use this to control the creation order of
