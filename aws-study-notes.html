ch-by-batch.<\/li>\n<li><strong>Checkpoints:<\/strong> You can set percentages (e.g., \"replace 20%, then wait 1 hour\") to verify stability.<\/li>\n<\/ul>\n<h3><strong>Warm Pools<\/strong><\/h3>\n<ul>\n<li><strong>Problem:<\/strong> Instances take too long to boot and install software (e.g., 5+ minutes), making dynamic scaling too slow.<\/li>\n<li><strong>Solution:<\/strong> A pool of pre-initialized EC2 instances kept in a <code>Stopped<\/code> state.<\/li>\n<li><strong>Benefit:<\/strong> When the ASG scales out, it pulls from the Warm Pool (starting a stopped instance is much faster than creating a new one).<\/li>\n<\/ul>\n<h2>5. Summary Cheat Sheet for Scenarios<\/h2>\n<table>\n<thead>\n<tr>\n<th>Scenario<\/th>\n<th>Solution<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Traffic is completely unpredictable/spiky<\/strong><\/td>\n<td><strong>Target Tracking<\/strong> (set CPU/Network metric).<\/td>\n<\/tr>\n<tr>\n<td><strong>Traffic has a known weekly pattern<\/strong><\/td>\n<td><strong>Scheduled Scaling<\/strong>.<\/td>\n<\/tr>\n<tr>\n<td><strong>Need to scale BEFORE the load hits (based on history)<\/strong><\/td>\n<td><strong>Predictive Scaling<\/strong>.<\/td>\n<\/tr>\n<tr>\n<td><strong>Need to prevent a specific instance from terminating<\/strong><\/td>\n<td>Enable <strong>Scale-In Protection<\/strong>.<\/td>\n<\/tr>\n<tr>\n<td><strong>App takes 10 mins to install on boot<\/strong><\/td>\n<td>Use <strong>Warm Pools<\/strong> (stopped state) or <strong>Golden AMI<\/strong>.<\/td>\n<\/tr>\n<tr>\n<td><strong>Need to run a script<\/strong> <em><strong>before<\/strong><\/em> <strong>instance terminates<\/strong><\/td>\n<td><strong>Lifecycle Hook<\/strong> (<code>Terminating:Wait<\/code>).<\/td>\n<\/tr>\n<tr>\n<td><strong>Update OS patches on all ASG instances<\/strong><\/td>\n<td><strong>Instance Refresh<\/strong> (Rolling update).<\/td>\n<\/tr>\n<tr>\n<td><strong>Availability Zones are unbalanced<\/strong><\/td>\n<td>ASG will attempt to <strong>Rebalance<\/strong> (launch in one AZ, terminate in another).<\/td>\n<\/tr>\n<\/tbody>\n<\/table>", "text": "AWS SAA-C03 Study Notes: Auto Scaling Groups (ASG) 1. Auto Scaling Group (ASG) Basics Goal: Scale EC2 instances out (add) to match increased load and scale in (remove) to save money when load decreases. Ensure a minimum and maximum number of instances run. Min Size: The ASG will never go below this number of instances. Max Size: The ASG will never go above this number. Desired Capacity: The number of instances you want running right now . Note: If you manually change Desired Capacity, the ASG will immediately launch or terminate instances to match it. Launch Template vs. Launch Configuration (Critical for Exam) The exam often asks which one to use. Always choose Launch Templates. Feature Launch Template (Newer/Recommended) Launch Configuration (Legacy) Modifiable? Yes (Versioning supported) No (Immutable - must recreate) Instance Types Mixed Instances (Spot + On-Demand) Single Instance Type only Features T2/T3 Unlimited, Dedicated Hosts Limited feature set Exam Verdict ALWAYS USE THIS Only use if explicitly forced by legacy constraints 2. Scaling Policies (Detailed) The SAA-C03 exam focuses heavily on knowing which policy fits a specific scenario. A. Dynamic Scaling Policies Reactive scaling based on real-time metrics (e.g., CPU, Network In/Out). 1. Target Tracking Scaling (Most Common) Concept: \"I want to keep the average CPU at 50%.\" How it works: You set a target value (e.g., 40% ASG Average CPU). The ASG automatically creates CloudWatch alarms. If CPU > 40%, it adds instances. If CPU < 40%, it removes them. Exam Keyword: \"Maintain average metric,\" \"Easiest to set up.\" 2. Step Scaling Concept: \"If CPU is slightly high, add 1 instance. If CPU is VERY high, add 5 instances.\" How it works: You define steps based on alarm breach size. Example: * CPU 50-60% -> Add 1 instance. CPU > 60% -> Add 3 instances. Key Feature: Does NOT wait for the cooldown period during scale-out (reacts faster to spikes than Simple Scaling). 3. Simple Scaling (Legacy) Concept: \"If alarm breaches, add 1 instance.\" How it works: Relies on a single CloudWatch alarm. Downside: It must wait for a Cooldown Period (default 300s) to expire before scaling again. Step Scaling is generally preferred. B. Predictive Scaling Concept: Uses Machine Learning to look at historical data and predict future traffic. How it works: Forecasts load for the next 48 hours and schedules scaling actions in advance . Exam Scenario: \"Recurring business patterns\" or \"Scale proactively before the load hits.\" C. Scheduled Scaling Concept: Scaling based on a known time schedule. Exam Scenario: \"Every Friday at 5 PM, traffic spikes.\" \"Big marketing event next Monday at 9 AM.\" 3. Important ASG Mechanics Scaling Cooldowns Definition: A \"pause\" period after a scaling activity (default 300 seconds) to allow metrics to stabilize. Effect: During a cooldown, the ASG will not launch or terminate additional instances (Simple Scaling respects this; Step Scaling can override it for scale-out). Tip: If your ASG is scaling up and down too rapidly (\"thrashing\"), increase the cooldown. Health Checks (EC2 vs. ELB) EC2 Status Checks (Default): The ASG checks if the instance VM is running. If the hardware fails, ASG replaces it. ELB Health Checks (Optional but Important): The ASG checks the application health via the Load Balancer. Scenario: The instance is running (EC2 check PASS), but the App crashed (HTTP 500 error). If ELB Check Enabled: ASG sees the App is down, terminates the instance, and replaces it. If ELB Check Disabled: ASG thinks the instance is healthy and keeps sending traffic to a broken app. Termination Policy When scaling in (removing instances), which one gets killed first? Default Policy: Find the Availability Zone (AZ) with the most instances (to maintain balance). Delete the instance with the Oldest Launch Configuration/Template . If multiple exist, delete the one closest to the next billing hour . - Exam Tip: You can enable Instance Scale-In Protection to prevent specific instances from being terminated during scale-in (useful for long-running jobs). 4. Advanced Features (High Exam Probability) Lifecycle Hooks Allows you to pause the creation or termination of an instance to perform a custom action. Pending:Wait: Instance is created but paused before serving traffic. (Use case: Installing software, downloading large datasets). Terminating:Wait: Instance is paused before destruction. (Use case: Uploading logs to S3, extracting final data). Integration: Usually triggers EventBridge or SNS -> Lambda Function. Instance Refresh Goal: Update all instances in the ASG to a new Launch Template (e.g., new AMI or User Data) without downtime. Mechanism: Performs a \"Rolling Update.\" It replaces instances batch-by-batch. Checkpoints: You can set percentages (e.g., \"replace 20%, then wait 1 hour\") to verify stability. Warm Pools Problem: Instances take too long to boot and install software (e.g., 5+ minutes), making dynamic scaling too slow. Solution: A pool of pre-initialized EC2 instances kept in a Stopped state. Benefit: When the ASG scales out, it pulls from the Warm Pool (starting a stopped instance is much faster than creating a new one). 5. Summary Cheat Sheet for Scenarios Scenario Solution Traffic is completely unpredictable/spiky Target Tracking (set CPU/Network metric). Traffic has a known weekly pattern Scheduled Scaling . Need to scale BEFORE the load hits (based on history) Predictive Scaling . Need to prevent a specific instance from terminating Enable Scale-In Protection . App takes 10 mins to install on boot Use Warm Pools (stopped state) or Golden AMI . Need to run a script before instance terminates Lifecycle Hook ( Terminating:Wait ). Update OS patches on all ASG instances Instance Refresh (Rolling update). Availability Zones are unbalanced ASG will attempt to Rebalance (launch in one AZ, terminate in another)."}, {"id": 5, "num": "5", "title": "RDS, Aurora, and ElastiCache", "html": "<h1>AWS SAA-C03 Exam Notes: RDS, Aurora, and ElastiCache<\/h1>\n<h2>1. Amazon RDS Overview<\/h2>\n<ul>\n<li><strong>What is it?<\/strong> Managed Relational Database Service. AWS manages the OS, patching, backups, and hardware. You manage the app optimization and schema.<\/li>\n<li><strong>Supported Engines:<\/strong> Postgres, MySQL, MariaDB, Oracle, Microsoft SQL Server, IBM Db2.<\/li>\n<li><strong>Instance Types:<\/strong><ul>\n<li><em>Standard<\/em> (m-class): General purpose.<\/li>\n<li><em>Memory Optimized<\/em> (r-class, x-class): Great for production DBs with heavy loads.<\/li>\n<li><em>Burstable<\/em> (t-class): Dev/Test or low workloads.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Storage Types:<\/strong><ul>\n<li><strong>General Purpose SSD (gp2/gp3):<\/strong> Cost-effective. Transactional workloads.<\/li>\n<li><strong>Provisioned IOPS SSD (io1/io2/Block Express):<\/strong> High performance, low latency, mission-critical. <strong>Supports Multi-Attach<\/strong> (io2 only on EBS, not RDS directly in the same way, but RDS uses io1/io2 for intense I/O).<\/li>\n<li><strong>Magnetic:<\/strong> Legacy (avoid in exam answers unless \"cost\" is the <em>only<\/em> factor and performance doesn't matter).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Auto Scaling:<\/strong> RDS Storage Auto Scaling can increase storage automatically without downtime (you must set a maximum limit).<\/li>\n<\/ul>\n<h2>2. RDS Read Replicas vs Multi-AZ (High Availability)<\/h2>\n<p><em>This is a guaranteed exam topic. Know the difference cold.<\/em><\/p>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th><strong>Read Replicas<\/strong><\/th>\n<th><strong>Multi-AZ (Standby)<\/strong><\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Primary Goal<\/strong><\/td>\n<td><strong>Scalability<\/strong> (Offload reads)<\/td>\n<td><strong>High Availability / Disaster Recovery<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Replication<\/strong><\/td>\n<td><strong>Asynchronous<\/strong> (Eventual consistency)<\/td>\n<td><strong>Synchronous<\/strong> (Strong consistency)<\/td>\n<\/tr>\n<tr>\n<td><strong>Active/Passive<\/strong><\/td>\n<td>All active (Primary writes, Replicas read)<\/td>\n<td>Active Primary / Passive Standby<\/td>\n<\/tr>\n<tr>\n<td><strong>Failover<\/strong><\/td>\n<td>Manual (must promote replica to primary)<\/td>\n<td><strong>Automatic<\/strong> (DNS points to standby)<\/td>\n<\/tr>\n<tr>\n<td><strong>Traffic<\/strong><\/td>\n<td>Serves <strong>READ ONLY<\/strong> traffic<\/td>\n<td><strong>NO TRAFFIC<\/strong> served by standby (it is idle)<\/td>\n<\/tr>\n<tr>\n<td><strong>Scope<\/strong><\/td>\n<td>Can be <strong>Cross-AZ<\/strong> or <strong>Cross-Region<\/strong><\/td>\n<td><strong>Within Region<\/strong> (spans 2 AZs)<\/td>\n<\/tr>\n<tr>\n<td><strong>Backups<\/strong><\/td>\n<td>Backups typically taken from Primary<\/td>\n<td>Backups taken from Standby (avoids I/O suspension)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<blockquote>\n<p><strong>Important Numbers:<\/strong>\n- <strong>RDS Read Replicas:<\/strong> Max <strong>15<\/strong> replicas for ASG/MySQL/MariaDB/PostgreSQL. Max <strong>5<\/strong> for Oracle.\n- <strong>Multi-AZ:<\/strong> Typically <strong>1 Standby<\/strong> instance (2 copies total).\n- <strong>Note on Multi-AZ Cluster:<\/strong> There is a newer deployment option called \"Multi-AZ with two readable standbys\" for MySQL/PostgreSQL. However, in standard exam questions, if they just say \"Multi-AZ,\" assume the classic <strong>Active/Passive<\/strong> setup where the standby cannot accept traffic.\n- <strong>Exam Tip:<\/strong> If a question asks to \"improve performance of a read-heavy analytics application,\" choose <strong>Read Replicas<\/strong>.\n- <strong>Exam Tip:<\/strong> If a question asks for \"fault tolerance\" or \"durability\" in case of a data center failure, choose <strong>Multi-AZ<\/strong>.<\/p>\n<\/blockquote>\n<h2>3. RDS Custom (Oracle &amp; Microsoft SQL Server)<\/h2>\n<ul>\n<li><strong>Use Case:<\/strong> You need to migrate a legacy application that requires <strong>access to the underlying Operating System (OS)<\/strong> or requires you to install custom software/agents on the DB server.<\/li>\n<li><strong>Management Model:<\/strong><ul>\n<li>Standard RDS: You <strong>cannot<\/strong> SSH/RDP into the instance.<\/li>\n<li><strong>RDS Custom:<\/strong> You <strong>CAN<\/strong> SSH/RDP into the instance.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Responsibility Shift:<\/strong> Because you have OS access, <strong>you<\/strong> are responsible for OS patching. AWS will pause automation if you make changes that interfere with their hooks.<\/li>\n<li><strong>Engines:<\/strong> Only available for Oracle and Microsoft SQL Server.<\/li>\n<\/ul>\n<h2>4. Amazon Aurora<\/h2>\n<ul>\n<li><strong>Architecture:<\/strong> AWS-native relational DB (MySQL &amp; PostgreSQL compatible).<\/li>\n<li><strong>Storage (The \"Magic\" Part):<\/strong><ul>\n<li>Data is stored in a <strong>shared Cluster Volume<\/strong> (virtual storage), not local EBS.<\/li>\n<li><strong>3 AZs, 6 Copies:<\/strong> Aurora writes 6 copies of your data across 3 AZs.<\/li>\n<li><strong>Self-Healing:<\/strong> Automatically isolates bad disk blocks.<\/li>\n<li><strong>Auto-Expanding:<\/strong> Storage grows automatically (up to 128 TB).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Availability &amp; Replicas:<\/strong><ul>\n<li>Write availability: Needs 4 of 6 copies.<\/li>\n<li>Read availability: Needs 3 of 6 copies.<\/li>\n<li><strong>Aurora Replicas:<\/strong> Max <strong>15<\/strong> replicas (Auto Scaling enabled).<\/li>\n<li>If Master fails, an Aurora Replica is promoted automatically (very fast, &lt; 30s)<\/li>\n<\/ul>\n<\/li>\n<li><strong>Endpoints (Crucial for Exam):<\/strong><ul>\n<li><strong>Cluster Endpoint (Writer Endpoint):<\/strong> Points to the ONE primary instance. Use for writes.<\/li>\n<li><strong>Reader Endpoint:<\/strong> Load balances traffic across ALL read replicas. Use for reporting/analytics.<\/li>\n<li><strong>Custom Endpoint:<\/strong> A subset of instances (e.g., \"Analytics Nodes\" vs \"Web Nodes\").<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>5. Amazon Aurora - Advanced Concepts<\/h2>\n<ul>\n<li><strong>Aurora Serverless (v1 &amp; v2):<\/strong><ul>\n<li>Automated scaling for <strong>intermittent or unpredictable workloads<\/strong>.<\/li>\n<li>No instance provisioning. Pay per second (v2) or minute (v1).<\/li>\n<li><em>Exam Use Case:<\/em> \"A startup has a database that is used heavily for 2 hours a day but is idle the rest of the time.\" -&gt; <strong>Aurora Serverless<\/strong>.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Aurora Global Database:<\/strong><ul>\n<li><strong>Physical Replication:<\/strong> Replicates at the storage layer (latency &lt; 1 second).<\/li>\n<li><strong>Secondary Regions:<\/strong> Supports up to <strong>10 secondary regions<\/strong> (check exam version, formerly 5).<\/li>\n<li><strong>Cross-Region DR:<\/strong> Promote a secondary region to primary in &lt; 1 minute.<\/li>\n<li><em>Exam Use Case:<\/em> \"Mission-critical app requires RPO &lt; 1 second and RTO &lt; 1 minute across regions.\"<\/li>\n<\/ul>\n<\/li>\n<li><strong>Aurora Backtrack (MySQL Only):<\/strong><ul>\n<li>Rewind the database to a specific point in time without restoring from a backup.<\/li>\n<li>Exclusive to Aurora MySQL.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Aurora Machine Learning:<\/strong><ul>\n<li>Enables you to add ML-based predictions to your applications via SQL.<\/li>\n<li><strong>Integration:<\/strong> Direct integration with <strong>Amazon SageMaker<\/strong> (for any ML model) and <strong>Amazon Comprehend<\/strong> (for sentiment analysis).<\/li>\n<li><em>Exam Benefit:<\/em> No need to build complex ML pipelines; just call a SQL function.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Babelfish for Aurora PostgreSQL:<\/strong><ul>\n<li><strong>Goal:<\/strong> Run Microsoft SQL Server applications on Aurora PostgreSQL with minimal code changes.<\/li>\n<li><strong>How it works:<\/strong> It allows Aurora PostgreSQL to understand T-SQL (Transact-SQL) and listen on port 1433.<\/li>\n<li><em>Exam Use Case:<\/em> \"Migrating legacy SQL Server app to open-source AWS DB with minimal refactoring.\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>6. RDS &amp; Aurora - Backups, Monitoring &amp; Maintenance<\/h2>\n<ul>\n<li><strong>Backup &amp; Restore Architecture (Exam Critical):<\/strong><ul>\n<li><strong>RDS Backup:<\/strong><ul>\n<li><strong>Snapshots:<\/strong> Traditional snapshots of the storage volume.<\/li>\n<li><strong>Performance:<\/strong> In Single-AZ, I/O may suspend briefly. In Multi-AZ, backup is taken from the Standby (no impact).<\/li>\n<li><strong>Retention:<\/strong> 1-35 days for automated. Manual snapshots kept indefinitely.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Aurora Backup:<\/strong><ul>\n<li><strong>Continuous Backup:<\/strong> Backups are essentially continuous and streaming to S3.<\/li>\n<li><strong>Performance:<\/strong> <strong>Zero performance impact<\/strong> on the database (no I/O freeze).<\/li>\n<li><strong>Restore:<\/strong> Point-in-Time Recovery (PITR) is faster than RDS.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<\/li>\n<li><strong>Database Cloning (Aurora Only):<\/strong><ul>\n<li><strong>Concept:<\/strong> Creates a new cluster from an existing one using <strong>Copy-on-Write<\/strong> protocol.<\/li>\n<li><strong>Speed:<\/strong> Instant (does not copy full data initially).<\/li>\n<li><strong>Cost:<\/strong> You only pay for the <em>changes<\/em> made to the new clone.<\/li>\n<li><em>Exam Use Case:<\/em> \"Need to create a Staging environment using Production data for testing immediately without high storage costs.\"<\/li>\n<\/ul>\n<\/li>\n<li><strong>Monitoring Tools (Know the difference!):<\/strong><ul>\n<li><strong>CloudWatch:<\/strong> <em>Hypervisor<\/em> metrics. CPU, Network, Disk I/O.<ul>\n<li><em>Limitation:<\/em> Can't see <em>what<\/em> query or process is consuming resources.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Enhanced Monitoring:<\/strong> <em>OS-level<\/em> agent.<ul>\n<li><em>Key Metrics:<\/em> Memory, <strong>Process List<\/strong> (which process is using CPU?), Swap.<\/li>\n<li><em>Granularity:<\/em> Down to 1 second.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Performance Insights:<\/strong> <em>Database-level<\/em> dashboard.<ul>\n<li><em>Key Metrics:<\/em> <strong>DB Load (AAS)<\/strong>, Wait Events, Top SQL Queries.<\/li>\n<li><em>Exam Scenario:<\/em> \"Database is slow, CPU is 100%. Which SQL query is responsible?\" -&gt; <strong>Performance Insights<\/strong>.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<\/li>\n<li><strong>Maintenance Windows:<\/strong><ul>\n<li>Required for engine version upgrades or OS patching.<\/li>\n<li><strong>RDS Multi-AZ:<\/strong> Standby patched first, then failover, then Primary patched. (Brief downtime for failover).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>7. RDS Security<\/h2>\n<ul>\n<li><strong>Encryption at Rest:<\/strong> Enabled at creation time using <strong>KMS<\/strong> (AES-256). You cannot encrypt an existing unencrypted DB directly (Snap -&gt; Copy as Encrypted -&gt; Restore).<\/li>\n<li><strong>Encryption in Transit:<\/strong> SSL/TLS is supported. Enforce using parameter groups (<code>rds.force_ssl=1<\/code> for Postgres/MySQL) or SQL commands.<\/li>\n<li><strong>IAM Database Authentication:<\/strong><ul>\n<li>Instead of a database password, use an IAM Token (valid for 15 mins).<\/li>\n<li>Best for: Lambda functions or EC2 instances accessing RDS. Removes need for hardcoded credentials.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Security Groups:<\/strong> Control <strong>network<\/strong> access (allow port 3306/5432 from App Security Group).<\/li>\n<\/ul>\n<h2>8. RDS Proxy<\/h2>\n<ul>\n<li><strong>Problem:<\/strong> Opening and closing DB connections is \"expensive\" (CPU/RAM). High-concurrency apps (like Lambda) can exhaust DB connections (aka \"Connection Storms\").<\/li>\n<li><strong>Solution:<\/strong> RDS Proxy sits between the App and the DB.<ul>\n<li><strong>Connection Pooling:<\/strong> Reuses existing connections.<\/li>\n<li><strong>Failover Reduction:<\/strong> Reduces Aurora failover time by up to 66% (bypasses DNS propagation delays).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Keyword:<\/strong> \"Lambda,\" \"Too many connections,\" \"Connection timeout,\" \"Reduce failover time.\"<\/li>\n<\/ul>\n<h2>9. ElastiCache Overview<\/h2>\n<ul>\n<li><strong>What is it?<\/strong> Managed In-Memory Caching (Redis &amp; Memcached). Helps offload read-heavy workloads from the database.<\/li>\n<\/ul>\n<h3>Redis vs. Memcached (The Comparison)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th><strong>Redis<\/strong><\/th>\n<th><strong>Memcached<\/strong><\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Data Types<\/strong><\/td>\n<td><strong>Complex<\/strong> (Strings, Lists, Sets, Sorted Sets, Hashes, Bitmaps)<\/td>\n<td><strong>Simple<\/strong> (Strings, Objects)<\/td>\n<\/tr>\n<tr>\n<td><strong>Persistence<\/strong><\/td>\n<td><strong>Yes<\/strong> (AOF/RDB) - Data survives reboot<\/td>\n<td><strong>No<\/strong> - Data lost on reboot<\/td>\n<\/tr>\n<tr>\n<td><strong>Availability<\/strong><\/td>\n<td><strong>Multi-AZ<\/strong> with Auto-Failover<\/td>\n<td>No Multi-AZ (Sharding only)<\/td>\n<\/tr>\n<tr>\n<td><strong>Scaling<\/strong><\/td>\n<td>Scale Read Replicas &amp; Clustering<\/td>\n<td>Multithreaded (Scale Up/Out)<\/td>\n<\/tr>\n<tr>\n<td><strong>Features<\/strong><\/td>\n<td>Pub/Sub, Geospatial, Transactions, <strong>Leaderboards<\/strong><\/td>\n<td>Simple Caching<\/td>\n<\/tr>\n<tr>\n<td><strong>Compliance<\/strong><\/td>\n<td>HIPPA, FedRAMP<\/td>\n<td>HIPPA, FedRAMP<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<ul>\n<li><strong>Exam Shortcut:<\/strong><ul>\n<li>Need \"Leaderboards\", \"Sorting\", \"Persistence\", or \"Advanced Types\"? <strong>Choose Redis.<\/strong><\/li>\n<li>Need \"Simple multithreaded cache\" or \"Object caching\"? <strong>Choose Memcached.<\/strong><\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>10. ElastiCache for Solution Architects (Strategies)<\/h2>\n<h3>Caching Strategies<\/h3>\n<ol>\n<li><strong>Lazy Loading (Cache-Aside):<\/strong><ul>\n<li>App checks Cache. If miss, queries DB, writes to Cache, returns to user.<\/li>\n<li><em>Pros:<\/em> Only requested data is cached. Node failure not fatal.<\/li>\n<li><em>Cons:<\/em> \"Cache Miss\" penalty (3 network calls). Data can become stale.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Write-Through:<\/strong><ul>\n<li>App writes to DB and Cache simultaneously.<\/li>\n<li><em>Pros:<\/em> Data never stale. fast reads.<\/li>\n<li><em>Cons:<\/em> Write penalty (slower writes). Wasted memory on data that is never read.<\/li>\n<\/ul>\n<\/li>\n<\/ol>\n<h3>Use Case: Session Store<\/h3>\n<ul>\n<li><strong>Scenario:<\/strong> You have a stateless web application scaling across multiple EC2 instances. Where do you store the user's login session?<\/li>\n<li><strong>Option A:<\/strong> DynamoDB (Great, but higher latency than cache).<\/li>\n<li><strong>Option B:<\/strong> <strong>ElastiCache (Redis)<\/strong>.<ul>\n<li><em>Why?<\/em> Sub-millisecond latency. You can set a TTL (Time to Live) to auto-expire sessions.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>Caching at Scale<\/h3>\n<ul>\n<li>If you see \"Global\" or \"Cross Region\" caching requirements -&gt; <strong>Redis Global Datastore<\/strong>.<\/li>\n<\/ul>\n<h2>11. Crucial Exam Extras (Must Know!)<\/h2>\n<h3>AWS Secrets Manager Integration<\/h3>\n<ul>\n<li><strong>Problem:<\/strong> Hardcoding DB passwords in code is a security violation.<\/li>\n<li><strong>Solution:<\/strong> Store credentials in <strong>AWS Secrets Manager<\/strong>.<\/li>\n<li><strong>Key Feature:<\/strong> <strong>Automatic Rotation.<\/strong> Secrets Manager can automatically rotate the password in RDS and give the new one to the application without you doing anything.<\/li>\n<li><em>Exam Keyword:<\/em> \"Rotate credentials,\" \"Remove hardcoded passwords,\" \"Retrieve secrets automatically.\"<\/li>\n<\/ul>\n<h3>RDS Backups vs. Snapshots<\/h3>\n<ul>\n<li><strong>Automated Backups:<\/strong><ul>\n<li>Enabled by default.<\/li>\n<li>Retention: 1 to 35 days (Set to 0 to disable).<\/li>\n<li>Point-in-Time Recovery (PITR) capable.<\/li>\n<li><em>Deleted when you delete the instance<\/em> (unless you check \"Retain final backup\").<\/li>\n<\/ul>\n<\/li>\n<li><strong>Manual Snapshots:<\/strong><ul>\n<li>User initiated.<\/li>\n<li>Retention: <strong>Indefinite<\/strong> (Never expire).<\/li>\n<li><em>Persist even if the original RDS instance is deleted.<\/em><\/li>\n<\/ul>\n<\/li>\n<li><em>Exam Scenario:<\/em> \"Company needs to keep database backups for 5 years for auditing.\" -&gt; Use <strong>Manual Snapshots<\/strong> (or AWS Backup service), as Automated only goes to 35 days.<\/li>\n<\/ul>\n<h3>Parameter Groups: Static vs. Dynamic<\/h3>\n<ul>\n<li><strong>Dynamic Parameters:<\/strong> Changes apply <strong>immediately<\/strong> (no reboot).<\/li>\n<li><strong>Static Parameters:<\/strong> Changes require a <strong>MANUAL REBOOT<\/strong> of the database to take effect.<\/li>\n<li><em>Exam Scenario:<\/em> \"You updated a parameter to enable logging, but it's not working.\" -&gt; Check if it was a static parameter and if the instance was rebooted.<\/li>\n<\/ul>\n<h3>Database Migration Service (DMS)<\/h3>\n<ul>\n<li><strong>What is it?<\/strong> Migrates databases to AWS while the source DB remains operational (minimal downtime).<\/li>\n<li><strong>Schema Conversion Tool (SCT):<\/strong> Used <em>before<\/em> DMS if engines are different (e.g., Oracle -&gt; Aurora PostgreSQL) to convert schema/procedures.<\/li>\n<li><strong>Homogeneous:<\/strong> Same engine (MySQL -&gt; RDS MySQL).<\/li>\n<li><strong>Heterogeneous:<\/strong> Different engine (SQL Server -&gt; Aurora). Use SCT + DMS.<\/li>\n<\/ul>", "text": "AWS SAA-C03 Exam Notes: RDS, Aurora, and ElastiCache 1. Amazon RDS Overview What is it? Managed Relational Database Service. AWS manages the OS, patching, backups, and hardware. You manage the app optimization and schema. Supported Engines: Postgres, MySQL, MariaDB, Oracle, Microsoft SQL Server, IBM Db2. Instance Types: Standard (m-class): General purpose. Memory Optimized (r-class, x-class): Great for production DBs with heavy loads. Burstable (t-class): Dev/Test or low workloads. Storage Types: General Purpose SSD (gp2/gp3): Cost-effective. Transactional workloads. Provisioned IOPS SSD (io1/io2/Block Express): High performance, low latency, mission-critical. Supports Multi-Attach (io2 only on EBS, not RDS directly in the same way, but RDS uses io1/io2 for intense I/O). Magnetic: Legacy (avoid in exam answers unless \"cost\" is the only factor and performance doesn't matter). Auto Scaling: RDS Storage Auto Scaling can increase storage automatically without downtime (you must set a maximum limit). 2. RDS Read Replicas vs Multi-AZ (High Availability) This is a guaranteed exam topic. Know the difference cold. Feature Read Replicas Multi-AZ (Standby) Primary Goal Scalability (Offload reads) High Availability / Disaster Recovery Replication Asynchronous (Eventual consistency) Synchronous (Strong consistency) Active/Passive All active (Primary writes, Replicas read) Active Primary / Passive Standby Failover Manual (must promote replica to primary) Automatic (DNS points to standby) Traffic Serves READ ONLY traffic NO TRAFFIC served by standby (it is idle) Scope Can be Cross-AZ or Cross-Region Within Region (spans 2 AZs) Backups Backups typically taken from Primary Backups taken from Standby (avoids I/O suspension) Important Numbers: - RDS Read Replicas: Max 15 replicas for ASG/MySQL/MariaDB/PostgreSQL. Max 5 for Oracle. - Multi-AZ: Typically 1 Standby instance (2 copies total). - Note on Multi-AZ Cluster: There is a newer deployment option called \"Multi-AZ with two readable standbys\" for MySQL/PostgreSQL. However, in standard exam questions, if they just say \"Multi-AZ,\" assume the classic Active/Passive setup where the standby cannot accept traffic. - Exam Tip: If a question asks to \"improve performance of a read-heavy analytics application,\" choose Read Replicas . - Exam Tip: If a question asks for \"fault tolerance\" or \"durability\" in case of a data center failure, choose Multi-AZ . 3. RDS Custom (Oracle & Microsoft SQL Server) Use Case: You need to migrate a legacy application that requires access to the underlying Operating System (OS) or requires you to install custom software/agents on the DB server. Management Model: Standard RDS: You cannot SSH/RDP into the instance. RDS Custom: You CAN SSH/RDP into the instance. Responsibility Shift: Because you have OS access, you are responsible for OS patching. AWS will pause automation if you make changes that interfere with their hooks. Engines: Only available for Oracle and Microsoft SQL Server. 4. Amazon Aurora Architecture: AWS-native relational DB (MySQL & PostgreSQL compatible). Storage (The \"Magic\" Part): Data is stored in a shared Cluster Volume (virtual storage), not local EBS. 3 AZs, 6 Copies: Aurora writes 6 copies of your data across 3 AZs. Self-Healing: Automatically isolates bad disk blocks. Auto-Expanding: Storage grows automatically (up to 128 TB). Availability & Replicas: Write availability: Needs 4 of 6 copies. Read availability: Needs 3 of 6 copies. Aurora Replicas: Max 15 replicas (Auto Scaling enabled). If Master fails, an Aurora Replica is promoted automatically (very fast, < 30s) Endpoints (Crucial for Exam): Cluster Endpoint (Writer Endpoint): Points to the ONE primary instance. Use for writes. Reader Endpoint: Load balances traffic across ALL read replicas. Use for reporting/analytics. Custom Endpoint: A subset of instances (e.g., \"Analytics Nodes\" vs \"Web Nodes\"). 5. Amazon Aurora - Advanced Concepts Aurora Serverless (v1 & v2): Automated scaling for intermittent or unpredictable workloads . No instance provisioning. Pay per second (v2) or minute (v1). Exam Use Case: \"A startup has a database that is used heavily for 2 hours a day but is idle the rest of the time.\" -> Aurora Serverless . Aurora Global Database: Physical Replication: Replicates at the storage layer (latency < 1 second). Secondary Regions: Supports up to 10 secondary regions (check exam version, formerly 5). Cross-Region DR: Promote a secondary region to primary in < 1 minute. Exam Use Case: \"Mission-critical app requires RPO < 1 second and RTO < 1 minute across regions.\" Aurora Backtrack (MySQL Only): Rewind the database to a specific point in time without restoring from a backup. Exclusive to Aurora MySQL. Aurora Machine Learning: Enables you to add ML-based predictions to your applications via SQL. Integration: Direct integration with Amazon SageMaker (for any ML model) and Amazon Comprehend (for sentiment analysis). Exam Benefit: No need to build complex ML pipelines; just call a SQL function. Babelfish for Aurora PostgreSQL: Goal: Run Microsoft SQL Server applications on Aurora PostgreSQL with minimal code changes. How it works: It allows Aurora PostgreSQL to understand T-SQL (Transact-SQL) and listen on port 1433. Exam Use Case: \"Migrating legacy SQL Server app to open-source AWS DB with minimal refactoring.\" 6. RDS & Aurora - Backups, Monitoring & Maintenance Backup & Restore Architecture (Exam Critical): RDS Backup: Snapshots: Traditional snapshots of the storage volume. Performance: In Single-AZ, I/O may suspend briefly. In Multi-AZ, backup is taken from the Standby (no impact). Retention: 1-35 days for automated. Manual snapshots kept indefinitely. Aurora Backup: Continuous Backup: Backups are essentially continuous and streaming to S3. Performance: Zero performance impact on the database (no I/O freeze). Restore: Point-in-Time Recovery (PITR) is faster than RDS. Database Cloning (Aurora Only): Concept: Creates a new cluster from an existing one using Copy-on-Write protocol. Speed: Instant (does not copy full data initially). Cost: You only pay for the changes made to the new clone. Exam Use Case: \"Need to create a Staging environment using Production data for testing immediately without high storage costs.\" Monitoring Tools (Know the difference!): CloudWatch: Hypervisor metrics. CPU, Network, Disk I/O. Limitation: Can't see what query or process is consuming resources. Enhanced Monitoring: OS-level agent. Key Metrics: Memory, Process List (which process is using CPU?), Swap. Granularity: Down to 1 second. Performance Insights: Database-level dashboard. Key Metrics: DB Load (AAS) , Wait Events, Top SQL Queries. Exam Scenario: \"Database is slow, CPU is 100%. Which SQL query is responsible?\" -> Performance Insights . Maintenance Windows: Required for engine version upgrades or OS patching. RDS Multi-AZ: Standby patched first, then failover, then Primary patched. (Brief downtime for failover). 7. RDS Security Encryption at Rest: Enabled at creation time using KMS (AES-256). You cannot encrypt an existing unencrypted DB directly (Snap -> Copy as Encrypted -> Restore). Encryption in Transit: SSL/TLS is supported. Enforce using parameter groups ( rds.force_ssl=1 for Postgres/MySQL) or SQL commands. IAM Database Authentication: Instead of a database password, use an IAM Token (valid for 15 mins). Best for: Lambda functions or EC2 instances accessing RDS. Removes need for hardcoded credentials. Security Groups: Control network access (allow port 3306/5432 from App Security Group). 8. RDS Proxy Problem: Opening and closing DB connections is \"expensive\" (CPU/RAM). High-concurrency apps (like Lambda) can exhaust DB connections (aka \"Connection Storms\"). Solution: RDS Proxy sits between the App and the DB. Connection Pooling: Reuses existing connections. Failover Reduction: Reduces Aurora failover time by up to 66% (bypasses DNS propagation delays). Exam Keyword: \"Lambda,\" \"Too many connections,\" \"Connection timeout,\" \"Reduce failover time.\" 9. ElastiCache Overview What is it? Managed In-Memory Caching (Redis & Memcached). Helps offload read-heavy workloads from the database. Redis vs. Memcached (The Comparison) Feature Redis Memcached Data Types Complex (Strings, Lists, Sets, Sorted Sets, Hashes, Bitmaps) Simple (Strings, Objects) Persistence Yes (AOF/RDB) - Data survives reboot No - Data lost on reboot Availability Multi-AZ with Auto-Failover No Multi-AZ (Sharding only) Scaling Scale Read Replicas & Clustering Multithreaded (Scale Up/Out) Features Pub/Sub, Geospatial, Transactions, Leaderboards Simple Caching Compliance HIPPA, FedRAMP HIPPA, FedRAMP Exam Shortcut: Need \"Leaderboards\", \"Sorting\", \"Persistence\", or \"Advanced Types\"? Choose Redis. Need \"Simple multithreaded cache\" or \"Object caching\"? Choose Memcached. 10. ElastiCache for Solution Architects (Strategies) Caching Strategies Lazy Loading (Cache-Aside): App checks Cache. If miss, queries DB, writes to Cache, returns to user. Pros: Only requested data is cached. Node failure not fatal. Cons: \"Cache Miss\" penalty (3 network calls). Data can become stale. Write-Through: App writes to DB and Cache simultaneously. Pros: Data never stale. fast reads. Cons: Write penalty (slower writes). Wasted memory on data that is never read. Use Case: Session Store Scenario: You have a stateless web application scaling across multiple EC2 instances. Where do you store the user's login session? Option A: DynamoDB (Great, but higher latency than cache). Option B: ElastiCache (Redis) . Why? Sub-millisecond latency. You can set a TTL (Time to Live) to auto-expire sessions. Caching at Scale If you see \"Global\" or \"Cross Region\" caching requirements -> Redis Global Datastore . 11. Crucial Exam Extras (Must Know!) AWS Secrets Manager Integration Problem: Hardcoding DB passwords in code is a security violation. Solution: Store credentials in AWS Secrets Manager . Key Feature: Automatic Rotation. Secrets Manager can automatically rotate the password in RDS and give the new one to the application without you doing anything. Exam Keyword: \"Rotate credentials,\" \"Remove hardcoded passwords,\" \"Retrieve secrets automatically.\" RDS Backups vs. Snapshots Automated Backups: Enabled by default. Retention: 1 to 35 days (Set to 0 to disable). Point-in-Time Recovery (PITR) capable. Deleted when you delete the instance (unless you check \"Retain final backup\"). Manual Snapshots: User initiated. Retention: Indefinite (Never expire). Persist even if the original RDS instance is deleted. Exam Scenario: \"Company needs to keep database backups for 5 years for auditing.\" -> Use Manual Snapshots (or AWS Backup service), as Automated only goes to 35 days. Parameter Groups: Static vs. Dynamic Dynamic Parameters: Changes apply immediately (no reboot). Static Parameters: Changes require a MANUAL REBOOT of the database to take effect. Exam Scenario: \"You updated a parameter to enable logging, but it's not working.\" -> Check if it was a static parameter and if the instance was rebooted. Database Migration Service (DMS) What is it? Migrates databases to AWS while the source DB remains operational (minimal downtime). Schema Conversion Tool (SCT): Used before DMS if engines are different (e.g., Oracle -> Aurora PostgreSQL) to convert schema/procedures. Homogeneous: Same engine (MySQL -> RDS MySQL). Heterogeneous: Different engine (SQL Server -> Aurora). Use SCT + DMS."}, {"id": 6, "num": "6", "title": "Route 53", "html": "<h1>AWS SAA-C03 Exam Notes: Route 53<\/h1>\n<h2>1. What is DNS? (Domain Name System)<\/h2>\n<ul>\n<li><strong>Concept:<\/strong> The \"Phonebook of the Internet.\" It translates human-friendly hostnames (e.g., <code>www.google.com<\/code>) into machine-readable IP addresses (e.g., <code>172.217.1.1<\/code>).<\/li>\n<li><strong>Hierarchy:<\/strong><ul>\n<li><strong>Root:<\/strong> The dot at the end (managed by IANA).<\/li>\n<li><strong>TLD (Top Level Domain):<\/strong> .com, .org, .gov.<\/li>\n<li><strong>SLD (Second Level Domain):<\/strong> amazon.com, https://www.google.com/search?q=google.com.<\/li>\n<li><strong>Subdomain:<\/strong> www, api, blog.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Records:<\/strong> The specific instructions in the DNS database (A, AAAA, CNAME, NS, SOA).<\/li>\n<\/ul>\n<h2>2. Route 53 Overview<\/h2>\n<ul>\n<li><strong>Definition:<\/strong> A highly available and scalable cloud Domain Name System (DNS) web service.<\/li>\n<li><strong>Key Functions:<\/strong><ol>\n<li><strong>Domain Registration:<\/strong> You can buy domain names.<\/li>\n<li><strong>DNS Routing:<\/strong> Routing internet traffic to resources.<\/li>\n<li><strong>Health Checking:<\/strong> Monitoring the health of resources.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Global Service:<\/strong> Route 53 is a <strong>Global<\/strong> service (similar to IAM and S3), though resources you point to are Regional.<\/li>\n<li><strong>SLA:<\/strong> It is the only AWS service to offer a <strong>100% Availability SLA<\/strong>.<\/li>\n<li><strong>Hosted Zones:<\/strong><ul>\n<li><strong>Public Hosted Zone:<\/strong> Records for the internet to resolve.<\/li>\n<li><strong>Private Hosted Zone:<\/strong> Records for internal VPCs to resolve (requires VPC settings <code>enableDnsHostnames<\/code> and <code>enableDnsSupport<\/code> to be true).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>3. Route 53 - TTL (Time To Live)<\/h2>\n<ul>\n<li><strong>Definition:<\/strong> The duration (in seconds) that a DNS resolver or local computer caches a DNS record.<\/li>\n<li><strong>Mandatory:<\/strong> TTL is mandatory for all record types <strong>except Alias records<\/strong>.<\/li>\n<li><strong>High TTL (e.g., 24 hours):<\/strong><ul>\n<li>Less traffic to Route 53.<\/li>\n<li>Lower cost.<\/li>\n<li><strong>Con:<\/strong> Changes to records take a long time to propagate.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Low TTL (e.g., 60 seconds):<\/strong><ul>\n<li>More traffic to Route 53.<\/li>\n<li>Higher cost.<\/li>\n<li><strong>Pro:<\/strong> Changes propagate quickly (good for changing IPs frequently).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>4. Route 53 CNAME vs Alias (CRITICAL EXAM TOPIC)<\/h2>\n<h3>CNAME (Canonical Name)<\/h3>\n<ul>\n<li>Points a <strong>Hostname to another Hostname<\/strong>.<\/li>\n<li>Example: <code>app.mydomain.com<\/code> -&gt; <code>lb-123.us-east-1.elb.amazonaws.com<\/code>.<\/li>\n<li><strong>Limitation:<\/strong> You <strong>CANNOT<\/strong> create a CNAME record for the <strong>Zone Apex<\/strong> (Root Domain/Naked Domain), e.g., <code>mydomain.com<\/code>.<\/li>\n<\/ul>\n<h3>Alias Record<\/h3>\n<ul>\n<li><strong>AWS Specific<\/strong> feature.<\/li>\n<li>Points a <strong>Hostname to an AWS Resource<\/strong> (ELB, CloudFront, S3 Website, Elastic Beanstalk, API Gateway, VPC Interface Endpoint, Global Accelerator).<\/li>\n<li><strong>Key Advantage:<\/strong> It <strong>CAN<\/strong> be used at the <strong>Zone Apex<\/strong> (<code>mydomain.com<\/code>).<\/li>\n<li><strong>Behavior:<\/strong> It acts like an A record (returns an IP) but internally maps to the AWS resource.<\/li>\n<li><strong>Cost:<\/strong> Alias queries to AWS resources are free.<\/li>\n<li><strong>TTL:<\/strong> You cannot set a TTL for Alias records (Route 53 respects the TTL of the target resource).<\/li>\n<\/ul>\n<blockquote>\n<p><strong>Exam Tip:<\/strong> If a question asks to point the <em>root domain<\/em> (zone apex) to an ELB or S3 bucket, the answer is always <strong>Alias<\/strong>. Never CNAME.<\/p>\n<\/blockquote>\n<h2>5. Routing Policies<\/h2>\n<h3>A. Simple Routing Policy<\/h3>\n<ul>\n<li><strong>Use Case:<\/strong> Use when you have a single resource that performs a given function for your domain.<\/li>\n<li><strong>Behavior:<\/strong><ul>\n<li>Can return one or multiple values (IPs) to the client.<\/li>\n<li>If multiple values are returned, the client chooses one at random.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Constraint:<\/strong> Does <strong>not<\/strong> support Health Checks (you cannot route away from an unhealthy instance automatically with Simple routing).<\/li>\n<\/ul>\n<h3>B. Weighted Routing Policy<\/h3>\n<ul>\n<li><strong>Use Case:<\/strong> <strong>A/B Testing<\/strong>, Blue/Green Deployments, or splitting traffic between regions intentionally.<\/li>\n<li><strong>Behavior:<\/strong> You assign a \"Weight\" (0-255) to each record.<\/li>\n<li><strong>Logic:<\/strong> Traffic % = (Specific Weight / Sum of all Weights).<ul>\n<li><em>Example:<\/em> Record A (Weight 10), Record B (Weight 90). Record A gets 10% traffic.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Note:<\/strong> Setting weight to 0 stops traffic to that resource.<\/li>\n<\/ul>\n<h3>C. Latency Routing Policy<\/h3>\n<ul>\n<li><strong>Use Case:<\/strong> <strong>Performance<\/strong>. You want to provide the best experience for global users.<\/li>\n<li><strong>Behavior:<\/strong> Route 53 looks at the user's location and the AWS Region latency, then routes the user to the AWS Region with the <strong>lowest latency<\/strong> (fastest response time).<\/li>\n<\/ul>\n<h3>D. Failover Routing Policy<\/h3>\n<ul>\n<li><strong>Use Case:<\/strong> <strong>Disaster Recovery (DR)<\/strong>. Active-Passive configuration.<\/li>\n<li><strong>Prerequisite:<\/strong> Requires <strong>Health Checks<\/strong>.<\/li>\n<li><strong>Behavior:<\/strong><ul>\n<li><strong>Primary Record:<\/strong> Route 53 monitors this.<\/li>\n<li><strong>Secondary Record:<\/strong> Traffic is routed here <em>only<\/em> if the Primary is unhealthy.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>E. Geolocation Routing Policy<\/h3>\n<ul>\n<li><strong>Use Case:<\/strong> <strong>Compliance<\/strong>, Content Restrictions, Localized Language.<\/li>\n<li><strong>Behavior:<\/strong> Routes traffic based on the <strong>geographic location of the user<\/strong> (Continent, Country, or US State).<\/li>\n<li><strong>Example:<\/strong> Users in France go to French servers; everyone else goes to a Default server.<\/li>\n<li><strong>Key Difference from Latency:<\/strong> Latency is about <em>speed<\/em>; Geolocation is about <em>boundaries<\/em>.<\/li>\n<\/ul>\n<h3>F. Geoproximity Routing Policy<\/h3>\n<ul>\n<li><strong>Use Case:<\/strong> Complicated geographic routing with \"Bias.\"<\/li>\n<li><strong>Behavior:<\/strong> Routes traffic based on the geographic location of the users and the resources.<\/li>\n<li><strong>Bias:<\/strong> You can shift traffic from one region to another by increasing/decreasing the \"bias\" (expand or shrink the geographic region coverage).<\/li>\n<li><strong>Requirement:<\/strong> Must use <strong>Route 53 Traffic Flow<\/strong> (visual editor).<\/li>\n<\/ul>\n<h3>G. IP-Based Routing Policy<\/h3>\n<ul>\n<li><strong>Use Case:<\/strong> Performance optimization for specific ISPs or routing internal subnets.<\/li>\n<li><strong>Behavior:<\/strong> Routes traffic based on the client's <strong>CIDR (IP)<\/strong> block.<\/li>\n<li><strong>Example:<\/strong> Route 53 recognizes the IP is from \"Comcast\" or a specific corporate range and routes accordingly.<\/li>\n<\/ul>\n<h3>H. Multi-Value Answer Routing Policy<\/h3>\n<ul>\n<li><strong>Use Case:<\/strong> \"Simple Routing with Health Checks.\"<\/li>\n<li><strong>Behavior:<\/strong> Returns multiple values (IPs) in response to DNS queries, but <strong>only returns values for resources that are Healthy<\/strong>.<\/li>\n<li><strong>Limit:<\/strong> Up to 8 records.<\/li>\n<li><strong>Note:<\/strong> It is not a substitute for an ELB (Load Balancer), but acts as a basic client-side load balancer.<\/li>\n<\/ul>\n<h2>6. Health Checks<\/h2>\n<ul>\n<li><strong>Purpose:<\/strong> Automate failover and monitor status.<\/li>\n<li><strong>Types:<\/strong><ol>\n<li><strong>Endpoint:<\/strong> Checks an IP address or domain name (HTTP/HTTPS/TCP).<\/li>\n<li><strong>Calculated:<\/strong> Combines results of other health checks (AND/OR/NOT logic).<\/li>\n<li><strong>CloudWatch Alarm:<\/strong> Checks the state of a CloudWatch Alarm (useful for checking DynamoDB throttle or custom metrics, not just connectivity).<\/li>\n<\/ol>\n<\/li>\n<li><strong>Operation:<\/strong><ul>\n<li>Global health checkers send requests to your endpoint.<\/li>\n<li>Default: 30-second interval (can be fast - 10s).<\/li>\n<li>Default: 3 retries constitute a failure.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Private Hosted Zones:<\/strong> If monitoring an internal resource (Private IP), you must create a CloudWatch Alarm and use the \"CloudWatch Alarm\" health check type (Route 53 public checkers cannot access your private VPC).<\/li>\n<\/ul>\n<h2>7. 3rd Party Domains &amp; Route 53<\/h2>\n<ul>\n<li><strong>Scenario:<\/strong> You bought <code>example.com<\/code> on GoDaddy (Registrar) but want to manage records in AWS Route 53.<\/li>\n<li><strong>Steps:<\/strong><ol>\n<li>Create a <strong>Hosted Zone<\/strong> in Route 53 for <code>example.com<\/code>.<\/li>\n<li>Route 53 generates 4 <strong>Name Servers (NS)<\/strong>.<\/li>\n<li>Log in to GoDaddy (Registrar).<\/li>\n<li>Update the NS records in GoDaddy to match the 4 NS records provided by Route 53.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Note:<\/strong> Domain Registration and DNS Hosting are separate. You can keep the registration at GoDaddy but host the DNS zone file at AWS.<\/li>\n<\/ul>\n<h2>8. Route 53 Resolvers &amp; Hybrid DNS<\/h2>\n<ul>\n<li><strong>Scenario:<\/strong> You have an On-Premise Data Center and an AWS VPC connected via Direct Connect or VPN. You want on-prem servers to resolve AWS names, and AWS instances to resolve on-prem names.<\/li>\n<li><strong>Route 53 Resolver (Inbound Endpoint):<\/strong><ul>\n<li>Allows <strong>On-Premise<\/strong> resources to query Route 53 Resolver.<\/li>\n<li>Forward DNS queries from On-Prem -&gt; AWS.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Route 53 Resolver (Outbound Endpoint):<\/strong><ul>\n<li>Allows <strong>AWS<\/strong> resources to query On-Premise DNS servers.<\/li>\n<li>Forward DNS queries from AWS -&gt; On-Prem (using Forwarding Rules).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>Summary of Exam \"Gotchas\"<\/h2>\n<table>\n<thead>\n<tr>\n<th>Keyword/Scenario<\/th>\n<th>Answer usually involves...<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Zone Apex / Root Domain<\/strong><\/td>\n<td><strong>Alias Record<\/strong> (Not CNAME)<\/td>\n<\/tr>\n<tr>\n<td><strong>Active/Passive DR<\/strong><\/td>\n<td><strong>Failover Routing<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Lowest Latency / Fastest<\/strong><\/td>\n<td><strong>Latency Routing<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Legal Compliance / Borders<\/strong><\/td>\n<td><strong>Geolocation Routing<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Traffic Shift / Bias<\/strong><\/td>\n<td><strong>Geoproximity Routing<\/strong> (Traffic Flow)<\/td>\n<\/tr>\n<tr>\n<td><strong>80% to V1, 20% to V2<\/strong><\/td>\n<td><strong>Weighted Routing<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Hybrid Cloud DNS<\/strong><\/td>\n<td><strong>Route 53 Resolver<\/strong> (Inbound/Outbound)<\/td>\n<\/tr>\n<tr>\n<td><strong>Health Check Private IP<\/strong><\/td>\n<td><strong>CloudWatch Alarm<\/strong> Health Check<\/td>\n<\/tr>\n<\/tbody>\n<\/table>", "text": "AWS SAA-C03 Exam Notes: Route 53 1. What is DNS? (Domain Name System) Concept: The \"Phonebook of the Internet.\" It translates human-friendly hostnames (e.g., www.google.com ) into machine-readable IP addresses (e.g., 172.217.1.1 ). Hierarchy: Root: The dot at the end (managed by IANA). TLD (Top Level Domain): .com, .org, .gov. SLD (Second Level Domain): amazon.com, https://www.google.com/search?q=google.com. Subdomain: www, api, blog. Records: The specific instructions in the DNS database (A, AAAA, CNAME, NS, SOA). 2. Route 53 Overview Definition: A highly available and scalable cloud Domain Name System (DNS) web service. Key Functions: Domain Registration: You can buy domain names. DNS Routing: Routing internet traffic to resources. Health Checking: Monitoring the health of resources. Global Service: Route 53 is a Global service (similar to IAM and S3), though resources you point to are Regional. SLA: It is the only AWS service to offer a 100% Availability SLA . Hosted Zones: Public Hosted Zone: Records for the internet to resolve. Private Hosted Zone: Records for internal VPCs to resolve (requires VPC settings enableDnsHostnames and enableDnsSupport to be true). 3. Route 53 - TTL (Time To Live) Definition: The duration (in seconds) that a DNS resolver or local computer caches a DNS record. Mandatory: TTL is mandatory for all record types except Alias records . High TTL (e.g., 24 hours): Less traffic to Route 53. Lower cost. Con: Changes to records take a long time to propagate. Low TTL (e.g., 60 seconds): More traffic to Route 53. Higher cost. Pro: Changes propagate quickly (good for changing IPs frequently). 4. Route 53 CNAME vs Alias (CRITICAL EXAM TOPIC) CNAME (Canonical Name) Points a Hostname to another Hostname . Example: app.mydomain.com -> lb-123.us-east-1.elb.amazonaws.com . Limitation: You CANNOT create a CNAME record for the Zone Apex (Root Domain/Naked Domain), e.g., mydomain.com . Alias Record AWS Specific feature. Points a Hostname to an AWS Resource (ELB, CloudFront, S3 Website, Elastic Beanstalk, API Gateway, VPC Interface Endpoint, Global Accelerator). Key Advantage: It CAN be used at the Zone Apex ( mydomain.com ). Behavior: It acts like an A record (returns an IP) but internally maps to the AWS resource. Cost: Alias queries to AWS resources are free. TTL: You cannot set a TTL for Alias records (Route 53 respects the TTL of the target resource). Exam Tip: If a question asks to point the root domain (zone apex) to an ELB or S3 bucket, the answer is always Alias . Never CNAME. 5. Routing Policies A. Simple Routing Policy Use Case: Use when you have a single resource that performs a given function for your domain. Behavior: Can return one or multiple values (IPs) to the client. If multiple values are returned, the client chooses one at random. Constraint: Does not support Health Checks (you cannot route away from an unhealthy instance automatically with Simple routing). B. Weighted Routing Policy Use Case: A/B Testing , Blue/Green Deployments, or splitting traffic between regions intentionally. Behavior: You assign a \"Weight\" (0-255) to each record. Logic: Traffic % = (Specific Weight / Sum of all Weights). Example: Record A (Weight 10), Record B (Weight 90). Record A gets 10% traffic. Note: Setting weight to 0 stops traffic to that resource. C. Latency Routing Policy Use Case: Performance . You want to provide the best experience for global users. Behavior: Route 53 looks at the user's location and the AWS Region latency, then routes the user to the AWS Region with the lowest latency (fastest response time). D. Failover Routing Policy Use Case: Disaster Recovery (DR) . Active-Passive configuration. Prerequisite: Requires Health Checks . Behavior: Primary Record: Route 53 monitors this. Secondary Record: Traffic is routed here only if the Primary is unhealthy. E. Geolocation Routing Policy Use Case: Compliance , Content Restrictions, Localized Language. Behavior: Routes traffic based on the geographic location of the user (Continent, Country, or US State). Example: Users in France go to French servers; everyone else goes to a Default server. Key Difference from Latency: Latency is about speed ; Geolocation is about boundaries . F. Geoproximity Routing Policy Use Case: Complicated geographic routing with \"Bias.\" Behavior: Routes traffic based on the geographic location of the users and the resources. Bias: You can shift traffic from one region to another by increasing/decreasing the \"bias\" (expand or shrink the geographic region coverage). Requirement: Must use Route 53 Traffic Flow (visual editor). G. IP-Based Routing Policy Use Case: Performance optimization for specific ISPs or routing internal subnets. Behavior: Routes traffic based on the client's CIDR (IP) block. Example: Route 53 recognizes the IP is from \"Comcast\" or a specific corporate range and routes accordingly. H. Multi-Value Answer Routing Policy Use Case: \"Simple Routing with Health Checks.\" Behavior: Returns multiple values (IPs) in response to DNS queries, but only returns values for resources that are Healthy . Limit: Up to 8 records. Note: It is not a substitute for an ELB (Load Balancer), but acts as a basic client-side load balancer. 6. Health Checks Purpose: Automate failover and monitor status. Types: Endpoint: Checks an IP address or domain name (HTTP/HTTPS/TCP). Calculated: Combines results of other health checks (AND/OR/NOT logic). CloudWatch Alarm: Checks the state of a CloudWatch Alarm (useful for checking DynamoDB throttle or custom metrics, not just connectivity). Operation: Global health checkers send requests to your endpoint. Default: 30-second interval (can be fast - 10s). Default: 3 retries constitute a failure. Private Hosted Zones: If monitoring an internal resource (Private IP), you must create a CloudWatch Alarm and use the \"CloudWatch Alarm\" health check type (Route 53 public checkers cannot access your private VPC). 7. 3rd Party Domains & Route 53 Scenario: You bought example.com on GoDaddy (Registrar) but want to manage records in AWS Route 53. Steps: Create a Hosted Zone in Route 53 for example.com . Route 53 generates 4 Name Servers (NS) . Log in to GoDaddy (Registrar). Update the NS records in GoDaddy to match the 4 NS records provided by Route 53. Note: Domain Registration and DNS Hosting are separate. You can keep the registration at GoDaddy but host the DNS zone file at AWS. 8. Route 53 Resolvers & Hybrid DNS Scenario: You have an On-Premise Data Center and an AWS VPC connected via Direct Connect or VPN. You want on-prem servers to resolve AWS names, and AWS instances to resolve on-prem names. Route 53 Resolver (Inbound Endpoint): Allows On-Premise resources to query Route 53 Resolver. Forward DNS queries from On-Prem -> AWS. Route 53 Resolver (Outbound Endpoint): Allows AWS resources to query On-Premise DNS servers. Forward DNS queries from AWS -> On-Prem (using Forwarding Rules). Summary of Exam \"Gotchas\" Keyword/Scenario Answer usually involves... Zone Apex / Root Domain Alias Record (Not CNAME) Active/Passive DR Failover Routing Lowest Latency / Fastest Latency Routing Legal Compliance / Borders Geolocation Routing Traffic Shift / Bias Geoproximity Routing (Traffic Flow) 80% to V1, 20% to V2 Weighted Routing Hybrid Cloud DNS Route 53 Resolver (Inbound/Outbound) Health Check Private IP CloudWatch Alarm Health Check"}, {"id": 7, "num": "7", "title": "S3 Basic", "html": "<h1>AWS S3 (Simple Storage Service) - SAA-C03 Study Notes<\/h1>\n<h2>1. S3 Overview<\/h2>\n<ul>\n<li><strong>Type:<\/strong> Object Storage (not Block or File storage).<\/li>\n<li><strong>Structure:<\/strong><ul>\n<li><strong>Buckets:<\/strong> Root level containers. Must have a <strong>globally unique name<\/strong> (across all AWS regions/accounts).<\/li>\n<li><strong>Objects:<\/strong> Files stored in buckets.<\/li>\n<li><strong>Keys:<\/strong> The full path to the object (e.g., <code>images/logo.png<\/code>).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Size:<\/strong> Unlimited total storage. Single object size from 0 bytes to <strong>5 TB<\/strong>.<\/li>\n<li><strong>Durability:<\/strong> 99.999999999% (11 9s) for Standard classes.<\/li>\n<li><strong>Consistency Model:<\/strong> Strong consistency for all GET, PUT, and LIST operations (read-after-write consistency).<\/li>\n<\/ul>\n<h2>2. Security: IAM vs. Bucket Policies<\/h2>\n<p>S3 security is a combination of User-Based policies and Resource-Based policies.<\/p>\n<h3>IAM Policies (User-Based)<\/h3>\n<ul>\n<li>Attached to IAM Users, Groups, or Roles.<\/li>\n<li>Defines what an IAM principal can do (e.g., \"User A can read from Bucket X\").<\/li>\n<li>Best for internal users within your AWS account.<\/li>\n<\/ul>\n<h3>S3 Bucket Policies (Resource-Based)<\/h3>\n<ul>\n<li>Attached directly to the S3 Bucket.<\/li>\n<li>Defines <em>who<\/em> can access <em>this specific bucket<\/em>.<\/li>\n<li>JSON format. Key elements: <code>Principal<\/code>, <code>Effect<\/code>, <code>Action<\/code>, <code>Resource<\/code>.<\/li>\n<li><strong>Use Cases:<\/strong><ul>\n<li>Granting public access to a bucket.<\/li>\n<li>Granting cross-account access.<\/li>\n<li>Enforcing upload of encrypted objects only.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>Evaluation Logic<\/h3>\n<ul>\n<li><strong>Union of Policies:<\/strong> Access is the union of IAM permissions and Bucket Policy permissions.<\/li>\n<li><strong>Explicit DENY:<\/strong> Always overrides an ALLOW.<\/li>\n<li><strong>Implicit DENY:<\/strong> If not explicitly allowed, it is denied.<\/li>\n<\/ul>\n<h3>Block Public Access<\/h3>\n<ul>\n<li>An account-level or bucket-level setting that overrides any bucket policy to prevent accidental public exposure.<\/li>\n<li>Should be enabled unless you specifically intend to host a public static website.<\/li>\n<\/ul>\n<h2>3. S3 Static Website Hosting<\/h2>\n<ul>\n<li>S3 can host static websites (HTML, CSS, JS, Images). It cannot run server-side code (PHP, Python, etc.).<\/li>\n<li><strong>URL Format:<\/strong> <code>http://&lt;bucket-name&gt;.s3-website-&lt;region&gt;.amazonaws.com<\/code><\/li>\n<li><strong>Requirements:<\/strong><ol>\n<li>Enable \"Static website hosting\" in properties.<\/li>\n<li>Set an <strong>Index Document<\/strong> (e.g., <code>index.html<\/code>) and <strong>Error Document<\/strong> (e.g., <code>error.html<\/code>).<\/li>\n<li>Disable \"Block Public Access\".<\/li>\n<li>Add a <strong>Bucket Policy<\/strong> to allow <code>s3:GetObject<\/code> for <code>Principal: \"*\"<\/code>.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Exam Tip:<\/strong> S3 Website endpoints do <strong>not<\/strong> support HTTPS. To get HTTPS, you must use CloudFront in front of S3.<\/li>\n<\/ul>\n<h2>4. S3 Versioning<\/h2>\n<ul>\n<li>Enabled at the bucket level. Once enabled, it can only be suspended, not disabled.<\/li>\n<li><strong>Function:<\/strong> Keeps multiple variants of an object in the same bucket.<\/li>\n<li><strong>Benefits:<\/strong><ul>\n<li>Protects against unintended overwrites.<\/li>\n<li>Protects against accidental deletions (a \"Delete Marker\" is added instead of removing the file).<\/li>\n<li>Easy rollback to previous versions.<\/li>\n<\/ul>\n<\/li>\n<li><strong>MFA Delete:<\/strong> Forces Multi-Factor Authentication to change the versioning state or permanently delete an object version. (Must be enabled via CLI, not Console).<\/li>\n<\/ul>\n<h2>5. S3 Replication<\/h2>\n<p>To replicate data, <strong>Versioning must be enabled<\/strong> on both the Source and Destination buckets.<\/p>\n<ul>\n<li>\n<p><strong>CRR (Cross-Region Replication):<\/strong><\/p>\n<ul>\n<li>Replicate to a different AWS Region.<\/li>\n<li>Use cases: Compliance, lower latency for global users, disaster recovery.<\/li>\n<\/ul>\n<\/li>\n<li>\n<p><strong>SRR (Same-Region Replication):<\/strong><\/p>\n<ul>\n<li>Replicate to the same AWS Region.<\/li>\n<li>Use cases: Log aggregation, replication between production and test environments.<\/li>\n<\/ul>\n<\/li>\n<li>\n<p><strong>Key Notes:<\/strong><\/p>\n<ul>\n<li>Only <em>new<\/em> objects are replicated after enabling. (Existing objects need \"S3 Batch Replication\").<\/li>\n<li>Delete Markers are replicated? Configurable.<\/li>\n<li>Permanent deletions? NOT replicated (security feature).<\/li>\n<li>Requires an IAM Role for S3 to perform the replication.<\/li>\n<li><strong>No Chaining:<\/strong> If Bucket A replicates to Bucket B, and Bucket B replicates to Bucket C, objects uploaded to Bucket A are <strong>not<\/strong> replicated to Bucket C.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>6. S3 Storage Classes<\/h2>\n<h3>S3 Standard – General Purpose<\/h3>\n<ul>\n<li><strong>Availability:<\/strong> 99.99%<\/li>\n<li>Used for frequently accessed data.<\/li>\n<li>Low latency and high throughput.<\/li>\n<li>Sustain 2 concurrent facility failures.<\/li>\n<li><strong>Use Cases:<\/strong> Big Data analytics, mobile &amp; gaming applications, content distribution.<\/li>\n<\/ul>\n<h3>S3 Storage Classes – Infrequent Access<\/h3>\n<p>For data that is less frequently accessed, but requires rapid access when needed. Lower cost than S3 Standard.<\/p>\n<ul>\n<li><strong>Amazon S3 Standard-Infrequent Access (S3 Standard-IA)<\/strong><ul>\n<li><strong>Availability:<\/strong> 99.9%<\/li>\n<li><strong>Use cases:<\/strong> Disaster Recovery, backups.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Amazon S3 One Zone-Infrequent Access (S3 One Zone-IA)<\/strong><ul>\n<li><strong>Durability:<\/strong> High durability (99.999999999%) in a single AZ; <strong>data lost when AZ is destroyed<\/strong><\/li>\n<li><strong>Availability:<\/strong> 99.5%<\/li>\n<li><strong>Use Cases:<\/strong> Storing secondary backup copies of on-premises data, or data you can recreate.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>Amazon S3 Glacier Storage Classes<\/h3>\n<p>Low-cost object storage meant for archiving / backup. <strong>Pricing:<\/strong> Price for storage + object retrieval cost.<\/p>\n<ul>\n<li><strong>Amazon S3 Glacier Instant Retrieval<\/strong><ul>\n<li>Millisecond retrieval, great for data accessed once a quarter.<\/li>\n<li>Minimum storage duration of 90 days.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Amazon S3 Glacier Flexible Retrieval<\/strong> (formerly Amazon S3 Glacier)<ul>\n<li><strong>Retrieval options:<\/strong> Expedited (1 to 5 minutes), Standard (3 to 5 hours), Bulk (5 to 12 hours) – free.<\/li>\n<li>Minimum storage duration of 90 days.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Amazon S3 Glacier Deep Archive<\/strong> – For long term storage<ul>\n<li><strong>Retrieval options:<\/strong> Standard (12 hours), Bulk (48 hours).<\/li>\n<li>Minimum storage duration of 180 days.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>S3 Intelligent-Tiering<\/h3>\n<ul>\n<li>Small monthly monitoring and auto-tiering fee.<\/li>\n<li>Moves objects automatically between Access Tiers based on usage.<\/li>\n<li><strong>There are no retrieval charges in S3 Intelligent-Tiering.<\/strong><\/li>\n<li><strong>Tiers:<\/strong><ul>\n<li><strong>Frequent Access tier (automatic):<\/strong> Default tier.<\/li>\n<li><strong>Infrequent Access tier (automatic):<\/strong> Objects not accessed for 30 days.<\/li>\n<li><strong>Archive Instant Access tier (automatic):<\/strong> Objects not accessed for 90 days.<\/li>\n<li><strong>Archive Access tier (optional):<\/strong> Configurable from 90 days to 700+ days.<\/li>\n<li><strong>Deep Archive Access tier (optional):<\/strong> Configurable from 180 days to 700+ days.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>7. S3 Express One Zone<\/h2>\n<ul>\n<li><strong>Newest Storage Class:<\/strong> High-performance, single-availability zone.<\/li>\n<li><strong>Structure:<\/strong> Uses <strong>Directory Buckets<\/strong> (different from standard general-purpose buckets).<\/li>\n<li><strong>Performance:<\/strong> Delivers single-digit millisecond latency.<\/li>\n<li><strong>Cost:<\/strong> 50% lower request costs compared to S3 Standard.<\/li>\n<li><strong>Use Case:<\/strong> frequently accessed data, AI/ML training, financial modeling, media processing.<\/li>\n<li><strong>Durability:<\/strong> Data is stored in a single AZ; if that AZ is destroyed, data is lost (unlike Regional classes).<\/li>\n<\/ul>", "text": "AWS S3 (Simple Storage Service) - SAA-C03 Study Notes 1. S3 Overview Type: Object Storage (not Block or File storage). Structure: Buckets: Root level containers. Must have a globally unique name (across all AWS regions/accounts). Objects: Files stored in buckets. Keys: The full path to the object (e.g., images/logo.png ). Size: Unlimited total storage. Single object size from 0 bytes to 5 TB . Durability: 99.999999999% (11 9s) for Standard classes. Consistency Model: Strong consistency for all GET, PUT, and LIST operations (read-after-write consistency). 2. Security: IAM vs. Bucket Policies S3 security is a combination of User-Based policies and Resource-Based policies. IAM Policies (User-Based) Attached to IAM Users, Groups, or Roles. Defines what an IAM principal can do (e.g., \"User A can read from Bucket X\"). Best for internal users within your AWS account. S3 Bucket Policies (Resource-Based) Attached directly to the S3 Bucket. Defines who can access this specific bucket . JSON format. Key elements: Principal , Effect , Action , Resource . Use Cases: Granting public access to a bucket. Granting cross-account access. Enforcing upload of encrypted objects only. Evaluation Logic Union of Policies: Access is the union of IAM permissions and Bucket Policy permissions. Explicit DENY: Always overrides an ALLOW. Implicit DENY: If not explicitly allowed, it is denied. Block Public Access An account-level or bucket-level setting that overrides any bucket policy to prevent accidental public exposure. Should be enabled unless you specifically intend to host a public static website. 3. S3 Static Website Hosting S3 can host static websites (HTML, CSS, JS, Images). It cannot run server-side code (PHP, Python, etc.). URL Format: http://<bucket-name>.s3-website-<region>.amazonaws.com Requirements: Enable \"Static website hosting\" in properties. Set an Index Document (e.g., index.html ) and Error Document (e.g., error.html ). Disable \"Block Public Access\". Add a Bucket Policy to allow s3:GetObject for Principal: \"*\" . Exam Tip: S3 Website endpoints do not support HTTPS. To get HTTPS, you must use CloudFront in front of S3. 4. S3 Versioning Enabled at the bucket level. Once enabled, it can only be suspended, not disabled. Function: Keeps multiple variants of an object in the same bucket. Benefits: Protects against unintended overwrites. Protects against accidental deletions (a \"Delete Marker\" is added instead of removing the file). Easy rollback to previous versions. MFA Delete: Forces Multi-Factor Authentication to change the versioning state or permanently delete an object version. (Must be enabled via CLI, not Console). 5. S3 Replication To replicate data, Versioning must be enabled on both the Source and Destination buckets. CRR (Cross-Region Replication): Replicate to a different AWS Region. Use cases: Compliance, lower latency for global users, disaster recovery. SRR (Same-Region Replication): Replicate to the same AWS Region. Use cases: Log aggregation, replication between production and test environments. Key Notes: Only new objects are replicated after enabling. (Existing objects need \"S3 Batch Replication\"). Delete Markers are replicated? Configurable. Permanent deletions? NOT replicated (security feature). Requires an IAM Role for S3 to perform the replication. No Chaining: If Bucket A replicates to Bucket B, and Bucket B replicates to Bucket C, objects uploaded to Bucket A are not replicated to Bucket C. 6. S3 Storage Classes S3 Standard – General Purpose Availability: 99.99% Used for frequently accessed data. Low latency and high throughput. Sustain 2 concurrent facility failures. Use Cases: Big Data analytics, mobile & gaming applications, content distribution. S3 Storage Classes – Infrequent Access For data that is less frequently accessed, but requires rapid access when needed. Lower cost than S3 Standard. Amazon S3 Standard-Infrequent Access (S3 Standard-IA) Availability: 99.9% Use cases: Disaster Recovery, backups. Amazon S3 One Zone-Infrequent Access (S3 One Zone-IA) Durability: High durability (99.999999999%) in a single AZ; data lost when AZ is destroyed Availability: 99.5% Use Cases: Storing secondary backup copies of on-premises data, or data you can recreate. Amazon S3 Glacier Storage Classes Low-cost object storage meant for archiving / backup. Pricing: Price for storage + object retrieval cost. Amazon S3 Glacier Instant Retrieval Millisecond retrieval, great for data accessed once a quarter. Minimum storage duration of 90 days. Amazon S3 Glacier Flexible Retrieval (formerly Amazon S3 Glacier) Retrieval options: Expedited (1 to 5 minutes), Standard (3 to 5 hours), Bulk (5 to 12 hours) – free. Minimum storage duration of 90 days. Amazon S3 Glacier Deep Archive – For long term storage Retrieval options: Standard (12 hours), Bulk (48 hours). Minimum storage duration of 180 days. S3 Intelligent-Tiering Small monthly monitoring and auto-tiering fee. Moves objects automatically between Access Tiers based on usage. There are no retrieval charges in S3 Intelligent-Tiering. Tiers: Frequent Access tier (automatic): Default tier. Infrequent Access tier (automatic): Objects not accessed for 30 days. Archive Instant Access tier (automatic): Objects not accessed for 90 days. Archive Access tier (optional): Configurable from 90 days to 700+ days. Deep Archive Access tier (optional): Configurable from 180 days to 700+ days. 7. S3 Express One Zone Newest Storage Class: High-performance, single-availability zone. Structure: Uses Directory Buckets (different from standard general-purpose buckets). Performance: Delivers single-digit millisecond latency. Cost: 50% lower request costs compared to S3 Standard. Use Case: frequently accessed data, AI/ML training, financial modeling, media processing. Durability: Data is stored in a single AZ; if that AZ is destroyed, data is lost (unlike Regional classes)."}, {"id": 8, "num": "8", "title": "S3 Advance", "html": "<h1>AWS SAA-C03 Study Notes: Amazon S3 Advanced Features<\/h1>\n<h2>1. S3 Lifecycle Rules<\/h2>\n<p>Automate moving objects between storage classes or deleting them to optimize costs.<\/p>\n<h3><strong>Types of Actions<\/strong><\/h3>\n<ul>\n<li><strong>Transition Actions:<\/strong> Move objects to a cheaper storage class (e.g., Standard $\\rightarrow$ Standard-IA $\\rightarrow$ Glacier).<\/li>\n<li><strong>Expiration Actions:<\/strong> Delete objects after a specified period (e.g., delete log files after 365 days).<\/li>\n<li><strong>Incomplete Multipart Uploads:<\/strong> Configure a rule to clean up incomplete uploads to save storage costs.<\/li>\n<\/ul>\n<h3><strong>Rules &amp; Constraints<\/strong><\/h3>\n<ul>\n<li><strong>128KB Minimum:<\/strong> Objects must be larger than 128KB to transition to Standard-IA or One Zone-IA (otherwise, you pay for 128KB).<\/li>\n<li><strong>30-Day Minimum:<\/strong> Objects usually must sit in Standard for 30 days before transitioning to IA (Standard-IA/One Zone-IA).<\/li>\n<\/ul>\n<h3><strong>S3 Analytics - Storage Class Analysis<\/strong><\/h3>\n<ul>\n<li><strong>Exam Tip:<\/strong> \"How do I know <em>when<\/em> to move objects to Standard-IA?\"<\/li>\n<li>Use <strong>S3 Analytics<\/strong> first. It analyzes storage access patterns and generates a report suggesting optimal lifecycle rules.<\/li>\n<li>It specifically helps identify candidates for <strong>Standard-IA<\/strong> or <strong>One Zone-IA<\/strong>.<\/li>\n<\/ul>\n<h2>2. S3 Event Notifications<\/h2>\n<p>Automated reactions to events happening inside your S3 bucket.<\/p>\n<ul>\n<li><strong>Triggers:<\/strong> <code>ObjectCreated<\/code>, <code>ObjectRemoved<\/code>, <code>ObjectRestore<\/code>, <code>Replication<\/code>.<\/li>\n<li><strong>Destinations (Targets):<\/strong><ol>\n<li><strong>SNS<\/strong> (Simple Notification Service) - Send alerts/emails.<\/li>\n<li><strong>SQS<\/strong> (Simple Queue Service) - Decouple and process events later.<\/li>\n<li><strong>Lambda<\/strong> - Trigger code immediately (e.g., generate a thumbnail when an image is uploaded).<\/li>\n<li><strong>EventBridge<\/strong> - Complex filtering and routing to many other AWS services.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Versioning:<\/strong> Ensure notification is enabled for specific object versions if versioning is on.<\/li>\n<\/ul>\n<h2>3. S3 Performance Optimization<\/h2>\n<p>S3 scales automatically, but specific features help with high throughput.<\/p>\n<h3><strong>Baseline Performance<\/strong><\/h3>\n<ul>\n<li><strong>3,500<\/strong> PUT/COPY/POST/DELETE requests per second (per prefix).<\/li>\n<li><strong>5,500<\/strong> GET/HEAD requests per second (per prefix).<\/li>\n<li><em>Note:<\/em> You can scale higher by using different \"prefixes\" (folder paths) to parallelize requests.<\/li>\n<\/ul>\n<h3><strong>High-Performance Features<\/strong><\/h3>\n<ol>\n<li><strong>Multipart Upload:<\/strong><ul>\n<li>Uploads a file in parts in parallel.<\/li>\n<li><strong>Recommended<\/strong> for files &gt; 100 MB.<\/li>\n<li><strong>Mandatory<\/strong> for files &gt; 5 GB.<\/li>\n<\/ul>\n<\/li>\n<li><strong>S3 Transfer Acceleration:<\/strong><ul>\n<li>Uses AWS <strong>Edge Locations<\/strong> to speed up uploads over the public internet.<\/li>\n<li>Data enters the Edge Location and travels over the fast AWS internal network to the bucket.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Byte-Range Fetches:<\/strong><ul>\n<li>Download a file in parts in parallel (speeds up downloads).<\/li>\n<li>Can also be used to retrieve only a specific part of a file (e.g., the header of a video).<\/li>\n<\/ul>\n<\/li>\n<li><strong>S3 Select:<\/strong><ul>\n<li>Uses <strong>SQL expressions<\/strong> to retrieve only a specific subset of data from an object.<\/li>\n<li><strong>Filters data server-side<\/strong>, which drastically reduces the amount of data transferred and lowers costs.<\/li>\n<li><strong>Supports<\/strong> CSV, JSON, and Parquet files (even if compressed with GZIP/BZIP2).<\/li>\n<\/ul>\n<\/li>\n<\/ol>\n<h2>4. S3 Batch Operations<\/h2>\n<p>Managed solution to perform a single action on billions of objects across buckets.<\/p>\n<h3><strong>Use Cases<\/strong><\/h3>\n<ul>\n<li><strong>Encrypt un-encrypted objects:<\/strong> Retroactively apply SSE-KMS or SSE-S3 to millions of existing legacy objects.<\/li>\n<li><strong>Copy objects:<\/strong> Bulk copy between buckets (e.g., for disaster recovery or migration).<\/li>\n<li><strong>Restore from Glacier:<\/strong> Bulk restore archived data.<\/li>\n<li><strong>Replace Tag sets:<\/strong> Update cost-allocation tags.<\/li>\n<li><strong>Invoke Lambda:<\/strong> Run custom logic on every object in the list.<\/li>\n<\/ul>\n<h3><strong>The Workflow (S3 Inventory + Athena)<\/strong><\/h3>\n<p>For Batch Operations to work, it needs a <strong>list<\/strong> of objects.<\/p>\n<ol>\n<li><strong>S3 Inventory:<\/strong> Enable this to generate a daily CSV/ORC/Parquet report listing all objects and their metadata (encryption status, size, etc.).<\/li>\n<li><strong>Athena:<\/strong> Query the S3 Inventory file using SQL to <strong>filter<\/strong> the list (e.g., <em>\"Select all objects where encryption status is 'Server-Side Encryption: None'\"<\/em>).<\/li>\n<li><strong>Batch Job:<\/strong> Feed this filtered list into S3 Batch Operations to perform the action (e.g., Encrypt).<\/li>\n<\/ol>\n<h2>5. S3 Storage Lens<\/h2>\n<p>\"Single pane of glass\" visibility into object storage usage and activity organization-wide.<\/p>\n<h3><strong>Free vs. Paid Metrics<\/strong><\/h3>\n<p>There are two tiers of metrics in Storage Lens:<\/p>\n<ol>\n<li>\n<p><strong>Free Metrics:<\/strong> Default.<\/p>\n<ul>\n<li><strong>Summary:<\/strong> Total storage, object count, average object size.<\/li>\n<li><strong>Cost Efficiency:<\/strong> Identify incomplete multipart uploads, old versions, uncompressed files.<\/li>\n<li><strong>Data Protection:<\/strong> Bucket encryption status, replication status.<\/li>\n<\/ul>\n<\/li>\n<li>\n<p><strong>Advanced Metrics (Paid):<\/strong> Adds \"Activity\" and \"Status Codes\" insights.<\/p>\n<ul>\n<li><strong>Activity Metrics:<\/strong> Tracks request counts (GET, PUT, HEAD), bytes downloaded/uploaded.<\/li>\n<li><strong>Detailed Status Code Metrics:<\/strong> Tracks HTTP errors like <strong>403 Forbidden<\/strong> (Access Denied), <strong>404 Not Found<\/strong>, and <strong>5xx<\/strong> Server Errors.<\/li>\n<li><strong>Access Management Metrics:<\/strong> Tracks Object Ownership settings and encryption counts.<\/li>\n<li><strong>Performance Metrics:<\/strong> Tracks transfer acceleration usage and request latency.<\/li>\n<li><strong>Event Metrics:<\/strong> Tracks S3 Event Notification delivery rates<\/li>\n<\/ul>\n<\/li>\n<\/ol>\n<h2>6. S3 Requester Pays<\/h2>\n<p>Shift the cost of data transfer and requests from the bucket owner to the requester.<\/p>\n<h3><strong>Key Concepts<\/strong><\/h3>\n<ul>\n<li><strong>Who Pays What?<\/strong><ul>\n<li><strong>Requester:<\/strong> Pays for the <strong>Data Transfer<\/strong> costs and the <strong>Request<\/strong> costs (GET, PUT, LIST).<\/li>\n<li><strong>Bucket Owner:<\/strong> Pays for the <strong>Storage<\/strong> costs.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3><strong>Exam Constraints<\/strong><\/h3>\n<ol>\n<li><strong>Authentication Required:<\/strong> You <strong>cannot<\/strong> use Requester Pays with anonymous (public) users. The requester <em>must<\/em> be an authenticated AWS user so AWS knows who to bill.<\/li>\n<li><strong>Header Requirement:<\/strong> The requester must explicitly agree to pay by including a specific header in their API call.<ul>\n<li><strong>Header:<\/strong> <code>x-amz-request-payer<\/code><\/li>\n<li><strong>CLI Flag:<\/strong> <code>--request-payer requester<\/code><\/li>\n<\/ul>\n<\/li>\n<li><strong>Failure Scenario:<\/strong> If a user tries to access the bucket <em>without<\/em> this header, the request will fail with a <strong>403 Access Denied<\/strong> error, even if they have full permissions.<\/li>\n<\/ol>", "text": "AWS SAA-C03 Study Notes: Amazon S3 Advanced Features 1. S3 Lifecycle Rules Automate moving objects between storage classes or deleting them to optimize costs. Types of Actions Transition Actions: Move objects to a cheaper storage class (e.g., Standard $\\rightarrow$ Standard-IA $\\rightarrow$ Glacier). Expiration Actions: Delete objects after a specified period (e.g., delete log files after 365 days). Incomplete Multipart Uploads: Configure a rule to clean up incomplete uploads to save storage costs. Rules & Constraints 128KB Minimum: Objects must be larger than 128KB to transition to Standard-IA or One Zone-IA (otherwise, you pay for 128KB). 30-Day Minimum: Objects usually must sit in Sta
