ndard for 30 days before transitioning to IA (Standard-IA/One Zone-IA). S3 Analytics - Storage Class Analysis Exam Tip: \"How do I know when to move objects to Standard-IA?\" Use S3 Analytics first. It analyzes storage access patterns and generates a report suggesting optimal lifecycle rules. It specifically helps identify candidates for Standard-IA or One Zone-IA . 2. S3 Event Notifications Automated reactions to events happening inside your S3 bucket. Triggers: ObjectCreated , ObjectRemoved , ObjectRestore , Replication . Destinations (Targets): SNS (Simple Notification Service) - Send alerts/emails. SQS (Simple Queue Service) - Decouple and process events later. Lambda - Trigger code immediately (e.g., generate a thumbnail when an image is uploaded). EventBridge - Complex filtering and routing to many other AWS services. Versioning: Ensure notification is enabled for specific object versions if versioning is on. 3. S3 Performance Optimization S3 scales automatically, but specific features help with high throughput. Baseline Performance 3,500 PUT/COPY/POST/DELETE requests per second (per prefix). 5,500 GET/HEAD requests per second (per prefix). Note: You can scale higher by using different \"prefixes\" (folder paths) to parallelize requests. High-Performance Features Multipart Upload: Uploads a file in parts in parallel. Recommended for files > 100 MB. Mandatory for files > 5 GB. S3 Transfer Acceleration: Uses AWS Edge Locations to speed up uploads over the public internet. Data enters the Edge Location and travels over the fast AWS internal network to the bucket. Byte-Range Fetches: Download a file in parts in parallel (speeds up downloads). Can also be used to retrieve only a specific part of a file (e.g., the header of a video). S3 Select: Uses SQL expressions to retrieve only a specific subset of data from an object. Filters data server-side , which drastically reduces the amount of data transferred and lowers costs. Supports CSV, JSON, and Parquet files (even if compressed with GZIP/BZIP2). 4. S3 Batch Operations Managed solution to perform a single action on billions of objects across buckets. Use Cases Encrypt un-encrypted objects: Retroactively apply SSE-KMS or SSE-S3 to millions of existing legacy objects. Copy objects: Bulk copy between buckets (e.g., for disaster recovery or migration). Restore from Glacier: Bulk restore archived data. Replace Tag sets: Update cost-allocation tags. Invoke Lambda: Run custom logic on every object in the list. The Workflow (S3 Inventory + Athena) For Batch Operations to work, it needs a list of objects. S3 Inventory: Enable this to generate a daily CSV/ORC/Parquet report listing all objects and their metadata (encryption status, size, etc.). Athena: Query the S3 Inventory file using SQL to filter the list (e.g., \"Select all objects where encryption status is 'Server-Side Encryption: None'\" ). Batch Job: Feed this filtered list into S3 Batch Operations to perform the action (e.g., Encrypt). 5. S3 Storage Lens \"Single pane of glass\" visibility into object storage usage and activity organization-wide. Free vs. Paid Metrics There are two tiers of metrics in Storage Lens: Free Metrics: Default. Summary: Total storage, object count, average object size. Cost Efficiency: Identify incomplete multipart uploads, old versions, uncompressed files. Data Protection: Bucket encryption status, replication status. Advanced Metrics (Paid): Adds \"Activity\" and \"Status Codes\" insights. Activity Metrics: Tracks request counts (GET, PUT, HEAD), bytes downloaded/uploaded. Detailed Status Code Metrics: Tracks HTTP errors like 403 Forbidden (Access Denied), 404 Not Found , and 5xx Server Errors. Access Management Metrics: Tracks Object Ownership settings and encryption counts. Performance Metrics: Tracks transfer acceleration usage and request latency. Event Metrics: Tracks S3 Event Notification delivery rates 6. S3 Requester Pays Shift the cost of data transfer and requests from the bucket owner to the requester. Key Concepts Who Pays What? Requester: Pays for the Data Transfer costs and the Request costs (GET, PUT, LIST). Bucket Owner: Pays for the Storage costs. Exam Constraints Authentication Required: You cannot use Requester Pays with anonymous (public) users. The requester must be an authenticated AWS user so AWS knows who to bill. Header Requirement: The requester must explicitly agree to pay by including a specific header in their API call. Header: x-amz-request-payer CLI Flag: --request-payer requester Failure Scenario: If a user tries to access the bucket without this header, the request will fail with a 403 Access Denied error, even if they have full permissions."}, {"id": 9, "num": "9", "title": "S3 Security", "html": "<h1>AWS SAA-C03 Study Note: Amazon S3 Advanced Features<\/h1>\n<p>This study note covers critical S3 topics for the AWS Certified Solutions Architect - Associate (SAA-C03) exam, focusing on security, access management, and advanced features.<\/p>\n<h2>1. S3 Encryption<\/h2>\n<p>S3 offers multiple methods to encrypt objects at rest. You must understand the differences, especially regarding key management and audit permissions.<\/p>\n<h3>Server-Side Encryption (SSE)<\/h3>\n<ul>\n<li><strong>SSE-S3 (S3 Managed Keys):<\/strong><ul>\n<li><strong>Keys:<\/strong> Managed by Amazon S3.<\/li>\n<li><strong>Algorithm:<\/strong> AES-256.<\/li>\n<li><strong>Rotation:<\/strong> Handled automatically by S3.<\/li>\n<li><strong>Cost:<\/strong> No additional cost for keys.<\/li>\n<li><strong>Exam Tip:<\/strong> The default option if no specific encryption is requested. Simplest to implement.<\/li>\n<\/ul>\n<\/li>\n<li><strong>SSE-KMS (KMS Managed Keys):<\/strong><ul>\n<li><strong>Keys:<\/strong> Managed by AWS Key Management Service (KMS).<\/li>\n<li><strong>Features:<\/strong> Provides control over key rotation and <strong>audit trails<\/strong> via CloudTrail (who used the key and when).<\/li>\n<li><strong>Limits:<\/strong> Accessing objects impacts KMS API quotas (e.g., <code>GenerateDataKey<\/code>, <code>Decrypt<\/code>). Large-scale access can trigger KMS throttling errors.<\/li>\n<li><strong>Exam Tip:<\/strong> Choose this if the scenario requires <strong>auditability<\/strong> of key usage or <strong>customer-managed<\/strong> key rotation policies.<\/li>\n<\/ul>\n<\/li>\n<li><strong>SSE-C (Customer-Provided Keys):<\/strong><ul>\n<li><strong>Keys:<\/strong> You (the customer) manage and store the keys. S3 <strong>does not<\/strong> store the encryption key.<\/li>\n<li><strong>Process:<\/strong> You send the key with every request (upload/download). S3 performs the encryption/decryption and then discards the key.<\/li>\n<li><strong>Requirement:<\/strong> HTTPS is mandatory.<\/li>\n<li><strong>Exam Tip:<\/strong> Use this if the company security policy dictates that they must manage and hold their own keys exclusively, but they still want AWS to perform the cryptographic operations.<\/li>\n<\/ul>\n<\/li>\n<li><strong>DSSE-KMS (Dual-Layer Server-Side Encryption):<\/strong><ul>\n<li>Applies two layers of encryption at the server side using KMS keys.<\/li>\n<li>Used for strict compliance requirements (e.g., NSA CNSSP 15).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>Client-Side Encryption<\/h3>\n<ul>\n<li>You encrypt the data <strong>before<\/strong> uploading it to S3. S3 never sees the unencrypted data or the keys.<\/li>\n<\/ul>\n<h2>2. S3 Default Encryption<\/h2>\n<ul>\n<li><strong>Behavior:<\/strong> S3 buckets now have default encryption enabled automatically (SSE-S3).<\/li>\n<li><strong>Configuration:<\/strong> You can override this default to use SSE-KMS.<\/li>\n<li><strong>Effect:<\/strong> New objects are automatically encrypted. Existing objects remain as they were until they are overwritten or copied.<\/li>\n<\/ul>\n<h3>Default Encryption vs. Bucket Policy<\/h3>\n<p>It is crucial to understand the difference between <em>setting a default<\/em> and <em>enforcing<\/em> encryption via policy.<\/p>\n<ul>\n<li><strong>Default Encryption (The Safety Net):<\/strong><ul>\n<li><strong>How it works:<\/strong> If a user uploads an object <strong>without<\/strong> specifying any encryption headers, S3 automatically applies the bucket's default encryption settings. The upload <strong>succeeds<\/strong>.<\/li>\n<li><strong>Use Case:<\/strong> Ensuring no object is ever stored in plain text, without breaking applications that forget to request encryption.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Bucket Policy (The Gatekeeper):<\/strong><ul>\n<li><strong>How it works:<\/strong> You write a policy that explicitly <strong>Denies<\/strong> <code>PutObject<\/code> requests if they do not include a specific encryption header (e.g., <code>x-amz-server-side-encryption<\/code>).<\/li>\n<li><strong>Result:<\/strong> If a user tries to upload an unencrypted object, the request <strong>fails<\/strong> with <code>403 Access Denied<\/code>.<\/li>\n<li><strong>Use Case:<\/strong> Strictly enforcing compliance where the <em>client<\/em> must be aware of and explicitly request specific encryption (e.g., forcing the use of a specific SSE-KMS key).<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>3. S3 CORS (Cross-Origin Resource Sharing)<\/h2>\n<ul>\n<li><strong>Problem:<\/strong> A web browser blocks requests to an S3 bucket domain (e.g., <code>mybucket.s3.amazonaws.com<\/code>) if the request originates from a different domain (e.g., <code>www.example.com<\/code>).<\/li>\n<li><strong>Solution:<\/strong> Enable CORS on the S3 bucket to allow specific origins to access resources.<\/li>\n<li><strong>Configuration:<\/strong><ul>\n<li><strong>AllowedOrigins:<\/strong> E.g., <code>https://www.example.com<\/code><\/li>\n<li><strong>AllowedMethods:<\/strong> E.g., <code>GET<\/code>, <code>PUT<\/code>, <code>POST<\/code><\/li>\n<li><strong>AllowedHeaders:<\/strong> E.g., <code>Authorization<\/code><\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> If a static website hosted on S3 (or a user on a different domain) receives <code>403 Forbidden<\/code> or \"Network Error\" when trying to access resources in another bucket, <strong>check CORS configuration<\/strong>.<\/li>\n<\/ul>\n<h2>4. S3 MFA Delete<\/h2>\n<ul>\n<li><strong>Purpose:<\/strong> Enforces Multi-Factor Authentication (MFA) to delete object versions or change the versioning state of a bucket.<\/li>\n<li><strong>Requirements:<\/strong><ol>\n<li><strong>Versioning:<\/strong> Must be enabled on the bucket.<\/li>\n<li><strong>Root User:<\/strong> Only the <strong>Root Account<\/strong> (bucket owner) can enable/disable MFA Delete.<\/li>\n<li><strong>CLI/API Only:<\/strong> Cannot be enabled via the AWS Management Console.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Protects Against:<\/strong><ul>\n<li>Permanently deleting an object version.<\/li>\n<li>Suspending versioning on the bucket.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> If a question asks how to prevent accidental deletion by <em>privileged<\/em> administrators, look for <strong>MFA Delete<\/strong>. Remember it requires the <strong>Root<\/strong> user to set up.<\/li>\n<\/ul>\n<h2>5. S3 Access Logs vs. CloudTrail<\/h2>\n<ul>\n<li><strong>S3 Server Access Logs:<\/strong><ul>\n<li><strong>Scope:<\/strong> Logs detailed records for requests made to a bucket (e.g., requester, bucket name, request time, request action, response status).<\/li>\n<li><strong>Destination:<\/strong> Another S3 bucket.<\/li>\n<li><strong>Latency:<\/strong> Delivery can be delayed (hours).<\/li>\n<li><strong>Best Practice:<\/strong> Do <strong>not<\/strong> set the target bucket to be the same as the source bucket (creates a logging loop).<\/li>\n<\/ul>\n<\/li>\n<li><strong>CloudTrail Data Events:<\/strong><ul>\n<li><strong>Scope:<\/strong> Logs API activity (e.g., <code>GetObject<\/code>, <code>PutObject<\/code>).<\/li>\n<li><strong>Cost:<\/strong> Additional cost for Object-level logging.<\/li>\n<li><strong>Performance:<\/strong> Faster delivery than S3 Access Logs.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> For <strong>auditing<\/strong> specific access (who accessed this file?), CloudTrail is often the modern answer. For <strong>detailed access analysis<\/strong> or troubleshooting server responses, Access Logs are used.<\/li>\n<\/ul>\n<h2>6. S3 Pre-signed URLs<\/h2>\n<ul>\n<li><strong>Use Case:<\/strong> Grant temporary access to a private object without changing the bucket policy or making the object public.<\/li>\n<li><strong>Mechanism:<\/strong> Generated using AWS CLI or SDK.<\/li>\n<li><strong>Permissions:<\/strong> The URL inherits the permissions of the <strong>user/role who generated it<\/strong>.<\/li>\n<li><strong>Scenarios:<\/strong><ul>\n<li>Allowing a premium user to download a video file.<\/li>\n<li>Allowing a user to upload a file directly to S3 without AWS credentials (Pre-signed PUT).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> If the creator of the URL loses permission (e.g., user deleted), the URL stops working immediately, even if it hasn't expired.<\/li>\n<\/ul>\n<h2>7. Glacier Vault Lock &amp; S3 Object Lock (WORM)<\/h2>\n<p>Both enforce a <strong>WORM (Write Once, Read Many)<\/strong> model.<\/p>\n<h3>S3 Object Lock<\/h3>\n<ul>\n<li>Applies to individual objects in S3. Requires Versioning.<\/li>\n<li><strong>Retention Modes:<\/strong><ol>\n<li><strong>Governance Mode:<\/strong> Users generally cannot overwrite/delete, but users with special permissions (<code>s3:BypassGovernanceRetention<\/code>) can. Good for testing or lenient compliance.<\/li>\n<li><strong>Compliance Mode:<\/strong> <strong>Strict.<\/strong> No one, including the <strong>Root User<\/strong>, can delete or overwrite the object during the retention period.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Legal Hold:<\/strong> Independent of retention period. Prevents deletion indefinitely until explicitly removed.<\/li>\n<\/ul>\n<h3>Glacier Vault Lock<\/h3>\n<ul>\n<li>Applies to an entire Glacier Vault.<\/li>\n<li><strong>Process:<\/strong> You create a Vault Lock Policy -&gt; Initiate lock -&gt; You have 24 hours to validate -&gt; Complete lock.<\/li>\n<li><strong>Exam Tip:<\/strong> Once the Vault Lock policy is locked (after the 24h window), it <strong>cannot<\/strong> be changed or deleted. Used for strict, long-term archival compliance (e.g., SEC Rule 17a-4).<\/li>\n<\/ul>\n<h2>8. S3 Access Points<\/h2>\n<ul>\n<li><strong>Problem:<\/strong> Managing a single, massive bucket policy for a bucket shared by 100 different teams/applications is complex and risky.<\/li>\n<li><strong>Solution:<\/strong> Create multiple <strong>Access Points<\/strong> for the bucket.<\/li>\n<li><strong>Features:<\/strong><ul>\n<li>Each Access Point has its own <strong>policy<\/strong>.<\/li>\n<li>Each Access Point has a unique DNS hostname.<\/li>\n<li>Can be restricted to a specific <strong>VPC<\/strong> (VPC Origin).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> Use Access Points to <strong>decompose<\/strong> large bucket policies into smaller, application-specific policies.<\/li>\n<\/ul>\n<h2>9. S3 Object Lambda<\/h2>\n<ul>\n<li><strong>Concept:<\/strong> Add your own code (Lambda function) to S3 <code>GET<\/code> requests to modify data as it is returned to the application.<\/li>\n<li><strong>Workflow:<\/strong> App -&gt; S3 Object Lambda Access Point -&gt; Lambda Function (Process Data) -&gt; S3 Bucket.<\/li>\n<li><strong>Use Cases:<\/strong><ul>\n<li><strong>Redaction:<\/strong> Removing PII (Personally Identifiable Information) from analytics data for specific users.<\/li>\n<li><strong>Format Conversion:<\/strong> Converting XML to JSON on the fly.<\/li>\n<li><strong>Watermarking:<\/strong> Adding dynamic watermarks to images upon download.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> The application does not need to change its code; it just points to the Object Lambda Access Point instead of the bucket directly.<\/li>\n<\/ul>", "text": "AWS SAA-C03 Study Note: Amazon S3 Advanced Features This study note covers critical S3 topics for the AWS Certified Solutions Architect - Associate (SAA-C03) exam, focusing on security, access management, and advanced features. 1. S3 Encryption S3 offers multiple methods to encrypt objects at rest. You must understand the differences, especially regarding key management and audit permissions. Server-Side Encryption (SSE) SSE-S3 (S3 Managed Keys): Keys: Managed by Amazon S3. Algorithm: AES-256. Rotation: Handled automatically by S3. Cost: No additional cost for keys. Exam Tip: The default option if no specific encryption is requested. Simplest to implement. SSE-KMS (KMS Managed Keys): Keys: Managed by AWS Key Management Service (KMS). Features: Provides control over key rotation and audit trails via CloudTrail (who used the key and when). Limits: Accessing objects impacts KMS API quotas (e.g., GenerateDataKey , Decrypt ). Large-scale access can trigger KMS throttling errors. Exam Tip: Choose this if the scenario requires auditability of key usage or customer-managed key rotation policies. SSE-C (Customer-Provided Keys): Keys: You (the customer) manage and store the keys. S3 does not store the encryption key. Process: You send the key with every request (upload/download). S3 performs the encryption/decryption and then discards the key. Requirement: HTTPS is mandatory. Exam Tip: Use this if the company security policy dictates that they must manage and hold their own keys exclusively, but they still want AWS to perform the cryptographic operations. DSSE-KMS (Dual-Layer Server-Side Encryption): Applies two layers of encryption at the server side using KMS keys. Used for strict compliance requirements (e.g., NSA CNSSP 15). Client-Side Encryption You encrypt the data before uploading it to S3. S3 never sees the unencrypted data or the keys. 2. S3 Default Encryption Behavior: S3 buckets now have default encryption enabled automatically (SSE-S3). Configuration: You can override this default to use SSE-KMS. Effect: New objects are automatically encrypted. Existing objects remain as they were until they are overwritten or copied. Default Encryption vs. Bucket Policy It is crucial to understand the difference between setting a default and enforcing encryption via policy. Default Encryption (The Safety Net): How it works: If a user uploads an object without specifying any encryption headers, S3 automatically applies the bucket's default encryption settings. The upload succeeds . Use Case: Ensuring no object is ever stored in plain text, without breaking applications that forget to request encryption. Bucket Policy (The Gatekeeper): How it works: You write a policy that explicitly Denies PutObject requests if they do not include a specific encryption header (e.g., x-amz-server-side-encryption ). Result: If a user tries to upload an unencrypted object, the request fails with 403 Access Denied . Use Case: Strictly enforcing compliance where the client must be aware of and explicitly request specific encryption (e.g., forcing the use of a specific SSE-KMS key). 3. S3 CORS (Cross-Origin Resource Sharing) Problem: A web browser blocks requests to an S3 bucket domain (e.g., mybucket.s3.amazonaws.com ) if the request originates from a different domain (e.g., www.example.com ). Solution: Enable CORS on the S3 bucket to allow specific origins to access resources. Configuration: AllowedOrigins: E.g., https://www.example.com AllowedMethods: E.g., GET , PUT , POST AllowedHeaders: E.g., Authorization Exam Tip: If a static website hosted on S3 (or a user on a different domain) receives 403 Forbidden or \"Network Error\" when trying to access resources in another bucket, check CORS configuration . 4. S3 MFA Delete Purpose: Enforces Multi-Factor Authentication (MFA) to delete object versions or change the versioning state of a bucket. Requirements: Versioning: Must be enabled on the bucket. Root User: Only the Root Account (bucket owner) can enable/disable MFA Delete. CLI/API Only: Cannot be enabled via the AWS Management Console. Protects Against: Permanently deleting an object version. Suspending versioning on the bucket. Exam Tip: If a question asks how to prevent accidental deletion by privileged administrators, look for MFA Delete . Remember it requires the Root user to set up. 5. S3 Access Logs vs. CloudTrail S3 Server Access Logs: Scope: Logs detailed records for requests made to a bucket (e.g., requester, bucket name, request time, request action, response status). Destination: Another S3 bucket. Latency: Delivery can be delayed (hours). Best Practice: Do not set the target bucket to be the same as the source bucket (creates a logging loop). CloudTrail Data Events: Scope: Logs API activity (e.g., GetObject , PutObject ). Cost: Additional cost for Object-level logging. Performance: Faster delivery than S3 Access Logs. Exam Tip: For auditing specific access (who accessed this file?), CloudTrail is often the modern answer. For detailed access analysis or troubleshooting server responses, Access Logs are used. 6. S3 Pre-signed URLs Use Case: Grant temporary access to a private object without changing the bucket policy or making the object public. Mechanism: Generated using AWS CLI or SDK. Permissions: The URL inherits the permissions of the user/role who generated it . Scenarios: Allowing a premium user to download a video file. Allowing a user to upload a file directly to S3 without AWS credentials (Pre-signed PUT). Exam Tip: If the creator of the URL loses permission (e.g., user deleted), the URL stops working immediately, even if it hasn't expired. 7. Glacier Vault Lock & S3 Object Lock (WORM) Both enforce a WORM (Write Once, Read Many) model. S3 Object Lock Applies to individual objects in S3. Requires Versioning. Retention Modes: Governance Mode: Users generally cannot overwrite/delete, but users with special permissions ( s3:BypassGovernanceRetention ) can. Good for testing or lenient compliance. Compliance Mode: Strict. No one, including the Root User , can delete or overwrite the object during the retention period. Legal Hold: Independent of retention period. Prevents deletion indefinitely until explicitly removed. Glacier Vault Lock Applies to an entire Glacier Vault. Process: You create a Vault Lock Policy -> Initiate lock -> You have 24 hours to validate -> Complete lock. Exam Tip: Once the Vault Lock policy is locked (after the 24h window), it cannot be changed or deleted. Used for strict, long-term archival compliance (e.g., SEC Rule 17a-4). 8. S3 Access Points Problem: Managing a single, massive bucket policy for a bucket shared by 100 different teams/applications is complex and risky. Solution: Create multiple Access Points for the bucket. Features: Each Access Point has its own policy . Each Access Point has a unique DNS hostname. Can be restricted to a specific VPC (VPC Origin). Exam Tip: Use Access Points to decompose large bucket policies into smaller, application-specific policies. 9. S3 Object Lambda Concept: Add your own code (Lambda function) to S3 GET requests to modify data as it is returned to the application. Workflow: App -> S3 Object Lambda Access Point -> Lambda Function (Process Data) -> S3 Bucket. Use Cases: Redaction: Removing PII (Personally Identifiable Information) from analytics data for specific users. Format Conversion: Converting XML to JSON on the fly. Watermarking: Adding dynamic watermarks to images upon download. Exam Tip: The application does not need to change its code; it just points to the Object Lambda Access Point instead of the bucket directly."}, {"id": 10, "num": "10", "title": "CloudFront & Global Accelerator", "html": "<h1>AWS SAA-C03 Exam Note: CloudFront &amp; AWS Global Accelerator<\/h1>\n<h2>1. CloudFront Overview<\/h2>\n<ul>\n<li><strong>What is it?<\/strong> A global Content Delivery Network (CDN) that delivers data, videos, applications, and APIs to customers globally with low latency and high transfer speeds.<\/li>\n<li><strong>Key Concept:<\/strong> Content is cached at <strong>Edge Locations<\/strong> (points of presence) closest to the user.<\/li>\n<li><strong>Benefits:<\/strong><ul>\n<li>Improves read performance (content is closer to users).<\/li>\n<li>Reduces load on the Origin server.<\/li>\n<li><strong>DDoS Protection:<\/strong> Integrated with AWS Shield (Standard is free) and AWS WAF (Web Application Firewall).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Origins:<\/strong><ul>\n<li><strong>S3 Bucket:<\/strong> For distributing files and caching them at the edge.<\/li>\n<li><strong>Custom Origin (HTTP):<\/strong> Application Load Balancer (ALB), EC2 instance, S3 Website (static hosting enabled), or any non-AWS HTTP backend.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>2. CloudFront - S3 Security (OAC vs OAI)<\/h2>\n<p>When using S3 as an origin, you must prevent users from accessing the S3 bucket directly (which would bypass CloudFront fees, WAF, and restrictions).<\/p>\n<ul>\n<li><strong>The Solution:<\/strong> Use <strong>Origin Access Control (OAC)<\/strong> (or the legacy Origin Access Identity - OAI) to restrict access.<\/li>\n<li><strong>How it works:<\/strong><ol>\n<li>Create an OAC in CloudFront.<\/li>\n<li>Update the <strong>S3 Bucket Policy<\/strong> to deny public access and <strong>only allow<\/strong> the CloudFront Service Principal.<\/li>\n<\/ol>\n<\/li>\n<\/ul>\n<h3>OAC vs OAI (Exam Key Topic)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th>Origin Access Identity (OAI)<\/th>\n<th>Origin Access Control (OAC)<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Status<\/strong><\/td>\n<td>Legacy (Deprecated)<\/td>\n<td><strong>Recommended (Modern)<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Security Protocol<\/strong><\/td>\n<td>Older protocol<\/td>\n<td><strong>SigV4<\/strong> (Stronger security)<\/td>\n<\/tr>\n<tr>\n<td><strong>SSE-KMS Support<\/strong><\/td>\n<td>No (Cannot serve KMS-encrypted files)<\/td>\n<td><strong>Yes<\/strong> (Supports SSE-KMS encrypted buckets)<\/td>\n<\/tr>\n<tr>\n<td><strong>HTTP Methods<\/strong><\/td>\n<td>GET, HEAD only<\/td>\n<td>All (GET, PUT, POST, DELETE, etc.)<\/td>\n<\/tr>\n<tr>\n<td><strong>Region Support<\/strong><\/td>\n<td>Limited in newer regions<\/td>\n<td>All AWS Regions<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<blockquote>\n<p><strong>Exam Tip:<\/strong> If a scenario mentions \"KMS encrypted S3 objects\" or \"uploading via CloudFront (PUT/POST)\" and asks for the security solution, the answer is <strong>OAC<\/strong>.<\/p>\n<\/blockquote>\n<h2>3. CloudFront - ALB/EC2 as an Origin<\/h2>\n<p>When using an EC2 instance or ALB as an origin, CloudFront connects to it using the HTTP/HTTPS protocol.<\/p>\n<ul>\n<li><strong>Security Challenge:<\/strong> Users might bypass CloudFront and access the ALB/EC2 directly, which bypasses WAF rules or caching logic.<\/li>\n<li><strong>How to Restrict Access (Exam Favorite):<\/strong><ol>\n<li><strong>Security Groups (Network Level):<\/strong> Configure the EC2 or ALB Security Group to <strong>only<\/strong> allow Inbound traffic from CloudFront's IP ranges.<ul>\n<li><em>Tip:<\/em> Use the <strong>AWS Managed Prefix List<\/strong> for CloudFront in the Security Group source.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Custom Headers (Application Level):<\/strong><ul>\n<li>Configure CloudFront to add a <strong>custom HTTP header<\/strong> (e.g., <code>X-Custom-Secret<\/code>) to every request it sends to the origin.<\/li>\n<li>Configure the ALB Listener Rules (or backend application) to <strong>only<\/strong> process requests that contain this specific header and value.<\/li>\n<li>Requests without the header (direct access) are dropped or returned as 403 Forbidden.<\/li>\n<\/ul>\n<\/li>\n<\/ol>\n<\/li>\n<\/ul>\n<h2>4. CloudFront - Geo Restriction<\/h2>\n<ul>\n<li><strong>Purpose:<\/strong> Restrict access to your content based on the viewer's geographic location.<\/li>\n<li><strong>Mechanism:<\/strong> Uses a third-party Geo-IP database to determine the user's country.<\/li>\n<li><strong>Modes:<\/strong><ul>\n<li><strong>Whitelist:<\/strong> Allow access ONLY to users in specific countries.<\/li>\n<li><strong>Blacklist:<\/strong> Prevent access to users in specific countries.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Use Case:<\/strong> complying with copyright laws (e.g., streaming sports only allowed in specific territories).<\/li>\n<li><strong>Note:<\/strong> This restricts access <em>at the CloudFront edge<\/em>. (For finer control like restricting specific <em>files<\/em>, you would use Signed URLs/Cookies, not Geo Restriction).<\/li>\n<\/ul>\n<h2>5. CloudFront Security (AWS WAF &amp; Shield)<\/h2>\n<p>CloudFront integrates seamlessly with AWS WAF to provide Layer 7 protection at the edge.<\/p>\n<ul>\n<li><strong>AWS WAF (Web Application Firewall):<\/strong><ul>\n<li><strong>Protects Against:<\/strong> SQL Injection, Cross-Site Scripting (XSS), and common web exploits.<\/li>\n<li><strong>Scope:<\/strong> You create a <strong>Web ACL<\/strong> and associate it with the CloudFront distribution (Global resource).<\/li>\n<li><strong>WAF Geo Match vs. CloudFront Geo Restriction:<\/strong><ul>\n<li><strong>CloudFront Geo Restriction:<\/strong> \"All or Nothing.\" You block a country for the <em>entire<\/em> distribution.<\/li>\n<li><strong>WAF Geo Match:<\/strong> Granular control. You can block a country only for specific paths (e.g., <code>/admin<\/code>) or combine it with other rules.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<\/li>\n<li><strong>AWS Shield:<\/strong><ul>\n<li><strong>Shield Standard:<\/strong> Automatically enabled for all CloudFront customers (Free). Protects against common Layer 3/4 DDoS attacks.<\/li>\n<li><strong>Shield Advanced:<\/strong> Paid service ($3k/mo). Provides specialized support, cost protection, and advanced reporting for sophisticated attacks.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>6. CloudFront - Price Classes<\/h2>\n<p>CloudFront pricing varies by edge location. To save costs, you can exclude expensive regions.<\/p>\n<ul>\n<li><strong>Price Class All (Default):<\/strong><ul>\n<li>Uses <strong>all<\/strong> Edge Locations globally.<\/li>\n<li><strong>Pros:<\/strong> Best performance worldwide.<\/li>\n<li><strong>Cons:<\/strong> Most expensive.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Price Class 200:<\/strong><ul>\n<li>Uses most regions but <strong>excludes the most expensive<\/strong> ones.<\/li>\n<li><em>Typically excludes:<\/em> South America, Australia.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Price Class 100:<\/strong><ul>\n<li>Uses <strong>only the cheapest<\/strong> regions.<\/li>\n<li><em>Includes:<\/em> United States, Canada, Europe.<\/li>\n<li><strong>Pros:<\/strong> Cheapest option.<\/li>\n<li><strong>Cons:<\/strong> Higher latency for users in Asia, South America, etc.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>7. CloudFront - Cache Invalidation<\/h2>\n<ul>\n<li><strong>The Problem:<\/strong> When you update a file on the origin (e.g., <code>logo.png<\/code>), CloudFront continues to serve the old cached version until the TTL (Time To Live) expires.<\/li>\n<li><strong>The Solution (Invalidation):<\/strong> You can force CloudFront to remove the object from the cache immediately.<\/li>\n<li><strong>How it works:<\/strong> You specify the path (e.g., <code>/images/logo.png<\/code> or <code>/images/*<\/code>) to invalidate.<\/li>\n<li><strong>Cost:<\/strong> The first 1,000 invalidation paths per month are free; you pay for each one after that.<\/li>\n<li><strong>Better Alternative (Versioning):<\/strong> instead of invalidating, use file versioning (e.g., <code>logo_v1.png<\/code>, <code>logo_v2.png<\/code>). This forces the client to fetch the new file immediately with no cost.<\/li>\n<\/ul>\n<h2>8. AWS Global Accelerator - Overview<\/h2>\n<ul>\n<li><strong>What is it?<\/strong> A networking service that improves the availability and performance of your applications for local and global users.<\/li>\n<li><strong>How it works:<\/strong><ul>\n<li>Traffic enters the AWS network at the Edge Location closest to the user.<\/li>\n<li>It travels over the <strong>AWS internal global backbone network<\/strong> (instead of the public internet) to reach your application endpoints.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li><strong>2 Anycast Static IPs:<\/strong> You get 2 static IP addresses that work globally. (Great for whitelisting).<\/li>\n<li><strong>Non-HTTP Support:<\/strong> Works with TCP and UDP (CloudFront is HTTP/S only).<\/li>\n<li><strong>No Caching:<\/strong> It does <em>not<\/em> cache content; it optimizes the network path.<\/li>\n<li><strong>Fast Regional Failover:<\/strong> If one region goes down, Global Accelerator redirects traffic to a healthy endpoint in another region in less than 1 minute (DNS-based failover can take much longer due to TTL).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Endpoints:<\/strong> Network Load Balancers (NLB), Application Load Balancers (ALB), EC2 Instances, or Elastic IPs.<\/li>\n<\/ul>\n<h3>Summary Table: CloudFront vs. Global Accelerator<\/h3>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th>Amazon CloudFront<\/th>\n<th>AWS Global Accelerator<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Primary Goal<\/strong><\/td>\n<td>Content Delivery &amp; Caching<\/td>\n<td>Network Performance &amp; Path Optimization<\/td>\n<\/tr>\n<tr>\n<td><strong>Protocol<\/strong><\/td>\n<td>HTTP / HTTPS<\/td>\n<td>TCP / UDP (and HTTP/S)<\/td>\n<\/tr>\n<tr>\n<td><strong>Caching<\/strong><\/td>\n<td><strong>Yes<\/strong> (Edge Caching)<\/td>\n<td><strong>No<\/strong> (Pass-through)<\/td>\n<\/tr>\n<tr>\n<td><strong>IP Address<\/strong><\/td>\n<td>Dynamic (changes)<\/td>\n<td><strong>2 Static Anycast IPs<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Best For<\/strong><\/td>\n<td>Static content (images/video), Dynamic Web<\/td>\n<td>Gaming (UDP), IoT (MQTT), VoIP, HTTP APIs<\/td>\n<\/tr>\n<tr>\n<td><strong>Network<\/strong><\/td>\n<td>AWS Edge Network<\/td>\n<td>AWS Global Backbone Network<\/td>\n<\/tr>\n<\/tbody>\n<\/table>", "text": "AWS SAA-C03 Exam Note: CloudFront & AWS Global Accelerator 1. CloudFront Overview What is it? A global Content Delivery Network (CDN) that delivers data, videos, applications, and APIs to customers globally with low latency and high transfer speeds. Key Concept: Content is cached at Edge Locations (points of presence) closest to the user. Benefits: Improves read performance (content is closer to users). Reduces load on the Origin server. DDoS Protection: Integrated with AWS Shield (Standard is free) and AWS WAF (Web Application Firewall). Origins: S3 Bucket: For distributing files and caching them at the edge. Custom Origin (HTTP): Application Load Balancer (ALB), EC2 instance, S3 Website (static hosting enabled), or any non-AWS HTTP backend. 2. CloudFront - S3 Security (OAC vs OAI) When using S3 as an origin, you must prevent users from accessing the S3 bucket directly (which would bypass CloudFront fees, WAF, and restrictions). The Solution: Use Origin Access Control (OAC) (or the legacy Origin Access Identity - OAI) to restrict access. How it works: Create an OAC in CloudFront. Update the S3 Bucket Policy to deny public access and only allow the CloudFront Service Principal. OAC vs OAI (Exam Key Topic) Feature Origin Access Identity (OAI) Origin Access Control (OAC) Status Legacy (Deprecated) Recommended (Modern) Security Protocol Older protocol SigV4 (Stronger security) SSE-KMS Support No (Cannot serve KMS-encrypted files) Yes (Supports SSE-KMS encrypted buckets) HTTP Methods GET, HEAD only All (GET, PUT, POST, DELETE, etc.) Region Support Limited in newer regions All AWS Regions Exam Tip: If a scenario mentions \"KMS encrypted S3 objects\" or \"uploading via CloudFront (PUT/POST)\" and asks for the security solution, the answer is OAC . 3. CloudFront - ALB/EC2 as an Origin When using an EC2 instance or ALB as an origin, CloudFront connects to it using the HTTP/HTTPS protocol. Security Challenge: Users might bypass CloudFront and access the ALB/EC2 directly, which bypasses WAF rules or caching logic. How to Restrict Access (Exam Favorite): Security Groups (Network Level): Configure the EC2 or ALB Security Group to only allow Inbound traffic from CloudFront's IP ranges. Tip: Use the AWS Managed Prefix List for CloudFront in the Security Group source. Custom Headers (Application Level): Configure CloudFront to add a custom HTTP header (e.g., X-Custom-Secret ) to every request it sends to the origin. Configure the ALB Listener Rules (or backend application) to only process requests that contain this specific header and value. Requests without the header (direct access) are dropped or returned as 403 Forbidden. 4. CloudFront - Geo Restriction Purpose: Restrict access to your content based on the viewer's geographic location. Mechanism: Uses a third-party Geo-IP database to determine the user's country. Modes: Whitelist: Allow access ONLY to users in specific countries. Blacklist: Prevent access to users in specific countries. Use Case: complying with copyright laws (e.g., streaming sports only allowed in specific territories). Note: This restricts access at the CloudFront edge . (For finer control like restricting specific files , you would use Signed URLs/Cookies, not Geo Restriction). 5. CloudFront Security (AWS WAF & Shield) CloudFront integrates seamlessly with AWS WAF to provide Layer 7 protection at the edge. AWS WAF (Web Application Firewall): Protects Against: SQL Injection, Cross-Site Scripting (XSS), and common web exploits. Scope: You create a Web ACL and associate it with the CloudFront distribution (Global resource). WAF Geo Match vs. CloudFront Geo Restriction: CloudFront Geo Restriction: \"All or Nothing.\" You block a country for the entire distribution. WAF Geo Match: Granular control. You can block a country only for specific paths (e.g., /admin ) or combine it with other rules. AWS Shield: Shield Standard: Automatically enabled for all CloudFront customers (Free). Protects against common Layer 3/4 DDoS attacks. Shield Advanced: Paid service ($3k/mo). Provides specialized support, cost protection, and advanced reporting for sophisticated attacks. 6. CloudFront - Price Classes CloudFront pricing varies by edge location. To save costs, you can exclude expensive regions. Price Class All (Default): Uses all Edge Locations globally. Pros: Best performance worldwide. Cons: Most expensive. Price Class 200: Uses most regions but excludes the most expensive ones. Typically excludes: South America, Australia. Price Class 100: Uses only the cheapest regions. Includes: United States, Canada, Europe. Pros: Cheapest option. Cons: Higher latency for users in Asia, South America, etc. 7. CloudFront - Cache Invalidation The Problem: When you update a file on the origin (e.g., logo.png ), CloudFront continues to serve the old cached version until the TTL (Time To Live) expires. The Solution (Invalidation): You can force CloudFront to remove the object from the cache immediately. How it works: You specify the path (e.g., /images/logo.png or /images/* ) to invalidate. Cost: The first 1,000 invalidation paths per month are free; you pay for each one after that. Better Alternative (Versioning): instead of invalidating, use file versioning (e.g., logo_v1.png , logo_v2.png ). This forces the client to fetch the new file immediately with no cost. 8. AWS Global Accelerator - Overview What is it? A networking service that improves the availability and performance of your applications for local and global users. How it works: Traffic enters the AWS network at the Edge Location closest to the user. It travels over the AWS internal global backbone network (instead of the public internet) to reach your application endpoints. Key Features: 2 Anycast Static IPs: You get 2 static IP addresses that work globally. (Great for whitelisting). Non-HTTP Support: Works with TCP and UDP (CloudFront is HTTP/S only). No Caching: It does not cache content; it optimizes the network path. Fast Regional Failover: If one region goes down, Global Accelerator redirects traffic to a healthy endpoint in another region in less than 1 minute (DNS-based failover can take much longer due to TTL). Endpoints: Network Load Balancers (NLB), Application Load Balancers (ALB), EC2 Instances, or Elastic IPs. Summary Table: CloudFront vs. Global Accelerator Feature Amazon CloudFront AWS Global Accelerator Primary Goal Content Delivery & Caching Network Performance & Path Optimization Protocol HTTP / HTTPS TCP / UDP (and HTTP/S) Caching Yes (Edge Caching) No (Pass-through) IP Address Dynamic (changes) 2 Static Anycast IPs Best For Static content (images/video), Dynamic Web Gaming (UDP), IoT (MQTT), VoIP, HTTP APIs Network AWS Edge Network AWS Global Backbone Network"}, {"id": 11, "num": "11", "title": "AWS Storage", "html": "<h1>AWS SAA-C03 Study Note: Storage Extras<\/h1>\n<h2>1. AWS Snow Family Overview<\/h2>\n<p>The Snow Family is used for <strong>offline<\/strong> data migration and edge computing. It is the answer when network capacity is insufficient for the volume of data (e.g., \"it would take years to transfer over the internet\").<\/p>\n<h3>Device Comparison<\/h3>\n<table>\n<thead>\n<tr>\n<th>Device<\/th>\n<th>Capacity (Usable)<\/th>\n<th>Key Features<\/th>\n<th>Exam Use Case<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Snowcone<\/strong><\/td>\n<td>8 TB (HDD) or 14 TB (SSD)<\/td>\n<td>Portable, rugged, battery option. Fits in a backpack.<\/td>\n<td>Small data transfers (e.g., 5TB) from rough environments (deserts, oil rigs) or individual IoT collection points.<\/td>\n<\/tr>\n<tr>\n<td><strong>Snowball Edge Storage Optimized<\/strong><\/td>\n<td>80 TB<\/td>\n<td>High storage capacity. 40 vCPUs.<\/td>\n<td>Large-scale data migration (petabytes). Replacing physical tape libraries.<\/td>\n<\/tr>\n<tr>\n<td><strong>Snowball Edge Compute Optimized<\/strong><\/td>\n<td>42 TB<\/td>\n<td>More compute power (52 vCPUs, GPU options).<\/td>\n<td>Edge processing (ML inference, video analysis) <em>before<\/em> sending data to AWS.<\/td>\n<\/tr>\n<tr>\n<td><strong>Snowmobile<\/strong><\/td>\n<td>100 PB<\/td>\n<td>Shipping container truck.<\/td>\n<td>Exabyte-scale migrations (e.g., entire datacenter shutdown).<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p><strong>Key Exam Rule:<\/strong> If the transfer takes <strong>more than a week<\/strong> over the network, consider Snowball.<\/p>\n<h2>2. Architecture: Snowball into Glacier<\/h2>\n<p>A common exam scenario asks for the most cost-effective way to migrate petabytes of archives from on-premises directly into cold storage (Glacier).<\/p>\n<h3>The \"Lifecycle\" Pattern (Classic)<\/h3>\n<ol>\n<li><strong>On-Premises:<\/strong> Load data onto Snowball Edge.<\/li>\n<li><strong>Transport:<\/strong> Ship device to AWS.<\/li>\n<li><strong>Ingest:<\/strong> AWS imports data into an <strong>S3 Standard<\/strong> bucket.<\/li>\n<li><strong>Transition:<\/strong> Use an <strong>S3 Lifecycle Policy<\/strong> to transition objects to S3 Glacier Flexible Retrieval or Deep Archive immediately (0 days).<ul>\n<li><em>Drawback:<\/em> You pay a transition fee per object.<\/li>\n<\/ul>\n<\/li>\n<\/ol>\n<h3>The \"Direct Import\" Pattern (Optimized)<\/h3>\n<p>Snowball Edge now supports importing data <strong>directly<\/strong> into S3 Glacier storage classes.<\/p>\n<ul>\n<li><strong>How:<\/strong> When creating the job in the console, select the destination storage class as <strong>Glacier Flexible Retrieval<\/strong> or <strong>Glacier Deep Archive<\/strong>.<\/li>\n<li><strong>Benefit:<\/strong> Avoids the S3 Lifecycle transition costs. This is often the \"most cost-effective\" answer for archival migration.<\/li>\n<\/ul>\n<h2>3. Amazon FSx<\/h2>\n<p>FSx provides fully managed third-party file systems. You must match the \"Operating System\" or \"Workload\" to the FSx type.<\/p>\n<table>\n<thead>\n<tr>\n<th>Service<\/th>\n<th>Protocol<\/th>\n<th>OS / Compatibility<\/th>\n<th>Primary Exam Use Case<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>FSx for Windows File Server<\/strong><\/td>\n<td>SMB<\/td>\n<td><strong>Windows<\/strong><\/td>\n<td>\"Lift and shift\" Windows apps. Shared storage for Windows servers. <strong>Active Directory<\/strong> integration. Distributed File System (DFS).<\/td>\n<\/tr>\n<tr>\n<td><strong>FSx for Lustre<\/strong><\/td>\n<td>POSIX<\/td>\n<td><strong>Linux<\/strong><\/td>\n<td><strong>HPC<\/strong> (High-Performance Computing), Machine Learning, Video Processing. \"Fast parallel file system.\"<\/td>\n<\/tr>\n<tr>\n<td><strong>FSx for NetApp ONTAP<\/strong><\/td>\n<td>NFS, SMB, iSCSI<\/td>\n<td>Linux &amp; Windows<\/td>\n<td>Migrating on-prem <strong>NetApp<\/strong> workloads. Supports de-duplication, compression, and snapshotting.<\/td>\n<\/tr>\n<tr>\n<td><strong>FSx for OpenZFS<\/strong><\/td>\n<td>NFS<\/td>\n<td>Linux<\/td>\n<td>Migrating ZFS workloads. High performance (1 million IOPS).<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>FSx for Lustre Deployment Types (Crucial)<\/h3>\n<p>The exam will often ask you to choose between these two modes based on data durability needs and job length.<\/p>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th><strong>Scratch File System<\/strong><\/th>\n<th><strong>Persistent File System<\/strong><\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Use Case<\/strong><\/td>\n<td>Temporary storage, short-term processing (weeks/months).<\/td>\n<td>Long-term storage, sensitive to availability.<\/td>\n<\/tr>\n<tr>\n<td><strong>Durability<\/strong><\/td>\n<td><strong>NOT replicated.<\/strong> If a server fails, data is lost.<\/td>\n<td><strong>Replicated<\/strong> within the Availability Zone (AZ). Self-healing if a server fails.<\/td>\n<\/tr>\n<tr>\n<td><strong>Performance<\/strong><\/td>\n<td>Higher burst throughput (up to 6x baseline).<\/td>\n<td>Consistent baseline performance.<\/td>\n<\/tr>\n<tr>\n<td><strong>Cost<\/strong><\/td>\n<td>Lower cost.<\/td>\n<td>Higher cost.<\/td>\n<\/tr>\n<tr>\n<td><strong>Exam Trigger<\/strong><\/td>\n<td>\"Temporary processing,\" \"Cost optimization,\" \"Data can be reproduced from S3.\"<\/td>\n<td>\"High availability,\" \"Long-term storage,\" \"Data cannot be easily reproduced.\"<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3>FSx for Lustre + S3 Integration<\/h3>\n<ul>\n<li>You can link an FSx for Lustre file system to an S3 bucket.<\/li>\n<li>The S3 objects appear as files in the file system.<\/li>\n<li><strong>Workflow:<\/strong><ol>\n<li>Spin up a <strong>Scratch<\/strong> FSx for Lustre file system linked to S3.<\/li>\n<li>Process data at high speed.<\/li>\n<li>Write results back to S3.<\/li>\n<li><strong>Delete<\/strong> the FSx file system to save money.<\/li>\n<\/ol>\n<\/li>\n<\/ul>\n<h2>4. AWS Storage Gateway Overview<\/h2>\n<p>Hybrid storage service that enables on-premises applications to use AWS cloud storage. It requires a virtual or hardware appliance installed on-premises.<\/p>\n<h3>1. S3 File Gateway<\/h3>\n<ul>\n<li><strong>Interface:<\/strong> NFS or SMB.<\/li>\n<li><strong>Backend:<\/strong> Stores files as <strong>Objects<\/strong> in an S3 bucket.<\/li>\n<li><strong>Use Case:<\/strong> User home directories, data lakes, content repositories that need to be accessible as files on-prem but stored cheaply in S3.<\/li>\n<li><strong>Caching:<\/strong> Keeps \"recently accessed\" data locally for low latency.<\/li>\n<\/ul>\n<h3>2. FSx File Gateway<\/h3>\n<ul>\n<li><strong>Interface:<\/strong> SMB.<\/li>\n<li><strong>Backend:<\/strong> Amazon <strong>FSx for Windows File Server<\/strong>.<\/li>\n<li><strong>Use Case:<\/strong> Low-latency on-prem access to Windows file shares in the cloud. Extension of FSx.<\/li>\n<\/ul>\n<h3>3. Volume Gateway (Block Storage / iSCSI)<\/h3>\n<p>Presents disk volumes (iSCSI) to on-prem servers.<\/p>\n<ul>\n<li><strong>Stored Volumes:<\/strong> All data is stored <strong>locally<\/strong> (on-prem) for maximum speed. Asynchronous backups are sent to AWS (EBS Snapshots).<ul>\n<li><em>Use Case:<\/em> fast local access + offsite backup.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Cached Volumes:<\/strong> Primary data is in <strong>AWS (S3)<\/strong>. Only frequently accessed data is cached locally.<ul>\n<li><em>Use Case:<\/em> expanding on-prem storage cheaply without buying new hardware.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3>4. Tape Gateway<\/h3>\n<ul>\n<li><strong>Interface:<\/strong> iSCSI VTL (Virtual Tape Library).<\/li>\n<li><strong>Backend:<\/strong> S3 (Virtual Tapes) -&gt; Glacier / Deep Archive.<\/li>\n<li><strong>Use Case:<\/strong> Killing physical tape infrastructure. Backup software (e.g., Veeam, Veritas) thinks it's writing to physical tapes, but it's going to AWS.<\/li>\n<\/ul>\n<h2>5. AWS Transfer Family<\/h2>\n<p>A serverless service to manage file transfers <em>into<\/em> and <em>out of<\/em> AWS storage without managing infrastructure.<\/p>\n<ul>\n<li><strong>Protocols Supported:<\/strong><ul>\n<li><strong>SFTP<\/strong> (Secure File Transfer Protocol) - <em>Most tested.<\/em><\/li>\n<li><strong>FTPS<\/strong> (File Transfer Protocol over SSL)<\/li>\n<li><strong>FTP<\/strong> (Unencrypted - rarely the answer unless \"legacy support\" required)<\/li>\n<\/ul>\n<\/li>\n<li><strong>Destinations:<\/strong> Amazon S3 or Amazon EFS.<\/li>\n<li><strong>Exam Scenario:<\/strong> \"A 3rd party partner needs to upload weekly reports via SFTP. We do not want to manage EC2 instances for this.\" -&gt; <strong>AWS Transfer Family<\/strong>.<\/li>\n<\/ul>\n<h2>6. AWS DataSync - Overview<\/h2>\n<p>An online data transfer service designed to automate moving data between on-premises storage and AWS.<\/p>\n<ul>\n<li><strong>Mechanism:<\/strong> Requires a <strong>DataSync Agent<\/strong> (VM) installed on-premises.<\/li>\n<li><strong>Protocol:<\/strong> Uses a proprietary, accelerated network protocol (not standard traffic) over Internet or Direct Connect.<\/li>\n<li><strong>Speed:<\/strong> Much faster than standard command-line tools (like AWS CLI <code>cp<\/code>).<\/li>\n<li><strong>Destinations:<\/strong> S3, EFS, FSx for Windows, FSx for Lustre.<\/li>\n<li><strong>Scheduling:<\/strong> Supports bandwidth throttling and scheduling (e.g., \"transfer only at night\").<\/li>\n<li><strong>Exam Scenario:<\/strong> \"Migrating a large on-prem NFS server to EFS over the weekend\" or \"Ongoing replication of on-prem data to AWS.\"<\/li>\n<\/ul>\n<h2>7. All AWS Storage Options Compared (Cheat Sheet)<\/h2>\n<table>\n<thead>\n<tr>\n<th>Scenario<\/th>\n<th>Best Service<\/th>\n<th>Why?<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Object Storage<\/strong> (Images, Videos, Backups)<\/td>\n<td><strong>S3<\/strong><\/td>\n<td>Limitless, serverless, web-accessible.<\/td>\n<\/tr>\n<tr>\n<td><strong>Block Storage<\/strong> (OS Boot Volume, Database)<\/td>\n<td><strong>EBS<\/strong><\/td>\n<td>Low latency, attached to one EC2 instance.<\/td>\n<\/tr>\n<tr>\n<td><strong>Shared File Storage<\/strong> (Linux EC2 instances)<\/td>\n<td><strong>EFS<\/strong><\/td>\n<td>POSIX compliant, scales automatically, multi-AZ.<\/td>\n<\/tr>\n<tr>\n<td><strong>Shared File Storage<\/strong> (Windows EC2 instances)<\/td>\n<td><strong>FSx for Windows<\/strong><\/td>\n<td>Native SMB, AD integration.<\/td>\n<\/tr>\n<tr>\n<td><strong>HPC / Parallel File System<\/strong><\/td>\n<td><strong>FSx for Lustre<\/strong><\/td>\n<td>High throughput, links to S3.<\/td>\n<\/tr>\n<tr>\n<td><strong>Local Cache + Cloud Backed Files<\/strong><\/td>\n<td><strong>S3 File Gateway<\/strong><\/td>\n<td>NFS/SMB interface on-prem, data lives in S3.<\/td>\n<\/tr>\n<tr>\n<td><strong>Local Cache + Cloud Backed Block<\/strong><\/td>\n<td><strong>Volume Gateway<\/strong><\/td>\n<td>iSCSI interface, extends on-prem disks to cloud.<\/td>\n<\/tr>\n<tr>\n<td><strong>Replace Physical Tapes<\/strong><\/td>\n<td><strong>Tape Gateway<\/strong><\/td>\n<td>VTL interface, cheap archive in Glacier.<\/td>\n<\/tr>\n<tr>\n<td><strong>Offline Migration<\/strong> (Petabytes)<\/td>\n<td><strong>Snowball Edge<\/strong><\/td>\n<td>No internet bandwidth used.<\/td>\n<\/tr>\n<tr>\n<td><strong>Online Migration<\/strong> (NFS/SMB to AWS)<\/td>\n<td><strong>DataSync<\/strong><\/td>\n<td>Automated, accelerated, agent-based.<\/td>\n<\/tr>\n<tr>\n<td><strong>Partner SFTP Uploads<\/strong><\/td>\n<td><strong>Transfer Family<\/strong><\/td>\n<td>Fully managed SFTP endpoint.<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2>8. Simplified Decision Tree (Memory Aids)<\/h2>\n<p>Use these short \"If-Then\" rules to answer questions quickly.<\/p>\n<h3><strong>Rule 1: Moving Data to AWS<\/strong><\/h3>\n<ul>\n<li><strong>No Internet<\/strong> (or \"weeks to transfer\")? $\\rightarrow$ <strong>Snowball<\/strong><\/li>\n<li><strong>Has Internet<\/strong> (Fast/Direct Connect)? $\\rightarrow$ <strong>DataSync<\/strong><\/li>\n<li><strong>SFTP / FTP Protocol?<\/strong> $\\rightarrow$ <strong>Transfer Family<\/strong><\/li>\n<\/ul>\n<h3><strong>Rule 2: Hybrid Access (Storage Gateway)<\/strong><\/h3>\n<ul>\n<li><strong>Need to see FILES?<\/strong> (NFS/SMB) $\\rightarrow$ <strong>S3 File Gateway<\/strong><\/li>\n<li><strong>Need a DISK?<\/strong> (iSCSI) $\\rightarrow$ <strong>Volume Gateway<\/strong><\/li>\n<li><strong>Need to Replace TAPES?<\/strong> $\\rightarrow$ <strong>Tape Gateway<\/strong><\/li>\n<\/ul>\n<h3><strong>Rule 3: FSx Keywords<\/strong><\/h3>\n<ul>\n<li><strong>Windows / Active Directory / SMB<\/strong> $\\rightarrow$ <strong>FSx for Windows<\/strong><\/li>\n<li><strong>Linux / HPC / \"Scratch\"<\/strong> $\\rightarrow$ <strong>FSx for Lustre<\/strong><\/li>\n<li><strong>NetApp<\/strong> $\\rightarrow$ <strong>FSx for ONTAP<\/strong><\/li>\n<\/ul>\n<h3><strong>Rule 4: Lustre Types<\/strong><\/h3>\n<ul>\n<li><strong>Fast &amp; Temporary<\/strong> $\\rightarrow$ <strong>Scratch<\/strong> (Not replicated, cheaper)<\/li>\n<li><strong>Long-term &amp; Safe<\/strong> $\\rightarrow$ <strong>Persistent<\/strong> (Replicated, higher availability)<\/li>\n<\/ul>", "text": "AWS SAA-C03 Study Note: Storage Extras 1. AWS Snow Family Overview The Snow Family is used for offline data migration and edge computing. It is the answer when network capacity is insufficient for the volume of data (e.g., \"it would take years to transfer over the internet\"). Device Comparison Device Capacity (Usable) Key Features Exam Use Case Snowcone 8 TB (HDD) or 14 TB (SSD) Portable, rugged, battery option. Fits in a backpack. Small data transfers (e.g., 5TB) from rough environments (deserts, oil rigs) or individual IoT collection points. Snowball Edge Storage Optimized 80 TB High storage capacity. 40 vCPUs. Large-scale data migration (petabytes). Replacing physical tape libraries. Snowball Edge Compute Optimized 42 TB More compute power (52 vCPUs, GPU options). Edge processing (ML inference, video analysis) before sending data to AWS. Snowmobile 100 PB Shipping container truck. Exabyte-scale migrations (e.g., entire datacenter shutdown). Key Exam Rule: If the transfer takes more than a week over the network, consider Snowball. 2. Architecture: Snowball into Glacier A common exam scenario asks for the most cost-effective way to migrate petabytes of archives from on-premises directly into cold storage (Glacier). The \"Lifecycle\" Pattern (Classic) On-Premises: Load data onto Snowball Edge. Transport: Ship device to AWS. Ingest: AWS imports data into an S3 Standard bucket. Transition: Use an S3 Lifecycle Policy to transition objects to S3 Glacier Flexible Retrieval or Deep Archive immediately (0 days). Drawback: You pay a transition fee per object. The \"Direct Import\" Pattern (Optimized) Snowball Edge now supports importing data directly into S3 Glacier storage classes. How: When creating the job in the console, select the destination storage class as Glacier Flexible Retrieval or Glacier Deep Archive . Benefit: Avoids the S3 Lifecycle transition costs. This is often the \"most cost-effective\" answer for archival migration. 3. Amazon FSx FSx provides fully managed third-party file systems. You must match the \"Operating System\" or \"Workload\" to the FSx type. Service Protocol OS / Compatibility Primary Exam Use Case FSx for Windows File Server SMB Windows \"Lift and shift\" Windows apps. Shared storage for Windows servers. Active Directory integration. Distributed File System (DFS). FSx for Lustre POSIX Linux HPC (High-Performance Computing), Machine Learning, Video Processing. \"Fast parallel file system.\" FSx for NetApp ONTAP NFS, SMB, iSCSI Linux & Windows Migrating on-prem NetApp workloads. Supports de-duplication, compression, and snapshotting. FSx for OpenZFS NFS Linux Migrating ZFS workloads. High performance (1 million IOPS). FSx for Lustre Deployment Types (Crucial) The exam will often ask you to choose between these two modes based on data durability needs and job length. Feature Scratch File System Persistent File System Use Case Temporary storage, short-term processing (weeks/months). Long-term storage, sensitive to availability. Durability NOT replicated. If a server fails, data is lost. Replicated within the Availability Zone (AZ). Self-healing if a server fails. Performance Higher burst throughput (up to 6x baseline). Consistent baseline performance. Cost Lower cost. Higher cost. Exam Trigger \"Temporary processing,\" \"Cost optimization,\" \"Data can be reproduced from S3.\" \"High availability,\" \"Long-term storage,\" \"Data cannot be easily reproduced.\" FSx for Lustre + S3 Integration You can link an FSx for Lustre file system to an S3 bucket. The S3 objects appear as files in the file system. Workflow: Spin up a Scratch FSx for Lustre file system linked to S3. Process data at high speed. Write results back to S3. Delete the FSx file system to save money. 4. AWS Storage Gateway Overview Hybrid storage service that enables on-premises applications to use AWS cloud storage. It requires a virtual or hardware appliance installed on-premises. 1. S3 File Gateway Interface: NFS or SMB. Backend: Stores files as Objects in an S3 bucket. Use Case: User home directories, data lakes, content repositories that need to be accessible as files on-prem but stored cheaply in S3. Caching: Keeps \"recently accessed\" data locally for low latency. 2. FSx File Gateway Interface: SMB. Backend: Amazon FSx for Windows File Server . Use Case: Low-latency on-prem access to Windows file shares in the cloud. Extension of FSx. 3. Volume Gateway (Block Storage / iSCSI) Presents disk volumes (iSCSI) to on-prem servers. Stored Volumes: All data is stored locally (on-prem) for maximum speed. Asynchronous backups are sent to AWS (EBS Snapshots). Use Case: fast local access + offsite backup. Cached Volumes: Primary data is in AWS (S3) . Only frequently accessed data is cached locally. Use Case: expanding on-prem storage cheaply without buying new hardware. 4. Tape Gateway Interface: iSCSI VTL (Virtual Tape Library). Backend: S3 (Virtual Tapes) -> Glacier / Deep Archive. Use Case: Killing physical tape infrastructure. Backup software (e.g., Veeam, Veritas) thinks it's writing to physical tapes, but it's going to AWS. 5. AWS Transfer Family A serverless service to manage file transfers into and out of AWS storage without managing infrastructure. Protocols Supported: SFTP (Secure File Transfer Protocol) - Most tested. FTPS (File Transfer Protocol over SSL) FTP (Unencrypted - rarely the answer unless \"legacy support\" required) Destinations: Amazon S3 or Amazon EFS. Exam Scenario: \"A 3rd party partner needs to upload weekly reports via SFTP. We do not want to manage EC2 instances for this.\" -> AWS Transfer Family . 6. AWS DataSync - Overview An online data transfer service designed to automate moving data between on-premises storage and AWS. Mechanism: Requires a DataSync Agent (VM) installed on-premises. Protocol: Uses a proprietary, accelerated network protocol (not standard traffic) over Internet or Direct Connect. Speed: Much faster than standard command-line tools (like AWS CLI cp ). Destinations: S3, EFS, FSx for Windows, FSx for Lustre. Scheduling: Supports bandwidth throttling and scheduling (e.g., \"transfer only at night\"). Exam Scenario: \"Migrating a large on-prem NFS server to EFS over the weekend\" or \"Ongoing replication of on-prem data to AWS.\" 7. All AWS Storage Options Compared (Cheat Sheet) Scenario Best Service Why? Object Storage (Images, Videos, Backups) S3 Limitless, serverless, web-accessible. Block Storage (OS Boot Volume, Database) EBS Low latency, attached to one EC2 instance. Shared File Storage (Linux EC2 instances) EFS POSIX compliant, scales automatically, multi-AZ. Shared File Storage (Windows EC2 instances) FSx for Windows Native SMB, AD integration. HPC / Parallel File System FSx for Lustre High throughput, links to S3. Local Cache + Cloud Backed Files S3 File Gateway NFS/SMB interface on-prem, data lives in S3. Local Cache + Cloud Backed Block Volume Gateway iSCSI interface, extends on-prem disks to cloud. Replace Physical Tapes Tape Gateway VTL interface, cheap archive in Glacier. Offline Migration (Petabytes) Snowball Edge No internet bandwidth used. Online Migration (NFS/SMB to AWS) DataSync Automated, accelerated, agent-based. Partner SFTP Uploads Transfer Family Fully managed SFTP endpoint. 8. Simplified Decision Tree (Memory Aids) Use these short \"If-Then\" rules to answer questions quickly. Rule 1: Moving Data to AWS No Internet (or \"weeks to transfer\")? $\\rightarrow$ Snowball Has Internet (Fast/Direct Connect)? $\\rightarrow$ DataSync SFTP / FTP Protocol? $\\rightarrow$ Transfer Family Rule 2: Hybrid Access (Storage Gateway) Need to see FILES? (NFS/SMB) $\\rightarrow$ S3 File Gateway Need a DISK? (iSCSI) $\\rightarrow$ Volume Gateway Need to Replace TAPES? $\\rightarrow$ Tape Gateway Rule 3: FSx Keywords Windows / Active Directory / SMB $\\rightarrow$ FSx for Windows Linux / HPC / \"Scratch\" $\\rightarrow$ FSx for Lustre NetApp $\\rightarrow$ FSx for ONTAP Rule 4: Lustre Types Fast & Temporary $\\rightarrow$ Scratch (Not replicated, cheaper) Long-term & Safe $\\rightarrow$ Persistent (Replicated, higher availability)"}, {"id": 12, "num": "12", "title": "Decoupling applications (SQS, SNS, Kinesis, Active MQ)", "html": "<h1>AWS SAA-C03 Study Notes: Decoupling Applications<\/h1>\n<h2>1. Introduction to Messaging<\/h2>\n<ul>\n<li><strong>Synchronous Communication:<\/strong> Application components talk directly to each other (e.g., Service A calls Service B). If Service B fails or slows down, Service A fails or slows down.<\/li>\n<li><strong>Asynchronous Communication (Decoupling):<\/strong> A buffer (queue or topic) is placed between components.<ul>\n<li>Service A (Producer) sends a message to the buffer.<\/li>\n<li>Service B (Consumer) reads from the buffer when ready.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Benefits:<\/strong><ul>\n<li><strong>Scalability:<\/strong> Components scale independently.<\/li>\n<li><strong>Resiliency:<\/strong> If the consumer is down, messages are stored, not lost.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>2. Amazon SQS - Standard Queues Overview<\/h2>\n<ul>\n<li><strong>SQS (Simple Queue Service):<\/strong> Fully managed message queuing service. Pull-based.<\/li>\n<li><strong>Standard Queue Attributes:<\/strong><ul>\n<li><strong>Unlimited Throughput:<\/strong> Supports nearly unlimited API calls per second.<\/li>\n<li><strong>At-Least-Once Delivery:<\/strong> Messages are guaranteed to be delivered, but <strong>duplicates<\/strong> may occur.<\/li>\n<li><strong>Best-Effort Ordering:<\/strong> Messages are generally delivered in order, but exact order is <strong>not<\/strong> guaranteed.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Data Retention:<\/strong> Default 4 days, maximum 14 days.<\/li>\n<li><strong>Message Size:<\/strong> Max 256KB (Use SQS Extended Client library + S3 for larger messages).<\/li>\n<\/ul>\n<h2>3. SQS - Message Visibility Timeout<\/h2>\n<ul>\n<li><strong>Concept:<\/strong> When a consumer polls a message, it becomes \"invisible\" to other consumers so it isn't processed twice simultaneously. It is <em>not<\/em> deleted yet.<\/li>\n<li><strong>Default Timeout:<\/strong> 30 seconds.<\/li>\n<li><strong>Scenario:<\/strong> If processing takes longer than the timeout, the message reappears in the queue and is processed again (duplicate processing).<\/li>\n<li><strong>Solution:<\/strong> The consumer must call the <code>ChangeMessageVisibility<\/code> API to get more time if processing is heavy.<\/li>\n<li><strong>Dead Letter Queue (DLQ):<\/strong> If a message fails processing multiple times (max receives threshold), it is sent to a DLQ for debugging.<\/li>\n<\/ul>\n<h2>4. SQS - Long Polling<\/h2>\n<ul>\n<li><strong>Short Polling (Default):<\/strong> Returns immediately, even if the queue is empty (returns distinct empty response). Can be expensive due to API costs.<\/li>\n<li><strong>Long Polling:<\/strong> The consumer waits (up to 20 seconds) for a message to arrive in the queue.<\/li>\n<li><strong>Benefits:<\/strong><ul>\n<li>Decreases the number of empty responses.<\/li>\n<li>Reduces latency (message is sent to consumer immediately upon arrival).<\/li>\n<li><strong>Reduces Cost<\/strong> (fewer API calls).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Configuration:<\/strong> Can be set at the Queue level (<code>ReceiveMessageWaitTimeSeconds<\/code>) or the API call level (<code>WaitTimeSeconds<\/code>).<\/li>\n<\/ul>\n<h2>5. SQS - FIFO Queues (First-In-First-Out)<\/h2>\n<ul>\n<li><strong>Use Case:<\/strong> When order is critical and duplicates are not allowed (e.g., banking transactions).<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li><strong>First-In-First-Out Delivery:<\/strong> Strictly preserves message order.<\/li>\n<li><strong>Exactly-Once Processing:<\/strong> No duplicates.<\/li>\n<li><strong>Limited Throughput:<\/strong> 300 msg/s without batching; 3,000 msg/s with batching.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Deduplication ID:<\/strong> Used to prevent duplicate messages sent by the producer.<\/li>\n<li><strong>Message Group ID:<\/strong> Allows parallel processing of different groups (e.g., Bus ID 1, Bus ID 2) while maintaining order <em>within<\/em> the group.<\/li>\n<\/ul>\n<h2>6. SQS + Auto Scaling Group (ASG)<\/h2>\n<ul>\n<li><strong>Pattern:<\/strong> Elastic scaling based on load.<\/li>\n<li><strong>Metric:<\/strong> CloudWatch Metric <code>ApproximateNumberOfMessagesVisible<\/code>.<\/li>\n<li><strong>Workflow:<\/strong><ol>\n<li>Queue length increases.<\/li>\n<li>CloudWatch Alarm triggers.<\/li>\n<li>ASG Scale-Out Policy adds EC2 instances to process messages faster.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Target Tracking:<\/strong> The most effective scaling policy (e.g., \"Keep backlog per instance at 1000\").<\/li>\n<\/ul>\n<h2>7. Amazon Simple Notification Service (AWS SNS)<\/h2>\n<ul>\n<li><strong>Pattern:<\/strong> Pub/Sub (Publish/Subscribe). Push-based.<\/li>\n<li><strong>Producer:<\/strong> Sends one message to an SNS <strong>Topic<\/strong>.<\/li>\n<li><strong>Subscribers:<\/strong> Can be SQS, Lambda, HTTP/S endpoint, Email, SMS, Mobile Push.<\/li>\n<li><strong>Key Features:<\/strong><ul>\n<li>Instant push delivery (no polling).<\/li>\n<li><strong>Message Filtering:<\/strong> JSON policy allows subscribers to only receive a subset of messages.<\/li>\n<li><strong>Encryption:<\/strong> Standard encryption in transit and at rest.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>8. SNS and SQS - Fan Out Pattern<\/h2>\n<ul>\n<li><strong>Problem:<\/strong> You want to send one message (e.g., \"New Order Placed\") but trigger multiple independent actions (Email User, Update Inventory, Notify Fraud Service).<\/li>\n<li><strong>Solution:<\/strong><ol>\n<li>Create an SNS Topic.<\/li>\n<li>Create multiple SQS Queues (one for Inventory, one for Fraud, etc.).<\/li>\n<li><strong>Subscribe<\/strong> the SQS Queues to the SNS Topic.<\/li>\n<li>Publish the message <em>once<\/em> to SNS.<\/li>\n<\/ol>\n<\/li>\n<li><strong>Result:<\/strong> SNS pushes the message to all SQS queues in parallel. The services process from their own queues at their own pace. ensures <strong>data persistence<\/strong> and <strong>decoupling<\/strong>.<\/li>\n<\/ul>\n<h2>9. Amazon Kinesis Data Streams<\/h2>\n<ul>\n<li><strong>Purpose:<\/strong> Ingest real-time streaming data at scale (logs, metrics, IoT, clickstreams) for Big Data analytics.<\/li>\n<li><strong>Architecture:<\/strong><ul>\n<li><strong>Shards:<\/strong> Streams are divided into Shards. 1 Shard = 1MB/s write or 1000 records/s.<\/li>\n<li><strong>Retention:<\/strong> Default 24 hours, up to 365 days. (Unlike SQS, data is <em>not<\/em> deleted after consumption; it expires).<\/li>\n<li><strong>Ordering:<\/strong> Ordered <em>per shard<\/em>.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Capacity Modes:<\/strong><ul>\n<li><strong>Provisioned:<\/strong> You choose number of shards manually.<\/li>\n<li><strong>On-Demand:<\/strong> AWS scales shards automatically.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h2>10. Amazon Data Firehose (formerly Kinesis Firehose)<\/h2>\n<ul>\n<li><strong>Purpose:<\/strong> Fully managed service to <strong>load<\/strong> streaming data into destinations.<\/li>\n<li><strong>Destinations:<\/strong> Amazon S3, Redshift, OpenSearch, Splunk, HTTP Endpoint.<\/li>\n<li><strong>Nature:<\/strong> Near real-time (lowest latency is 60 seconds).<\/li>\n<li><strong>Features:<\/strong><ul>\n<li>Auto-scaling (no shards to manage).<\/li>\n<li>Data Transformation (via Lambda) supports format conversion (e.g., JSON to Parquet).<\/li>\n<li>Compression (GZIP, Snappy).<\/li>\n<\/ul>\n<\/li>\n<li><strong>Exam Tip:<\/strong> If the question asks to \"store streaming data into S3/Redshift,\" think Firehose.<\/li>\n<\/ul>\n<h2>11. SQS vs SNS vs Kinesis (Comparison Cheat Sheet)<\/h2>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th>SQS<\/th>\n<th>SNS<\/th>\n<th>Kinesis Data Streams<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Model<\/strong><\/td>\n<td>Pull (Polling)<\/td>\n<td>Push (Pub/Sub)<\/td>\n<td>Pull (Real-time Streaming)<\/td>\n<\/tr>\n<tr>\n<td><strong>Entity<\/strong><\/td>\n<td>Queue<\/td>\n<td>Topic<\/td>\n<td>Stream (Shards)<\/td>\n<\/tr>\n<tr>\n<td><strong>Consumption<\/strong><\/td>\n<td>1 consumer (usually) deletes msg after processing<\/td>\n<td>Many subscribers receive copy<\/td>\n<td>Multiple consumers can read same stream (Replay)<\/td>\n<\/tr>\n<tr>\n<td><strong>Persistence<\/strong><\/td>\n<td>Yes (Deleted on success)<\/td>\n<td>No (Lost if not delivered*)<\/td>\n<td>Yes (Expires after retention)<\/td>\n<\/tr>\n<tr>\n<td><strong>Use Case<\/strong><\/td>\n<td>Decoupling jobs, Batch processing<\/td>\n<td>Notifications, Fan-out<\/td>\n<td>Real-time Analytics, Big Data, Clickstreams<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p><em>*Note: SNS can utilize DLQs for failed deliveries, but doesn't persist history like Kinesis.<\/em><\/p>\n<h2>12. Amazon MQ<\/h2>\n<ul>\n<li><strong>What is it?<\/strong> Managed Apache ActiveMQ and RabbitMQ service.<\/li>\n<li><strong>When to use (Exam Scenario):<\/strong><ul>\n<li>You are migrating an existing on-premise application to AWS.<\/li>\n<li>The app uses standard protocols like <strong>MQTT, AMQP, STOMP, OpenWire<\/strong>.<\/li>\n<li>You do <strong>not<\/strong> want to rewrite the application code to use SQS/SNS APIs.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Architecture:<\/strong><ul>\n<li>Runs on dedicated servers (not serverless like SQS/SNS).<\/li>\n<li>Multi-AZ setup required for High Availability (Active/Standby).<\/li>\n<\/ul>\n<\/li>\n<\/ul>", "text": "AWS SAA-C03 Study Notes: Decoupling Applications 1. Introduction to Messaging Synchronous Communication: Application components talk directly to each other (e.g., Service A calls Service B). If Service B fails or slows down, Service A fails or slows down. Asynchronous Communication (Decoupling): A buffer (queue or topic) is placed between components. Service A (Producer) sends a message to the buffer. Service B (Consumer) reads from the buffer when ready. Benefits: Scalability: Components scale independently. Resiliency: If the consumer is down, messages are stored, not lost. 2. Amazon SQS - Standard Queues Overview SQS (Simple Queue Service): Fully managed message queuing service. Pull-based. Standard Queue Attributes: Unlimited Throughput: Supports nearly unlimited API calls per second. At-Least-Once Delivery: Messages are guaranteed to be delivered, but duplicates may occur. Best-Effort Ordering: Messages are generally delivered in order, but exact order is not guaranteed. Data Retention: Default 4 days, maximum 14 days. Message Size: Max 256KB (Use SQS Extended Client library + S3 for larger messages). 3. SQS - Message Visibility Timeout Concept: When a consumer polls a message, it becomes \"invisible\" to other consumers so it isn't processed twice simultaneously. It is not deleted yet. Default Timeout: 30 seconds. Scenario: If processing takes longer than the timeout, the message reappears in the queue and is processed again (duplicate processing). Solution: The consumer must call the ChangeMessageVisibility API to get more time if processing is heavy. Dead Letter Queue (DLQ): If a message fails processing multiple times (max receives threshold), it is sent to a DLQ for debugging. 4. SQS - Long Polling Short Polling (Default): Returns immediately, even if the queue is empty (returns distinct empty response). Can be expensive due to API costs. Long Polling: The consumer waits (up to 20 seconds) for a message to arrive in the queue. Benefits: Decreases the number of empty responses. Reduces latency (message is sent to consumer immediately upon arrival). Reduces Cost (fewer API calls). Configuration: Can be set at the Queue level ( ReceiveMessageWaitTimeSeconds ) or the API call level ( WaitTimeSeconds ). 5. SQS - FIFO Queues (First-In-First-Out) Use Case: When order is critical and duplicates are not allowed (e.g., banking transactions). Key Features: First-In-First-Out Delivery: Strictly preserves message order. Exactly-Once Processing: No duplicates. Limited Throughput: 300 msg/s without batching; 3,000 msg/s with batching. Deduplication ID: Used to prevent duplicate messages sent by the producer. Message Group ID: Allows parallel processing of different groups (e.g., Bus ID 1, Bus ID 2) while maintaining order within the group. 6. SQS + Auto Scaling Group (ASG) Pattern: Elastic scaling based on load. Metric: CloudWatch Metric ApproximateNumberOfMessagesVisible . Workflow: Queue length increases. CloudWatch Alarm triggers. ASG Scale-Out Policy adds EC2 instances to process messages faster. Target Tracking: The most effective scaling policy (e.g., \"Keep backlog per instance at 1000\"). 7. Amazon Simple Notification Service (AWS SNS) Pattern: Pub/Sub (Publish/Subscribe). Push-based. Producer: Sends one message to an SNS Topic . Subscribers: Can be SQS, Lambda, HTTP/S endpoint, Email, SMS, Mobile Push. Key Features: Instant push delivery (no polling). Message Filtering: JSON policy allows subscribers to only receive a subset of messages. Encryption: Standard encryption in transit and at rest. 8. SNS and SQS - Fan Out Pattern Problem: You want to send one message (e.g., \"New Order Placed\") but trigger multiple independent actions (Email User, Update Inventory, Notify Fraud Service). Solution: Create an SNS Topic. Create multiple SQS Queues (one for Inventory, one for Fraud, etc.). Subscribe the SQS Queues to the SNS Topic. Publish the message once to SNS. Result: SNS pushes the message to all SQS queues in parallel. The services process from their own queues at their own pace. ensures data persistence and decoupling . 9. Amazon Kinesis Data Streams Purpose: Ingest real-time streaming data at scale (logs, metrics, IoT, clickstreams) for Big Data analytics. Architecture: Shards: Streams are divided into Shards. 1 Shard = 1MB/s write or 1000 records/s. Retention: Default 24 hours, up to 365 days. (Unlike SQS, data is not deleted after consumption; it expires). Ordering: Ordered per shard . Capacity Modes: Provisioned: You choose number of shards manually. On-Demand: AWS scales shards automatically. 10. Amazon Data Firehose (formerly Kinesis Firehose) Purpose: Fully managed service to load streaming data into destinations. Destinations: Amazon S3, Redshift, OpenSearch, Splunk, HTTP Endpoint. Nature: Near real-time (lowest latency is 60 seconds). Features: Auto-scaling (no shards to manage). Data Transformation (via Lambda) supports format conversion (e.g., JSON to Parquet). Compression (GZIP, Snappy). Exam Tip: If the question asks to \"store streaming data into S3/Redshift,\" think Firehose. 11. SQS vs SNS vs Kinesis (Comparison Cheat Sheet) Feature SQS SNS Kinesis Data Streams Model Pull (Polling) Push (Pub/Sub) Pull (Real-time Streaming) Entity Queue Topic Stream (Shards) Consumption 1 consumer (usually) deletes msg after processing Many subscribers receive copy Multiple consumers can read same stream (Replay) Persistence Yes (Deleted on success) No (Lost if not delivered*) Yes (Expires after retention) Use Case Decoupling jobs, Batch processing Notifications, Fan-out Real-time Analytics, Big Data, Clickstreams *Note: SNS can utilize DLQs for failed deliveries, but doesn't persist history like Kinesis. 12. Amazon MQ What is it? Managed Apache ActiveMQ and RabbitMQ service. When to use (Exam Scenario): You are migrating an existing on-premise application to AWS. The app uses standard protocols like MQTT, AMQP, STOMP, OpenWire . You do not want to rewrite the application code to use SQS/SNS APIs. Architecture: Runs on dedicated servers (not serverless like SQS/SNS). Multi-AZ setup required for High Availability (Active/Standby)."}, {"id": 13, "num": "13", "title": "Containers on AWS (ECS, Fargate, ECR & EKS)", "html": "<h1>AWS SAA-C03 Study Notes: Containers on AWS<\/h1>\n<h2>1. Docker Introduction<\/h2>\n<p><em>For the exam, you don't need to be a Docker expert, but you must understand the terminology to interpret architecture questions.<\/em><\/p>\n<ul>\n<li><strong>Docker:<\/strong> A platform to develop, ship, and run applications in isolated environments called containers.<\/li>\n<li><strong>Container:<\/strong> A lightweight, standalone, executable package that includes everything needed to run a piece of software (code, runtime, system tools, libraries).<\/li>\n<li><strong>Dockerfile:<\/strong> A text document that contains all the commands to assemble an image.<\/li>\n<li><strong>Docker Image:<\/strong> A read-only template with instructions for creating a Docker container.<\/li>\n<li><strong>Registry:<\/strong> A place to store images (e.g., Docker Hub, <strong>Amazon ECR<\/strong>).<\/li>\n<li><strong>Key Exam Concept:<\/strong> Containers solve the \"it works on my machine\" problem and provide portability across different computing environments (Dev -&gt; Test -&gt; Prod).<\/li>\n<\/ul>\n<h2>2. Amazon ECS (Elastic Container Service)<\/h2>\n<p><em>ECS is AWS's proprietary container orchestration tool. It is highly integrated with other AWS services.<\/em><\/p>\n<h3>Core Components<\/h3>\n<ol>\n<li><strong>Cluster:<\/strong> A logical grouping of tasks or services. It can run on EC2 instances or Fargate (serverless).<\/li>\n<li><strong>Task Definition:<\/strong> A blueprint (JSON file) that describes the container(s) (e.g., Image URI, CPU/Memory, Ports, Environment Variables). Similar to a Docker Compose file.<\/li>\n<li><strong>Task:<\/strong> A running instance of a Task Definition.<\/li>\n<li><strong>Service:<\/strong> Ensures that a specified number of Tasks are constantly running. Handles replacing failed tasks and registering them with Load Balancers.<\/li>\n<\/ol>\n<h3>Compute Options &amp; Launch Types (CRITICAL for Exam)<\/h3>\n<p>There are now three primary ways to host your tasks, ranging from fully serverless to fully self-managed.<\/p>\n<table>\n<thead>\n<tr>\n<th>Feature<\/th>\n<th><strong>Fargate<\/strong> (Serverless)<\/th>\n<th><strong>ECS Managed Instances<\/strong> (Hybrid)<\/th>\n<th><strong>EC2 Launch Type<\/strong> (Self-Managed)<\/th>\n<\/tr>\n<\/
