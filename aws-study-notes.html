 resources (e.g., ensure an S3 bucket is created before the Lambda function that uses it). 2. CloudFormation - Service Role The Problem: A user (e.g., a Junior Dev) needs to create a stack that includes IAM roles or VPCs, but they don't have permission to create those specific resources directly. The Solution: Assign a Service Role to the CloudFormation Stack. How it works: An Admin creates an IAM Role (Service Role) with powerful permissions (e.g., AdministratorAccess ). The Admin grants the Junior Dev permission to PassRole to CloudFormation. The Junior Dev launches the stack and selects this Service Role. CloudFormation uses the Service Role's permissions to create the resources, not the Junior Dev's permissions. Exam Keyword: \"Least Privilege\" for users while allowing them to deploy approved infrastructure. 3. Amazon SES (Simple Email Service) Primary Use Case: Sending and receiving transactional emails at scale. Scenarios: Application needs to send password resets, order confirmations, or OTPs. Marketing emails where you manage the list and content logic yourself. Hybrid: specific need to send email from an on-premises app through AWS (uses SMTP interface). Differentiation: If the question mentions \"marketing campaigns,\" \"user engagement,\" or \"analytics,\" look at Pinpoint instead. SES is the raw engine; Pinpoint is the marketing brain. 4. Amazon Pinpoint Primary Use Case: Marketing communications , user engagement, and segmentation. Key Features: Channels: Sends Email, SMS, Push Notifications, and Voice messages. Segmentation: \"Send a coupon to all users who haven't opened the app in 30 days.\" Campaigns & Journeys: Orchestrates multi-step user experiences. Exam Hint: Look for keywords like \"marketing campaigns,\" \"user behavior analysis,\" \"targeted segments,\" or \"push notifications.\" 5. SSM Session Manager (Systems Manager) Concept: Securely manage EC2 instances without opening inbound ports (No SSH/Port 22 required). Architecture: Agent-based (SSM Agent must be installed/running). Instance needs an IAM role with AmazonSSMManagedInstanceCore . Traffic flows via AWS Systems Manager API (HTTPS), not SSH. Exam Scenarios: \"How to securely access an instance in a private subnet with no Bastion Host?\" -> Session Manager . \"Need to audit who accessed an instance and what commands they ran?\" -> Session Manager (logs session data to S3 or CloudWatch Logs). 6. SSM Other Services (High Probability) SSM Parameter Store: Stores configuration data (database strings, license codes) and secrets (passwords). Free tier available (Standard). Integration: Works natively with CloudFormation, ECS, and Lambda. Vs. Secrets Manager: Parameter Store is cheaper/free but lacks automatic rotation (unless you write a custom Lambda). Secrets Manager has built-in rotation. SSM Patch Manager: Automates patching for managed instances (OS updates). Uses Patch Baselines to define approved patches (e.g., \"Critical updates only\"). Can patch large fleets of EC2 instances and on-prem servers during a Maintenance Window . SSM Run Command: Execute scripts/commands on a fleet of instances remotely and securely (no SSH). 7. AWS Cost Explorer Primary Use Case: Visualizing and analyzing historical cost and usage data. Features: View costs for the last 12 months. Forecast spend for the next 12 months. Rightsizing Recommendations: Identifies underutilized EC2 instances (e.g., \"You are using m5.large but only need m5.medium\"). Exam Hint: If the question asks to \"analyze spending trends\" or \"forecast future costs,\" it's Cost Explorer. 8. AWS Cost Anomaly Detection Primary Use Case: Automated monitoring to detect unusual spending spikes using Machine Learning. How it works: It learns your baseline usage patterns. If costs spike unexpectedly (e.g., a developer accidentally left a large instance running), it sends an alert (SNS email). Differentiation: Cost Explorer: You go to look at the data. Anomaly Detection: It alerts you when something is wrong. AWS Budgets: You set a static limit (e.g., \"Alert me if spend > $100\"). Anomaly Detection finds the \"unknown unknowns.\" 9. AWS Outposts Concept: Hybrid Cloud. Run AWS infrastructure and services (EC2, EBS, RDS, EKS) on-premises in your own data center. Physical Form: A physical rack of servers delivered by AWS to your location. Use Cases: Low Latency: Applications that need single-digit millisecond latency to on-prem machinery/systems. Data Residency: Data must remain in a specific physical location for regulatory reasons (where no AWS Region exists). Vs. Local Zones: Outposts = Your Data Center. Local Zones = AWS infrastructure in a specific city (managed by AWS, not in your building). 10. AWS Batch Primary Use Case: Running hundreds/thousands of batch computing jobs efficiently. Architecture: Dynamically provisions compute resources (e.g., EC2 Spot Instances) based on job volume. Uses Docker containers. Vs. Lambda: Lambda has a 15-minute timeout . If a job takes > 15 minutes, use AWS Batch . If the workload involves complex dependencies or huge disk requirements, use AWS Batch 11. Amazon AppFlow Concept: Fully managed integration service to securely transfer data between SaaS applications and AWS. Connectors: Salesforce, ServiceNow, Slack, Zendesk, Marketo, Google Analytics. Destinations: S3, Redshift, Snowflake. Exam Scenario: \"Company wants to analyze Salesforce data in Redshift. How to transfer the data with the least operational overhead?\" -> Amazon AppFlow . (No coding required). 12. AWS Amplify Target Audience: Front-end web and mobile developers. Function: A set of tools to build, deploy, and host full-stack applications. Key Features: Amplify Hosting: CI/CD for static web apps (connects to Git repo). Amplify Studio: Visual interface to build backend (Auth, DataStore/Storage) without deep cloud expertise. Authentication: Easy wrapper around Amazon Cognito. 13. Instance Scheduler on AWS Important: This is an AWS Solution (a pre-built CloudFormation template you deploy), not a standalone service in the console \"Service\" dropdown. Function: Automatically starts and stops EC2 and RDS instances on a schedule (e.g., Stop at 6 PM Friday, Start at 8 AM Monday). Architecture (Exam setup): Uses Amazon EventBridge to trigger a Lambda function . Configuration (schedules) is stored in DynamoDB . Tags are used to identify which instances to schedule. Benefit: drastic cost reduction for non-production environments (dev/test)."}];
const $ = id => document.getElementById(id);
let cur = 0;
const done = new Set();
let pendingHighlight = null;

/* ---------- sidebar ---------- */
function renderList(){
  const ul = $("chlist"); ul.innerHTML = "";
  CHAPTERS.forEach((c,i)=>{
    const li = document.createElement("li");
    const b = document.createElement("button");
    b.className = i===cur ? "on" : "";
    b.innerHTML = '<span class="n">'+c.num+'</span><span>'+esc(c.title)+'</span>'
      + (done.has(i) ? '<span class="done-mark">✓</span>' : '');
    b.onclick = ()=>{ open(i); $("side").classList.remove("open"); };
    li.appendChild(b); ul.appendChild(li);
  });
  $("progressLine").textContent = done.size + " / " + CHAPTERS.length + " chapters read";
}

/* ---------- chapter render ---------- */
function open(i, anchor){
  cur = i;
  const c = CHAPTERS[i];
  $("crumb").textContent = "Chapter " + c.num;
  $("chTitle").textContent = c.title;
  $("content").innerHTML = c.html;
  decorateTips();
  buildTOC();
  updateDoneBtn();
  renderList();
  const prev = CHAPTERS[i-1], next = CHAPTERS[i+1];
  $("prevBtn").disabled = !prev; $("prevT").textContent = prev ? prev.num+". "+prev.title : "—";
  $("nextBtn").disabled = !next; $("nextT").textContent = next ? next.num+". "+next.title : "—";
  if(pendingHighlight){ highlight(pendingHighlight); pendingHighlight = null; }
  else window.scrollTo({top:0});
}

function decorateTips(){
  $("content").querySelectorAll("em").forEach(em=>{
    if(/^\s*Exam Tip/i.test(em.textContent)){
      const host = em.closest("li,p");
      if(host) host.classList.add("exam-tip");
    }
  });
}

/* ---------- toc ---------- */
function buildTOC(){
  const toc = $("toc"); toc.innerHTML = '<div class="toc-head">On this page</div>';
  const hs = $("content").querySelectorAll("h2,h3");
  hs.forEach((h,idx)=>{
    h.id = "h-"+idx;
    const a = document.createElement("a");
    a.href = "#h-"+idx;
    a.textContent = h.textContent;
    if(h.tagName==="H3") a.className="h3";
    toc.appendChild(a);
  });
  // scroll spy
  const links = toc.querySelectorAll("a");
  if("IntersectionObserver" in window){
    const io = new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          links.forEach(l=>l.classList.toggle("now", l.getAttribute("href")==="#"+e.target.id));
        }
      });
    },{rootMargin:"0px 0px -75% 0px"});
    hs.forEach(h=>io.observe(h));
  }
}

/* ---------- done toggle ---------- */
function updateDoneBtn(){
  const on = done.has(cur);
  $("doneBtn").className = "done-toggle" + (on ? " on" : "");
  $("doneBtn").textContent = on ? "✓ Read" : "✓ Mark as read";
}
$("doneBtn").onclick = ()=>{
  done.has(cur) ? done.delete(cur) : done.add(cur);
  updateDoneBtn(); renderList();
};

/* ---------- search ---------- */
$("q").addEventListener("input", e=>{
  const q = e.target.value.trim().toLowerCase();
  const box = $("results");
  if(q.length < 2){ box.classList.remove("show"); box.innerHTML=""; return; }
  const hits = [];
  CHAPTERS.forEach((c,i)=>{
    const t = c.text.toLowerCase();
    let pos = t.indexOf(q), n = 0;
    while(pos !== -1 && n < 1){ // first snippet per chapter
      const s = Math.max(0, pos-45), e2 = Math.min(t.length, pos+q.length+60);
      hits.push({i, snippet: c.text.slice(s, e2), count: (t.split(q).length-1)});
      n++; pos = t.indexOf(q, pos+1);
    }
  });
  box.classList.add("show");
  if(!hits.length){ box.innerHTML = '<div class="r-none">No matches.</div>'; return; }
  box.innerHTML = "";
  hits.slice(0,12).forEach(h=>{
    const c = CHAPTERS[h.i];
    const d = document.createElement("div");
    d.className = "r-item";
    const snip = esc(h.snippet).replace(new RegExp(escReg(q),"ig"), m=>"<b>"+m+"</b>");
    d.innerHTML = '<div class="r-title">'+c.num+". "+esc(c.title)+' · '+h.count+' match'+(h.count>1?'es':'')+'</div><div class="r-snip">…'+snip+'…</div>';
    d.onclick = ()=>{ pendingHighlight = q; open(h.i); $("side").classList.remove("open"); };
    box.appendChild(d);
  });
});

function highlight(q){
  const walker = document.createTreeWalker($("content"), NodeFilter.SHOW_TEXT);
  const rx = new RegExp(escReg(q), "ig");
  const targets = [];
  while(walker.nextNode()){
    const node = walker.currentNode;
    if(node.parentElement.closest("script,style")) continue;
    if(rx.test(node.textContent)) targets.push(node);
    rx.lastIndex = 0;
  }
  targets.forEach(node=>{
    const frag = document.createDocumentFragment();
    let last = 0, m; const s = node.textContent;
    while((m = rx.exec(s))){
      frag.appendChild(document.createTextNode(s.slice(last, m.index)));
      const mk = document.createElement("mark"); mk.textContent = m[0]; frag.appendChild(mk);
      last = m.index + m[0].length;
    }
    frag.appendChild(document.createTextNode(s.slice(last)));
    node.parentNode.replaceChild(frag, node);
  });
  const first = $("content").querySelector("mark");
  if(first) setTimeout(()=>first.scrollIntoView({block:"center"}), 60);
}

/* ---------- nav & keys ---------- */
$("prevBtn").onclick = ()=>{ if(cur>0) open(cur-1); };
$("nextBtn").onclick = ()=>{ if(cur<CHAPTERS.length-1) open(cur+1); };
$("menuBtn").onclick = ()=> $("side").classList.toggle("open");
document.addEventListener("keydown", e=>{
  const tag = document.activeElement && document.activeElement.tagName;
  if(tag==="INPUT" || tag==="TEXTAREA"){
    if(e.key==="Escape"){ document.activeElement.blur(); $("results").classList.remove("show"); }
    return;
  }
  if(e.key==="ArrowLeft" && cur>0) open(cur-1);
  if(e.key==="ArrowRight" && cur<CHAPTERS.length-1) open(cur+1);
  if(e.key==="/"){ e.preventDefault(); $("q").focus(); }
});

/* ---------- utils ---------- */
function esc(s){ return s.replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function escReg(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

renderList();
open(0);
</script>
